articles:
- number: '47'
  text: "1 Ieder is gehouden desgevraagd aan de inspecteur:\n  a. de gegevens en inlichtingen\
    \ te verstrekken welke voor de belastingheffing te zijnen aanzien van belang kunnen\
    \ zijn;\n  b. de boeken, bescheiden en andere gegevensdragers of de inhoud daarvan\
    \ - zulks ter keuze van de inspecteur - waarvan de raadpleging van belang kan\
    \ zijn voor de vaststelling van de feiten welke invloed kunnen uitoefenen op de\
    \ belastingheffing te zijnen aanzien, voor dit doel beschikbaar te stellen.\n\
    2 Ingeval de belastingwet aangelegenheden van een derde aanmerkt als aangelegenheden\
    \ van degene die vermoedelijk belastingplichtig is, gelden, voor zover het deze\
    \ aangelegenheden betreft, gelijke verplichtingen voor de derde.\n3 Een ieder\
    \ die de leeftijd van veertien jaar heeft bereikt, is verplicht op vordering van\
    \ de inspecteur terstond een identiteitsbewijs als bedoeld in artikel 1 van de\
    \ Wet op de identificatieplicht ter inzage aan te bieden, indien dit van belang\
    \ kan zijn voor de belastingheffing te zijnen aanzien."
  url: https://wetten.overheid.nl/BWBR0002320/2020-01-01#Artikel47
