articles:
- number: 7a
  text: "1 De pensioengerechtigde leeftijd en de aanvangsleeftijd zijn:\n  a. vóór\
    \ 1 januari 2013: 65, respectievelijk 15 jaar;\n  b. in 2013: 65 jaar en één maand,\
    \ respectievelijk 15 jaar en één maand;\n  c. in 2014: 65 jaar en twee maanden,\
    \ respectievelijk 15 jaar en twee maanden;\n  d. in 2015: 65 jaar en drie maanden,\
    \ respectievelijk 15 jaar en drie maanden;\n  e. in 2016: 65 jaar en zes maanden,\
    \ respectievelijk 15 jaar en zes maanden;\n  f. in 2017: 65 jaar en negen maanden,\
    \ respectievelijk 15 jaar en negen maanden;\n  g. in 2018: 66 jaar, respectievelijk\
    \ 16 jaar;\n  h. in 2019: 66 jaar en vier maanden, respectievelijk 16 jaar en\
    \ vier maanden;\n  i. in 2020: 66 jaar en vier maanden, respectievelijk 16 jaar\
    \ en vier maanden;\n  j. in 2021: 66 jaar en vier maanden, respectievelijk 16\
    \ jaar en vier maanden;\n  k. in 2022: 66 jaar en zeven maanden, respectievelijk\
    \ 16 jaar en zeven maanden;\n  l. in 2023: 66 jaar en tien maanden, respectievelijk\
    \ 16 jaar en tien maanden;\n  m. in 2024: 67 jaar, respectievelijk 17 jaar;\n\
    \  n. in 2025 en de kalenderjaren daarna: de pensioengerechtigde leeftijd en de\
    \ aanvangsleeftijd, die jaarlijks op basis van de verhoging van de pensioengerechtigde\
    \ leeftijd en de aanvangsleeftijd op grond van het tweede lid worden vastgesteld.\n\
    Op pensioengerechtigden die in een bepaald kalenderjaar de pensioengerechtigde\
    \ leeftijd hebben bereikt zijn de pensioengerechtigde leeftijd en de aanvangsleeftijd\
    \ in de kalenderjaren daarna niet van toepassing.\n2 De verhoging van de pensioengerechtigde\
    \ leeftijd en de aanvangsleeftijd in 2025 en de kalenderjaren daarna wordt jaarlijks,\
    \ voor de eerste maal uiterlijk op 1 januari 2020 voor het jaar 2025, vastgesteld\
    \ volgens de volgende formule:\nV = (L – 18,26) – (P – 65)\nwaarbij:\nV staat\
    \ voor de periode waarmee de pensioengerechtigde leeftijd respectievelijk aanvangsleeftijd\
    \ wordt verhoogd, uitgedrukt in perioden van een jaar;\nL staat voor de geraamde\
    \ macro gemiddelde resterende levensverwachting op 65-jarige leeftijd in het kalenderjaar\
    \ van verhoging;\nP staat voor de pensioengerechtigde leeftijd in het kalenderjaar\
    \ voorafgaande aan het kalenderjaar van verhoging.\nIndien V negatief is of minder\
    \ dan 0,25 bedraagt, wordt deze gesteld op 0. Indien V 0,25 of meer bedraagt,\
    \ wordt deze gesteld op drie maanden.\nDe volgens de formule vastgestelde verdere\
    \ verhoging van de pensioengerechtigde leeftijd en de aanvangsleeftijd wordt door\
    \ of namens Onze Minister medegedeeld in de Staatscourant.\n3 De verhoging, bedoeld\
    \ in het tweede lid, treedt telkens in werking vijf jaar na de uiterste datum\
    \ van vaststelling, bedoeld in het tweede lid, voor de eerste maal met ingang\
    \ van 1 januari 2025.\n4 De ramingen van de macro gemiddelde resterende levensverwachting,\
    \ bedoeld in het tweede lid, worden uitgevoerd en bekendgemaakt door het CBS."
