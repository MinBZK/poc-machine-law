$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.0/schema.json
$id: wet_op_het_kindgebonden_budget
regulatory_layer: WET
publication_date: '2025-01-01'
valid_from: '2025-01-01'
name: Kindgebonden Budget
bwb_id: BWBR0022751
url: https://wetten.overheid.nl/BWBR0022751/2025-01-01
service: TOESLAGEN
uuid: 5d8e4b3a-6f9c-4a2d-8e7b-1c9f2a5b8d3e
discoverable: CITIZEN
articles:
- number: '2'
  text: ''
  url: https://wetten.overheid.nl/BWBR0022751/2025-01-01#Artikel2
  machine_readable:
    definitions:
      BASISBEDRAG_PER_KIND:
        value: 251100
      EXTRA_12_15_JAAR:
        value: 70300
      EXTRA_16_17_JAAR:
        value: 93600
      ALO_KOP:
        value: 348000
      DREMPELINKOMEN_ALLEENSTAAND:
        value: 2840600
      DREMPELINKOMEN_PARTNER:
        value: 4041600
      EXTRA_DREMPEL_PARTNER:
        value: 913900
      AFBOUWPERCENTAGE:
        value: 0.071
      VERMOGENSGRENS_ALLEENSTAAND:
        value: 14189600
      VERMOGENSGRENS_PARTNER:
        value: 17942900
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: HEEFT_PARTNER
        type: boolean
        source:
          regulation: wet_brp
          output: heeft_partner
          service: RvIG
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: PARTNER_BSN
        type: string
        source:
          regulation: wet_brp
          output: partner_bsn
          service: RvIG
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: AANTAL_KINDEREN
        type: number
        type_spec:
          precision: 0
          min: 0
        source:
          regulation: algemene_kinderbijslagwet
          output: aantal_kinderen
          service: SVB
      - name: KINDEREN_LEEFTIJDEN
        type: array
        source:
          regulation: algemene_kinderbijslagwet
          output: kinderen_leeftijden
          service: SVB
      - name: ONTVANGT_KINDERBIJSLAG
        type: boolean
        source:
          regulation: algemene_kinderbijslagwet
          output: ontvangt_kinderbijslag
          service: SVB
      - name: TOETSINGSINKOMEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: uwv_toetsingsinkomen
          output: toetsingsinkomen
          service: UWV
        temporal:
          type: period
          period_type: year
          immutable_after: P2Y
      - name: PARTNER_TOETSINGSINKOMEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: uwv_toetsingsinkomen
          output: toetsingsinkomen
          service: UWV
          parameters:
            BSN: $PARTNER_BSN
        temporal:
          type: period
          period_type: year
          immutable_after: P2Y
      - name: VERMOGEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: belastingdienst_vermogen
          output: vermogen
          service: BELASTINGDIENST
        temporal:
          type: point_in_time
          reference: $prev_january_first
      - name: PARTNER_VERMOGEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: belastingdienst_vermogen
          output: vermogen
          service: BELASTINGDIENST
          parameters:
            BSN: $PARTNER_BSN
        temporal:
          type: point_in_time
          reference: $prev_january_first
      output:
      - name: heeft_recht_op_kindgebonden_budget
        type: boolean
      - name: kindgebonden_budget_jaar
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: alo_kop_bedrag
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      requirements:
      - all:
        - subject: $ONTVANGT_KINDERBIJSLAG
          operation: EQUALS
          value: true
          legal_basis:
            law: Wet op het kindgebonden budget
            bwb_id: BWBR0022751
            article: '2'
            paragraph: '1'
            url: https://wetten.overheid.nl/BWBR0022751/2025-01-01#Artikel2
            juriconnect: jci1.3:c:BWBR0022751&artikel=2&lid=1&z=2025-01-01&g=2025-01-01
            explanation: Artikel 2 lid 1 vereist dat ouder kinderbijslag ontvangt
        - subject: $AANTAL_KINDEREN
          operation: GREATER_THAN
          value: 0
          legal_basis:
            law: Wet op het kindgebonden budget
            bwb_id: BWBR0022751
            article: '2'
            paragraph: '1'
            url: https://wetten.overheid.nl/BWBR0022751/2025-01-01#Artikel2
            juriconnect: jci1.3:c:BWBR0022751&artikel=2&lid=1&z=2025-01-01&g=2025-01-01
            explanation: Artikel 2 lid 1 bepaalt dat kindgebonden budget geldt per kind
        - operation: IF
          legal_basis:
            law: Wet op het kindgebonden budget
            bwb_id: BWBR0022751
            article: '3'
            paragraph: '1'
            url: https://wetten.overheid.nl/BWBR0022751/2025-01-01#Artikel3
            juriconnect: jci1.3:c:BWBR0022751&artikel=3&lid=1&z=2025-01-01&g=2025-01-01
            explanation: Artikel 3 lid 1 bepaalt de vermogensgrenzen
          conditions:
          - test:
              subject: $HEEFT_PARTNER
              operation: EQUALS
              value: true
            then:
              operation: LESS_THAN
              values:
              - operation: ADD
                values:
                - $VERMOGEN
                - $PARTNER_VERMOGEN
              - $VERMOGENSGRENS_PARTNER
          - else:
              operation: LESS_THAN
              values:
              - $VERMOGEN
              - $VERMOGENSGRENS_ALLEENSTAAND
      actions:
      - output: leeftijdstoeslagen
        value:
          operation: FOREACH
          subject: $KINDEREN_LEEFTIJDEN
          value:
          - operation: IF
            conditions:
            - test:
                operation: GREATER_OR_EQUAL
                subject: $leeftijd
                value: 16
              then:
                operation: IF
                conditions:
                - test:
                    operation: LESS_OR_EQUAL
                    subject: $leeftijd
                    value: 17
                  then: $EXTRA_16_17_JAAR
                - else: 0
            - test:
                operation: GREATER_OR_EQUAL
                subject: $leeftijd
                value: 12
              then:
                operation: IF
                conditions:
                - test:
                    operation: LESS_OR_EQUAL
                    subject: $leeftijd
                    value: 15
                  then: $EXTRA_12_15_JAAR
                - else: 0
            - else: 0
          combine: ADD
          as: leeftijd
      - output: alo_kop_bedrag
        value:
          operation: IF
          conditions:
          - test:
              operation: EQUALS
              subject: $HEEFT_PARTNER
              value: false
            then: $ALO_KOP
          - else: 0
        legal_basis:
          law: Wet op het kindgebonden budget
          bwb_id: BWBR0022751
          article: '2'
          paragraph: '6'
          url: https://wetten.overheid.nl/BWBR0022751/2025-01-01#Artikel2
          juriconnect: jci1.3:c:BWBR0022751&artikel=2&lid=6&z=2025-01-01&g=2025-01-01
          explanation: Artikel 2 lid 6 bepaalt dat alleenstaande ouders zonder partner recht hebben op verhoging van €3.480
      - output: heeft_partner
        value: $HEEFT_PARTNER
        legal_basis:
          law: Wet op het kindgebonden budget
          bwb_id: BWBR0022751
          article: '2'
          paragraph: '6'
          url: https://wetten.overheid.nl/BWBR0022751/2025-01-01#Artikel2
          juriconnect: jci1.3:c:BWBR0022751&artikel=2&lid=6&z=2025-01-01&g=2025-01-01
          explanation: Partnerstatus bepaalt of ALO-kop van toepassing is
      - output: kindgebonden_budget_jaar
        value:
          operation: IF
          conditions:
          - test:
              operation: EQUALS
              subject: $HEEFT_PARTNER
              value: false
            then:
              operation: MAX
              values:
              - operation: SUBTRACT
                values:
                - operation: ADD
                  values:
                  - operation: MULTIPLY
                    values:
                    - $AANTAL_KINDEREN
                    - $BASISBEDRAG_PER_KIND
                  - $leeftijdstoeslagen
                  - $alo_kop_bedrag
                - operation: IF
                  conditions:
                  - test:
                      operation: GREATER_THAN
                      subject: $TOETSINGSINKOMEN
                      value: $DREMPELINKOMEN_ALLEENSTAAND
                    then:
                      operation: MULTIPLY
                      values:
                      - operation: SUBTRACT
                        values:
                        - $TOETSINGSINKOMEN
                        - $DREMPELINKOMEN_ALLEENSTAAND
                      - $AFBOUWPERCENTAGE
                  - else: 0
              - 0
          - test:
              operation: EQUALS
              subject: $HEEFT_PARTNER
              value: true
            then:
              operation: MAX
              values:
              - operation: SUBTRACT
                values:
                - operation: ADD
                  values:
                  - operation: MULTIPLY
                    values:
                    - $AANTAL_KINDEREN
                    - $BASISBEDRAG_PER_KIND
                  - $leeftijdstoeslagen
                - operation: IF
                  conditions:
                  - test:
                      operation: GREATER_THAN
                      subject:
                        operation: ADD
                        values:
                        - $TOETSINGSINKOMEN
                        - $PARTNER_TOETSINGSINKOMEN
                      value:
                        operation: ADD
                        values:
                        - $DREMPELINKOMEN_PARTNER
                        - $EXTRA_DREMPEL_PARTNER
                    then:
                      operation: MULTIPLY
                      values:
                      - operation: SUBTRACT
                        values:
                        - operation: ADD
                          values:
                          - $TOETSINGSINKOMEN
                          - $PARTNER_TOETSINGSINKOMEN
                        - operation: ADD
                          values:
                          - $DREMPELINKOMEN_PARTNER
                          - $EXTRA_DREMPEL_PARTNER
                      - $AFBOUWPERCENTAGE
                  - else: 0
              - 0
        legal_basis:
          law: Wet op het kindgebonden budget
          bwb_id: BWBR0022751
          article: '2'
          url: https://wetten.overheid.nl/BWBR0022751/2025-01-01#Artikel2
          juriconnect: jci1.3:c:BWBR0022751&artikel=2&z=2025-01-01&g=2025-01-01
          explanation: Artikel 2 bepaalt berekening afhankelijk van partnerstatus en inkomen
