articles:
- number: '2'
  text: "1 Aanspraak op een kindgebonden budget heeft de ouder voor een kind voor wie aan die ouder op grond van artikel 18\
    \ van de Algemene Kinderbijslagwet kinderbijslag wordt betaald of zou worden betaald indien artikel 7, tweede lid van\
    \ die wet niet van toepassing zou zijn, met dien verstande dat de aanspraak op een kindgebonden budget bestaat met ingang\
    \ van de kalendermaand na de maand waarin het kind is geboren dan wel tot het huishouden is gaan behoren tot en met de\
    \ kalendermaand waarin het kind de leeftijd van 18 jaar bereikt.\n2 Het kindgebonden budget bedraagt voor een berekeningsjaar:\n\
    \  a. indien de ouder aanspraak heeft voor een kind: € 2.511;\n  b. indien de ouder aanspraak heeft voor twee of meer\
    \ kinderen: € 2.511 per kind voor het tweede of volgende kind.\n3 Een ouder heeft aanspraak op een verhoging van het kindgebonden\
    \ budget in een berekeningsjaar voor een kind met ingang van de kalendermaand na de maand waarin dat kind de leeftijd\
    \ van 12 jaar heeft bereikt.\n4 Voor een kind dat 12 jaar of ouder is, maar jonger is dan 16 jaar bedraagt de verhoging\
    \ van het kindgebonden budget € 703.\n5 Voor een kind dat 16 of 17 jaar is, bedraagt de verhoging van het kindgebonden\
    \ budget met ingang van de kalendermaand na de maand waarin het kind de leeftijd van 16 jaar heeft bereikt € 936,00.\n\
    6 De ouder die geen partner heeft, heeft aanspraak op een verhoging van het kindgebonden budget van € 3.389.\n7 Bij een\
    \ toetsingsinkomen van de ouder die geen partner heeft, van meer dan het drempelinkomen wordt de som van de bedragen waarop\
    \ recht bestaat op grond van het tweede, vierde, vijfde en zesde lid verminderd met 7,10% van het verschil tussen het\
    \ toetsingsinkomen en het drempelinkomen.\n8 Bij een gezamenlijk toetsingsinkomen van de ouder en zijn partner van meer\
    \ dan het met € 9.139,00 verhoogde drempelinkomen wordt de som van de bedragen waarop recht bestaat op grond van het tweede,\
    \ vierde en vijfde lid verminderd met 7,10% van het verschil tussen het gezamenlijk toetsingsinkomen en het met € 9.139,00\
    \ verhoogde drempelinkomen.\n9 Een ouder als bedoeld in het eerste en derde lid en zijn partner die tevens ouder is als\
    \ bedoeld in het eerste lid worden voor de toepassing van deze wet geacht gezamenlijk één aanspraak te hebben.\n10 Indien\
    \ aan twee ouders kinderbijslag wordt uitbetaald op basis van het recht op kinderbijslag van één van die ouders, heeft\
    \ alleen de ouder, wiens recht op kinderbijslag wordt uitbetaald aanspraak op een kindgebonden budget.\n11 De aanspraak\
    \ op een kindgebonden budget wordt voor iedere kalendermaand afzonderlijk bepaald.\n12 Indien de ouder:\n  a. aanspraak\
    \ heeft op kindgebonden budget voor een kind, en\n  b. voor dat kind voor de toepassing van de Algemene Kinderbijslagwet\
    \ een ander land dan Nederland, een van de andere lidstaten van de Europese Unie, een andere staat die partij is bij de\
    \ Overeenkomst betreffende de Europese Economische Ruimte en Zwitserland als woonland in aanmerking wordt genomen,\nbedraagt\
    \ het kindgebonden budget een bij ministeriële regeling vastgesteld percentage van de in het tweede lid, onderdeel a,\
    \ en vierde tot en met zesde lid bedoelde bedragen. Het percentage wordt zo bepaald dat het een weergave is van de verhouding\
    \ tussen het kostenniveau van het land dat als woonland in aanmerking wordt genomen en dat van Nederland. Het percentage\
    \ bedraagt maximaal 100.\n13 Indien de ouder:\n  a. aanspraak heeft op kindgebonden budget voor meer dan een kind, en\n\
    \  b. voor een of meer van die kinderen voor de toepassing van de Algemene Kinderbijslagwet een ander land dan Nederland,\
    \ een van de andere lidstaten van de Europese Unie, een andere staat die partij is bij de Overeenkomst betreffende de\
    \ Europese Economische Ruimte en Zwitserland als woonland in aanmerking wordt genomen,\nbedraagt het kindgebonden budget\
    \ een volgens bij ministeriële regeling te stellen regels vastgesteld bedrag. Dat bedrag is gebaseerd op de in het tweede\
    \ en vierde tot en met zesde lid, opgenomen bedragen en de verhouding tussen het kostenniveau van het land dat als woonland\
    \ in aanmerking wordt genomen voor het desbetreffende kind of voor de desbetreffende kinderen en dat van Nederland uitgedrukt\
    \ in procenten. Het percentage bedraagt maximaal 100.\n14 Het twaalfde en dertiende lid zijn niet van toepassing indien\
    \ het een kind betreft dat op de eerste dag van een kalenderkwartaal niet in Nederland woont doch langer dan drie maanden\
    \ onafgebroken in Nederland verblijft."
