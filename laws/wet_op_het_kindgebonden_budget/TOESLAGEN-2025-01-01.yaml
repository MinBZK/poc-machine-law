articles:
- number: '2'
  text: "1 Aanspraak op een kindgebonden budget heeft de ouder voor een kind voor\
    \ wie aan die ouder op grond van artikel 18 van de Algemene Kinderbijslagwet kinderbijslag\
    \ wordt betaald of zou worden betaald indien artikel 7, tweede lid van die wet\
    \ niet van toepassing zou zijn, met dien verstande dat de aanspraak op een kindgebonden\
    \ budget bestaat met ingang van de kalendermaand na de maand waarin het kind is\
    \ geboren dan wel tot het huishouden is gaan behoren tot en met de kalendermaand\
    \ waarin het kind de leeftijd van 18 jaar bereikt.\n2 Het kindgebonden budget\
    \ bedraagt voor een berekeningsjaar:\n  a. indien de ouder aanspraak heeft voor\
    \ een kind: € 2.511;\n  b. indien de ouder aanspraak heeft voor twee of meer kinderen:\
    \ € 2.511 per kind voor het tweede of volgende kind.\n3 Een ouder heeft aanspraak\
    \ op een verhoging van het kindgebonden budget in een berekeningsjaar voor een\
    \ kind met ingang van de kalendermaand na de maand waarin dat kind de leeftijd\
    \ van 12 jaar heeft bereikt.\n4 Voor een kind dat 12 jaar of ouder is, maar jonger\
    \ is dan 16 jaar bedraagt de verhoging van het kindgebonden budget € 703.\n5 Voor\
    \ een kind dat 16 of 17 jaar is, bedraagt de verhoging van het kindgebonden budget\
    \ met ingang van de kalendermaand na de maand waarin het kind de leeftijd van\
    \ 16 jaar heeft bereikt € 936,00.\n6 De ouder die geen partner heeft, heeft aanspraak\
    \ op een verhoging van het kindgebonden budget van € 3.389.\n7 Bij een toetsingsinkomen\
    \ van de ouder die geen partner heeft, van meer dan het drempelinkomen wordt de\
    \ som van de bedragen waarop recht bestaat op grond van het tweede, vierde, vijfde\
    \ en zesde lid verminderd met 7,10% van het verschil tussen het toetsingsinkomen\
    \ en het drempelinkomen.\n8 Bij een gezamenlijk toetsingsinkomen van de ouder\
    \ en zijn partner van meer dan het met € 9.139,00 verhoogde drempelinkomen wordt\
    \ de som van de bedragen waarop recht bestaat op grond van het tweede, vierde\
    \ en vijfde lid verminderd met 7,10% van het verschil tussen het gezamenlijk toetsingsinkomen\
    \ en het met € 9.139,00 verhoogde drempelinkomen.\n9 Een ouder als bedoeld in\
    \ het eerste en derde lid en zijn partner die tevens ouder is als bedoeld in het\
    \ eerste lid worden voor de toepassing van deze wet geacht gezamenlijk één aanspraak\
    \ te hebben.\n10 Indien aan twee ouders kinderbijslag wordt uitbetaald op basis\
    \ van het recht op kinderbijslag van één van die ouders, heeft alleen de ouder,\
    \ wiens recht op kinderbijslag wordt uitbetaald aanspraak op een kindgebonden\
    \ budget.\n11 De aanspraak op een kindgebonden budget wordt voor iedere kalendermaand\
    \ afzonderlijk bepaald.\n12 Indien de ouder:\n  a. aanspraak heeft op kindgebonden\
    \ budget voor een kind, en\n  b. voor dat kind voor de toepassing van de Algemene\
    \ Kinderbijslagwet een ander land dan Nederland, een van de andere lidstaten van\
    \ de Europese Unie, een andere staat die partij is bij de Overeenkomst betreffende\
    \ de Europese Economische Ruimte en Zwitserland als woonland in aanmerking wordt\
    \ genomen,\nbedraagt het kindgebonden budget een bij ministeriële regeling vastgesteld\
    \ percentage van de in het tweede lid, onderdeel a, en vierde tot en met zesde\
    \ lid bedoelde bedragen. Het percentage wordt zo bepaald dat het een weergave\
    \ is van de verhouding tussen het kostenniveau van het land dat als woonland in\
    \ aanmerking wordt genomen en dat van Nederland. Het percentage bedraagt maximaal\
    \ 100.\n13 Indien de ouder:\n  a. aanspraak heeft op kindgebonden budget voor\
    \ meer dan een kind, en\n  b. voor een of meer van die kinderen voor de toepassing\
    \ van de Algemene Kinderbijslagwet een ander land dan Nederland, een van de andere\
    \ lidstaten van de Europese Unie, een andere staat die partij is bij de Overeenkomst\
    \ betreffende de Europese Economische Ruimte en Zwitserland als woonland in aanmerking\
    \ wordt genomen,\nbedraagt het kindgebonden budget een volgens bij ministeriële\
    \ regeling te stellen regels vastgesteld bedrag. Dat bedrag is gebaseerd op de\
    \ in het tweede en vierde tot en met zesde lid, opgenomen bedragen en de verhouding\
    \ tussen het kostenniveau van het land dat als woonland in aanmerking wordt genomen\
    \ voor het desbetreffende kind of voor de desbetreffende kinderen en dat van Nederland\
    \ uitgedrukt in procenten. Het percentage bedraagt maximaal 100.\n14 Het twaalfde\
    \ en dertiende lid zijn niet van toepassing indien het een kind betreft dat op\
    \ de eerste dag van een kalenderkwartaal niet in Nederland woont doch langer dan\
    \ drie maanden onafgebroken in Nederland verblijft."
  url: https://wetten.overheid.nl/BWBR0022751/2025-01-01#Artikel2
  machine_readable:
    definitions:
      basisbedrag_per_kind:
        value: 251100
      extra_12_15_jaar:
        value: 70300
      extra_16_17_jaar:
        value: 93600
      alo_kop:
        value: 348000
      drempelinkomen_alleenstaand:
        value: 2840600
      drempelinkomen_partner:
        value: 4041600
      extra_drempel_partner:
        value: 913900
      afbouwpercentage:
        value: 0.071
      vermogensgrens_alleenstaand:
        value: 14189600
      vermogensgrens_partner:
        value: 17942900
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: bsn
        type: string
        required: true
      input:
      - name: heeft_partner
        type: boolean
        source:
          regulation: wet_brp
          output: heeft_partner
          service: RvIG
          parameters:
            bsn: $bsn
        temporal:
          type: point_in_time
          reference: $referencedate
      - name: partner_bsn
        type: string
        source:
          regulation: wet_brp
          output: partner_bsn
          service: RvIG
          parameters:
            bsn: $bsn
        temporal:
          type: point_in_time
          reference: $referencedate
      - name: aantal_kinderen
        type: number
        type_spec:
          precision: 0
          min: 0
        source:
          regulation: algemene_kinderbijslagwet
          output: aantal_kinderen
          service: SVB
          parameters:
            bsn: $bsn
      - name: kinderen_leeftijden
        type: array
        source:
          regulation: algemene_kinderbijslagwet
          output: kinderen_leeftijden
          service: SVB
          parameters:
            bsn: $bsn
      - name: ontvangt_kinderbijslag
        type: boolean
        source:
          regulation: algemene_kinderbijslagwet
          output: ontvangt_kinderbijslag
          service: SVB
          parameters:
            bsn: $bsn
      - name: toetsingsinkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: uwv_toetsingsinkomen
          output: toetsingsinkomen
          service: UWV
          parameters:
            bsn: $bsn
        temporal:
          type: period
          period_type: year
          immutable_after: P2Y
      - name: partner_toetsingsinkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: uwv_toetsingsinkomen
          output: toetsingsinkomen
          service: UWV
          parameters:
            bsn: $partner_bsn
        temporal:
          type: period
          period_type: year
          immutable_after: P2Y
      - name: vermogen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: belastingdienst_vermogen
          output: vermogen
          service: BELASTINGDIENST
          parameters:
            bsn: $bsn
        temporal:
          type: point_in_time
          reference: $prev_january_first
      - name: partner_vermogen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: belastingdienst_vermogen
          output: vermogen
          service: BELASTINGDIENST
          parameters:
            bsn: $partner_bsn
        temporal:
          type: point_in_time
          reference: $prev_january_first
      output:
      - name: voldoet_aan_voorwaarden
        type: boolean
      - name: heeft_recht_op_kindgebonden_budget
        type: boolean
      - name: kindgebonden_budget_jaar
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: alo_kop_bedrag
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      actions:
      - output: voldoet_aan_voorwaarden
        value:
          operation: AND
          conditions:
          - subject: $ontvangt_kinderbijslag
            operation: EQUALS
            value: true
          - subject: $aantal_kinderen
            operation: GREATER_THAN
            value: 0
          - operation: IF
            cases:
            - when:
                subject: $heeft_partner
                operation: EQUALS
                value: true
              then:
                operation: LESS_THAN
                subject:
                  operation: ADD
                  values:
                  - $vermogen
                  - $partner_vermogen
                value: $vermogensgrens_partner
            default:
              operation: LESS_THAN
              subject: $vermogen
              value: $vermogensgrens_alleenstaand
      - output: leeftijdstoeslagen
        value:
          operation: FOREACH
          collection: $kinderen_leeftijden
          body:
            operation: IF
            cases:
            - when:
                operation: GREATER_THAN_OR_EQUAL
                subject: $leeftijd
                value: 16
              then:
                operation: IF
                cases:
                - when:
                    operation: LESS_THAN_OR_EQUAL
                    subject: $leeftijd
                    value: 17
                  then: $extra_16_17_jaar
                default: 0
            - when:
                operation: GREATER_THAN_OR_EQUAL
                subject: $leeftijd
                value: 12
              then:
                operation: IF
                cases:
                - when:
                    operation: LESS_THAN_OR_EQUAL
                    subject: $leeftijd
                    value: 15
                  then: $extra_12_15_jaar
                default: 0
            default: 0
          combine: ADD
          as: leeftijd
      - output: alo_kop_bedrag
        value:
          operation: IF
          cases:
          - when:
              operation: EQUALS
              subject: $heeft_partner
              value: false
            then: $alo_kop
          default: 0
        legal_basis:
          law: Wet op het kindgebonden budget
          bwb_id: BWBR0022751
          article: '2'
          paragraph: '6'
          url: https://wetten.overheid.nl/BWBR0022751/2025-01-01#Artikel2
          juriconnect: jci1.3:c:BWBR0022751&artikel=2&lid=6&z=2025-01-01&g=2025-01-01
          explanation: Artikel 2 lid 6 bepaalt dat alleenstaande ouders zonder partner
            recht hebben op verhoging van €3.480
      - output: heeft_partner
        value: $heeft_partner
        legal_basis:
          law: Wet op het kindgebonden budget
          bwb_id: BWBR0022751
          article: '2'
          paragraph: '6'
          url: https://wetten.overheid.nl/BWBR0022751/2025-01-01#Artikel2
          juriconnect: jci1.3:c:BWBR0022751&artikel=2&lid=6&z=2025-01-01&g=2025-01-01
          explanation: Partnerstatus bepaalt of ALO-kop van toepassing is
      - output: kindgebonden_budget_jaar
        value:
          operation: IF
          cases:
          - when:
              operation: EQUALS
              subject: $heeft_partner
              value: false
            then:
              operation: MAX
              values:
              - operation: SUBTRACT
                values:
                - operation: ADD
                  values:
                  - operation: MULTIPLY
                    values:
                    - $aantal_kinderen
                    - $basisbedrag_per_kind
                  - $leeftijdstoeslagen
                  - $alo_kop_bedrag
                - operation: IF
                  cases:
                  - when:
                      operation: GREATER_THAN
                      subject: $toetsingsinkomen
                      value: $drempelinkomen_alleenstaand
                    then:
                      operation: MULTIPLY
                      values:
                      - operation: SUBTRACT
                        values:
                        - $toetsingsinkomen
                        - $drempelinkomen_alleenstaand
                      - $afbouwpercentage
                  default: 0
              - 0
          - when:
              operation: EQUALS
              subject: $heeft_partner
              value: true
            then:
              operation: MAX
              values:
              - operation: SUBTRACT
                values:
                - operation: ADD
                  values:
                  - operation: MULTIPLY
                    values:
                    - $aantal_kinderen
                    - $basisbedrag_per_kind
                  - $leeftijdstoeslagen
                - operation: IF
                  cases:
                  - when:
                      operation: GREATER_THAN
                      subject:
                        operation: ADD
                        values:
                        - $toetsingsinkomen
                        - $partner_toetsingsinkomen
                      value:
                        operation: ADD
                        values:
                        - $drempelinkomen_partner
                        - $extra_drempel_partner
                    then:
                      operation: MULTIPLY
                      values:
                      - operation: SUBTRACT
                        values:
                        - operation: ADD
                          values:
                          - $toetsingsinkomen
                          - $partner_toetsingsinkomen
                        - operation: ADD
                          values:
                          - $drempelinkomen_partner
                          - $extra_drempel_partner
                      - $afbouwpercentage
                  default: 0
              - 0
        legal_basis:
          law: Wet op het kindgebonden budget
          bwb_id: BWBR0022751
          article: '2'
          url: https://wetten.overheid.nl/BWBR0022751/2025-01-01#Artikel2
          juriconnect: jci1.3:c:BWBR0022751&artikel=2&z=2025-01-01&g=2025-01-01
          explanation: Artikel 2 bepaalt berekening afhankelijk van partnerstatus
            en inkomen
