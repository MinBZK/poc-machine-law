$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.1/schema.json
$id: wet_brp/laa
regulatory_layer: WET
publication_date: '2023-05-15'
valid_from: '2023-05-15'
name: Landelijke Aanpak Adreskwaliteit (LAA)
bwb_id: BWBR0034306
url: https://wetten.overheid.nl/BWBR0034306/2023-05-15
service: RvIG
uuid: 7f3e9a2b-5c4d-4e8f-9b1a-3d6c8f2e4a5b
articles:
- number: 28a
  text: "De analysemethoden, bedoeld in artikel 2.37c, vierde lid, van de wet zien op:\n  a. de analyse van mededelingen als\
    \ bedoeld in artikel 2.37b, eerste lid, van de wet;\n  b. de analyse aan de hand van profielen;\n  c. een onderzoek naar\
    \ patronen."
  url: https://wetten.overheid.nl/BWBR0034306/2023-05-15#Artikel28a
  machine_readable:
    definitions:
      HOOG_BEWONERS_DREMPEL:
        value: 5
      REACTIETERMIJN_WEKEN:
        value: 4
      ONDERZOEKSTERMIJN_MAANDEN:
        value: 6
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: ANDERE_HANDELING
      parameters:
      - name: BSN
        type: string
      - name: ADRES
        type: object
        required: true
      input:
      - name: BELASTINGDIENST_TWIJFEL
        type: boolean
        source:
          regulation: wet_brp/terugmelding
          output: heeft_gerede_twijfel_adres
          service: BELASTINGDIENST
          parameters:
            BSN: $BSN
            ADRES: $ADRES
      - name: TOESLAGEN_TWIJFEL
        type: boolean
        source:
          regulation: wet_brp/terugmelding
          output: heeft_gerede_twijfel_adres
          service: TOESLAGEN
          parameters:
            BSN: $BSN
            ADRES: $ADRES
      - name: CJIB_TWIJFEL
        type: boolean
        source:
          regulation: wet_brp/terugmelding
          output: heeft_gerede_twijfel_adres
          service: CJIB
          parameters:
            BSN: $BSN
            ADRES: $ADRES
      - name: BAG_GEBRUIKSDOEL
        type: string
        source:
          regulation: wet_bag
          output: gebruiksdoel
          service: KADASTER
          parameters:
            ADRES: $ADRES
      - name: BAG_IS_WOONFUNCTIE
        type: boolean
        source:
          regulation: wet_bag
          output: is_woonfunctie
          service: KADASTER
          parameters:
            ADRES: $ADRES
      - name: AANTAL_BEWONERS
        type: number
        source_reference:
          table: brp_adressen
          field: aantal_bewoners
          select_on:
          - name: postcode
            description: Postcode van het adres
            type: string
            value: $ADRES.postcode
          - name: huisnummer
            description: Huisnummer van het adres
            type: string
            value: $ADRES.huisnummer
      output:
      - name: genereer_signaal
        type: boolean
      - name: signaal_type
        type: string
      - name: reactietermijn_weken
        type: number
        type_spec:
          unit: weeks
          precision: 0
      - name: onderzoekstermijn_maanden
        type: number
        type_spec:
          unit: months
          precision: 0
      requirements:
      - all:
        - subject: $ADRES
          operation: NOT_NULL
          legal_basis:
            law: Besluit basisregistratie personen
            bwb_id: BWBR0034306
            article: 28f
            url: https://wetten.overheid.nl/BWBR0034306/2024-04-01#Hoofdstuk2_Afdeling2.6_Artikel28f
            juriconnect: jci1.3:c:BWBR0034306&artikel=28f&z=2024-04-01&g=2024-04-01
            explanation: Artikel 28f vereist minimaal adresgegevens voor signalering
      actions:
      - output: genereer_signaal
        value:
          operation: OR
          values:
          - operation: EQUALS
            subject: $BELASTINGDIENST_TWIJFEL
            value: true
          - operation: EQUALS
            subject: $TOESLAGEN_TWIJFEL
            value: true
          - operation: EQUALS
            subject: $CJIB_TWIJFEL
            value: true
          - operation: AND
            values:
            - operation: GREATER_THAN
              subject: $AANTAL_BEWONERS
              value: $HOOG_BEWONERS_DREMPEL
            - operation: EQUALS
              subject: $BAG_IS_WOONFUNCTIE
              value: false
        legal_basis:
          law: Besluit basisregistratie personen
          bwb_id: BWBR0034306
          article: 28f
          url: https://wetten.overheid.nl/BWBR0034306/2024-04-01#Hoofdstuk2_Afdeling2.6_Artikel28f
          juriconnect: jci1.3:c:BWBR0034306&artikel=28f&z=2024-04-01&g=2024-04-01
          explanation: Artikel 28f bepaalt verstrekking van signalen aan colleges
      - output: signaal_type
        value:
          operation: IF
          conditions:
          - test:
              operation: OR
              values:
              - operation: EQUALS
                subject: $BELASTINGDIENST_TWIJFEL
                value: true
              - operation: EQUALS
                subject: $TOESLAGEN_TWIJFEL
                value: true
              - operation: EQUALS
                subject: $CJIB_TWIJFEL
                value: true
            then: MELDING
          - else: PROFIEL
        legal_basis:
          law: Besluit basisregistratie personen
          bwb_id: BWBR0034306
          article: 28a
          url: https://wetten.overheid.nl/BWBR0034306/2024-04-01#Hoofdstuk2_Afdeling2.6_Artikel28a
          juriconnect: jci1.3:c:BWBR0034306&artikel=28a&z=2024-04-01&g=2024-04-01
          explanation: Artikel 28a onderscheidt meldingen en profielen (patroononderzoek leidt niet tot signaal)
      - output: reactietermijn_weken
        value: $REACTIETERMIJN_WEKEN
        legal_basis:
          law: Besluit basisregistratie personen
          bwb_id: BWBR0034306
          article: 28g
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0034306/2024-04-01#Hoofdstuk2_Afdeling2.6_Artikel28g
          juriconnect: jci1.3:c:BWBR0034306&artikel=28g&lid=1&z=2024-04-01&g=2024-04-01
          explanation: Artikel 28g lid 1 bepaalt vier weken reactietermijn
      - output: onderzoekstermijn_maanden
        value: $ONDERZOEKSTERMIJN_MAANDEN
        legal_basis:
          law: Besluit basisregistratie personen
          bwb_id: BWBR0034306
          article: 28g
          paragraph: '2'
          url: https://wetten.overheid.nl/BWBR0034306/2024-04-01#Hoofdstuk2_Afdeling2.6_Artikel28g
          juriconnect: jci1.3:c:BWBR0034306&artikel=28g&lid=2&z=2024-04-01&g=2024-04-01
          explanation: Artikel 28g lid 2 bepaalt zes maanden onderzoekstermijn
