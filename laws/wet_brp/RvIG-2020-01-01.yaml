$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.0/schema.json
$id: wet_brp
regulatory_layer: WET
publication_date: '2020-01-01'
valid_from: '2020-01-01'
name: Bepalen persoonsgegevens BRP
bwb_id: BWBR0033715
url: https://wetten.overheid.nl/BWBR0033715/2020-01-01
service: RvIG
uuid: fcf09c18-1584-4565-9223-e8a86fbddc09
discoverable: BUSINESS
articles:
- number: '1.1'
  text: ''
  url: https://wetten.overheid.nl/BWBR0033715/2020-01-01#Artikel1.1
  machine_readable:
    definitions:
      NEDERLANDSE_NATIONALITEITEN:
        value:
        - NEDERLANDS
      ADDRESS_MATCH_DISTANCE_M:
        value: 100
      GELDIGE_PARTNERTYPEN:
        value:
        - HUWELIJK
        - GEREGISTREERD_PARTNERSCHAP
      VASTE_ADRES_TYPEN:
        value:
        - WOONADRES
      POST_ADRES_TYPEN:
        value:
        - BRIEFADRES
      KIND_MAX_LEEFTIJD_COMBINATIEKORTING:
        value: 12
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: GEBOORTEDATUM
        type: date
        source_reference:
          table: personen
          field: geboortedatum
          select_on:
          - name: bsn
            description: Burgerservicenummer van de persoon
            type: string
            value: $BSN
      - name: PARTNER_GEBOORTEDATUM
        type: date
        source_reference:
          table: personen
          field: geboortedatum
          select_on:
          - name: bsn
            description: Burgerservicenummer van de partner
            type: string
            value: $PARTNER_BSN
      - name: PARTNERTYPE
        type: object
        source_reference:
          table: relaties
          field: partnerschap_type
          select_on:
          - name: bsn
            description: Burgerservicenummer van de persoon
            type: string
            value: $BSN
      - name: PARTNER_BSN
        type: string
        source_reference:
          table: relaties
          field: partner_bsn
          select_on:
          - name: bsn
            description: Burgerservicenummer van de persoon
            type: string
            value: $BSN
      - name: KINDEREN_GEGEVENS
        type: array
        source_reference:
          table: relaties
          field: kinderen
          select_on:
          - name: bsn
            description: Burgerservicenummer van de persoon
            type: string
            value: $BSN
      - name: VERBLIJFSADRES
        type: object
        source_reference:
          table: personen
          field: verblijfsadres
          select_on:
          - name: bsn
            description: Burgerservicenummer van de persoon
            type: string
            value: $BSN
      - name: OUDER_ADRESSEN
        type: array
        source_reference:
          table: relaties
          field: ouder_adressen
          select_on:
          - name: bsn
            description: Burgerservicenummer van de persoon
            type: string
            value: $BSN
      - name: LAND_VAN_VERBLIJF
        type: string
        source_reference:
          table: personen
          field: land_verblijf
          select_on:
          - name: bsn
            description: Burgerservicenummer van de persoon
            type: string
            value: $BSN
      - name: NATIONALITEIT
        type: string
        source_reference:
          table: personen
          field: nationaliteit
          select_on:
          - name: bsn
            description: Burgerservicenummer van de persoon
            type: string
            value: $BSN
      - name: ADRES
        type: object
        source_reference:
          table: verblijfplaats
          fields:
          - straat
          - huisnummer
          - postcode
          - woonplaats
          - type
          select_on:
          - name: bsn
            description: Burgerservicenummer van de persoon
            type: string
            value: $BSN
      - name: HUISHOUDEN
        type: array
        source_reference:
          table: bewoners
          field: medebewoners
          select_on:
          - name: postcode
            value: $ADRES.postcode
            description: Postcode van het adres van de persoon
            type: string
          - name: huisnummer
            value: $ADRES.huisnummer
            description: Huisnummer van het adres van de persoon
            type: string
      output:
      - name: leeftijd
        type: number
        type_spec:
          unit: years
          precision: 0
          min: 0
      - name: heeft_partner
        type: boolean
      - name: partner_bsn
        type: string
      - name: woonsituatie
        type: string
      - name: land_van_verblijf
        type: string
      - name: heeft_nederlandse_nationaliteit
        type: boolean
      - name: woont_in_nederland
        type: boolean
      - name: geboortedatum
        type: date
      - name: partner_geboortedatum
        type: date
      - name: heeft_vast_adres
        type: boolean
      - name: kinderen_bsns
        type: array
      - name: verblijfsadres
        type: string
      - name: postadres
        type: string
      - name: woonplaats
        type: string
      - name: huishoudgrootte
        type: number
        type_spec:
          precision: 0
          min: 1
      - name: huishoudleden
        type: array
      - name: kinderen
        type: array
      - name: heeft_kinderen_onder_12
        type: boolean
      requirements:
      - all:
        - subject: $GEBOORTEDATUM
          operation: NOT_NULL
      actions:
      - output: geboortedatum
        value: $GEBOORTEDATUM
      - output: partner_geboortedatum
        value: $PARTNER_GEBOORTEDATUM
      - output: partner_bsn
        value:
          operation: IF
          conditions:
          - test:
              operation: IN
              subject: $PARTNERTYPE
              values: $GELDIGE_PARTNERTYPEN
            then: $PARTNER_BSN
          - else: null
      - output: leeftijd
        value:
          operation: SUBTRACT_DATE
          unit: years
          values:
          - $calculation_date
          - $GEBOORTEDATUM
        legal_basis:
          law: Wet basisregistratie personen
          bwb_id: BWBR0033715
          article: '1.6'
          url: https://wetten.overheid.nl/BWBR0033715/2024-01-01#Hoofdstuk1_Paragraaf1.2_Artikel1.6
          juriconnect: jci1.3:c:BWBR0033715&artikel=1.6&z=2024-01-01&g=2024-01-01
          explanation: Artikel 1.6 Wet BRP bepaalt verplicht gebruik van basisregistratie voor persoonsgegevens
      - output: kinderen_bsns
        value:
          operation: FOREACH
          subject: $KINDEREN_GEGEVENS
          value: $bsn
        legal_basis:
          law: Wet basisregistratie personen
          bwb_id: BWBR0033715
          article: '2.9'
          url: https://wetten.overheid.nl/BWBR0033715/2024-01-01#Hoofdstuk2_Paragraaf2.2_Artikel2.9
          juriconnect: jci1.3:c:BWBR0033715&artikel=2.9&z=2024-01-01&g=2024-01-01
          explanation: Artikel 2.9 Wet BRP bepaalt registratie van gegevens over kinderen
      - output: heeft_partner
        value:
          operation: IN
          subject: $PARTNERTYPE
          values: $GELDIGE_PARTNERTYPEN
        legal_basis:
          law: Wet basisregistratie personen
          bwb_id: BWBR0033715
          article: '1.7'
          url: https://wetten.overheid.nl/BWBR0033715/2024-01-01#Hoofdstuk1_Paragraaf1.2_Artikel1.7
          juriconnect: jci1.3:c:BWBR0033715&artikel=1.7&z=2024-01-01&g=2024-01-01
          explanation: Artikel 1.7 Wet BRP verplicht gebruik authentieke gegevens over huwelijk en partnerschap
      - output: woonsituatie
        value:
          operation: IF
          conditions:
          - test:
              operation: EQUALS
              subject: $VERBLIJFSADRES
              value: $OUDER_ADRESSEN
            then: THUIS
          - else: UIT
        legal_basis:
          law: Wet basisregistratie personen
          bwb_id: BWBR0033715
          article: '2.4'
          url: https://wetten.overheid.nl/BWBR0033715/2024-01-01#Hoofdstuk2_Paragraaf2.1_Artikel2.4
          juriconnect: jci1.3:c:BWBR0033715&artikel=2.4&z=2024-01-01&g=2024-01-01
          explanation: Artikel 2.4 Wet BRP bepaalt meldingsplicht bij adreswijziging en woonsituatie
      - output: land_van_verblijf
        value: $LAND_VAN_VERBLIJF
        legal_basis:
          law: Wet basisregistratie personen
          bwb_id: BWBR0033715
          article: '2.7'
          url: https://wetten.overheid.nl/BWBR0033715/2024-01-01#Hoofdstuk2_Paragraaf2.2_Artikel2.7
          juriconnect: jci1.3:c:BWBR0033715&artikel=2.7&z=2024-01-01&g=2024-01-01
          explanation: Artikel 2.7 Wet BRP bepaalt registratie van algemene gegevens zoals nationaliteit
      - output: heeft_nederlandse_nationaliteit
        value:
          operation: IN
          subject: $NATIONALITEIT
          values: $NEDERLANDSE_NATIONALITEITEN
        legal_basis:
          law: Wet basisregistratie personen
          bwb_id: BWBR0033715
          article: '2.7'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0033715/2024-01-01#Hoofdstuk2_Paragraaf2.2_Artikel2.7
          juriconnect: jci1.3:c:BWBR0033715&artikel=2.7&lid=1&z=2024-01-01&g=2024-01-01
          explanation: Artikel 2.7 lid 1 Wet BRP bepaalt dat nationaliteit als algemeen gegeven wordt geregistreerd
      - output: woont_in_nederland
        value:
          operation: EQUALS
          subject: $LAND_VAN_VERBLIJF
          value: NEDERLAND
        legal_basis:
          law: Wet basisregistratie personen
          bwb_id: BWBR0033715
          article: '2.10'
          url: https://wetten.overheid.nl/BWBR0033715/2024-01-01#Hoofdstuk2_Paragraaf2.2_Artikel2.10
          juriconnect: jci1.3:c:BWBR0033715&artikel=2.10&z=2024-01-01&g=2024-01-01
          explanation: Artikel 2.10 Wet BRP bepaalt dat verblijfplaats in Nederland wordt geregistreerd
      - output: heeft_vast_adres
        value:
          operation: IN
          subject: $ADRES.type
          values: $VASTE_ADRES_TYPEN
        legal_basis:
          law: Wet basisregistratie personen
          bwb_id: BWBR0033715
          article: '2.10'
          url: https://wetten.overheid.nl/BWBR0033715/2024-01-01#Hoofdstuk2_Paragraaf2.2_Artikel2.10
          juriconnect: jci1.3:c:BWBR0033715&artikel=2.10&z=2024-01-01&g=2024-01-01
          explanation: Artikel 2.10 Wet BRP bepaalt registratie van verblijfplaatsgegevens
      - output: verblijfsadres
        value:
          operation: IF
          conditions:
          - test:
              operation: NOT_NULL
              subject: $ADRES
            then:
              operation: CONCAT
              values:
              - $ADRES.straat
              - ' '
              - $ADRES.huisnummer
              - ', '
              - $ADRES.postcode
              - ' '
              - $ADRES.woonplaats
          - else: null
      - output: huishoudgrootte
        value:
          operation: IF
          conditions:
          - test:
              operation: NOT_NULL
              subject: $HUISHOUDEN
            then:
              operation: ADD
              values:
              - 1
              - operation: FOREACH
                subject: $HUISHOUDEN
                value: 1
                combine: ADD
          - else: 1
      - output: postadres
        value:
          operation: IF
          conditions:
          - test:
              operation: IN
              subject: $ADRES.type
              values: $POST_ADRES_TYPEN
            then:
              operation: CONCAT
              values:
              - $ADRES.straat
              - ' '
              - $ADRES.huisnummer
              - ', '
              - $ADRES.postcode
              - ' '
              - $ADRES.woonplaats
          - else: null
      - output: woonplaats
        value: $ADRES.woonplaats
        legal_basis:
          law: Wet basisregistratie personen
          bwb_id: BWBR0033715
          article: '2.10'
          url: https://wetten.overheid.nl/BWBR0033715/2024-01-01#Hoofdstuk2_Paragraaf2.2_Artikel2.10
          juriconnect: jci1.3:c:BWBR0033715&artikel=2.10&z=2024-01-01&g=2024-01-01
          explanation: Artikel 2.10 Wet BRP bepaalt registratie van woonplaats als onderdeel van verblijfplaatsgegevens
      - output: huishoudleden
        value:
          operation: IF
          conditions:
          - test:
              operation: NOT_NULL
              subject: $HUISHOUDEN
            then: $HUISHOUDEN
          - else:
              value: null
        legal_basis:
          law: Wet basisregistratie personen
          bwb_id: BWBR0033715
          article: '2.4'
          url: https://wetten.overheid.nl/BWBR0033715/2024-01-01#Hoofdstuk2_Paragraaf2.1_Artikel2.4
          juriconnect: jci1.3:c:BWBR0033715&artikel=2.4&z=2024-01-01&g=2024-01-01
          explanation: Artikel 2.4 Wet BRP bepaalt meldingsplicht bij adreswijziging en woonsituatie
      - output: kinderen
        value:
          operation: IF
          conditions:
          - test:
              operation: NOT_NULL
              subject: $KINDEREN_GEGEVENS
            then: $KINDEREN_GEGEVENS
          - else:
              value: null
        legal_basis:
          law: Wet basisregistratie personen
          bwb_id: BWBR0033715
          article: '1.6'
          url: https://wetten.overheid.nl/BWBR0033715/2024-01-01#Hoofdstuk1_Paragraaf1.2_Artikel1.6
          juriconnect: jci1.3:c:BWBR0033715&artikel=1.6&z=2024-01-01&g=2024-01-01
          explanation: Artikel 1.6 Wet BRP bepaalt verplicht gebruik van basisregistratie voor persoonsgegevens
      - output: heeft_kinderen_onder_12
        value:
          operation: IF
          conditions:
          - test:
              operation: NOT_NULL
              subject: $KINDEREN_GEGEVENS
            then:
              operation: EXISTS
              subject: $KINDEREN_GEGEVENS
              value:
                operation: LESS_THAN
                subject:
                  operation: SUBTRACT_DATE
                  unit: years
                  values:
                  - $calculation_date
                  - $item.geboortedatum
                value: $KIND_MAX_LEEFTIJD_COMBINATIEKORTING
          - else: false
        legal_basis:
          law: Wet basisregistratie personen
          bwb_id: BWBR0033715
          article: '1.6'
          url: https://wetten.overheid.nl/BWBR0033715/2024-01-01#Hoofdstuk1_Paragraaf1.2_Artikel1.6
          juriconnect: jci1.3:c:BWBR0033715&artikel=1.6&z=2024-01-01&g=2024-01-01
          explanation: Artikel 1.6 Wet BRP bepaalt verplicht gebruik van basisregistratie voor persoonsgegevens
