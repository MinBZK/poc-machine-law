$id: wet_brp/terugmelding
regulatory_layer: WET
publication_date: '2023-05-15'
valid_from: '2023-05-15'
name: BRP Terugmeldplicht CJIB
bwb_id: BWBR0033715
url: https://wetten.overheid.nl/BWBR0033715/2023-05-15
service: CJIB
uuid: 8e3f7a2c-4d9b-4e1f-9a6c-2f7e4d8a3b5c
articles:
- number: '2.34'
  text: '1 Een bestuursorgaan dat in verband met de verstrekking van een authentiek gegeven uit de basisregistratie gerede
    twijfel heeft over de juistheid van dat gegeven, doet hiervan mededeling aan het college van burgemeester en wethouders
    van de bijhoudingsgemeente.

    2 Onze Minister wijst de bestuursorganen aan die tevens mededeling doen in verband met de verstrekking van andere dan
    authentieke gegevens.

    3 Bij of krachtens algemene maatregel van bestuur worden de gevallen waarin en de wijze waarop de mededeling wordt gedaan,
    alsmede de kennisgeving van het college van burgemeester en wethouders aan het bestuursorgaan naar aanleiding van een
    mededeling, geregeld.

    4 Het college van burgemeester en wethouders kan nadere regels stellen omtrent het doen van mededeling door en de kennisgeving
    aan bestuursorganen die een orgaan zijn van de desbetreffende gemeente en kan een of meer van deze bestuursorganen aanwijzen
    om tevens mededeling te doen in verband met de verstrekking van andere dan authentieke gegevens.

    5 Voor zover een mededeling als bedoeld in het eerste lid betrekking heeft op een gegeven dat op grond van een andere
    wet is overgenomen uit een andere registratie, zendt het college van burgemeester en wethouders die mededeling door aan
    de verantwoordelijke voor de verwerking van dat gegeven in die andere registratie.'
  url: https://wetten.overheid.nl/BWBR0033715/2023-05-15#Artikel2.34
  machine_readable:
    definitions:
      TWIJFEL_OBR_ENKEL:
        value: Post eenmalig onbestelbaar retour (OBR)
      TWIJFEL_OBR_HERHAALD:
        value: Post meerdere keren onbestelbaar retour (OBR)
      OBR_DREMPEL_HERHAALD:
        value: 2
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: ANDERE_HANDELING
      parameters:
      - name: BSN
        type: string
      - name: ADRES
        type: object
        required: true
      input:
      - name: POST_ONBESTELBAAR
        type: boolean
        source_reference:
          table: cjib_post
          field: onbestelbaar_retour
          select_on:
          - name: bsn
            description: BSN van de persoon (optioneel bij adresgerichte controles)
            type: string
            value: $BSN
      - name: AANTAL_ONBESTELBAAR
        type: number
        source_reference:
          table: cjib_post
          field: aantal_onbestelbaar
          select_on:
          - name: bsn
            description: BSN van de persoon (optioneel bij adresgerichte controles)
            type: string
            value: $BSN
      output:
      - name: heeft_gerede_twijfel_adres
        type: boolean
      - name: twijfel_reden
        type: string
      requirements:
      - all:
        - subject: $ADRES
          operation: NOT_NULL
      actions:
      - output: heeft_gerede_twijfel_adres
        value:
          operation: EQUALS
          subject: $POST_ONBESTELBAAR
          value: true
        legal_basis:
          law: Wet basisregistratie personen
          bwb_id: BWBR0033715
          article: '2.34'
          url: https://wetten.overheid.nl/BWBR0033715/2023-05-15#Hoofdstuk2_Paragraaf2.5_Artikel2.34
          juriconnect: jci1.3:c:BWBR0033715&artikel=2.34&z=2023-05-15&g=2023-05-15
          explanation: Onbestelbare post levert gerede twijfel op over adresgegevens
      - output: twijfel_reden
        value:
          operation: IF
          conditions:
          - test:
              operation: GREATER_OR_EQUAL
              subject: $AANTAL_ONBESTELBAAR
              value: $OBR_DREMPEL_HERHAALD
            then: $TWIJFEL_OBR_HERHAALD
          - test:
              operation: EQUALS
              subject: $POST_ONBESTELBAAR
              value: true
            then: $TWIJFEL_OBR_ENKEL
          - else: null
        legal_basis:
          law: Besluit basisregistratie personen
          bwb_id: BWBR0034306
          article: '28'
          url: https://wetten.overheid.nl/BWBR0034306/2024-04-01#Hoofdstuk2_Afdeling2.5_Artikel28
          juriconnect: jci1.3:c:BWBR0034306&artikel=28&z=2024-04-01&g=2024-04-01
          explanation: Artikel 28 vereist specificatie van reden bij terugmelding
