$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.0/schema.json
$id: wet_brp/terugmelding
regulatory_layer: WET
publication_date: '2023-05-15'
valid_from: '2023-05-15'
name: BRP Terugmeldplicht Dienst Toeslagen
bwb_id: BWBR0033715
url: https://wetten.overheid.nl/BWBR0033715/2023-05-15
service: TOESLAGEN
uuid: 5f9d3e7a-4c8b-4e1f-9a6c-3d7e8f2a5b4c
articles:
- number: '2.34'
  text: ''
  url: https://wetten.overheid.nl/BWBR0033715/2023-05-15#Artikel2.34
  machine_readable:
    definitions:
      TWIJFEL_ADRES_AFWIJKING:
        value: Adres bij Dienst Toeslagen wijkt af van BRP
      TWIJFEL_ONDERZOEK:
        value: Adresonderzoek Toeslagen bevestigt adres niet
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: ANDERE_HANDELING
      parameters:
      - name: BSN
        type: string
      - name: ADRES
        type: object
        required: true
      input:
      - name: TOESLAG_ADRES
        type: object
        source_reference:
          table: toeslagen_adressen
          fields:
          - postcode
          - huisnummer
          - straat
          - woonplaats
          select_on:
          - name: bsn
            description: BSN van de toeslagontvanger
            type: string
            value: $BSN
      - name: TOESLAGEN_ONDERZOEK
        type: object
        source_reference:
          table: toeslagen_adresonderzoek
          fields:
          - onderzoek_datum
          - onderzoek_uitkomst
          - adres_geverifieerd
          select_on:
          - name: bsn
            description: BSN van de toeslagontvanger
            type: string
            value: $BSN
      output:
      - name: heeft_gerede_twijfel_adres
        type: boolean
      - name: twijfel_reden
        type: string
      requirements:
      - all:
        - subject: $ADRES
          operation: NOT_NULL
      actions:
      - output: heeft_gerede_twijfel_adres
        value:
          operation: OR
          values:
          - operation: NOT_EQUALS
            values:
            - $ADRES
            - $TOESLAG_ADRES
          - operation: EQUALS
            subject: $TOESLAGEN_ONDERZOEK.adres_geverifieerd
            value: false
        legal_basis:
          law: Wet basisregistratie personen
          bwb_id: BWBR0033715
          article: '2.34'
          url: https://wetten.overheid.nl/BWBR0033715/2023-05-15#Hoofdstuk2_Paragraaf2.5_Artikel2.34
          juriconnect: jci1.3:c:BWBR0033715&artikel=2.34&z=2023-05-15&g=2023-05-15
          explanation: Artikel 2.34 verplicht melding bij gerede twijfel
      - output: twijfel_reden
        value:
          operation: IF
          conditions:
          - test:
              operation: NOT_EQUALS
              values:
              - $ADRES
              - $TOESLAG_ADRES
            then: $TWIJFEL_ADRES_AFWIJKING
          - test:
              operation: EQUALS
              subject: $TOESLAGEN_ONDERZOEK.adres_geverifieerd
              value: false
            then: $TWIJFEL_ONDERZOEK
          - else: null
        legal_basis:
          law: Besluit basisregistratie personen
          bwb_id: BWBR0034306
          article: '28'
          url: https://wetten.overheid.nl/BWBR0034306/2024-04-01#Hoofdstuk2_Afdeling2.5_Artikel28
          juriconnect: jci1.3:c:BWBR0034306&artikel=28&z=2024-04-01&g=2024-04-01
          explanation: Artikel 28 vereist specificatie van reden bij terugmelding
