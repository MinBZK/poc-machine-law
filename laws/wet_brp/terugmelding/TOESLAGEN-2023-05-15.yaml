$id: wet_brp/terugmelding/toeslagen
regulatory_layer: WET
publication_date: '2023-05-15'
valid_from: '2023-05-15'
name: BRP Terugmeldplicht Dienst Toeslagen
bwb_id: BWBR0033715
url: https://wetten.overheid.nl/BWBR0033715/2023-05-15
service: TOESLAGEN
uuid: 5f9d3e7a-4c8b-4e1f-9a6c-3d7e8f2a5b4c
articles:
- number: '2.34'
  text: '1 Een bestuursorgaan dat in verband met de verstrekking van een authentiek
    gegeven uit de basisregistratie gerede twijfel heeft over de juistheid van dat
    gegeven, doet hiervan mededeling aan het college van burgemeester en wethouders
    van de bijhoudingsgemeente.

    2 Onze Minister wijst de bestuursorganen aan die tevens mededeling doen in verband
    met de verstrekking van andere dan authentieke gegevens.

    3 Bij of krachtens algemene maatregel van bestuur worden de gevallen waarin en
    de wijze waarop de mededeling wordt gedaan, alsmede de kennisgeving van het college
    van burgemeester en wethouders aan het bestuursorgaan naar aanleiding van een
    mededeling, geregeld.

    4 Het college van burgemeester en wethouders kan nadere regels stellen omtrent
    het doen van mededeling door en de kennisgeving aan bestuursorganen die een orgaan
    zijn van de desbetreffende gemeente en kan een of meer van deze bestuursorganen
    aanwijzen om tevens mededeling te doen in verband met de verstrekking van andere
    dan authentieke gegevens.

    5 Voor zover een mededeling als bedoeld in het eerste lid betrekking heeft op
    een gegeven dat op grond van een andere wet is overgenomen uit een andere registratie,
    zendt het college van burgemeester en wethouders die mededeling door aan de verantwoordelijke
    voor de verwerking van dat gegeven in die andere registratie.'
  url: https://wetten.overheid.nl/BWBR0033715/2023-05-15#Artikel2.34
  machine_readable:
    definitions:
      twijfel_adres_afwijking: Adres bij Dienst Toeslagen wijkt af van BRP
      twijfel_onderzoek: Adresonderzoek Toeslagen bevestigt adres niet
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: ANDERE_HANDELING
      parameters:
      - name: bsn
        type: string
      - name: adres
        type: object
        required: true
      input:
      - name: toeslag_adres
        type: object
        source: {}
      - name: toeslagen_onderzoek
        type: object
        source: {}
      output:
      - name: voldoet_aan_voorwaarden
        type: boolean
      - name: heeft_gerede_twijfel_adres
        type: boolean
      - name: twijfel_reden
        type: string
      actions:
      - output: voldoet_aan_voorwaarden
        value:
          operation: AND
          conditions:
          - operation: EXISTS
            subject: $adres
      - output: heeft_gerede_twijfel_adres
        value:
          operation: OR
          conditions:
          - operation: NOT
            value:
              operation: EQUALS
              subject: $adres
              value: $toeslag_adres
          - operation: EQUALS
            subject: $toeslagen_onderzoek.adres_geverifieerd
            value: false
        legal_basis:
          law: Wet basisregistratie personen
          bwb_id: BWBR0033715
          article: '2.34'
          url: https://wetten.overheid.nl/BWBR0033715/2023-05-15#Hoofdstuk2_Paragraaf2.5_Artikel2.34
          juriconnect: jci1.3:c:BWBR0033715&artikel=2.34&z=2023-05-15&g=2023-05-15
          explanation: Artikel 2.34 verplicht melding bij gerede twijfel
      - output: twijfel_reden
        value:
          operation: IF
          cases:
          - when:
              operation: NOT
              value:
                operation: EQUALS
                subject: $adres
                value: $toeslag_adres
            then: $twijfel_adres_afwijking
          - when:
              operation: EQUALS
              subject: $toeslagen_onderzoek.adres_geverifieerd
              value: false
            then: $twijfel_onderzoek
        legal_basis:
          law: Besluit basisregistratie personen
          bwb_id: BWBR0034306
          article: '28'
          url: https://wetten.overheid.nl/BWBR0034306/2024-04-01#Hoofdstuk2_Afdeling2.5_Artikel28
          juriconnect: jci1.3:c:BWBR0034306&artikel=28&z=2024-04-01&g=2024-04-01
          explanation: Artikel 28 vereist specificatie van reden bij terugmelding
