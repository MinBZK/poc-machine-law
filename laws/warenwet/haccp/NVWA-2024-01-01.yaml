          article: '3'
          url: https://wetten.overheid.nl/BWBR0018823/2024-01-01#Artikel3
          juriconnect: jci1.3:c:BWBR0018823&artikel=3&z=2024-01-01&g=2024-01-01
          explanation: HACCP-systeemstatus wordt overgenomen uit het registratiesysteem
      - output: voldoet_aan_verplichting
