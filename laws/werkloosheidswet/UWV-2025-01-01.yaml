articles:
- number: '16'
  text: |-
    1. Werkloos wordt de werknemer die: a. in een kalenderweek ten minste vijf arbeidsuren minder heeft dan zijn gemiddeld aantal arbeidsuren per kalenderweek of een aantal arbeidsuren heeft dat ten hoogste gelijk is aan de helft van zijn gemiddeld aantal arbeidsuren per kalenderweek; en b. beschikbaar is om arbeid te aanvaarden. 2. Onder het in het eerste lid bedoelde gemiddeld aantal arbeidsuren per kalenderweek wordt verstaan het gemiddeld aantal arbeidsuren in de 26 kalenderweken onmiddellijk voorafgaande aan de kalenderweek, bedoeld in het eerste lid. Indien de werknemer ten opzichte van zijn gemiddeld aantal arbeidsuren per kalenderweek minder dan vijf arbeidsuren heeft verloren, worden bij de bepaling hoeveel arbeidsuren de werknemer heeft en bij de bepaling van het gemiddeld aantal arbeidsuren per kalenderweek, bedoeld in de eerste zin, mede in aanmerking genomen de uren waarin de werknemer werkzaamheden verricht uit hoofde waarvan hij niet als werknemer wordt beschouwd. Voor de vaststelling van de periode van 26 kalenderweken, bedoeld in de eerste zin, worden kalenderweken, tot een maximum van 78 kalenderweken, waarin de werknemer onbetaald verlof heeft genoten, niet in aanmerking genomen, tenzij dit leidt tot een lager gemiddeld aantal arbeidsuren per kalenderweek dan wanneer die kalenderweken wel in aanmerking zouden worden genomen. 3. Bij algemene maatregel van bestuur kunnen met betrekking tot het eerste en het tweede lid regels worden gesteld: a. omtrent de berekening van het verlies van arbeidsuren bij een opeenvolgend verlies van arbeidsuren, waarbij andere perioden voor de berekening van het gemiddeld aantal arbeidsuren in aanmerking kunnen worden genomen; b. waarbij voor bepaalde groepen werknemers een kortere of langere periode voor de berekening van het gemiddeld aantal arbeidsuren geldt. 4. In afwijking van het eerste lid is tevens werkloos de werknemer die voldoet aan het eerste lid, onderdeel a, doch niet voldoet aan het eerste lid, onderdeel b, wegens het enkele feit dat hij voorafgaand aan of aansluitend op het arbeidsurenverlies deelneemt of gaat deelnemen aan een naar het oordeel van het UWV noodzakelijke opleiding of scholing, als bedoeld in artikel 76. 5. In afwijking van het eerste lid is gedurende de periode dat de voor de werknemer rechtens geldende opzegtermijn langer duurt dan de opzegtermijn, bedoeld in artikel 64, eerste lid, onderdeel b, tevens werkloos de werknemer waarvan de werkgever het loon niet voldoet omdat hij verkeert in een toestand als bedoeld in artikel 61. 6. Indien bij een beoordeling als bedoeld in artikel 6, eerste lid, van de Wet werk en inkomen naar arbeidsvermogen of een beoordeling als bedoeld in artikel 19ab, eerste lid, van de Ziektewet is vastgesteld dat de werknemer voor een geringer aantal uren belastbaar is dan gezonde personen met soortgelijke opleiding en ervaring, doch minder dan 35% arbeidsongeschikt is, wordt onder het in het tweede lid bedoelde gemiddeld aantal arbeidsuren per kalenderweek verstaan: het aantal uren dat die werknemer belastbaar is, tenzij dit leidt tot een hoger aantal arbeidsuren. 7. Voor de toepassing van deze wet en de daarop berustende bepalingen is de maandag de eerste dag van de kalenderweek. 8. Een recht op uitkering dat is ontstaan en direct eindigt op grond van artikel 20, eerste lid, onderdeel c, wordt geacht niet te zijn ontstaan indien het inkomen is genoten uit werkzaamheden als werknemer.
