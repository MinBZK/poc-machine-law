articles:
- number: '16'
  text: '1. Werkloos wordt de werknemer die: a. in een kalenderweek ten minste vijf
    arbeidsuren minder heeft dan zijn gemiddeld aantal arbeidsuren per kalenderweek
    of een aantal arbeidsuren heeft dat ten hoogste gelijk is aan de helft van zijn
    gemiddeld aantal arbeidsuren per kalenderweek; en b. beschikbaar is om arbeid
    te aanvaarden. 2. Onder het in het eerste lid bedoelde gemiddeld aantal arbeidsuren
    per kalenderweek wordt verstaan het gemiddeld aantal arbeidsuren in de 26 kalenderweken
    onmiddellijk voorafgaande aan de kalenderweek, bedoeld in het eerste lid. Indien
    de werknemer ten opzichte van zijn gemiddeld aantal arbeidsuren per kalenderweek
    minder dan vijf arbeidsuren heeft verloren, worden bij de bepaling hoeveel arbeidsuren
    de werknemer heeft en bij de bepaling van het gemiddeld aantal arbeidsuren per
    kalenderweek, bedoeld in de eerste zin, mede in aanmerking genomen de uren waarin
    de werknemer werkzaamheden verricht uit hoofde waarvan hij niet als werknemer
    wordt beschouwd. Voor de vaststelling van de periode van 26 kalenderweken, bedoeld
    in de eerste zin, worden kalenderweken, tot een maximum van 78 kalenderweken,
    waarin de werknemer onbetaald verlof heeft genoten, niet in aanmerking genomen,
    tenzij dit leidt tot een lager gemiddeld aantal arbeidsuren per kalenderweek dan
    wanneer die kalenderweken wel in aanmerking zouden worden genomen. 3. Bij algemene
    maatregel van bestuur kunnen met betrekking tot het eerste en het tweede lid regels
    worden gesteld: a. omtrent de berekening van het verlies van arbeidsuren bij een
    opeenvolgend verlies van arbeidsuren, waarbij andere perioden voor de berekening
    van het gemiddeld aantal arbeidsuren in aanmerking kunnen worden genomen; b. waarbij
    voor bepaalde groepen werknemers een kortere of langere periode voor de berekening
    van het gemiddeld aantal arbeidsuren geldt. 4. In afwijking van het eerste lid
    is tevens werkloos de werknemer die voldoet aan het eerste lid, onderdeel a, doch
    niet voldoet aan het eerste lid, onderdeel b, wegens het enkele feit dat hij voorafgaand
    aan of aansluitend op het arbeidsurenverlies deelneemt of gaat deelnemen aan een
    naar het oordeel van het UWV noodzakelijke opleiding of scholing, als bedoeld
    in artikel 76. 5. In afwijking van het eerste lid is gedurende de periode dat
    de voor de werknemer rechtens geldende opzegtermijn langer duurt dan de opzegtermijn,
    bedoeld in artikel 64, eerste lid, onderdeel b, tevens werkloos de werknemer waarvan
    de werkgever het loon niet voldoet omdat hij verkeert in een toestand als bedoeld
    in artikel 61. 6. Indien bij een beoordeling als bedoeld in artikel 6, eerste
    lid, van de Wet werk en inkomen naar arbeidsvermogen of een beoordeling als bedoeld
    in artikel 19ab, eerste lid, van de Ziektewet is vastgesteld dat de werknemer
    voor een geringer aantal uren belastbaar is dan gezonde personen met soortgelijke
    opleiding en ervaring, doch minder dan 35% arbeidsongeschikt is, wordt onder het
    in het tweede lid bedoelde gemiddeld aantal arbeidsuren per kalenderweek verstaan:
    het aantal uren dat die werknemer belastbaar is, tenzij dit leidt tot een hoger
    aantal arbeidsuren. 7. Voor de toepassing van deze wet en de daarop berustende
    bepalingen is de maandag de eerste dag van de kalenderweek. 8. Een recht op uitkering
    dat is ontstaan en direct eindigt op grond van artikel 20, eerste lid, onderdeel
    c, wordt geacht niet te zijn ontstaan indien het inkomen is genoten uit werkzaamheden
    als werknemer.'
  url: https://wetten.overheid.nl/BWBR0004045/2025-01-01#Artikel16
  machine_readable:
    definitions:
      minimum_leeftijd: 18
      minimum_gewerkte_weken: 26
      referentieperiode_weken: 36
      minimum_urenvermindering: 5
      maximum_dagloon: 29067
      percentage_eerste_2_maanden: 0.75
      percentage_daarna: 0.7
      werkdagen_per_jaar: 261
      werkdagen_per_maand: 21.75
      minimum_duur_maanden: 3
      maximum_duur_maanden: 24
      geldige_verblijfsvergunningen:
      - PERMANENT
      - EU
      - FAMILY_REUNIFICATION
      - WORK_PERMIT
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: bsn
        type: string
        required: true
      input:
      - name: leeftijd
        type: number
        type_spec:
          unit: years
          precision: 0
          min: 0
        source:
          regulation: wet_brp
          output: leeftijd
          service: RvIG
          parameters:
            bsn: $bsn
        temporal:
          type: point_in_time
          reference: $referencedate
      - name: pensioenleeftijd
        type: number
        type_spec:
          unit: years
          precision: 0
          min: 0
        source:
          regulation: algemene_ouderdomswet_gegevens
          output: pensioenleeftijd
          service: SVB
          parameters:
            bsn: $bsn
      - name: heeft_nederlandse_nationaliteit
        type: boolean
        source:
          regulation: wet_brp
          output: heeft_nederlandse_nationaliteit
          service: RvIG
          parameters:
            bsn: $bsn
      - name: verblijfsvergunning_type
        type: string
        source:
          regulation: vreemdelingenwet
          output: verblijfsvergunning_type
          service: IND
          parameters:
            bsn: $bsn
      - name: woont_in_nederland
        type: boolean
        source:
          regulation: wet_brp
          output: woont_in_nederland
          service: RvIG
          parameters:
            bsn: $bsn
      - name: gemiddeld_arbeidsuren_per_week
        type: number
        type_spec:
          precision: 2
          min: 0
        source:
          regulation: uwv_werkgegevens
          output: gemiddeld_uren_per_week
          service: UWV
          parameters:
            bsn: $bsn
        temporal:
          type: period
          period_type: month
      - name: huidige_arbeidsuren_per_week
        type: number
        type_spec:
          precision: 2
          min: 0
        source:
          regulation: uwv_werkgegevens
          output: huidige_uren_per_week
          service: UWV
          parameters:
            bsn: $bsn
        temporal:
          type: point_in_time
          reference: $referencedate
      - name: gewerkte_weken_in_refperiode
        type: number
        type_spec:
          precision: 0
          min: 0
          max: 36
        source:
          regulation: uwv_werkgegevens
          output: gewerkte_weken_36
          service: UWV
          parameters:
            bsn: $bsn
      - name: arbeidsverleden_jaren
        type: number
        type_spec:
          precision: 0
          min: 0
        source:
          regulation: uwv_werkgegevens
          output: arbeidsverleden_jaren
          service: UWV
          parameters:
            bsn: $bsn
      - name: jaarloon
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: uwv_werkgegevens
          output: jaarloon
          service: UWV
          parameters:
            bsn: $bsn
        temporal:
          type: period
          period_type: year
      - name: ontvangt_ziektewet
        type: boolean
        source:
          regulation: ziektewet
          output: heeft_ziektewet_uitkering
          service: UWV
          parameters:
            bsn: $bsn
      - name: ontvangt_wia
        type: boolean
        source:
          regulation: wet_werk_en_inkomen_naar_arbeidsvermogen
          output: heeft_wia_uitkering
          service: UWV
          parameters:
            bsn: $bsn
      - name: is_gedetineerd
        type: boolean
        source:
          regulation: penitentiaire_beginselenwet
          output: is_gedetineerd
          service: DJI
          parameters:
            bsn: $bsn
      output:
      - name: voldoet_aan_voorwaarden
        type: boolean
      - name: heeft_recht_op_ww
        type: boolean
      - name: ww_dagloon
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: ww_uitkering_per_maand
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: ww_duur_maanden
        type: number
        type_spec:
          precision: 0
          min: 3
          max: 24
      actions:
      - output: voldoet_aan_voorwaarden
        value:
          operation: AND
          conditions:
          - subject: $leeftijd
            operation: GREATER_THAN_OR_EQUAL
            value: $minimum_leeftijd
          - subject: $leeftijd
            operation: LESS_THAN
            value: $pensioenleeftijd
          - operation: GREATER_THAN_OR_EQUAL
            subject:
              operation: SUBTRACT
              values:
              - $gemiddeld_arbeidsuren_per_week
              - $huidige_arbeidsuren_per_week
            value: $minimum_urenvermindering
          - subject: $gewerkte_weken_in_refperiode
            operation: GREATER_THAN_OR_EQUAL
            value: $minimum_gewerkte_weken
          - operation: OR
            conditions:
            - subject: $heeft_nederlandse_nationaliteit
              operation: EQUALS
              value: true
            - operation: IN
              subject: $verblijfsvergunning_type
              value: $geldige_verblijfsvergunningen
          - subject: $woont_in_nederland
            operation: EQUALS
            value: true
          - subject: $ontvangt_ziektewet
            operation: EQUALS
            value: false
          - subject: $ontvangt_wia
            operation: EQUALS
            value: false
          - subject: $is_gedetineerd
            operation: EQUALS
            value: false
      - output: heeft_recht_op_ww
        value: true
        legal_basis:
          law: Werkloosheidswet
          bwb_id: BWBR0004045
          article: '16'
          url: https://wetten.overheid.nl/BWBR0004045/2025-01-01#Hoofdstuk2_Artikel16
          juriconnect: jci1.3:c:BWBR0004045&artikel=16&z=2025-01-01&g=2025-01-01
          explanation: Als aan alle voorwaarden is voldaan, heeft men recht op WW
      - output: ww_dagloon
        value:
          operation: MIN
          values:
          - operation: DIVIDE
            values:
            - $jaarloon
            - $werkdagen_per_jaar
          - $maximum_dagloon
        legal_basis:
          law: Werkloosheidswet
          bwb_id: BWBR0004045
          article: 1b
          url: https://wetten.overheid.nl/BWBR0004045/2025-01-01#Hoofdstuk1_Artikel1b
          juriconnect: jci1.3:c:BWBR0004045&artikel=1b&z=2025-01-01&g=2025-01-01
          explanation: Artikel 1b bepaalt dat dagloon 1/261 van jaarloon is, met een
            maximum van €290,67
      - output: ww_uitkering_per_maand
        value:
          operation: MULTIPLY
          values:
          - operation: MULTIPLY
            values:
            - $ww_dagloon
            - $percentage_eerste_2_maanden
          - $werkdagen_per_maand
        legal_basis:
          law: Werkloosheidswet
          bwb_id: BWBR0004045
          article: '47'
          url: https://wetten.overheid.nl/BWBR0004045/2025-01-01#Hoofdstuk2_Paragraaf5_Artikel47
          juriconnect: jci1.3:c:BWBR0004045&artikel=47&z=2025-01-01&g=2025-01-01
          explanation: 'Artikel 47: eerste 2 maanden 75%, daarna 70% van dagloon *
            21.75 werkdagen'
      - output: ww_duur_maanden
        value:
          operation: MIN
          values:
          - operation: MAX
            values:
            - operation: IF
              cases:
              - when:
                  operation: LESS_THAN_OR_EQUAL
                  subject: $arbeidsverleden_jaren
                  value: 10
                then: $arbeidsverleden_jaren
              default:
                operation: ADD
                values:
                - 10
                - operation: MULTIPLY
                  values:
                  - operation: SUBTRACT
                    values:
                    - $arbeidsverleden_jaren
                    - 10
                  - 0.5
            - $minimum_duur_maanden
          - $maximum_duur_maanden
        legal_basis:
          law: Werkloosheidswet
          bwb_id: BWBR0004045
          article: '42'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0004045/2025-01-01#Hoofdstuk2_Paragraaf4_Artikel42
          juriconnect: jci1.3:c:BWBR0004045&artikel=42&lid=1&z=2025-01-01&g=2025-01-01
          explanation: 'Artikel 42: eerste 10 jaar 1 maand per jaar, daarna 0.5 maand
            per jaar, max 24 maanden'
