$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.0/schema.json
$id: wet_structuur_uitvoeringsorganisatie_werk_en_inkomen
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Bepalen verzekerde jaren 2025
bwb_id: BWBR0013060
url: https://wetten.overheid.nl/BWBR0013060/2024-01-01
service: UWV
uuid: c19a458e-3f5e-4d99-a7c3-67a4288aaa07
articles:
- number: '33'
  text: ''
  url: https://wetten.overheid.nl/BWBR0013060/2024-01-01#Artikel33
  machine_readable:
    definitions:
      GELDIGE_UITKERING_TYPEN:
        value:
        - WW
        - WIA
        - WAO
        - ZW
        - WAZO
      DAGEN_PER_JAAR:
        value: 365.25
      UREN_PER_DAG:
        value: 8
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: DIENSTVERBANDPERIODES
        type: array
        source_reference:
          table: dienstverbanden
          fields:
          - start_date
          - end_date
          select_on:
          - name: bsn
            description: Burgerservicenummer van de persoon
            type: string
            value: $BSN
      - name: UITKERINGSPERIODES
        type: array
        source_reference:
          table: uitkeringen
          fields:
          - start_date
          - end_date
          select_on:
          - name: bsn
            description: Burgerservicenummer van de persoon
            type: string
            value: $BSN
          - name: type
            description: Uitkerkingen die meetellen
            type: string
            value:
              operation: IN
              values: $GELDIGE_UITKERING_TYPEN
      output:
      - name: verzekerde_jaren
        type: number
        type_spec:
          precision: 2
          min: 0
          max: 50
      - name: gewerkte_uren
        type: number
        type_spec:
          min: 0
      actions:
      - output: verzekerde_jaren
        value:
          operation: DIVIDE
          values:
          - operation: ADD
            values:
            - operation: FOREACH
              subject: $DIENSTVERBANDPERIODES
              value:
              - operation: SUBTRACT_DATE
                unit: days
                values:
                - $end_date
                - $start_date
              combine: ADD
            - operation: FOREACH
              subject: $UITKERINGSPERIODES
              value:
              - operation: SUBTRACT_DATE
                unit: days
                values:
                - $end_date
                - $start_date
              combine: ADD
          - $DAGEN_PER_JAAR
      - output: gewerkte_uren
        value:
          operation: MULTIPLY
          values:
          - operation: FOREACH
            subject: $DIENSTVERBANDPERIODES
            value:
            - operation: SUBTRACT_DATE
              unit: days
              values:
              - $end_date
              - $start_date
            combine: ADD
          - $UREN_PER_DAG
