articles:
- number: '1.1'
  text: '1. In deze wet en de daarop rustende bepalingen wordt verstaan onder: a.
    behandelplan: een plan dat zo spoedig mogelijk na aanvang van de behandeling wordt
    opgesteld dat is gericht op het zodanig verminderen van de uit de psychische stoornis,
    psychogeriatrische aandoening of verstandelijke handicap voortvloeiende gevaarlijkheid
    van de forensische patient voor anderen dan de forensische patient of de algemene
    veiligheid van personen of goederen dat de forensische patient in de maatschappij
    kan terugkeren; b. forensische patient: een persoon met een aanspraak op forensische
    zorg; c. forensische zorg: zorg als omschreven in het tweede lid; d. gedetineerde:
    een persoon ten aanzien van wie de tenuitvoerlegging van een vrijheidsstraf of
    vrijheidsbenemende maatregel in een penitentiaire inrichting plaatsvindt; e. indicatiestelling:
    een met redenen omkleed, gedagtekend en ondertekend advies van deskundigen, opgesteld
    op basis van onderzoek van de verdachte, veroordeelde of gedetineerde, waarin
    de forensische zorgbehoefte en het noodzakelijke beveiligingsniveau is opgenomen;
    f. instelling: een rijksinstelling of een private instelling; g. instelling voor
    de verpleging van ter beschikking gestelden: een rijksinstelling of een private
    instelling met een bijzondere aanwijzing als bedoeld in artikel 3.3, eerste lid;
    h. Onze Minister: de Minister voor Rechtsbescherming; i. Onze Ministers: de Minister
    voor Rechtsbescherming en de Minister van Volksgezondheid, Welzijn en Sport; j.
    private instelling: een door Onze Minister aangewezen instelling bedoeld in artikel
    3.2, waarvan de verpleeg- en behandelkosten worden vergoed op basis van een schriftelijke
    overeenkomst die de zorgaanbieder met Onze Minister heeft gesloten; k. rijksinstelling:
    een door Onze Minister aangewezen instelling als bedoeld in artikel 3.1, eerste
    lid, onder beheer van Onze Minister; l. strafrechtelijke titel: een beslissing
    van een rechter, officier van justitie of Onze Minister die het verlenen van geestelijke
    gezondheidszorg of verslavingszorg omvat; m. sepot: een beslissing van het openbaar
    ministerie tot het afzien van verdere vervolging, bedoeld in artikel 167, tweede
    lid, van het Wetboek van Strafvordering; n. ter beschikking gestelde: een forensische
    patient ten aanzien van wie een bevel tot verpleging van overheidswege, bedoeld
    in artikel 37b of 38c van het Wetboek van Strafrecht, is gegeven; o. voorwaarde:
    een beperkende bepaling bij een straf, maatregel, sepot of gratie, of de tenuitvoerlegging
    daarvan, die inhoudt dat een persoon zich laat opnemen in een instelling dan wel
    zich onder behandeling stelt van een zorgverlener of door een zorgverlener voorgeschreven
    of aangeboden geneesmiddelen gebruikt dan wel gedoogt dat hij zich geneesmiddelen
    laat toedienen; p. zorgaanbieder: een rechtspersoon die bedrijfsmatig of beroepsmatig
    forensische zorg verleent, een organisatorisch verband van natuurlijke personen
    die bedrijfsmatig of beroepsmatig forensische zorg verlenen of doen verlenen,
    of een natuurlijk persoon die bedrijfsmatig of beroepsmatig forensische zorg doet
    verlenen. 2. Onder forensische zorg wordt verstaan zorg, die wordt verleend aan
    een justitiabele met een psychische stoornis, verslaving daaronder begrepen, een
    psychogeriatrische aandoening of een verstandelijke handicap, en die al dan niet
    als een voorwaarde, onderdeel uitmaakt van een straf of een maatregel, of van
    de tenuitvoerlegging van een straf of maatregel, of als voorwaarde onderdeel uitmaakt
    van een sepot, een schorsing van de voorlopige hechtenis, of een gratieverlening
    op grond van de Gratiewet, dan wel onderdeel uitmaakt van een strafbeschikking
    waarbij een gedragsmaatregel wordt opgelegd.'
