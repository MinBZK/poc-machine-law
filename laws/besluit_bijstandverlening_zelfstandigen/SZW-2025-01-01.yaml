        value: OM_NIET
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: bsn
        type: string
        required: true
      input:
      - name: leeftijd
        type: number
        type_spec:
          unit: years
          precision: 0
          min: 0
        source:
          regulation: wet_brp
          output: leeftijd
          service: RvIG
          parameters:
            bsn: $bsn
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: geboortedatum
        type: date
        source:
          regulation: wet_brp
          output: geboortedatum
          service: RvIG
          parameters:
            bsn: $bsn
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: pensioenleeftijd
        type: number
        type_spec:
          unit: years
          precision: 0
          min: 0
        source:
          regulation: algemene_ouderdomswet/leeftijdsbepaling
          output: pensioenleeftijd
          service: SVB
          parameters:
            geboortedatum: $geboortedatum
      - name: is_actieve_ondernemer
        type: boolean
        source:
          regulation: handelsregisterwet
          output: is_actieve_ondernemer
          service: KVK
          parameters:
            bsn: $bsn
      - name: vermogen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: bezittingen
          service: BELASTINGDIENST
          parameters:
            bsn: $bsn
      - name: heeft_ww_uitkering
        type: boolean
        source:
          regulation: werkloosheidswet
          output: heeft_recht_op_ww
          service: UWV
          parameters:
            bsn: $bsn
      - name: basisbedrag_bijstand
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: participatiewet/bijstand
          output: basisbedrag
          service: SZW
          parameters:
            bsn: $bsn
      - name: bbz_aanvraag
        type: object
        source_reference:
          table: bbz_aanvraag
          fields:
          - type_zelfstandige
          - bedrijf_levensvatbaar
          - jaren_ondernemerschap
          - uren_per_week
          - beeindigingsdatum
          select_on:
          - name: bsn
            description: BSN van de zelfstandige
            type: string
            value: $bsn
      output:
      - name: voldoet_aan_voorwaarden
        type: boolean
      - name: is_gerechtigd
        type: boolean
      - name: categorie_zelfstandige
        type: string
      - name: algemene_bijstand_bedrag
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: max_duur_maanden
        type: number
        type_spec:
          precision: 0
          min: 0
      - name: bedrijfskapitaal_max
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: bedrijfskapitaal_type
        type: string
      actions:
      - output: voldoet_aan_voorwaarden
        value:
          operation: AND
          conditions:
          - subject: $is_actieve_ondernemer
            operation: EQUALS
            value: true
          - subject: $leeftijd
            operation: GREATER_THAN_OR_EQUAL
            value: $minimum_leeftijd
          - subject: $leeftijd
            operation: LESS_THAN
            value: $pensioenleeftijd
          - operation: GREATER_THAN_OR_EQUAL
            values:
            - operation: MULTIPLY
              values:
              - $bbz_aanvraag.uren_per_week
              - 52
            - $urencriterium_per_jaar
          - operation: OR
            conditions:
            - operation: AND
              conditions:
              - subject: $bbz_aanvraag.type_zelfstandige
                operation: EQUALS
                value: OUDER
              - operation: LESS_THAN_OR_EQUAL
                values:
                - $vermogen
                - $vermogensgrens_ouder
            - operation: LESS_THAN_OR_EQUAL
              values:
              - $vermogen
              - $vermogensgrens_algemeen
          - operation: OR
            conditions:
            - operation: AND
              conditions:
              - subject: $bbz_aanvraag.type_zelfstandige
                operation: EQUALS
                value: GEVESTIGD
              - subject: $bbz_aanvraag.bedrijf_levensvatbaar
                operation: EQUALS
                value: true
            - operation: AND
              conditions:
              - subject: $bbz_aanvraag.type_zelfstandige
                operation: EQUALS
                value: BEGINNEND
              - subject: $heeft_ww_uitkering
                operation: EQUALS
                value: true
              - subject: $bbz_aanvraag.bedrijf_levensvatbaar
                operation: EQUALS
                value: true
            - operation: AND
              conditions:
              - subject: $bbz_aanvraag.type_zelfstandige
                operation: EQUALS
                value: OUDER
              - subject: $geboortedatum
                operation: LESS_THAN
                value: $geboren_voor_datum
              - subject: $bbz_aanvraag.bedrijf_levensvatbaar
                operation: EQUALS
                value: false
              - operation: GREATER_THAN_OR_EQUAL
                values:
                - $bbz_aanvraag.jaren_ondernemerschap
                - 10
            - operation: AND
              conditions:
              - subject: $bbz_aanvraag.type_zelfstandige
                operation: EQUALS
                value: BEEINDIGEND
              - operation: NOT
                value:
                  operation: IS_NULL
                  subject: $bbz_aanvraag.beeindigingsdatum
      - output: is_gerechtigd
        value: true
        legal_basis:
          law: Besluit bijstandverlening zelfstandigen 2004
          bwb_id: BWBR0015711
          article: '2'
          url: https://wetten.overheid.nl/BWBR0015711/2025-01-01#Hoofdstuk1_Artikel2
          juriconnect: jci1.3:c:BWBR0015711&artikel=2&z=2025-01-01&g=2025-01-01
          explanation: Als aan alle voorwaarden is voldaan, is de zelfstandige gerechtigd tot Bbz
      - output: categorie_zelfstandige
        value: $bbz_aanvraag.type_zelfstandige
        legal_basis:
          law: Besluit bijstandverlening zelfstandigen 2004
          bwb_id: BWBR0015711
          article: '2'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0015711/2025-01-01#Hoofdstuk1_Artikel2
          juriconnect: jci1.3:c:BWBR0015711&artikel=2&lid=1&z=2025-01-01&g=2025-01-01
          explanation: De categorie wordt overgenomen uit de aanvraag
      - output: algemene_bijstand_bedrag
        value: $basisbedrag_bijstand
        legal_basis:
          law: Besluit bijstandverlening zelfstandigen 2004
          bwb_id: BWBR0015711
          article: '10'
          url: https://wetten.overheid.nl/BWBR0015711/2025-01-01#Hoofdstuk2_Artikel10
          juriconnect: jci1.3:c:BWBR0015711&artikel=10&z=2025-01-01&g=2025-01-01
          explanation: Artikel 10 bepaalt dat de algemene bijstand wordt vastgesteld volgens de Participatiewet
      - output: max_duur_maanden
        value:
          operation: IF
          cases:
          - when:
              operation: EQUALS
              subject: $bbz_aanvraag.type_zelfstandige
              value: GEVESTIGD
            then: $max_duur_gevestigd
          - when:
              operation: EQUALS
              subject: $bbz_aanvraag.type_zelfstandige
              value: BEGINNEND
            then: $max_duur_beginnend
          - when:
              operation: EQUALS
              subject: $bbz_aanvraag.type_zelfstandige
              value: OUDER
            then: $max_duur_ouder
          default: $max_duur_beeindigend
        legal_basis:
          law: Besluit bijstandverlening zelfstandigen 2004
          bwb_id: BWBR0015711
          article: '18'
          url: https://wetten.overheid.nl/BWBR0015711/2025-01-01#Hoofdstuk3_Paragraaf1_Artikel18
          juriconnect: jci1.3:c:BWBR0015711&artikel=18&z=2025-01-01&g=2025-01-01
          explanation: De maximale duur verschilt per categorie zelfstandige
      - output: bedrijfskapitaal_max
        value:
          operation: IF
          cases:
          - when:
              operation: EQUALS
              subject: $bbz_aanvraag.type_zelfstandige
              value: GEVESTIGD
            then: $bedrijfskapitaal_gevestigd
          - when:
              operation: EQUALS
              subject: $bbz_aanvraag.type_zelfstandige
              value: BEGINNEND
            then: $bedrijfskapitaal_beginnend
          - when:
              operation: EQUALS
              subject: $bbz_aanvraag.type_zelfstandige
              value: OUDER
            then: $bedrijfskapitaal_ouder
          default: 0
        legal_basis:
          law: Besluit bijstandverlening zelfstandigen 2004
          bwb_id: BWBR0015711
          article: '20'
          url: https://wetten.overheid.nl/BWBR0015711/2025-01-01#Hoofdstuk3_Paragraaf1_Artikel20
          juriconnect: jci1.3:c:BWBR0015711&artikel=20&z=2025-01-01&g=2025-01-01
          explanation: Het maximale bedrijfskapitaal verschilt per categorie zelfstandige
      - output: bedrijfskapitaal_type
        value:
          operation: IF
          cases:
          - when:
              operation: EQUALS
              subject: $bbz_aanvraag.type_zelfstandige
              value: OUDER
            then: $type_om_niet
          - when:
              operation: EQUALS
              subject: $bbz_aanvraag.type_zelfstandige
              value: BEEINDIGEND
            then: GEEN
          default: $type_lening_rente
        legal_basis:
          law: Besluit bijstandverlening zelfstandigen 2004
          bwb_id: BWBR0015711
          article: '14'
          url: https://wetten.overheid.nl/BWBR0015711/2025-01-01#Hoofdstuk2_Artikel14
          juriconnect: jci1.3:c:BWBR0015711&artikel=14&z=2025-01-01&g=2025-01-01
          explanation: Het type bedrijfskapitaal verschilt per categorie zelfstandige
