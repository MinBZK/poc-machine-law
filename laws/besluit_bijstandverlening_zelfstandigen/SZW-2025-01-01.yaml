      vermogensgrens_ouder:
        value: 17072500
      vermogensgrens_laag:
        value: 5803500
      bedrijfskapitaal_gevestigd:
        value: 25342000
      bedrijfskapitaal_beginnend:
        value: 4665600
      bedrijfskapitaal_ouder:
        value: 1267100
      rente_percentage:
        value: 0.08
      belasting_percentage:
        value: 0.2
      min_inkomen_ouder:
        value: 1006500
      geboren_voor_datum:
        value: '1960-01-01'
      urencriterium_per_jaar:
        value: 1225
      max_duur_gevestigd:
        value: 12
      max_duur_beginnend:
        value: 36
      max_duur_beeindigend:
        value: 12
      max_duur_ouder:
        value: 0
      minimum_leeftijd:
        value: 18
      categorie_gevestigd:
        value: GEVESTIGD
      categorie_beginnend:
        value: BEGINNEND
      categorie_ouder:
        value: OUDER
      categorie_beeindigend:
        value: BEEINDIGEND
      type_lening_rente:
        value: LENING_RENTE
