$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.0/schema.json
$id: vreemdelingenwet
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Bepalen verblijfsstatus
bwb_id: BWBR0011823
url: https://wetten.overheid.nl/BWBR0011823/2024-01-01
service: IND
uuid: af0fed0d-ee11-48f3-b629-07becda4b7e9
articles:
- number: '8'
  text: ''
  url: https://wetten.overheid.nl/BWBR0011823/2024-01-01#Artikel8
  machine_readable:
    definitions:
      VALID_PERMIT_STATUSES:
        value:
        - VERLEEND
        - VERLENGD
        - VAN_RECHTSWEGE
      PERMANENT_TYPES:
        value:
        - ONBEPAALDE_TIJD_REGULIER
        - ONBEPAALDE_TIJD_ASIEL
        - ONBEPAALDE_TIJD_EU
        - DUURZAAM_VERBLIJF_EU
      EU_TYPES:
        value:
        - EU_BURGER
        - FAMILIE_EU_BURGER
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: VERGUNNING_GEGEVENS
        type: object
        source_reference:
          table: verblijfsvergunningen
          fields:
          - type
          - status
          - ingangsdatum
          - einddatum
          select_on:
          - name: bsn
            description: BSN nummer van de persoon
            type: string
            value: $BSN
      - name: EU_INSCHRIJVING
        type: object
        source_reference:
          table: eu_registraties
          fields:
          - type
          - ingangsdatum
          select_on:
          - name: bsn
            description: BSN nummer van de persoon
            type: string
            value: $BSN
      output:
      - name: verblijfsvergunning_type
        type: string
      actions:
      - output: verblijfsvergunning_type
        value:
          operation: IF
          conditions:
          - test:
              operation: AND
              values:
              - operation: IN
                subject: $VERGUNNING_GEGEVENS.type
                values: $PERMANENT_TYPES
              - operation: IN
                subject: $VERGUNNING_GEGEVENS.status
                values: $VALID_PERMIT_STATUSES
            then: PERMANENT
          - test:
              operation: IN
              subject: $EU_INSCHRIJVING.type
              values: $EU_TYPES
            then: EU
          - test:
              operation: AND
              values:
              - operation: IN
                subject: $VERGUNNING_GEGEVENS.status
                values: $VALID_PERMIT_STATUSES
              - operation: LESS_OR_EQUAL
                subject: $VERGUNNING_GEGEVENS.ingangsdatum
                value: $calculation_date
              - operation: GREATER_OR_EQUAL
                subject: $VERGUNNING_GEGEVENS.einddatum
                value: $calculation_date
            then: TIJDELIJK
          - else: null
        legal_basis:
          law: Vreemdelingenwet 2000
          bwb_id: BWBR0011823
          article: '8'
          url: https://wetten.overheid.nl/BWBR0011823/2024-01-01#Hoofdstuk3_Afdeling1_Artikel8
          juriconnect: jci1.3:c:BWBR0011823&artikel=8&z=2024-01-01&g=2024-01-01
          explanation: Artikel 8 Vw 2000 bepaalt de vaststelling van het type rechtmatig verblijf
