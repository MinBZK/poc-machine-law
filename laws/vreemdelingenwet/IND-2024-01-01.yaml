articles:
- number: '8'
  text: "De vreemdeling heeft in Nederland uitsluitend rechtmatig verblijf:\n  a.\
    \ op grond van een verblijfsvergunning voor bepaalde tijd als bedoeld in artikel\
    \ 14;\n  b. op grond van een verblijfsvergunning voor onbepaalde tijd als bedoeld\
    \ in artikel 20, of een EU-verblijfsvergunning voor langdurig ingezetenen als\
    \ bedoeld in artikel 45a indien op het aan de vreemdeling verschafte document,\
    \ bedoeld in artikel 9, geen aantekening als bedoeld in artikel 45c, eerste lid,\
    \ is geplaatst;\n  c. op grond van een verblijfsvergunning voor bepaalde tijd\
    \ als bedoeld in artikel 28;\n  d. op grond van een verblijfsvergunning voor onbepaalde\
    \ tijd als bedoeld in artikel 33, of een EU-verblijfsvergunning voor langdurig\
    \ ingezetenen als bedoeld in artikel 45a indien op het aan de vreemdeling verschafte\
    \ document, bedoeld in artikel 9, de aantekening, bedoeld in artikel 45c, eerste\
    \ lid, is geplaatst;\n  e. als gemeenschapsonderdaan zolang deze onderdaan verblijf\
    \ houdt op grond van een regeling krachtens het Verdrag betreffende de werking\
    \ van de Europese Unie dan wel de Overeenkomst betreffende de Europese Economische\
    \ Ruimte;\n  f. in afwachting van de beslissing op een aanvraag tot het verlenen\
    \ van de verblijfsvergunning, bedoeld in de artikelen 14 en 28, terwijl bij of\
    \ krachtens deze wet dan wel op grond van een rechterlijke beslissing uitzetting\
    \ van de aanvrager achterwege dient te blijven totdat op de aanvraag is beslist;\n\
    \  g. in afwachting van de beslissing op een aanvraag tot het verlenen van de\
    \ verblijfsvergunning, bedoeld in de artikelen 20, 33 en 45a, of tot het verlengen\
    \ van de geldigheidsduur van de verblijfsvergunning, bedoeld in de artikelen 14\
    \ en 28, of een wijziging ervan, terwijl bij of krachtens deze wet of op grond\
    \ van een rechterlijke beslissing uitzetting van de aanvrager achterwege dient\
    \ te blijven totdat op de aanvraag is beslist;\n  h. in afwachting van de beslissing\
    \ op een bezwaarschrift of een beroepschrift, terwijl bij of krachtens deze wet\
    \ of op grond van een rechterlijke beslissing uitzetting van de aanvrager achterwege\
    \ dient te blijven totdat op het bezwaarschrift of het beroepschrift is beslist;\n\
    \  i. gedurende de vrije termijn, bedoeld in artikel 12, zolang het verblijf van\
    \ de vreemdeling bij of krachtens artikel 12 is toegestaan;\n  j. indien tegen\
    \ de uitzetting beletselen bestaan als bedoeld in artikel 64;\n  k. gedurende\
    \ de periode waarin de vreemdeling door Onze Minister in de gelegenheid wordt\
    \ gesteld aangifte te doen van overtreding van artikel 273f van het Wetboek van\
    \ Strafrecht;\n  l. indien de vreemdeling verblijfsrecht ontleent aan het Associatiebesluit\
    \ 1/80 van de Associatieraad EEG/Turkije;\n  m. indien de aanvraag tot het verlenen\
    \ van een verblijfsvergunning voor bepaalde tijd als bedoeld in artikel 28 niet\
    \ in behandeling is genomen op grond van artikel 30 terwijl hij in afwachting\
    \ is van de feitelijke overdracht naar een verantwoordelijke lidstaat in de zin\
    \ van de Dublinverordening."
  url: https://wetten.overheid.nl/BWBR0011823/2024-01-01#Artikel8
