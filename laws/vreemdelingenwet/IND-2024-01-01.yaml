articles:
- number: '8'
  text: "De vreemdeling heeft in Nederland uitsluitend rechtmatig verblijf:\n  a. op grond van een verblijfsvergunning voor\
    \ bepaalde tijd als bedoeld in artikel 14;\n  b. op grond van een verblijfsvergunning voor onbepaalde tijd als bedoeld\
    \ in artikel 20, of een EU-verblijfsvergunning voor langdurig ingezetenen als bedoeld in artikel 45a indien op het aan\
    \ de vreemdeling verschafte document, bedoeld in artikel 9, geen aantekening als bedoeld in artikel 45c, eerste lid, is\
    \ geplaatst;\n  c. op grond van een verblijfsvergunning voor bepaalde tijd als bedoeld in artikel 28;\n  d. op grond van\
    \ een verblijfsvergunning voor onbepaalde tijd als bedoeld in artikel 33, of een EU-verblijfsvergunning voor langdurig\
    \ ingezetenen als bedoeld in artikel 45a indien op het aan de vreemdeling verschafte document, bedoeld in artikel 9, de\
    \ aantekening, bedoeld in artikel 45c, eerste lid, is geplaatst;\n  e. als gemeenschapsonderdaan zolang deze onderdaan\
    \ verblijf houdt op grond van een regeling krachtens het Verdrag betreffende de werking van de Europese Unie dan wel de\
    \ Overeenkomst betreffende de Europese Economische Ruimte;\n  f. in afwachting van de beslissing op een aanvraag tot het\
    \ verlenen van de verblijfsvergunning, bedoeld in de artikelen 14 en 28, terwijl bij of krachtens deze wet dan wel op\
    \ grond van een rechterlijke beslissing uitzetting van de aanvrager achterwege dient te blijven totdat op de aanvraag\
    \ is beslist;\n  g. in afwachting van de beslissing op een aanvraag tot het verlenen van de verblijfsvergunning, bedoeld\
    \ in de artikelen 20, 33 en 45a, of tot het verlengen van de geldigheidsduur van de verblijfsvergunning, bedoeld in de\
    \ artikelen 14 en 28, of een wijziging ervan, terwijl bij of krachtens deze wet of op grond van een rechterlijke beslissing\
    \ uitzetting van de aanvrager achterwege dient te blijven totdat op de aanvraag is beslist;\n  h. in afwachting van de\
    \ beslissing op een bezwaarschrift of een beroepschrift, terwijl bij of krachtens deze wet of op grond van een rechterlijke\
    \ beslissing uitzetting van de aanvrager achterwege dient te blijven totdat op het bezwaarschrift of het beroepschrift\
    \ is beslist;\n  i. gedurende de vrije termijn, bedoeld in artikel 12, zolang het verblijf van de vreemdeling bij of krachtens\
    \ artikel 12 is toegestaan;\n  j. indien tegen de uitzetting beletselen bestaan als bedoeld in artikel 64;\n  k. gedurende\
    \ de periode waarin de vreemdeling door Onze Minister in de gelegenheid wordt gesteld aangifte te doen van overtreding\
    \ van artikel 273f van het Wetboek van Strafrecht;\n  l. indien de vreemdeling verblijfsrecht ontleent aan het Associatiebesluit\
    \ 1/80 van de Associatieraad EEG/Turkije;\n  m. indien de aanvraag tot het verlenen van een verblijfsvergunning voor bepaalde\
    \ tijd als bedoeld in artikel 28 niet in behandeling is genomen op grond van artikel 30 terwijl hij in afwachting is van\
    \ de feitelijke overdracht naar een verantwoordelijke lidstaat in de zin van de Dublinverordening."
  url: https://wetten.overheid.nl/BWBR0011823/2024-01-01#Artikel8
  machine_readable:
    definitions:
      VALID_PERMIT_STATUSES:
        value:
        - VERLEEND
        - VERLENGD
        - VAN_RECHTSWEGE
      PERMANENT_TYPES:
        value:
        - ONBEPAALDE_TIJD_REGULIER
        - ONBEPAALDE_TIJD_ASIEL
        - ONBEPAALDE_TIJD_EU
        - DUURZAAM_VERBLIJF_EU
      EU_TYPES:
        value:
        - EU_BURGER
        - FAMILIE_EU_BURGER
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: VERGUNNING_GEGEVENS
        type: object
        source_reference:
          table: verblijfsvergunningen
          fields:
          - type
          - status
          - ingangsdatum
          - einddatum
          select_on:
          - name: bsn
            description: BSN nummer van de persoon
            type: string
            value: $BSN
      - name: EU_INSCHRIJVING
        type: object
        source_reference:
          table: eu_registraties
          fields:
          - type
          - ingangsdatum
          select_on:
          - name: bsn
            description: BSN nummer van de persoon
            type: string
            value: $BSN
      output:
      - name: verblijfsvergunning_type
        type: string
      actions:
      - output: verblijfsvergunning_type
        value:
          operation: IF
          conditions:
          - test:
              operation: AND
              values:
              - operation: IN
                subject: $VERGUNNING_GEGEVENS.type
                values: $PERMANENT_TYPES
              - operation: IN
                subject: $VERGUNNING_GEGEVENS.status
                values: $VALID_PERMIT_STATUSES
            then: PERMANENT
          - test:
              operation: IN
              subject: $EU_INSCHRIJVING.type
              values: $EU_TYPES
            then: EU
          - test:
              operation: AND
              values:
              - operation: IN
                subject: $VERGUNNING_GEGEVENS.status
                values: $VALID_PERMIT_STATUSES
              - operation: LESS_OR_EQUAL
                subject: $VERGUNNING_GEGEVENS.ingangsdatum
                value: $calculation_date
              - operation: GREATER_OR_EQUAL
                subject: $VERGUNNING_GEGEVENS.einddatum
                value: $calculation_date
            then: TIJDELIJK
          - else: null
