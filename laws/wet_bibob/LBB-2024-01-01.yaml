articles:
- number: '9'
  text: "1 Het Bureau heeft tot taak aan bestuursorganen, voorzover deze bij of krachtens de wet de bevoegdheid hebben gekregen\
    \ het Bureau daartoe te verzoeken, op verzoek advies uit te brengen over de mate van gevaar, bedoeld in artikel 3, eerste\
    \ lid, of over de feiten en omstandigheden, bedoeld in artikel 3, zesde lid.\n2 Voor zover het gaat om een overheidsopdracht,\
    \ heeft het Bureau voorts tot taak rechtspersonen met een overheidstaak desgevraagd advies uit te brengen over:\n  a.\
    \ feiten en omstandigheden die grond kunnen opleveren voor de toepassing ten aanzien van een betrokkene van artikelen\
    \ 2.86 tot en met 2.89 van de Aanbestedingswet 2012;\n  b. feiten en omstandigheden die grond kunnen opleveren voor de\
    \ toepassing ten aanzien van een betrokkene van artikel 3.65 van de Aanbestedingswet 2012 in samenhang gelezen met de\
    \ in onderdeel a genoemde bepalingen, indien het gaat om een speciale-sectoropdracht als bedoeld in artikel 1.1 van de\
    \ Aanbestedingswet 2012;\n  c. de mogelijkheid dat een betrokkene wordt gefinancierd met uit gepleegde strafbare feiten\
    \ verkregen of te verkrijgen, op geld waardeerbare voordelen;\n  d. de mate van gevaar dat een betrokkene, indien de overheidsopdracht\
    \ aan hem zou worden gegund, bij de uitvoering van die opdracht strafbare feiten zal plegen.\n3 Voor zover het gaat om\
    \ een vastgoedtransactie, heeft het Bureau tot taak rechtspersonen met een overheidstaak op verzoek advies uit te brengen\
    \ over:\n  a. de mate van gevaar dat de vastgoedtransactie mede zal worden gebruikt om uit gepleegde strafbare feiten\
    \ verkregen of te verkrijgen, op geld waardeerbare voordelen te benutten,\n  b. de mate van gevaar dat in of met de onroerende\
    \ zaak waar de vastgoedtransactie betrekking op heeft, mede strafbare feiten zullen worden gepleegd, of\n  c. de feiten\
    \ en omstandigheden die er op wijzen of redelijkerwijs doen vermoeden dat ter verkrijging of behoud van een vastgoedtransactie\
    \ een strafbaar feit is gepleegd.\n4 Artikel 3, tweede tot en met vijfde lid, is van overeenkomstige toepassing.\n5 Het\
    \ Bureau kan afzien van het uitbrengen van een advies indien:\n  a. het bestuursorgaan of de rechtspersoon met een overheidstaak\
    \ niet de in artikel 7a, vierde lid, bedoelde informatie heeft toegezonden aan het Bureau; of\n  b. uit de in artikel\
    \ 7a, vierde lid, bedoelde informatie naar het oordeel van het Bureau blijkt dat het bestuursorgaan of de rechtspersoon\
    \ met een overheidstaak onvoldoende gebruik heeft gemaakt van de mogelijkheden tot het verrichten van eigen onderzoek."
  url: https://wetten.overheid.nl/BWBR0013798/2024-01-01#Artikel9
  machine_readable:
    definitions:
      MATE_GEEN_GEVAAR:
        value: geen_gevaar
      MATE_MINDERE_MATE:
        value: mindere_mate
      MATE_ERNSTIG_GEVAAR:
        value: ernstig_gevaar
      ADVIESTERMIJN_WEKEN:
        value: 8
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: ANDERE_HANDELING
      parameters:
      - name: KVK_NUMMER
        type: string
      - name: BSN
        type: string
      - name: BESCHIKKING_TYPE
        type: enum
        required: true
        type_spec:
          enum:
          - vergunning
          - subsidie
          - overheidsopdracht
          - vastgoedtransactie
          enum_labels:
            vergunning: Vergunning (horeca, bouw, milieu, etc.)
            subsidie: Subsidie
            overheidsopdracht: Overheidsopdracht of aanbesteding
            vastgoedtransactie: Vastgoedtransactie
      input:
      - name: ADVIES_UITGEBRACHT
        type: boolean
        source_reference:
          table: bibob_adviezen
          field: advies_uitgebracht
          select_on:
          - name: kvk_nummer
            description: KVK-nummer van de onderneming
            type: string
            value: $KVK_NUMMER
      - name: ADVIES_MATE_VAN_GEVAAR
        type: enum
        source_reference:
          table: bibob_adviezen
          field: mate_van_gevaar
          select_on:
          - name: kvk_nummer
            description: KVK-nummer van de onderneming
            type: string
            value: $KVK_NUMMER
      - name: ADVIES_DATUM
        type: date
        source_reference:
          table: bibob_adviezen
          field: advies_datum
          select_on:
          - name: kvk_nummer
            description: KVK-nummer van de onderneming
            type: string
            value: $KVK_NUMMER
      - name: RELATIE_TOT_STRAFBARE_FEITEN
        type: boolean
        source_reference:
          table: bibob_adviezen
          field: relatie_strafbare_feiten
          select_on:
          - name: kvk_nummer
            description: KVK-nummer van de onderneming
            type: string
            value: $KVK_NUMMER
      - name: FINANCIERINGSRISICO
        type: boolean
        source_reference:
          table: bibob_adviezen
          field: financieringsrisico
          select_on:
          - name: kvk_nummer
            description: KVK-nummer van de onderneming
            type: string
            value: $KVK_NUMMER
      - name: VOORSCHRIFTEN_GEADVISEERD
        type: boolean
        source_reference:
          table: bibob_adviezen
          field: voorschriften_geadviseerd
          select_on:
          - name: kvk_nummer
            description: KVK-nummer van de onderneming
            type: string
            value: $KVK_NUMMER
      output:
      - name: advies_uitgebracht
        type: boolean
      - name: mate_van_gevaar
        type: string
      - name: weigering_mogelijk
        type: boolean
      - name: voorschriften_mogelijk
        type: boolean
      - name: verlening_geadviseerd
        type: boolean
      - name: financieringsrisico
        type: boolean
      - name: relatie_strafbare_feiten
        type: boolean
      actions:
      - output: advies_uitgebracht
        value: $ADVIES_UITGEBRACHT
        legal_basis:
          law: Wet bevordering integriteitsbeoordelingen door het openbaar bestuur
          bwb_id: BWBR0013798
          article: '9'
          url: https://wetten.overheid.nl/BWBR0013798/2024-01-01#Paragraaf3_Artikel9
          explanation: Geeft door of er een advies is uitgebracht
      - output: mate_van_gevaar
        value:
          operation: IF
          conditions:
          - test:
              operation: EQUALS
              subject: $ADVIES_UITGEBRACHT
              value: true
            then: $ADVIES_MATE_VAN_GEVAAR
          - else: null
        legal_basis:
          law: Wet bevordering integriteitsbeoordelingen door het openbaar bestuur
          bwb_id: BWBR0013798
          article: '3'
          url: https://wetten.overheid.nl/BWBR0013798/2024-01-01#Paragraaf2_Artikel3
          explanation: De mate van gevaar wordt alleen bepaald als er een advies is uitgebracht
      - output: weigering_mogelijk
        value:
          operation: AND
          values:
          - operation: EQUALS
            subject: $ADVIES_UITGEBRACHT
            value: true
          - operation: EQUALS
            subject: $ADVIES_MATE_VAN_GEVAAR
            value: $MATE_ERNSTIG_GEVAAR
        legal_basis:
          law: Wet bevordering integriteitsbeoordelingen door het openbaar bestuur
          bwb_id: BWBR0013798
          article: '3'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0013798/2024-01-01#Paragraaf2_Artikel3
          explanation: Weigering of intrekking is mogelijk bij ernstig gevaar
      - output: voorschriften_mogelijk
        value:
          operation: AND
          values:
          - operation: EQUALS
            subject: $ADVIES_UITGEBRACHT
            value: true
          - operation: OR
            values:
            - operation: EQUALS
              subject: $ADVIES_MATE_VAN_GEVAAR
              value: $MATE_MINDERE_MATE
            - operation: AND
              values:
              - operation: EQUALS
                subject: $ADVIES_MATE_VAN_GEVAAR
                value: $MATE_ERNSTIG_GEVAAR
              - operation: EQUALS
                subject: $VOORSCHRIFTEN_GEADVISEERD
                value: true
        legal_basis:
          law: Wet bevordering integriteitsbeoordelingen door het openbaar bestuur
          bwb_id: BWBR0013798
          article: '3'
          paragraph: '7'
          url: https://wetten.overheid.nl/BWBR0013798/2024-01-01#Paragraaf2_Artikel3
          explanation: Voorschriften zijn mogelijk bij mindere mate van gevaar of bij ernstig gevaar waar weigering niet proportioneel
            is
      - output: verlening_geadviseerd
        value:
          operation: OR
          values:
          - operation: EQUALS
            subject: $ADVIES_UITGEBRACHT
            value: false
          - operation: EQUALS
            subject: $ADVIES_MATE_VAN_GEVAAR
            value: $MATE_GEEN_GEVAAR
        legal_basis:
          law: Wet bevordering integriteitsbeoordelingen door het openbaar bestuur
          bwb_id: BWBR0013798
          article: '3'
          url: https://wetten.overheid.nl/BWBR0013798/2024-01-01#Paragraaf2_Artikel3
          explanation: Verlening wordt geadviseerd als er geen advies is of als er geen gevaar is gebleken
      - output: financieringsrisico
        value: $FINANCIERINGSRISICO
        legal_basis:
          law: Wet bevordering integriteitsbeoordelingen door het openbaar bestuur
          bwb_id: BWBR0013798
          article: '3'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0013798/2024-01-01#Paragraaf2_Artikel3
          explanation: Geeft door of er sprake is van financieringsrisico
      - output: relatie_strafbare_feiten
        value: $RELATIE_TOT_STRAFBARE_FEITEN
        legal_basis:
          law: Wet bevordering integriteitsbeoordelingen door het openbaar bestuur
          bwb_id: BWBR0013798
          article: '3'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0013798/2024-01-01#Paragraaf2_Artikel3
          explanation: Geeft door of er een relatie is tot strafbare feiten
