articles:
- number: '18.14'
  text: '1 De emissie in de lucht van kooldioxide door woon-werkmobiliteit of zakelijke mobiliteit in kalenderjaargemiddelde per reizigerskilometer wordt berekend door de emissie in de lucht van kooldioxide door woon-werkmobiliteit of zakelijke mobiliteit in het kalenderjaar te delen door het aantal reizigerskilometers voor woon-werkmobiliteit respectievelijk zakelijke mobiliteit in het kalenderjaar.

    2 De emissie in de lucht van kooldioxide door woon-werkmobiliteit of zakelijke mobiliteit, bedoeld in het eerste lid, wordt berekend door voor elke reismodaliteit het aantal in het kalenderjaar gereisde kilometers voor woon-werkmobiliteit respectievelijk zakelijke mobiliteit te vermenigvuldigen met de bij ministeriële regeling vastgestelde emissiefactor voor die reismodaliteit en de uitkomsten bij elkaar op te tellen.'
  url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.14
