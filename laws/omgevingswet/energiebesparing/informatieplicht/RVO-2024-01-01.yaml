$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: omgevingswet/energiebesparing/informatieplicht
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Informatieplicht Energiebesparing
bwb_id: BWBR0041330
url: https://wetten.overheid.nl/BWBR0041330/2024-01-01
service: RVO
uuid: d4ecfc05-c1a3-48f4-bd1c-184390cd0013
discoverable: BUSINESS
articles:
- number: 5.15d
  text: Als voor de inwerkingtreding van dit besluit gegevens en bescheiden zijn verstrekt
    of hadden moeten worden verstrekt als bedoeld in artikel 2.15, tweede, negende
    of tiende lid, van het Activiteitenbesluit milieubeheer, blijft artikel 2.15 van
    dat besluit, zoals dat luidde voor de inwerkingtreding van dit besluit voor zover
    gericht op de verplichtingen als bedoeld in artikel 2.15, tweede, negende of tiende
    lid, en de regels die bij of krachtens dat artikel in samenhang met artikel 1.7,
    eerste lid, van het Activiteitenbesluit milieubeheer, zijn gesteld, tot 1 december
    2027 van toepassing.
  url: https://wetten.overheid.nl/BWBR0041330/2024-01-01#Artikel5.15d
  machine_readable:
    definitions:
      drempel_elektriciteit_kwh: 50000
      drempel_gas_m3: 25000
      drempel_onderzoek_elektriciteit_kwh: 10000000
      drempel_onderzoek_gas_m3: 170000
      rapportage_frequentie_jaren: 4
      volgende_deadline: '2027-12-01'
      rapportage_methode: RVO eLoket (mijn.rvo.nl) met eHerkenning niveau 2+
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: ANDERE_HANDELING
      parameters:
      - name: kvk_nummer
        type: string
        required: true
      input:
      - name: bag_gebruiksdoel
        type: string
        source:
          regulation: wet_bag
          output: gebruiksdoel
          service: KADASTER
          parameters:
            adres: $adres
        temporal:
          type: point_in_time
          reference: $referencedate
      - name: adres
        type: string
        source:
          regulation: handelsregisterwet/bedrijfsgegevens
          output: vestigingsadres
          service: KVK
          parameters:
            kvk_nummer: $kvk_nummer
        temporal:
          type: point_in_time
          reference: $referencedate
      - name: elektriciteit_kwh
        type: number
        source: {}
      - name: gasverbruik_m3
        type: number
        source: {}
      - name: is_woonfunctie
        type: boolean
        source: {}
      output:
      - name: voldoet_aan_voorwaarden
        type: boolean
      - name: heeft_energiebesparingsplicht
        type: boolean
      - name: heeft_informatieplicht
        type: boolean
      - name: heeft_onderzoeksplicht
        type: boolean
      - name: rapportage_frequentie_jaren
        type: number
      - name: volgende_rapportage_deadline
        type: date
      - name: rapportage_methode
        type: string
      - name: bevoegd_gezag
        type: string
      actions:
      - output: voldoet_aan_voorwaarden
        value:
          operation: AND
          conditions:
          - subject: $is_woonfunctie
            operation: EQUALS
            value: false
          - operation: OR
            conditions:
            - subject: $elektriciteit_kwh
              operation: GREATER_THAN_OR_EQUAL
              value: $drempel_elektriciteit_kwh
            - subject: $gasverbruik_m3
              operation: GREATER_THAN_OR_EQUAL
              value: $drempel_gas_m3
      - output: heeft_energiebesparingsplicht
        value: true
        legal_basis:
          law: Besluit activiteiten leefomgeving
          bwb_id: BWBR0041330
          article: '5.15'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0041330/2024-01-01#Hoofdstuk5_Afdeling5.4_Paragraaf5.4.1_Artikel5.15
          juriconnect: jci1.3:c:BWBR0041330&artikel=5.15&lid=1&z=2024-01-01&g=2024-01-01
          explanation: De organisatie voldoet aan de drempelwaarden en heeft geen
            woonfunctie; de energiebesparingsplicht is van toepassing
      - output: heeft_informatieplicht
        value: true
        legal_basis:
          law: Besluit activiteiten leefomgeving
          bwb_id: BWBR0041330
          article: 5.15d
          url: https://wetten.overheid.nl/BWBR0041330/2024-01-01#Hoofdstuk5_Afdeling5.4_Paragraaf5.4.1_Artikel5.15d
          juriconnect: jci1.3:c:BWBR0041330&artikel=5.15d&z=2024-01-01&g=2024-01-01
          explanation: De informatieplicht geldt voor alle organisaties die onder
            de energiebesparingsplicht vallen
      - output: heeft_onderzoeksplicht
        value:
          operation: OR
          conditions:
          - operation: GREATER_THAN_OR_EQUAL
            subject: $elektriciteit_kwh
            value: $drempel_onderzoek_elektriciteit_kwh
          - operation: GREATER_THAN_OR_EQUAL
            subject: $gasverbruik_m3
            value: $drempel_onderzoek_gas_m3
        legal_basis:
          law: Besluit activiteiten leefomgeving
          bwb_id: BWBR0041330
          article: 5.15a
          url: https://wetten.overheid.nl/BWBR0041330/2024-01-01#Hoofdstuk5_Afdeling5.4_Paragraaf5.4.1_Artikel5.15a
          juriconnect: jci1.3:c:BWBR0041330&artikel=5.15a&z=2024-01-01&g=2024-01-01
          explanation: De onderzoeksplicht geldt voor grote verbruikers met meer dan
            10 miljoen kWh elektriciteit of 170.000 m³ aardgas per jaar
      - output: rapportage_frequentie_jaren
        value: $rapportage_frequentie_jaren
        legal_basis:
          law: Besluit activiteiten leefomgeving
          bwb_id: BWBR0041330
          article: 5.15d
          url: https://wetten.overheid.nl/BWBR0041330/2024-01-01#Hoofdstuk5_Afdeling5.4_Paragraaf5.4.1_Artikel5.15d
          juriconnect: jci1.3:c:BWBR0041330&artikel=5.15d&z=2024-01-01&g=2024-01-01
          explanation: Rapportage is vierjaarlijks verplicht
      - output: volgende_rapportage_deadline
        value: $volgende_deadline
        legal_basis:
          law: Besluit activiteiten leefomgeving
          bwb_id: BWBR0041330
          article: 5.15d
          url: https://wetten.overheid.nl/BWBR0041330/2024-01-01#Hoofdstuk5_Afdeling5.4_Paragraaf5.4.1_Artikel5.15d
          juriconnect: jci1.3:c:BWBR0041330&artikel=5.15d&z=2024-01-01&g=2024-01-01
          explanation: De volgende rapportagedeadline is 1 december 2027
      - output: rapportage_methode
        value: $rapportage_methode
        legal_basis:
          law: Besluit activiteiten leefomgeving
          bwb_id: BWBR0041330
          article: 5.15d
          url: https://wetten.overheid.nl/BWBR0041330/2024-01-01#Hoofdstuk5_Afdeling5.4_Paragraaf5.4.1_Artikel5.15d
          juriconnect: jci1.3:c:BWBR0041330&artikel=5.15d&z=2024-01-01&g=2024-01-01
          explanation: Rapportage wordt ingediend via het RVO eLoket met eHerkenning
      - output: bevoegd_gezag
        value: gemeente
        legal_basis:
          law: Omgevingswet
          bwb_id: BWBR0037885
          article: '5.1'
          url: https://wetten.overheid.nl/BWBR0037885/2024-01-01#Hoofdstuk5_Afdeling5.1_Paragraaf5.1.1_Artikel5.1
          juriconnect: jci1.3:c:BWBR0037885&artikel=5.1&z=2024-01-01&g=2024-01-01
          explanation: Voor de meeste bedrijven is de gemeente het bevoegd gezag;
            handhaving via de omgevingsdienst
