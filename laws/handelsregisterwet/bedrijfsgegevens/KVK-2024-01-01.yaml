articles:
- number: '14'
  text: "1 In het handelsregister worden over een vestiging van een rechtspersoon waaraan geen onderneming toebehoort opgenomen:\n\
    \  a. een door de Kamer toegekend uniek nummer;\n  b. de naam;\n  c. het post- en bezoekadres;\n  d. de datum van ingebruikname\
    \ of beëindiging.\n2 Indien een rechtspersoon meerdere vestigingen heeft, wordt in het handelsregister opgenomen welke\
    \ vestiging de hoofdvestiging of de hoofdnederzetting is."
  url: https://wetten.overheid.nl/BWBR0021777/2024-01-01#Artikel14
  machine_readable:
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: KVK_NUMMER
        type: string
        required: true
      input:
      - name: ORGANISATIE_GEGEVENS
        type: object
        source_reference:
          table: organisaties
          fields:
          - kvk_nummer
          - rechtsvorm
          - status
          - aantal_werknemers
          - datum_telling
          - datum_aanvang
          - vestigingsadres
          select_on:
