$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.1/schema.json
$id: handelsregisterwet
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Bepalen ondernemerschap
bwb_id: BWBR0021777
url: https://wetten.overheid.nl/BWBR0021777/2024-01-01
service: KVK
uuid: 8b59ef92-03f8-4294-bce9-4eaac01ba0ed
articles:
- number: '2'
  text: "Er is een handelsregister van ondernemingen en rechtspersonen:\n  a. ter bevordering van de rechtszekerheid in het\
    \ economisch verkeer;\n  b. voor de verstrekking van gegevens van algemene, feitelijke aard omtrent de samenstelling van\
    \ ondernemingen en rechtspersonen ter bevordering van de economische belangen van handel, industrie, ambacht en dienstverlening;\n\
    \  c. voor het registreren van alle ondernemingen en rechtspersonen als onderdeel van de gegevenshuishouding die bijdraagt\
    \ aan het efficiënt functioneren van en de rechtshandhaving door de overheid;\n  d. voor het registreren van uiteindelijk\
    \ belanghebbenden ter voorkoming van het gebruik van het financiële stelsel voor het witwassen van geld en terrorismefinanciering."
  url: https://wetten.overheid.nl/BWBR0021777/2024-01-01#Artikel2
  machine_readable:
    definitions:
      ACTIEVE_STATUSSEN:
        value:
        - ACTIEF
        - TIJDELIJK_GESTAAKT
      ONDERNEMERSVORMEN:
        value:
        - EENMANSZAAK
        - VOF
        - MAATSCHAP
        - COMMANDITAIRE_VENNOOTSCHAP
      ONDERNEMERS_POSITIES:
        value:
        - EIGENAAR
        - VENNOOT
        - MAAT
        - BEHEREND_VENNOOT
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: INSCHRIJVINGEN
        type: array
        source_reference:
          table: inschrijvingen
          fields:
          - kvk_nummer
          - rechtsvorm
          - status
          - activiteit
          select_on:
          - name: bsn
            description: BSN nummer van de persoon
            type: string
            value: $BSN
      - name: POSITIES
        type: array
        source_reference:
          table: functionarissen
          fields:
          - kvk_nummer
          - functie
          - status
          select_on:
          - name: bsn
            description: BSN nummer van de persoon
            type: string
            value: $BSN
      output:
      - name: is_actieve_ondernemer
        type: boolean
      - name: kvk_nummer
        type: string
      actions:
      - output: is_actieve_ondernemer
        value:
          operation: OR
          values:
          - operation: AND
            values:
            - operation: IN
              subject: $INSCHRIJVINGEN.rechtsvorm
              values: $ONDERNEMERSVORMEN
            - operation: IN
              subject: $INSCHRIJVINGEN.status
              values: $ACTIEVE_STATUSSEN
          - operation: AND
            values:
            - operation: IN
              subject: $POSITIES.functie
              values: $ONDERNEMERS_POSITIES
            - operation: IN
              subject: $POSITIES.status
              values: $ACTIEVE_STATUSSEN
        legal_basis:
          law: Handelsregisterwet 2007
          bwb_id: BWBR0021777
          article: '7'
          url: https://wetten.overheid.nl/BWBR0021777/2024-01-01#Hoofdstuk2_Artikel7
          juriconnect: jci1.3:c:BWBR0021777&artikel=7&z=2024-01-01&g=2024-01-01
          explanation: Artikel 7 Handelsregisterwet bepaalt wanneer sprake is van actief ondernemerschap
      - output: kvk_nummer
        value: $INSCHRIJVINGEN.kvk_nummer
        legal_basis:
          law: Handelsregisterwet 2007
          bwb_id: BWBR0021777
          article: '9'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0021777/2024-01-01#Hoofdstuk2_Artikel9
          juriconnect: jci1.3:c:BWBR0021777&artikel=9&lid=1&z=2024-01-01&g=2024-01-01
          explanation: Het KvK-nummer wordt opgehaald uit de inschrijving in het handelsregister
