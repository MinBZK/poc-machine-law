$id: https://raw.githubusercontent.com/MinBZK/poc-machine-law/refs/heads/main/schema/v0.1.7/schema.json
uuid: f3b2d5e8-1a4c-4f9b-a6d7-8e3f2b4a0c19
name: Handelsregisterwet - Jaarrekening Deponeringsplicht
law: handelsregisterwet/jaarrekening
law_type: "FORMELE_WET"
legal_character: "BESCHIKKING"
decision_type: "ANDERE_HANDELING"
discoverable: "BUSINESS"
requires_manual_approval: false
valid_from: 2024-01-01
service: "KVK"
description: >
  Bepaling van de deponeringsplicht voor de jaarrekening op grond van artikel 394 van Boek 2
  Burgerlijk Wetboek. Rechtspersonen (BV, NV, coöperatie, onderlinge waarborgmaatschappij) zijn
  verplicht hun jaarrekening te deponeren bij het handelsregister van de KVK. Eenmanszaken en
  vennootschappen onder firma (VOF) zijn hiervan vrijgesteld.

legal_basis:
  law: "Burgerlijk Wetboek Boek 2"
  bwb_id: "BWBR0003045"
  article: "394"
  url: "https://wetten.overheid.nl/BWBR0003045/2024-01-01#Boek2_Titeldeel9_Afdeling10_Artikel394"
  juriconnect: "jci1.3:c:BWBR0003045&boek=2&artikel=394&z=2024-01-01&g=2024-01-01"
  explanation: "Artikel 394 BW2 bepaalt dat rechtspersonen verplicht zijn de jaarrekening te deponeren bij het handelsregister"

references:
  - law: "Burgerlijk Wetboek Boek 2"
    article: "360"
    url: "https://wetten.overheid.nl/BWBR0003045/2024-01-01#Boek2_Titeldeel9_Afdeling1_Artikel360"
  - law: "Handelsregisterwet 2007"
    article: "19"
    url: "https://wetten.overheid.nl/BWBR0021777/2024-01-01#Hoofdstuk4_Artikel19"

properties:
  parameters:
    - name: "KVK_NUMMER"
      description: "KvK-nummer van de organisatie"
      type: "string"
      required: true
      legal_basis:
        law: "Handelsregisterwet 2007"
        bwb_id: "BWBR0021777"
        article: "19"
        url: "https://wetten.overheid.nl/BWBR0021777/2024-01-01#Hoofdstuk4_Artikel19"
        juriconnect: "jci1.3:c:BWBR0021777&artikel=19&z=2024-01-01&g=2024-01-01"
        explanation: "Identificatie van de onderneming via het KvK-nummer voor de jaarrekening deponeringsplicht"

  sources:
    - name: "RECHTSVORM"
      description: "Rechtsvorm van de organisatie volgens het handelsregister"
      type: "string"
      required: true
      temporal:
        type: "point_in_time"
        reference: "$calculation_date"
      source_reference:
        source_type: "KVK"
        table: "organisaties"
        field: "rechtsvorm"
        select_on:
          - name: "kvk_nummer"
            description: "KvK-nummer van de organisatie"
            type: "string"
            value: "$KVK_NUMMER"
      legal_basis:
        law: "Burgerlijk Wetboek Boek 2"
        bwb_id: "BWBR0003045"
        article: "360"
        url: "https://wetten.overheid.nl/BWBR0003045/2024-01-01#Boek2_Titeldeel9_Afdeling1_Artikel360"
        juriconnect: "jci1.3:c:BWBR0003045&boek=2&artikel=360&z=2024-01-01&g=2024-01-01"
        explanation: "De rechtsvorm bepaalt of Titel 9 Boek 2 BW van toepassing is; alleen rechtspersonen vallen onder de deponeringsplicht"

    - name: "LAATSTE_BOEKJAAR_EINDE"
      description: "Einddatum van het laatste afgelopen boekjaar"
      type: "date"
      required: false
      temporal:
        type: "point_in_time"
        reference: "$calculation_date"
      source_reference:
        source_type: "KVK"
        table: "jaarrekeningen"
        field: "laatste_boekjaar_einde"
        select_on:
          - name: "kvk_nummer"
            description: "KvK-nummer van de organisatie"
            type: "string"
            value: "$KVK_NUMMER"
      legal_basis:
        law: "Burgerlijk Wetboek Boek 2"
        bwb_id: "BWBR0003045"
        article: "394"
        url: "https://wetten.overheid.nl/BWBR0003045/2024-01-01#Boek2_Titeldeel9_Afdeling10_Artikel394"
        juriconnect: "jci1.3:c:BWBR0003045&boek=2&artikel=394&z=2024-01-01&g=2024-01-01"
        explanation: "De jaarrekening moet binnen 8 dagen na vaststelling worden gedeponeerd, uiterlijk 12 maanden na einde boekjaar"

  output:
    - name: "heeft_deponeringsplicht"
      description: "Of de jaarrekening gedeponeerd moet worden bij de KVK"
      type: "boolean"
      temporal:
        type: "point_in_time"
        reference: "$calculation_date"
      citizen_relevance: primary
      legal_basis:
        law: "Burgerlijk Wetboek Boek 2"
        bwb_id: "BWBR0003045"
        article: "394"
        url: "https://wetten.overheid.nl/BWBR0003045/2024-01-01#Boek2_Titeldeel9_Afdeling10_Artikel394"
        juriconnect: "jci1.3:c:BWBR0003045&boek=2&artikel=394&z=2024-01-01&g=2024-01-01"
        explanation: "Alleen rechtspersonen (BV, NV, coöperatie, etc.) zijn verplicht de jaarrekening te deponeren"

    - name: "rapportage_methode"
      description: "De wijze waarop de jaarrekening gedeponeerd moet worden"
      type: "string"
      temporal:
        type: "point_in_time"
        reference: "$calculation_date"
      citizen_relevance: primary
      legal_basis:
        law: "Burgerlijk Wetboek Boek 2"
        bwb_id: "BWBR0003045"
        article: "394"
        url: "https://wetten.overheid.nl/BWBR0003045/2024-01-01#Boek2_Titeldeel9_Afdeling10_Artikel394"
        juriconnect: "jci1.3:c:BWBR0003045&boek=2&artikel=394&z=2024-01-01&g=2024-01-01"
        explanation: "Deponering geschiedt digitaal via SBR (Standard Business Reporting) in XBRL-formaat"

    - name: "volgende_deadline"
      description: "Uiterste datum waarop de jaarrekening gedeponeerd moet zijn"
      type: "date"
      temporal:
        type: "point_in_time"
        reference: "$calculation_date"
      citizen_relevance: primary
      legal_basis:
        law: "Burgerlijk Wetboek Boek 2"
        bwb_id: "BWBR0003045"
        article: "394"
        url: "https://wetten.overheid.nl/BWBR0003045/2024-01-01#Boek2_Titeldeel9_Afdeling10_Artikel394"
        juriconnect: "jci1.3:c:BWBR0003045&boek=2&artikel=394&z=2024-01-01&g=2024-01-01"
        explanation: "De jaarrekening moet uiterlijk 12 maanden na het einde van het boekjaar zijn gedeponeerd"

    - name: "reden_vrijstelling"
      description: "Reden waarom de organisatie is vrijgesteld van de deponeringsplicht"
      type: "string"
      temporal:
        type: "point_in_time"
        reference: "$calculation_date"
      citizen_relevance: secondary
      legal_basis:
        law: "Burgerlijk Wetboek Boek 2"
        bwb_id: "BWBR0003045"
        article: "360"
        url: "https://wetten.overheid.nl/BWBR0003045/2024-01-01#Boek2_Titeldeel9_Afdeling1_Artikel360"
        juriconnect: "jci1.3:c:BWBR0003045&boek=2&artikel=360&z=2024-01-01&g=2024-01-01"
        explanation: "Eenmanszaken en personenvennootschappen vallen niet onder Titel 9 Boek 2 BW en zijn daarom vrijgesteld"

  definitions:
    DEPONERINGSPLICHTIGE_RECHTSVORMEN:
      - "BV"
      - "NV"
      - "COOPERATIE"
      - "ONDERLINGE_WAARBORGMAATSCHAPPIJ"
      - "STICHTING"
      - "VERENIGING"
    RAPPORTAGE_METHODE: "SBR/XBRL via KVK (kvk.nl/deponeren)"
    DEPONERINGS_TERMIJN_MAANDEN: 12

variables: []

requirements:
  - all:
      - subject: "$RECHTSVORM"
        operation: IN
        value: "$DEPONERINGSPLICHTIGE_RECHTSVORMEN"
        legal_basis:
          law: "Burgerlijk Wetboek Boek 2"
          bwb_id: "BWBR0003045"
          article: "360"
          url: "https://wetten.overheid.nl/BWBR0003045/2024-01-01#Boek2_Titeldeel9_Afdeling1_Artikel360"
          juriconnect: "jci1.3:c:BWBR0003045&boek=2&artikel=360&z=2024-01-01&g=2024-01-01"
          explanation: "Titel 9 Boek 2 BW is alleen van toepassing op rechtspersonen; eenmanszaken en VOF zijn vrijgesteld"

actions:
  - output: "heeft_deponeringsplicht"
    value: true
    legal_basis:
      law: "Burgerlijk Wetboek Boek 2"
      bwb_id: "BWBR0003045"
      article: "394"
      url: "https://wetten.overheid.nl/BWBR0003045/2024-01-01#Boek2_Titeldeel9_Afdeling10_Artikel394"
      juriconnect: "jci1.3:c:BWBR0003045&boek=2&artikel=394&z=2024-01-01&g=2024-01-01"
      explanation: "De organisatie is een rechtspersoon; de deponeringsplicht is van toepassing"

  - output: "rapportage_methode"
    value: "$RAPPORTAGE_METHODE"
    legal_basis:
      law: "Burgerlijk Wetboek Boek 2"
      bwb_id: "BWBR0003045"
      article: "394"
      url: "https://wetten.overheid.nl/BWBR0003045/2024-01-01#Boek2_Titeldeel9_Afdeling10_Artikel394"
      juriconnect: "jci1.3:c:BWBR0003045&boek=2&artikel=394&z=2024-01-01&g=2024-01-01"
      explanation: "De jaarrekening wordt digitaal gedeponeerd via SBR in XBRL-formaat"

  - output: "volgende_deadline"
    value: "$LAATSTE_BOEKJAAR_EINDE"
    legal_basis:
      law: "Burgerlijk Wetboek Boek 2"
      bwb_id: "BWBR0003045"
      article: "394"
      url: "https://wetten.overheid.nl/BWBR0003045/2024-01-01#Boek2_Titeldeel9_Afdeling10_Artikel394"
      juriconnect: "jci1.3:c:BWBR0003045&boek=2&artikel=394&z=2024-01-01&g=2024-01-01"
      explanation: "De deadline is uiterlijk 12 maanden na het einde van het boekjaar"

  - output: "reden_vrijstelling"
    value: ""
    legal_basis:
      law: "Burgerlijk Wetboek Boek 2"
      bwb_id: "BWBR0003045"
      article: "360"
      url: "https://wetten.overheid.nl/BWBR0003045/2024-01-01#Boek2_Titeldeel9_Afdeling1_Artikel360"
      juriconnect: "jci1.3:c:BWBR0003045&boek=2&artikel=360&z=2024-01-01&g=2024-01-01"
      explanation: "Niet van toepassing; de organisatie heeft een deponeringsplicht"
