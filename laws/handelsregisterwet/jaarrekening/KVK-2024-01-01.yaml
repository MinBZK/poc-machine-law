uuid: f3b2d5e8-1a4c-4f9b-a6d7-8e3f2b4a0c19
discoverable: BUSINESS
articles:
- number: '394'
  text: "1 De rechtspersoon is verplicht tot openbaarmaking van de jaarrekening binnen\
    \ acht dagen na de vaststelling. De openbaarmaking geschiedt door deponering van\
    \ de volledig in de Nederlandse taal gestelde jaarrekening of, als die niet is\
    \ vervaardigd, de jaarrekening in het Frans, Duits of Engels, bij het handelsregister,\
    \ indien van toepassing op de wijze als voorgeschreven bij of krachtens artikel\
    \ 19a van de Handelsregisterwet 2007. De dag van vaststelling moet zijn vermeld.\n\
    2 Is de jaarrekening niet binnen twee maanden na afloop van de voor het opmaken\
    \ voorgeschreven termijn overeenkomstig de wettelijke voorschriften vastgesteld,\
    \ dan maakt het bestuur onverwijld de opgemaakte jaarrekening op de in lid 1 voorgeschreven\
    \ wijze openbaar; op de jaarrekening wordt vermeld dat zij nog niet is vastgesteld.\
    \ Binnen twee maanden na gerechtelijke vernietiging van een jaarrekening moet\
    \ de rechtspersoon een afschrift van de in de uitspraak opgenomen bevelen met\
    \ betrekking tot de jaarrekening deponeren bij het handelsregister, met vermelding\
    \ van de uitspraak.\n3 Uiterlijk twaalf maanden na afloop van het boekjaar moet\
    \ de rechtspersoon de jaarrekening op de in lid 1 voorgeschreven wijze openbaar\
    \ hebben gemaakt.\n4 Gelijktijdig met en op dezelfde wijze als de jaarrekening\
    \ worden het bestuursverslag en de overige in artikel 392 bedoelde gegevens in\
    \ het Nederlands of in een van de andere in het eerste lid genoemde talen openbaar\
    \ gemaakt. Het voorafgaande geldt, behalve voor de in artikel 392 lid 1 onder\
    \ a en e genoemde gegevens, niet, indien de stukken ten kantore van de rechtspersoon\
    \ ter inzage van een ieder worden gehouden en op verzoek een volledig of gedeeltelijk\
    \ afschrift daarvan ten hoogste tegen de kostprijs wordt verstrekt; hiervan doet\
    \ de rechtspersoon opgaaf ter inschrijving in het handelsregister.\n5 De vorige\
    \ leden gelden niet, indien Onze Minister van Economische Zaken de in artikel\
    \ 58, artikel 101 of artikel 210 genoemde ontheffing heeft verleend; alsdan wordt\
    \ een afschrift van die ontheffing bij het handelsregister gedeponeerd.\n6 De\
    \ in de vorige leden bedoelde bescheiden worden gedurende zeven jaren bewaard.\
    \ De Kamer van Koophandel mag de op deze bescheiden geplaatste gegevens overbrengen\
    \ op andere gegevensdragers, die zij in hun plaats in het handelsregister bewaart,\
    \ mits die overbrenging geschiedt met juiste en volledige weergave der gegevens\
    \ en deze gegevens gedurende de volledige bewaartijd beschikbaar zijn en binnen\
    \ redelijke tijd leesbaar kunnen worden gemaakt.\n7 Iedere belanghebbende kan\
    \ van de rechtspersoon nakoming van de in de leden 1-5 omschreven verplichtingen\
    \ vorderen.\n8 Een vennootschap waarvan effecten zijn toegelaten tot de handel\
    \ op een gereglementeerde markt als bedoeld in de Wet op het financieel toezicht\
    \ wordt geacht te hebben voldaan aan:\n  a. lid 1, indien zij de vastgestelde\
    \ jaarrekening op grond van artikel 5:25o, eerste lid, van die wet heeft toegezonden\
    \ aan de Stichting Autoriteit Financiële Markten;\n  b. lid 2, eerste volzin,\
    \ indien zij mededeling heeft gedaan op grond van artikel 5:25o, tweede lid, van\
    \ die wet aan de Stichting Autoriteit Financiële Markten;\n  c. vierde lid, eerste\
    \ volzin, indien zij het bestuursverslag en de overige in artikel 392 bedoelde\
    \ gegevens op grond van artikel 5:25o, vierde lid, van de Wet op het financieel\
    \ toezicht heeft toegezonden aan de Stichting Autoriteit Financiële Markten."
  url: https://wetten.overheid.nl/BWBR0003045/2024-01-01#Artikel394
