$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: faillissementswet_wsnp_bewindvoerder
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Bepalen WSNP-bewindvoerder en vertegenwoordigingsbevoegdheid schuldsanering
bwb_id: BWBR0001860
url: https://wetten.overheid.nl/BWBR0001860/2024-01-01
service: RECHTSPRAAK
uuid: 1a8ce7cd-8c96-41ae-806c-d6387e43c0dd
discoverable: DELEGATION_PROVIDER
articles:
- number: '316'
  text: "1 De bewindvoerder is belast met:\n  a. het toezicht op de naleving door\
    \ de schuldenaar van diens verplichtingen die uit de schuldsaneringsregeling voortvloeien;\n\
    \  b. het beheer en de vereffening van de boedel.\n2 Alvorens in rechte op te\
    \ treden, behalve waar het verificatiegeschillen betreft, alsmede in de gevallen\
    \ van de artikelen 37, 40, 58, tweede lid, 59a, zesde lid, 305, 326, eerste lid,\
    \ en 349, eerste lid, behoeft de bewindvoerder machtiging van de rechter-commissaris.\
    \ Artikel 72 is van overeenkomstige toepassing."
  url: https://wetten.overheid.nl/BWBR0001860/2024-01-01#Artikel316
  machine_readable:
    definitions:
      wsnp_bewindvoerder_rechten:
      - LEZEN
      - CLAIMS_INDIENEN
      - BESLUITEN_ONTVANGEN
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: ANDERE_HANDELING
      parameters:
      - name: bsn
        type: string
        required: true
      input:
      - name: wsnp_registraties
        type: array
        source: {}
      output:
      - name: voldoet_aan_voorwaarden
        type: boolean
      - name: heeft_delegaties
        type: boolean
      - name: subject_ids
        type: array
      - name: subject_names
        type: array
      - name: subject_types
        type: array
      - name: delegation_types
        type: array
      - name: permissions
        type: array
      - name: valid_from_dates
        type: array
      - name: valid_until_dates
        type: array
      actions:
      - output: voldoet_aan_voorwaarden
        value:
          operation: EXISTS
          subject: $wsnp_registraties
      - output: actieve_wsnp
        value:
          operation: FOREACH
          collection: $wsnp_registraties
          filter:
            operation: AND
            conditions:
            - operation: EQUALS
              subject: $current.status
              value: ACTIEF
            - operation: OR
              conditions:
              - operation: IS_NULL
                subject: $current.datum_einde
              - operation: EQUALS
                subject: $current.datum_einde
                value: ''
              - operation: GREATER_THAN
                subject: $current.datum_einde
                value: $referencedate
          body: $current
          as: current
        legal_basis:
          law: Faillissementswet
          bwb_id: BWBR0001860
          article: '356'
          url: https://wetten.overheid.nl/BWBR0001860/2024-01-01#TiteldeelIII_Artikel356
          juriconnect: jci1.3:c:BWBR0001860&artikel=356&z=2024-01-01&g=2024-01-01
          explanation: 'Alleen actieve WSNP-regelingen geven bewindvoerderbevoegdheid.
            Art. 356 Fw: schuldsanering eindigt bij schone lei of beeindiging.

            '
      - output: heeft_delegaties
        value:
          operation: EXISTS
          subject: $actieve_wsnp
        legal_basis:
          law: Faillissementswet
          bwb_id: BWBR0001860
          article: '316'
          url: https://wetten.overheid.nl/BWBR0001860/2024-01-01#TiteldeelIII_Artikel316
          juriconnect: jci1.3:c:BWBR0001860&artikel=316&z=2024-01-01&g=2024-01-01
          explanation: 'Art. 316 Fw bepaalt dat de bewindvoerder de WSNP-boedel beheert.

            '
      - output: subject_ids
        value: $actieve_wsnp.bsn_saniet
        legal_basis:
          law: Faillissementswet
          bwb_id: BWBR0001860
          article: '294'
          url: https://wetten.overheid.nl/BWBR0001860/2024-01-01#TiteldeelIII_Artikel294
          juriconnect: jci1.3:c:BWBR0001860&artikel=294&z=2024-01-01&g=2024-01-01
          explanation: BSN nummers van sanieten uit CIR registratie
      - output: subject_names
        value:
          operation: FOREACH
          collection: $actieve_wsnp
          body:
            operation: CONCAT
            values:
            - 'WSNP Boedel '
            - $current.naam_saniet
          as: current
        legal_basis:
          law: Faillissementswet
          bwb_id: BWBR0001860
          article: '316'
          url: https://wetten.overheid.nl/BWBR0001860/2024-01-01#TiteldeelIII_Artikel316
          juriconnect: jci1.3:c:BWBR0001860&artikel=316&z=2024-01-01&g=2024-01-01
          explanation: Namen met 'WSNP Boedel' prefix om boedelvertegenwoordiging
            aan te geven
      - output: subject_types
        value:
          operation: FOREACH
          collection: $actieve_wsnp
          body: CITIZEN
        legal_basis:
          law: Faillissementswet
          bwb_id: BWBR0001860
          article: '284'
          url: https://wetten.overheid.nl/BWBR0001860/2024-01-01#TiteldeelIII_Artikel284
          juriconnect: jci1.3:c:BWBR0001860&artikel=284&z=2024-01-01&g=2024-01-01
          explanation: WSNP is alleen voor natuurlijke personen, altijd CITIZEN
      - output: delegation_types
        value:
          operation: FOREACH
          collection: $actieve_wsnp
          body: WSNP_BEWINDVOERDER_BOEDEL
        legal_basis:
          law: Faillissementswet
          bwb_id: BWBR0001860
          article: '316'
          url: https://wetten.overheid.nl/BWBR0001860/2024-01-01#TiteldeelIII_Artikel316
          juriconnect: jci1.3:c:BWBR0001860&artikel=316&z=2024-01-01&g=2024-01-01
          explanation: Type delegatie is WSNP_BEWINDVOERDER_BOEDEL voor WSNP-bewindvoerder
      - output: permissions
        value:
          operation: FOREACH
          collection: $actieve_wsnp
          body: $wsnp_bewindvoerder_rechten
        legal_basis:
          law: Faillissementswet
          bwb_id: BWBR0001860
          article: '316'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0001860/2024-01-01#TiteldeelIII_Artikel316
          juriconnect: jci1.3:c:BWBR0001860&artikel=316&lid=1&z=2024-01-01&g=2024-01-01
          explanation: 'Art. 316 lid 1 Fw: De bewindvoerder beheert de WSNP-boedel.

            '
      - output: valid_from_dates
        value: $actieve_wsnp.datum_uitspraak
        legal_basis:
          law: Faillissementswet
          bwb_id: BWBR0001860
          article: '289'
          url: https://wetten.overheid.nl/BWBR0001860/2024-01-01#TiteldeelIII_Artikel289
          juriconnect: jci1.3:c:BWBR0001860&artikel=289&z=2024-01-01&g=2024-01-01
          explanation: Datum toelating WSNP uit CIR
      - output: valid_until_dates
        value: $actieve_wsnp.datum_einde
        legal_basis:
          law: Faillissementswet
          bwb_id: BWBR0001860
          article: '356'
          url: https://wetten.overheid.nl/BWBR0001860/2024-01-01#TiteldeelIII_Artikel356
          juriconnect: jci1.3:c:BWBR0001860&artikel=356&z=2024-01-01&g=2024-01-01
          explanation: Einddatum WSNP, null indien nog actief
    untranslatables:
    - construct: iteratie over variabel aantal WSNP-registraties
      reason: FOREACH niet beschikbaar in v0.5.1 schema; het aantal actieve schuldsaneringen
        is dynamisch en kan niet vooraf worden uitgerold
      suggestion: Voeg FOREACH toe aan het schema of beperk het aantal registraties
        tot een vast maximum
      accepted: true
