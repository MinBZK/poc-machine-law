$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: wet_studiefinanciering
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Bepalen studiefinanciering 2024
bwb_id: BWBR0011453
url: https://wetten.overheid.nl/BWBR0011453/2024-01-01
service: DUO
uuid: e3bb489c-b7d1-49dd-985c-a3cde1ab0ad3
articles:
- number: '3.1'
  text: |-
    1 Studiefinanciering bestaat voor een opleiding in het beroepsonderwijs uit een basisbeurs, een basislening en een aanvullende beurs of aanvullende lening, en kan geheel of gedeeltelijk worden toegekend in de vorm van:
      a. een gift;
      b. een prestatiebeurs; of
      c. een lening.
    2 Studiefinanciering bestaat voor een opleiding in het hoger onderwijs uit een basisbeurs, een basislening, een aanvullende beurs of aanvullende lening en collegegeldkrediet, en kan geheel of gedeeltelijk worden toegekend in de vorm van:
      a. een gift;
      b. een prestatiebeurs; of
      c. een lening.
    3 Indien een student geen aanspraak heeft op studiefinanciering als bedoeld in het eerste of tweede lid bestaat studiefinanciering uit levenlanglerenkrediet.
    4 De hoogte van de studiefinanciering wordt vastgesteld op basis van een budget voor een kalendermaand.
    5 In afwijking van het vierde lid kan de hoogte van de studiefinanciering ook worden vastgesteld op een tegemoetkoming in de kosten van de toegang tot het onderwijs.
  url: https://wetten.overheid.nl/BWBR0011453/2024-01-01#Artikel3.1
  machine_readable:
    definitions:
      basisbeurs_wo_uit:
        value: 28800
      basisbeurs_wo_thuis:
        value: 10300
      basisbeurs_hbo_uit:
        value: 28800
      basisbeurs_hbo_thuis:
        value: 10300
      basisbeurs_mbo_uit:
        value: 28800
      basisbeurs_mbo_thuis:
        value: 10300
      max_aanvullende_beurs_wo:
        value: 41900
      max_aanvullende_beurs_hbo:
        value: 41900
      max_aanvullende_beurs_mbo:
        value: 41900
      inkomen_grens_geen_beurs:
        value: 7000000
      inkomensdrempel_basis:
        value: 3400000
      verhoging_drempel_per_kind:
        value: 350000
    execution:
      parameters:
      - name: bsn
        type: string
        required: true
      input:
      - name: woonsituatie
        type: string
        source:
          regulation: wet_brp
          output: woonsituatie
          service: RvIG
          parameters:
            bsn: $bsn
        temporal:
          type: period
          period_type: month
      - name: ouder1_inkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: inkomen
          service: BELASTINGDIENST
          parameters:
            bsn: $bsn
        temporal:
          type: period
          period_type: year
      - name: ouder2_inkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: inkomen
          service: BELASTINGDIENST
          parameters:
            bsn: $bsn
        temporal:
          type: period
          period_type: year
      - name: partner_bsn
        type: string
        source:
          regulation: wet_brp
          output: partner_bsn
          service: RvIG
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: partner_woonsituatie
        type: string
        source:
          regulation: wet_brp
          output: woonsituatie
          service: RvIG
          parameters:
            bsn: $partner_bsn
        temporal:
          type: period
          period_type: month
      - name: partner_ouder1_inkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: inkomen
          service: BELASTINGDIENST
          parameters:
            bsn: $partner_bsn
        temporal:
          type: period
          period_type: year
      - name: partner_ouder2_inkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: inkomen
          service: BELASTINGDIENST
          parameters:
            bsn: $partner_bsn
        temporal:
          type: period
          period_type: year
      - name: opleiding_type
        type: string
        source_reference:
          table: inschrijvingen
          field: onderwijstype
          select_on:
          - name: bsn
            description: Burgerservicenummer van de persoon
            type: string
            value: $bsn
      - name: studerend_gezin
        type: number
        source_reference:
          table: studiefinanciering
          field: aantal_studerend_gezin
          select_on:
          - name: bsn
            description: Burgerservicenummer van de persoon
            type: string
            value: $bsn
      - name: partner_opleiding_type
        type: string
        source_reference:
          table: inschrijvingen
          field: onderwijstype
          select_on:
          - name: bsn
            description: Burgerservicenummer van partner
            type: string
            value: $partner_bsn
      - name: partner_studerend_gezin
        type: number
        source_reference:
          table: studiefinanciering
          field: aantal_studerend_gezin
          select_on:
          - name: bsn
            description: Burgerservicenummer van partner
            type: string
            value: $partner_bsn
      output:
      - name: studiefinanciering
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: partner_studiefinanciering
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: is_student
        type: boolean
      - name: ontvangt_studiefinanciering
        type: boolean
      actions:
      - output: studiefinanciering
        value:
          operation: ADD
          values:
          - operation: IF
            cases:
            - when:
                operation: EQUALS
                subject: $opleiding_type
                value: WO
              then:
                operation: IF
                cases:
                - when:
                    operation: EQUALS
                    subject: $woonsituatie
                    value: UIT
                  then: $basisbeurs_wo_uit
                default: $basisbeurs_wo_thuis
            - when:
                operation: EQUALS
                subject: $opleiding_type
                value: HBO
              then:
                operation: IF
                cases:
                - when:
                    operation: EQUALS
                    subject: $woonsituatie
                    value: UIT
                  then: $basisbeurs_hbo_uit
                default: $basisbeurs_hbo_thuis
            - when:
                operation: EQUALS
                subject: $opleiding_type
                value: MBO
              then:
                operation: IF
                cases:
                - when:
                    operation: EQUALS
                    subject: $woonsituatie
                    value: UIT
                  then: $basisbeurs_mbo_uit
                default: $basisbeurs_mbo_thuis
          - operation: IF
            cases:
            - when:
                operation: LESS_THAN
                subject:
                  operation: ADD
                  values:
                  - $ouder1_inkomen
                  - $ouder2_inkomen
                value: $inkomen_grens_geen_beurs
              then:
                operation: MULTIPLY
                values:
                - operation: IF
                  cases:
                  - when:
                      operation: EQUALS
                      subject: $opleiding_type
                      value: WO
                    then: $max_aanvullende_beurs_wo
                  - when:
                      operation: EQUALS
                      subject: $opleiding_type
                      value: HBO
                    then: $max_aanvullende_beurs_hbo
                  - when:
                      operation: EQUALS
                      subject: $opleiding_type
                      value: MBO
                    then: $max_aanvullende_beurs_mbo
                - operation: SUBTRACT
                  values:
                  - 1
                  - operation: DIVIDE
                    values:
                    - operation: SUBTRACT
                      values:
                      - operation: ADD
                        values:
                        - $ouder1_inkomen
                        - $ouder2_inkomen
                      - $inkomensdrempel_basis
                      - operation: MULTIPLY
                        values:
                        - $studerend_gezin
                        - $verhoging_drempel_per_kind
                    - operation: SUBTRACT
                      values:
                      - $inkomen_grens_geen_beurs
                      - $inkomensdrempel_basis
        legal_basis:
          law: Wet studiefinanciering 2000
          bwb_id: BWBR0011453
          article: '3.1'
          url: https://wetten.overheid.nl/BWBR0011453/2024-01-01#Hoofdstuk3_Paragraaf3.1_Artikel3.1
          juriconnect: jci1.3:c:BWBR0011453&artikel=3.1&z=2024-01-01&g=2024-01-01
          explanation: Artikel 3.1 bepaalt dat studiefinanciering bestaat uit de som van basisbeurs en aanvullende beurs.
      - output: partner_studiefinanciering
        value:
          operation: ADD
          values:
          - operation: IF
            cases:
            - when:
                operation: EQUALS
                subject: $partner_opleiding_type
                value: WO
              then:
                operation: IF
                cases:
                - when:
                    operation: EQUALS
                    subject: $partner_woonsituatie
                    value: UIT
                  then: $basisbeurs_wo_uit
                default: $basisbeurs_wo_thuis
            - when:
                operation: EQUALS
                subject: $partner_opleiding_type
                value: HBO
              then:
                operation: IF
                cases:
                - when:
                    operation: EQUALS
                    subject: $partner_woonsituatie
                    value: UIT
                  then: $basisbeurs_hbo_uit
                default: $basisbeurs_hbo_thuis
            - when:
                operation: EQUALS
                subject: $partner_opleiding_type
                value: MBO
              then:
                operation: IF
                cases:
                - when:
                    operation: EQUALS
                    subject: $partner_woonsituatie
                    value: UIT
                  then: $basisbeurs_mbo_uit
                default: $basisbeurs_mbo_thuis
          - operation: IF
            cases:
            - when:
                operation: LESS_THAN
                subject:
                  operation: ADD
                  values:
                  - $partner_ouder1_inkomen
                  - $partner_ouder2_inkomen
                value: $inkomen_grens_geen_beurs
              then:
                operation: MULTIPLY
                values:
                - operation: IF
                  cases:
                  - when:
                      operation: EQUALS
                      subject: $partner_opleiding_type
                      value: WO
                    then: $max_aanvullende_beurs_wo
                  - when:
                      operation: EQUALS
                      subject: $partner_opleiding_type
                      value: HBO
                    then: $max_aanvullende_beurs_hbo
                  - when:
                      operation: EQUALS
                      subject: $partner_opleiding_type
                      value: MBO
                    then: $max_aanvullende_beurs_mbo
                - operation: SUBTRACT
                  values:
                  - 1
                  - operation: DIVIDE
                    values:
                    - operation: SUBTRACT
                      values:
                      - operation: ADD
                        values:
                        - $partner_ouder1_inkomen
                        - $partner_ouder2_inkomen
                      - $inkomensdrempel_basis
                      - operation: MULTIPLY
                        values:
                        - $partner_studerend_gezin
                        - $verhoging_drempel_per_kind
                    - operation: SUBTRACT
                      values:
                      - $inkomen_grens_geen_beurs
                      - $inkomensdrempel_basis
        legal_basis:
          law: Wet studiefinanciering 2000
          bwb_id: BWBR0011453
          article: '3.1'
          url: https://wetten.overheid.nl/BWBR0011453/2024-01-01#Hoofdstuk3_Paragraaf3.1_Artikel3.1
          juriconnect: jci1.3:c:BWBR0011453&artikel=3.1&z=2024-01-01&g=2024-01-01
          explanation: Artikel 3.1 bepaalt dat studiefinanciering voor partners bestaat uit de som van basisbeurs en aanvullende
            beurs.
      - output: is_student
        value:
          operation: NOT
          value:
            operation: IS_NULL
            subject: $opleiding_type
        legal_basis:
          law: Wet studiefinanciering 2000
          bwb_id: BWBR0011453
          article: '2.1'
          url: https://wetten.overheid.nl/BWBR0011453/2024-01-01#Hoofdstuk2_Artikel2.1
          juriconnect: jci1.3:c:BWBR0011453&artikel=2.1&z=2024-01-01&g=2024-01-01
          explanation: Artikel 2.1 vereist dat de studerende is ingeschreven voor een opleiding om recht te hebben op studiefinanciering.
      - output: ontvangt_studiefinanciering
        value:
          operation: GREATER_THAN
          subject: $studiefinanciering
          value: 0
        legal_basis:
          law: Wet studiefinanciering 2000
          bwb_id: BWBR0011453
          article: '2.2'
          url: https://wetten.overheid.nl/BWBR0011453/2024-01-01#Hoofdstuk2_Artikel2.2
          juriconnect: jci1.3:c:BWBR0011453&artikel=2.2&z=2024-01-01&g=2024-01-01
          explanation: Artikel 2.2 bepaalt dat een studerende recht heeft op studiefinanciering als het berekende bedrag groter
            is dan nul.
