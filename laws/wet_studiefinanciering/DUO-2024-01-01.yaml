$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.1/schema.json
$id: wet_studiefinanciering
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Bepalen studiefinanciering 2024
bwb_id: BWBR0011453
url: https://wetten.overheid.nl/BWBR0011453/2024-01-01
service: DUO
uuid: e3bb489c-b7d1-49dd-985c-a3cde1ab0ad3
articles:
- number: '3.1'
  text: "1 Studiefinanciering bestaat voor een opleiding in het beroepsonderwijs uit een basisbeurs, een basislening en een\
    \ aanvullende beurs of aanvullende lening, en kan geheel of gedeeltelijk worden toegekend in de vorm van:\n  a. een gift;\n\
    \  b. een prestatiebeurs; of\n  c. een lening.\n2 Studiefinanciering bestaat voor een opleiding in het hoger onderwijs\
    \ uit een basisbeurs, een basislening, een aanvullende beurs of aanvullende lening en collegegeldkrediet, en kan geheel\
    \ of gedeeltelijk worden toegekend in de vorm van:\n  a. een gift;\n  b. een prestatiebeurs; of\n  c. een lening.\n3 Indien\
    \ een student geen aanspraak heeft op studiefinanciering als bedoeld in het eerste of tweede lid bestaat studiefinanciering\
    \ uit levenlanglerenkrediet.\n4 De hoogte van de studiefinanciering wordt vastgesteld op basis van een budget voor een\
    \ kalendermaand.\n5 In afwijking van het vierde lid kan de hoogte van de studiefinanciering ook worden vastgesteld op\
    \ een tegemoetkoming in de kosten van de toegang tot het onderwijs."
  url: https://wetten.overheid.nl/BWBR0011453/2024-01-01#Artikel3.1
  machine_readable:
    definitions:
      BASISBEURS_WO_UIT:
        value: 28800
      BASISBEURS_WO_THUIS:
        value: 10300
      BASISBEURS_HBO_UIT:
        value: 28800
      BASISBEURS_HBO_THUIS:
        value: 10300
      BASISBEURS_MBO_UIT:
        value: 28800
      BASISBEURS_MBO_THUIS:
        value: 10300
      MAX_AANVULLENDE_BEURS_WO:
        value: 41900
      MAX_AANVULLENDE_BEURS_HBO:
        value: 41900
      MAX_AANVULLENDE_BEURS_MBO:
        value: 41900
      INKOMEN_GRENS_GEEN_BEURS:
        value: 7000000
      INKOMENSDREMPEL_BASIS:
        value: 3400000
      VERHOGING_DREMPEL_PER_KIND:
        value: 350000
    execution:
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: WOONSITUATIE
        type: string
        source:
          regulation: wet_brp
          output: woonsituatie
          service: RvIG
          parameters:
            BSN: $BSN
        temporal:
          type: period
          period_type: month
      - name: OUDER1_INKOMEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: inkomen
          service: BELASTINGDIENST
          parameters:
            BSN: $BSN
        temporal:
          type: period
          period_type: year
      - name: OUDER2_INKOMEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: inkomen
          service: BELASTINGDIENST
          parameters:
            BSN: $BSN
        temporal:
          type: period
          period_type: year
      - name: PARTNER_BSN
        type: string
        source:
          regulation: wet_brp
          output: partner_bsn
          service: RvIG
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: PARTNER_WOONSITUATIE
        type: string
        source:
          regulation: wet_brp
          output: woonsituatie
          service: RvIG
          parameters:
            BSN: $PARTNER_BSN
        temporal:
          type: period
          period_type: month
      - name: PARTNER_OUDER1_INKOMEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: inkomen
          service: BELASTINGDIENST
          parameters:
            BSN: $PARTNER_BSN
        temporal:
          type: period
          period_type: year
      - name: PARTNER_OUDER2_INKOMEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: inkomen
          service: BELASTINGDIENST
          parameters:
            BSN: $PARTNER_BSN
        temporal:
          type: period
          period_type: year
      - name: OPLEIDING_TYPE
        type: string
        source_reference:
          table: inschrijvingen
          field: onderwijstype
          select_on:
          - name: bsn
            description: Burgerservicenummer van de persoon
            type: string
            value: $BSN
      - name: STUDEREND_GEZIN
        type: number
        source_reference:
          table: studiefinanciering
          field: aantal_studerend_gezin
          select_on:
          - name: bsn
            description: Burgerservicenummer van de persoon
            type: string
            value: $BSN
      - name: PARTNER_OPLEIDING_TYPE
        type: string
        source_reference:
          table: inschrijvingen
          field: onderwijstype
          select_on:
          - name: bsn
            description: Burgerservicenummer van partner
            type: string
            value: $PARTNER_BSN
      - name: PARTNER_STUDEREND_GEZIN
        type: number
        source_reference:
          table: studiefinanciering
          field: aantal_studerend_gezin
          select_on:
          - name: bsn
            description: Burgerservicenummer van partner
            type: string
            value: $PARTNER_BSN
      output:
      - name: studiefinanciering
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: partner_studiefinanciering
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: is_student
        type: boolean
      - name: ontvangt_studiefinanciering
        type: boolean
      actions:
      - output: studiefinanciering
        value:
          operation: ADD
          values:
          - operation: IF
            conditions:
            - test:
                operation: EQUALS
                subject: $OPLEIDING_TYPE
                value: WO
              then:
                operation: IF
                conditions:
                - test:
                    operation: EQUALS
                    subject: $WOONSITUATIE
                    value: UIT
                  then: $BASISBEURS_WO_UIT
                - else: $BASISBEURS_WO_THUIS
            - test:
                operation: EQUALS
                subject: $OPLEIDING_TYPE
                value: HBO
              then:
                operation: IF
                conditions:
                - test:
                    operation: EQUALS
                    subject: $WOONSITUATIE
                    value: UIT
                  then: $BASISBEURS_HBO_UIT
                - else: $BASISBEURS_HBO_THUIS
            - test:
                operation: EQUALS
                subject: $OPLEIDING_TYPE
                value: MBO
              then:
                operation: IF
                conditions:
                - test:
                    operation: EQUALS
                    subject: $WOONSITUATIE
                    value: UIT
                  then: $BASISBEURS_MBO_UIT
                - else: $BASISBEURS_MBO_THUIS
          - operation: IF
            conditions:
            - test:
                operation: LESS_THAN
                subject:
                  operation: ADD
                  values:
                  - $OUDER1_INKOMEN
                  - $OUDER2_INKOMEN
                value: $INKOMEN_GRENS_GEEN_BEURS
              then:
                operation: MULTIPLY
                values:
                - operation: IF
                  conditions:
                  - test:
                      operation: EQUALS
                      subject: $OPLEIDING_TYPE
                      value: WO
                    then: $MAX_AANVULLENDE_BEURS_WO
                  - test:
                      operation: EQUALS
                      subject: $OPLEIDING_TYPE
                      value: HBO
                    then: $MAX_AANVULLENDE_BEURS_HBO
                  - test:
                      operation: EQUALS
                      subject: $OPLEIDING_TYPE
                      value: MBO
                    then: $MAX_AANVULLENDE_BEURS_MBO
                - operation: SUBTRACT
                  values:
                  - 1
                  - operation: DIVIDE
                    values:
                    - operation: SUBTRACT
                      values:
                      - operation: ADD
                        values:
                        - $OUDER1_INKOMEN
                        - $OUDER2_INKOMEN
                      - $INKOMENSDREMPEL_BASIS
                      - operation: MULTIPLY
                        values:
                        - $STUDEREND_GEZIN
                        - $VERHOGING_DREMPEL_PER_KIND
                    - operation: SUBTRACT
                      values:
                      - $INKOMEN_GRENS_GEEN_BEURS
                      - $INKOMENSDREMPEL_BASIS
              else: 0
        legal_basis:
          law: Wet studiefinanciering 2000
          bwb_id: BWBR0011453
          article: '3.1'
          url: https://wetten.overheid.nl/BWBR0011453/2024-01-01#Hoofdstuk3_Paragraaf3.1_Artikel3.1
          juriconnect: jci1.3:c:BWBR0011453&artikel=3.1&z=2024-01-01&g=2024-01-01
          explanation: Artikel 3.1 bepaalt dat studiefinanciering bestaat uit de som van basisbeurs en aanvullende beurs.
      - output: partner_studiefinanciering
        value:
          operation: ADD
          values:
          - operation: IF
            conditions:
            - test:
                operation: EQUALS
                subject: $PARTNER_OPLEIDING_TYPE
                value: WO
              then:
                operation: IF
                conditions:
                - test:
                    operation: EQUALS
                    subject: $PARTNER_WOONSITUATIE
                    value: UIT
                  then: $BASISBEURS_WO_UIT
                - else: $BASISBEURS_WO_THUIS
            - test:
                operation: EQUALS
                subject: $PARTNER_OPLEIDING_TYPE
                value: HBO
              then:
                operation: IF
                conditions:
                - test:
                    operation: EQUALS
                    subject: $PARTNER_WOONSITUATIE
                    value: UIT
                  then: $BASISBEURS_HBO_UIT
                - else: $BASISBEURS_HBO_THUIS
            - test:
                operation: EQUALS
                subject: $PARTNER_OPLEIDING_TYPE
                value: MBO
              then:
                operation: IF
                conditions:
                - test:
                    operation: EQUALS
                    subject: $PARTNER_WOONSITUATIE
                    value: UIT
                  then: $BASISBEURS_MBO_UIT
                - else: $BASISBEURS_MBO_THUIS
          - operation: IF
            conditions:
            - test:
                operation: LESS_THAN
                subject:
                  operation: ADD
                  values:
                  - $PARTNER_OUDER1_INKOMEN
                  - $PARTNER_OUDER2_INKOMEN
                value: $INKOMEN_GRENS_GEEN_BEURS
              then:
                operation: MULTIPLY
                values:
                - operation: IF
                  conditions:
                  - test:
                      operation: EQUALS
                      subject: $PARTNER_OPLEIDING_TYPE
                      value: WO
                    then: $MAX_AANVULLENDE_BEURS_WO
                  - test:
                      operation: EQUALS
                      subject: $PARTNER_OPLEIDING_TYPE
                      value: HBO
                    then: $MAX_AANVULLENDE_BEURS_HBO
                  - test:
                      operation: EQUALS
                      subject: $PARTNER_OPLEIDING_TYPE
                      value: MBO
                    then: $MAX_AANVULLENDE_BEURS_MBO
                - operation: SUBTRACT
                  values:
                  - 1
                  - operation: DIVIDE
                    values:
                    - operation: SUBTRACT
                      values:
                      - operation: ADD
                        values:
                        - $PARTNER_OUDER1_INKOMEN
                        - $PARTNER_OUDER2_INKOMEN
                      - $INKOMENSDREMPEL_BASIS
                      - operation: MULTIPLY
                        values:
                        - $PARTNER_STUDEREND_GEZIN
                        - $VERHOGING_DREMPEL_PER_KIND
                    - operation: SUBTRACT
                      values:
                      - $INKOMEN_GRENS_GEEN_BEURS
                      - $INKOMENSDREMPEL_BASIS
              else: 0
        legal_basis:
          law: Wet studiefinanciering 2000
          bwb_id: BWBR0011453
          article: '3.1'
          url: https://wetten.overheid.nl/BWBR0011453/2024-01-01#Hoofdstuk3_Paragraaf3.1_Artikel3.1
          juriconnect: jci1.3:c:BWBR0011453&artikel=3.1&z=2024-01-01&g=2024-01-01
          explanation: Artikel 3.1 bepaalt dat studiefinanciering voor partners bestaat uit de som van basisbeurs en aanvullende
            beurs.
      - output: is_student
        value:
          operation: NOT_NULL
          subject: $OPLEIDING_TYPE
        legal_basis:
          law: Wet studiefinanciering 2000
          bwb_id: BWBR0011453
          article: '2.1'
          url: https://wetten.overheid.nl/BWBR0011453/2024-01-01#Hoofdstuk2_Artikel2.1
          juriconnect: jci1.3:c:BWBR0011453&artikel=2.1&z=2024-01-01&g=2024-01-01
          explanation: Artikel 2.1 vereist dat de studerende is ingeschreven voor een opleiding om recht te hebben op studiefinanciering.
      - output: ontvangt_studiefinanciering
        value:
          operation: GREATER_THAN
          subject: $studiefinanciering
          value: 0
        legal_basis:
          law: Wet studiefinanciering 2000
          bwb_id: BWBR0011453
          article: '2.2'
          url: https://wetten.overheid.nl/BWBR0011453/2024-01-01#Hoofdstuk2_Artikel2.2
          juriconnect: jci1.3:c:BWBR0011453&artikel=2.2&z=2024-01-01&g=2024-01-01
          explanation: Artikel 2.2 bepaalt dat een studerende recht heeft op studiefinanciering als het berekende bedrag groter
            is dan nul.
