$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.1/schema.json
$id: burgerlijk_wetboek_curatele
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Bepalen curatele en vertegenwoordigingsbevoegdheid curator
bwb_id: BWBR0002656
url: https://wetten.overheid.nl/BWBR0002656/2024-01-01
service: RECHTSPRAAK
uuid: b270d49d-f98d-4f3a-bff7-1043dbd5dacb
discoverable: DELEGATION_PROVIDER
articles:
- number: '378'
  text: "1 Een meerderjarige kan door de kantonrechter onder curatele worden gesteld, wanneer hij tijdelijk of duurzaam zijn\
    \ belangen niet behoorlijk waarneemt of zijn veiligheid of die van anderen in gevaar brengt, als gevolg van\n  a. zijn\
    \ lichamelijke of geestelijke toestand, dan wel\n  b. gewoonte van drank- of drugsmisbruik,\nen een voldoende behartiging\
    \ van die belangen niet met een meer passende en minder verstrekkende voorziening kan worden bewerkstelligd.\n2 Indien\
    \ te verwachten is dat ten aanzien van een minderjarige op het tijdstip waarop hij meerderjarig zal worden, van een der\
    \ in het vorige lid genoemde gronden voor curatele sprake zal zijn, kan de curatele reeds voor de meerderjarigheid worden\
    \ uitgesproken.\n3 De rechter bij wie een verzoek tot het verlenen van een rechterlijke machtiging als bedoeld in de Wet\
    \ zorg en dwang psychogeriatrische en verstandelijk gehandicapte cliënten dan wel een zorgmachtiging of een machtiging\
    \ tot voorzetting van de crisismaatregel als bedoeld in de Wet verplichte geestelijke gezondheidszorg aanhangig is, is\
    \ tevens bevoegd tot de kennisneming van een verzoek tot ondercuratelestelling."
  url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Artikel378
  machine_readable:
    definitions:
      CURATOR_RECHTEN:
        value:
        - LEZEN
        - CLAIMS_INDIENEN
        - BESLUITEN_ONTVANGEN
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: ANDERE_HANDELING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: CURATELE_REGISTRATIES
        type: array
        source_reference:
          table: curatele_registraties
          fields:
          - bsn_curandus
          - naam_curandus
          - datum_ingang
          - datum_einde
          - status
          select_on:
          - name: bsn_curator
            description: BSN nummer van de curator
            type: string
            value: $BSN
      output:
      - name: heeft_delegaties
        type: boolean
      - name: subject_ids
        type: array
      - name: subject_names
        type: array
      - name: subject_types
        type: array
      - name: delegation_types
        type: array
      - name: permissions
        type: array
      - name: valid_from_dates
        type: array
      - name: valid_until_dates
        type: array
      requirements:
      - operation: EXISTS
        subject: $CURATELE_REGISTRATIES
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '391'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling4_Artikel391
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=391&z=2024-01-01&g=2024-01-01
          explanation: Persoon moet als curator zijn geregistreerd in het CCBR
      actions:
      - output: actieve_curatele
        value:
          operation: FOREACH
          subject: $CURATELE_REGISTRATIES
          where:
            operation: AND
            values:
            - operation: EQUALS
              subject: $current.status
              value: ACTIEF
            - operation: OR
              values:
              - operation: IS_NULL
                subject: $current.datum_einde
              - operation: EQUALS
                subject: $current.datum_einde
                value: ''
              - operation: GREATER_THAN
                subject: $current.datum_einde
                value: $calculation_date
          value: $current
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '389'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling4_Artikel389
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=389&z=2024-01-01&g=2024-01-01
          explanation: 'Alleen actieve curatele-registraties geven vertegenwoordigingsbevoegdheid. Curatele kan worden opgeheven
            door de rechter (Art. 1:389 BW).

            '
      - output: heeft_delegaties
        value:
          operation: EXISTS
          subject: $actieve_curatele
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '386'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling3_Artikel386
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=386&z=2024-01-01&g=2024-01-01
          explanation: 'Art. 1:386 BW bepaalt dat de curator de curandus vertegenwoordigt.

            '
      - output: subject_ids
        value: $actieve_curatele.bsn_curandus
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '391'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling4_Artikel391
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=391&z=2024-01-01&g=2024-01-01
          explanation: BSN nummers van curandussen uit CCBR registratie
      - output: subject_names
        value: $actieve_curatele.naam_curandus
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '391'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling4_Artikel391
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=391&z=2024-01-01&g=2024-01-01
          explanation: Namen van curandussen uit CCBR registratie
      - output: subject_types
        value:
          operation: FOREACH
          subject: $actieve_curatele
          value: CITIZEN
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '378'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling1_Artikel378
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=378&z=2024-01-01&g=2024-01-01
          explanation: Curatele is alleen voor meerderjarige natuurlijke personen, altijd CITIZEN
      - output: delegation_types
        value:
          operation: FOREACH
          subject: $actieve_curatele
          value: CURATOR
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '383'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling2_Artikel383
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=383&z=2024-01-01&g=2024-01-01
          explanation: Type delegatie is CURATOR voor curatele
      - output: permissions
        value:
          operation: FOREACH
          subject: $actieve_curatele
          value: $CURATOR_RECHTEN
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '386'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling3_Artikel386
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=386&lid=1&z=2024-01-01&g=2024-01-01
          explanation: 'Art. 1:386 lid 1 BW: De curator vertegenwoordigt de curandus in alle burgerlijke handelingen, dus
            krijgt volledige rechten.

            '
      - output: valid_from_dates
        value: $actieve_curatele.datum_ingang
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '379'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling1_Artikel379
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=379&z=2024-01-01&g=2024-01-01
          explanation: Ingangsdatum curatele uit CCBR registratie
      - output: valid_until_dates
        value: $actieve_curatele.datum_einde
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '389'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling4_Artikel389
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=389&z=2024-01-01&g=2024-01-01
          explanation: Einddatum curatele, null indien nog actief
