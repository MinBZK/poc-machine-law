$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: wgbo_vertegenwoordiger
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Bepalen WGBO-vertegenwoordiger voor wilsonbekwame patienten
bwb_id: BWBR0005290
url: https://wetten.overheid.nl/BWBR0005290/2024-01-01
service: RvIG
uuid: 54ba9cdb-61ff-4735-a650-8ccee6ef0bb8
discoverable: DELEGATION_PROVIDER
articles:
- number: '465'
  text: |-
    1 De verplichtingen die voor de hulpverlener uit deze afdeling jegens de patiënt voortvloeien worden, indien de patiënt de leeftijd van twaalf jaren nog niet heeft bereikt, door de hulpverlener nagekomen jegens de ouders die het gezag over de patiënt uitoefenen dan wel jegens zijn voogd.
    2 Hetzelfde geldt indien de patiënt de leeftijd van twaalf jaren heeft bereikt, maar niet in staat kan worden geacht tot een redelijke waardering van zijn belangen ter zake, tenzij zodanige patiënt meerderjarig is en onder curatele staat of ten behoeve van hem het mentorschap is ingesteld, in welke gevallen nakoming jegens de curator of de mentor geschiedt.
    3 Indien een meerderjarige patiënt die niet in staat kan worden geacht tot een redelijke waardering van zijn belangen ter zake, niet onder curatele staat of ten behoeve van hem niet het mentorschap is ingesteld, worden de verplichtingen die voor de hulpverlener uit deze afdeling jegens de patiënt voortvloeien, door de hulpverlener nagekomen jegens de persoon die daartoe door de patiënt schriftelijk is gemachtigd in zijn plaats op te treden. Ontbreekt zodanige persoon, of treedt deze niet op, dan worden de verplichtingen nagekomen jegens de echtgenoot, de geregistreerde partner of andere levensgezel van de patiënt, tenzij deze persoon dat niet wenst, dan wel, indien ook zodanige persoon ontbreekt, jegens een ouder, kind, broer, zus, grootouder of kleinkind van de patiënt, tenzij deze persoon dat niet wenst.
    4 De hulpverlener komt zijn verplichtingen na jegens de in de leden 1 en 2 bedoelde wettelijke vertegenwoordigers van de patiënt en de in lid 3 bedoelde personen, tenzij die nakoming niet verenigbaar is met de zorg van een goed hulpverlener.
    5 De persoon jegens wie de hulpverlener krachtens de leden 2 of 3 gehouden is de uit deze afdeling jegens de patiënt voortvloeiende verplichtingen na te komen, betracht de zorg van een goed vertegenwoordiger. Deze persoon is gehouden de patiënt zoveel mogelijk bij de vervulling van zijn taak te betrekken.
    6 Verzet de patiënt zich tegen een verrichting van ingrijpende aard waarvoor een persoon als bedoeld in de leden 2 of 3 toestemming heeft gegeven, dan kan de verrichting slechts worden uitgevoerd indien zij kennelijk nodig is teneinde ernstig nadeel voor de patiënt te voorkomen.
  url: https://wetten.overheid.nl/BWBR0005290/2024-01-01#Artikel465
  machine_readable:
    definitions:
      wgbo_relatie_hierarchie:
        value:
        - ECHTGENOOT
        - GEREGISTREERD_PARTNER
        - LEVENSGEZEL
        - OUDER
        - KIND
        - BROER
        - ZUS
      wgbo_vertegenwoordiger_rechten:
        value:
        - LEZEN
        - CLAIMS_INDIENEN
        - BESLUITEN_ONTVANGEN
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: ANDERE_HANDELING
      parameters:
      - name: bsn
        type: string
        required: true
      input:
      - name: familie_relaties
        type: array
        source_reference:
          table: wgbo_familie_relaties
          fields:
          - bsn_patient
          - naam_patient
          - relatie_type
          - is_wilsonbekwaam
          - datum_wilsonbekwaamheid
          select_on:
          - name: bsn_familielid
            description: BSN nummer van het familielid (potentiele vertegenwoordiger)
            type: string
            value: $bsn
      output:
      - name: heeft_delegaties
        type: boolean
      - name: subject_ids
        type: array
      - name: subject_names
        type: array
      - name: subject_types
        type: array
      - name: delegation_types
        type: array
      - name: permissions
        type: array
      - name: valid_from_dates
        type: array
      - name: valid_until_dates
        type: array
      requirements:
      - operation: NOT
        value:
          operation: IS_NULL
          subject: $familie_relaties
        legal_basis:
          law: Burgerlijk Wetboek Boek 7
          bwb_id: BWBR0005290
          article: '465'
          url: https://wetten.overheid.nl/BWBR0005290/2024-01-01#Boek7_Titeldeel7_Afdeling5_Artikel465
          juriconnect: jci1.3:c:BWBR0005290&boek=7&artikel=465&z=2024-01-01&g=2024-01-01
          explanation: Persoon moet familielid zijn van een wilsonbekwame patient
      actions:
      - output: wgbo_vertegenwoordigingen
        value:
          operation: FOREACH
          subject: $familie_relaties
          where:
            operation: AND
            conditions:
            - operation: EQUALS
              subject: $current.is_wilsonbekwaam
              value: true
            - operation: IN
              subject: $current.relatie_type
              values: $wgbo_relatie_hierarchie
          value: $current
        legal_basis:
          law: Burgerlijk Wetboek Boek 7
          bwb_id: BWBR0005290
          article: '465'
          paragraph: '3'
          url: https://wetten.overheid.nl/BWBR0005290/2024-01-01#Boek7_Titeldeel7_Afdeling5_Artikel465
          juriconnect: jci1.3:c:BWBR0005290&boek=7&artikel=465&lid=3&z=2024-01-01&g=2024-01-01
          explanation: |
            Art. 7:465 lid 3 BW: familieleden kunnen optreden als vertegenwoordiger voor wilsonbekwame patienten. Alleen relevante relaties geven bevoegdheid.
      - output: heeft_delegaties
        value:
          operation: NOT
          value:
            operation: IS_NULL
            subject: $wgbo_vertegenwoordigingen
        legal_basis:
          law: Burgerlijk Wetboek Boek 7
          bwb_id: BWBR0005290
          article: '465'
          url: https://wetten.overheid.nl/BWBR0005290/2024-01-01#Boek7_Titeldeel7_Afdeling5_Artikel465
          juriconnect: jci1.3:c:BWBR0005290&boek=7&artikel=465&z=2024-01-01&g=2024-01-01
          explanation: |
            Art. 7:465 BW bepaalt dat familieleden kunnen vertegenwoordigen.
      - output: subject_ids
        value: $wgbo_vertegenwoordigingen.bsn_patient
        legal_basis:
          law: Burgerlijk Wetboek Boek 7
          bwb_id: BWBR0005290
          article: '465'
          url: https://wetten.overheid.nl/BWBR0005290/2024-01-01#Boek7_Titeldeel7_Afdeling5_Artikel465
          juriconnect: jci1.3:c:BWBR0005290&boek=7&artikel=465&z=2024-01-01&g=2024-01-01
          explanation: BSN nummers van wilsonbekwame patienten
      - output: subject_names
        value: $wgbo_vertegenwoordigingen.naam_patient
        legal_basis:
          law: Burgerlijk Wetboek Boek 7
          bwb_id: BWBR0005290
          article: '465'
          url: https://wetten.overheid.nl/BWBR0005290/2024-01-01#Boek7_Titeldeel7_Afdeling5_Artikel465
          juriconnect: jci1.3:c:BWBR0005290&boek=7&artikel=465&z=2024-01-01&g=2024-01-01
          explanation: Namen van wilsonbekwame patienten
      - output: subject_types
        value:
          operation: FOREACH
          subject: $wgbo_vertegenwoordigingen
          value: CITIZEN
        legal_basis:
          law: Burgerlijk Wetboek Boek 7
          bwb_id: BWBR0005290
          article: '465'
          url: https://wetten.overheid.nl/BWBR0005290/2024-01-01#Boek7_Titeldeel7_Afdeling5_Artikel465
          juriconnect: jci1.3:c:BWBR0005290&boek=7&artikel=465&z=2024-01-01&g=2024-01-01
          explanation: Patienten zijn natuurlijke personen, altijd CITIZEN
      - output: delegation_types
        value:
          operation: FOREACH
          subject: $wgbo_vertegenwoordigingen
          value:
            operation: IF
            cases:
            - when:
                operation: IN
                subject: $current.relatie_type
                values:
                - ECHTGENOOT
                - GEREGISTREERD_PARTNER
                - LEVENSGEZEL
              then: WGBO_VERTEGENWOORDIGER_PARTNER
            - when:
                operation: EQUALS
                subject: $current.relatie_type
                value: OUDER
              then: WGBO_VERTEGENWOORDIGER_OUDER
            - when:
                operation: EQUALS
                subject: $current.relatie_type
                value: KIND
              then: WGBO_VERTEGENWOORDIGER_KIND
            default: WGBO_VERTEGENWOORDIGER_SIBLING
        legal_basis:
          law: Burgerlijk Wetboek Boek 7
          bwb_id: BWBR0005290
          article: '465'
          paragraph: '3'
          url: https://wetten.overheid.nl/BWBR0005290/2024-01-01#Boek7_Titeldeel7_Afdeling5_Artikel465
          juriconnect: jci1.3:c:BWBR0005290&boek=7&artikel=465&lid=3&z=2024-01-01&g=2024-01-01
          explanation: Type gebaseerd op familierelatie conform hierarchie Art. 7:465 lid 3 BW
      - output: permissions
        value:
          operation: FOREACH
          subject: $wgbo_vertegenwoordigingen
          value: $wgbo_vertegenwoordiger_rechten
        legal_basis:
          law: Burgerlijk Wetboek Boek 7
          bwb_id: BWBR0005290
          article: '465'
          paragraph: '3'
          url: https://wetten.overheid.nl/BWBR0005290/2024-01-01#Boek7_Titeldeel7_Afdeling5_Artikel465
          juriconnect: jci1.3:c:BWBR0005290&boek=7&artikel=465&lid=3&z=2024-01-01&g=2024-01-01
          explanation: |
            Art. 7:465 lid 3 BW: vertegenwoordiger neemt beslissingen over medische behandeling namens wilsonbekwame patient.
      - output: valid_from_dates
        value: $wgbo_vertegenwoordigingen.datum_wilsonbekwaamheid
        legal_basis:
          law: Burgerlijk Wetboek Boek 7
          bwb_id: BWBR0005290
          article: '465'
          url: https://wetten.overheid.nl/BWBR0005290/2024-01-01#Boek7_Titeldeel7_Afdeling5_Artikel465
          juriconnect: jci1.3:c:BWBR0005290&boek=7&artikel=465&z=2024-01-01&g=2024-01-01
          explanation: Vertegenwoordiging start bij vaststelling wilsonbekwaamheid
      - output: valid_until_dates
        value:
          operation: FOREACH
          subject: $wgbo_vertegenwoordigingen
          value: null
        legal_basis:
          law: Burgerlijk Wetboek Boek 7
          bwb_id: BWBR0005290
          article: '465'
          url: https://wetten.overheid.nl/BWBR0005290/2024-01-01#Boek7_Titeldeel7_Afdeling5_Artikel465
          juriconnect: jci1.3:c:BWBR0005290&boek=7&artikel=465&z=2024-01-01&g=2024-01-01
          explanation: Vertegenwoordiging eindigt bij herstel wilsbekwaamheid of overlijden
    untranslatables:
    - construct: iteratie over variabel aantal WGBO-vertegenwoordigingen
      reason: FOREACH niet beschikbaar in v0.5.1 schema; het aantal vertegenwoordigingsrelaties is dynamisch en kan niet vooraf worden uitgerold
      suggestion: Voeg FOREACH toe aan het schema of beperk het aantal registraties tot een vast maximum
      accepted: true
