$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.0/schema.json
$id: zorgtoeslagwet
regulatory_layer: WET
publication_date: '2025-01-01'
valid_from: '2025-01-01'
name: Zorgtoeslag
bwb_id: BWBR0018451
url: https://wetten.overheid.nl/BWBR0018451/2025-01-01
service: TOESLAGEN
uuid: 60e71675-38bc-4297-87ac-0c145613e481
discoverable: CITIZEN
articles:
- number: '2'
  text: ''
  url: https://wetten.overheid.nl/BWBR0018451/2025-01-01#Artikel2
  machine_readable:
    definitions:
      MINIMUM_LEEFTIJD:
        value: 18
      PERCENTAGE_DREMPELINKOMEN_MET_PARTNER:
        value: 0.04273
      PERCENTAGE_DREMPELINKOMEN_ALLEENSTAAND:
        value: 0.01896
      AFBOUWPERCENTAGE_MINIMUM:
        value: 0.137
      AFBOUWPERCENTAGE_BOVEN_DREMPEL:
        value: 0.137
      DREMPELINKOMEN_ALLEENSTAANDE:
        value: 3971900
      DREMPELINKOMEN_TOESLAGPARTNER:
        value: 5020600
      VERMOGENSGRENS_ALLEENSTAANDE:
        value: 14189600
      VERMOGENSGRENS_TOESLAGPARTNER:
        value: 17942900
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: LEEFTIJD
        type: number
        type_spec:
          unit: years
          precision: 0
          min: 0
        source:
          regulation: wet_brp
          output: leeftijd
          service: RvIG
        temporal:
          type: point_in_time
          reference: $prev_january_first
      - name: IS_VERZEKERDE
        type: boolean
        source:
          regulation: zvw
          output: is_verzekerde
          service: RVZ
        temporal:
          type: period
          period_type: month
      - name: INKOMEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: inkomen
          service: UWV
        temporal:
          type: period
          period_type: year
          immutable_after: P2Y
      - name: VERMOGEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: vermogen
          service: BELASTINGDIENST
        temporal:
          type: point_in_time
          reference: $prev_january_first
      - name: GEZAMENLIJK_VERMOGEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: gezamenlijk_vermogen
          service: BELASTINGDIENST
        temporal:
          type: point_in_time
          reference: $prev_january_first
      - name: PARTNER_INKOMEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: partner_inkomen
          service: UWV
        temporal:
          type: period
          period_type: year
          immutable_after: P2Y
      - name: HEEFT_PARTNER
        type: boolean
        source:
          regulation: wet_brp
          output: heeft_partner
          service: RvIG
        temporal:
          type: point_in_time
          reference: $prev_january_first
      - name: STANDAARDPREMIE
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: zorgtoeslagwet/regelingen/regeling_vaststelling_standaardpremie_en_bestuursrechtelijke_premies
          output: standaardpremie
          service: VWS
      output:
      - name: is_verzekerde_zorgtoeslag
        type: boolean
      - name: hoogte_toeslag
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      requirements:
      - all:
        - subject: $LEEFTIJD
          operation: GREATER_OR_EQUAL
          value: $MINIMUM_LEEFTIJD
        - subject: $IS_VERZEKERDE
          operation: EQUALS
          value: true
      actions:
      - output: is_verzekerde_zorgtoeslag
        value: true
      - output: hoogte_toeslag
        value:
          operation: IF
          conditions:
          - test:
              operation: EQUALS
              subject: $HEEFT_PARTNER
              value: false
            then:
              operation: IF
              conditions:
              - test:
                  operation: GREATER_THAN
                  subject: $INKOMEN
                  value: $DREMPELINKOMEN_ALLEENSTAANDE
                then: 0
              - test:
                  operation: GREATER_THAN
                  subject: $VERMOGEN
                  value: $VERMOGENSGRENS_ALLEENSTAANDE
                then: 0
              - else:
                  operation: SUBTRACT
                  values:
                  - $STANDAARDPREMIE
                  - operation: ADD
                    values:
                    - operation: MULTIPLY
                      values:
                      - $PERCENTAGE_DREMPELINKOMEN_ALLEENSTAAND
                      - operation: MIN
                        values:
                        - $INKOMEN
                        - $DREMPELINKOMEN_ALLEENSTAANDE
                    - operation: IF
                      conditions:
                      - test:
                          operation: GREATER_THAN
                          subject: $INKOMEN
                          value: $DREMPELINKOMEN_ALLEENSTAANDE
                        then:
                          operation: MULTIPLY
                          values:
                          - operation: SUBTRACT
                            values:
                            - $INKOMEN
                            - $DREMPELINKOMEN_ALLEENSTAANDE
                          - $AFBOUWPERCENTAGE_MINIMUM
                      - else: 0
          - test:
              operation: EQUALS
              subject: $HEEFT_PARTNER
              value: true
            then:
              operation: IF
              conditions:
              - test:
                  operation: GREATER_THAN
                  subject:
                    operation: ADD
                    values:
                    - $INKOMEN
                    - $PARTNER_INKOMEN
                  value: $DREMPELINKOMEN_TOESLAGPARTNER
                then: 0
              - test:
                  operation: GREATER_THAN
                  subject: $GEZAMENLIJK_VERMOGEN
                  value: $VERMOGENSGRENS_TOESLAGPARTNER
                then: 0
              - else:
                  operation: SUBTRACT
                  values:
                  - operation: MULTIPLY
                    values:
                    - $STANDAARDPREMIE
                    - 2
                  - operation: ADD
                    values:
                    - operation: MULTIPLY
                      values:
                      - $PERCENTAGE_DREMPELINKOMEN_MET_PARTNER
                      - operation: MIN
                        values:
                        - operation: ADD
                          values:
                          - $INKOMEN
                          - $PARTNER_INKOMEN
                        - $DREMPELINKOMEN_TOESLAGPARTNER
                    - operation: IF
                      conditions:
                      - test:
                          operation: GREATER_THAN
                          subject:
                            operation: ADD
                            values:
                            - $INKOMEN
                            - $PARTNER_INKOMEN
                          value: $DREMPELINKOMEN_TOESLAGPARTNER
                        then:
                          operation: MULTIPLY
                          values:
                          - operation: SUBTRACT
                            values:
                            - operation: ADD
                              values:
                              - $INKOMEN
                              - $PARTNER_INKOMEN
                            - $DREMPELINKOMEN_TOESLAGPARTNER
                          - $AFBOUWPERCENTAGE_BOVEN_DREMPEL
                      - else: 0
        legal_basis:
          law: Zorgtoeslagwet
          bwb_id: BWBR0018451
          article: '2'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0018451/2025-01-01/0/Artikel2
          juriconnect: jci1.3:c:BWBR0018451&artikel=2&lid=1&z=2025-01-01&g=2025-01-01
          explanation: Artikel 2 lid 1 bepaalt dat hoogte zorgtoeslag afhangt van verschil tussen standaardpremie en normpremie,
            waarbij onderscheid wordt gemaakt tussen alleenstaanden en partners
