$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: zorgtoeslagwet
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Zorgtoeslag
bwb_id: BWBR0018451
url: https://wetten.overheid.nl/BWBR0018451/2024-01-01
service: TOESLAGEN
uuid: 5be9dbe7-f565-40e2-8931-da82825dcf21
discoverable: CITIZEN
articles:
- number: '1'
  text: |-
    1 In deze wet en de daarop berustende bepalingen wordt, tenzij anders is geregeld, verstaan onder:
      a. Onze Minister: Onze Minister van Volksgezondheid, Welzijn en Sport;
      b. zorgverzekering: de schadeverzekering, bedoeld in artikel 1, onder d, van de Zorgverzekeringswet;
      c. verzekerde: de persoon, bedoeld in artikel 1, onder f, of in artikel 69 van de Zorgverzekeringswet, vanaf de eerste dag van de kalendermaand volgende op de maand waarin hij achttien jaar wordt, met uitzondering van de verzekerde, bedoeld in artikel 24, eerste of tweede lid, van die wet;
      d. premie: een premie als bedoeld in afdeling 3.3.1 van de Zorgverzekeringswet;
      e. zorgtoeslag: een tegemoetkoming in een premie dan wel in een bestuursrechtelijke premie als bedoeld in artikel 18d of 18e van de Zorgverzekeringswet en in het verplicht eigen risico, bedoeld in artikel 19 van de Zorgverzekeringswet;
      f. drempelinkomen: 108% van het twaalfvoud van het voor de maand januari van het berekeningsjaar geldende in artikel 8, eerste lid, onderdeel b, van de Wet minimumloon en minimumvakantiebijslag bedoelde bedrag per maand;
      g. de standaardpremie: het op grond van artikel 4 vastgestelde bedrag;
      h. de normpremie: de aan de hand van het drempelinkomen en het toetsingsinkomen van de verzekerde berekende premie voor een zorgverzekering in het berekeningsjaar.
    2 De hoogte van de zorgtoeslag is afhankelijk van de draagkracht op basis van het inkomen en het vermogen.
  url: https://wetten.overheid.nl/BWBR0018451/2024-01-01#Artikel1
  machine_readable:
    definitions:
      MINIMUM_LEEFTIJD:
        value: 18
      PERCENTAGE_DREMPELINKOMEN_MET_PARTNER:
        value: 0.0486
      PERCENTAGE_DREMPELINKOMEN_ALLEENSTAAND:
        value: 0.0486
      AFBOUWPERCENTAGE_MINIMUM:
        value: 0.1367
      AFBOUWPERCENTAGE_BOVEN_DREMPEL:
        value: 0.0387
      DREMPELINKOMEN_ALLEENSTAANDE:
        value: 3749600
      DREMPELINKOMEN_TOESLAGPARTNER:
        value: 4821800
      VERMOGENSGRENS_ALLEENSTAANDE:
        value: 14193900
      VERMOGENSGRENS_TOESLAGPARTNER:
        value: 17942900
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: LEEFTIJD
        type: number
        type_spec:
          unit: years
          precision: 0
          min: 0
        source:
          regulation: wet_brp
          output: leeftijd
          service: RvIG
        temporal:
          type: point_in_time
          reference: $prev_january_first
      - name: HEEFT_PARTNER
        type: boolean
        source:
          regulation: wet_brp
          output: heeft_partner
          service: RvIG
        temporal:
          type: point_in_time
          reference: $prev_january_first
      - name: HEEFT_VERZEKERING
        type: boolean
        source:
          regulation: zvw
          output: heeft_verzekering
          service: RVZ
        temporal:
          type: period
          period_type: month
      - name: HEEFT_VERDRAGSVERZEKERING
        type: boolean
        source:
          regulation: zvw
          output: heeft_verdragsverzekering
          service: RVZ
        temporal:
          type: period
          period_type: month
      - name: IS_GEDETINEERD
        type: boolean
        source:
          regulation: penitentiaire_beginselenwet
          output: is_gedetineerd
          service: DJI
        temporal:
          type: point_in_time
          reference: $prev_january_first
      - name: IS_FORENSISCH
        type: boolean
        source:
          regulation: wet_forensische_zorg
          output: is_forensisch
          service: DJI
        temporal:
          type: point_in_time
          reference: $prev_january_first
      - name: INKOMEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: inkomen
          service: UWV
        temporal:
          type: period
          period_type: year
          immutable_after: P2Y
      - name: VERMOGEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: vermogen
          service: BELASTINGDIENST
        temporal:
          type: point_in_time
          reference: $prev_january_first
      - name: GEZAMENLIJK_VERMOGEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: gezamenlijk_vermogen
          service: BELASTINGDIENST
        temporal:
          type: point_in_time
          reference: $prev_january_first
      - name: PARTNER_INKOMEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: partner_inkomen
          service: UWV
        temporal:
          type: period
          period_type: year
          immutable_after: P2Y
      - name: STANDAARDPREMIE
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: zorgtoeslagwet/regelingen/regeling_vaststelling_standaardpremie_en_bestuursrechtelijke_premies
          output: standaardpremie
          service: VWS
      output:
      - name: is_verzekerde_zorgtoeslag
        type: boolean
      - name: hoogte_toeslag
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      requirements:
      - all:
        - or:
          - subject: $HEEFT_VERZEKERING
            operation: EQUALS
            value: true
          - subject: $HEEFT_VERDRAGSVERZEKERING
            operation: EQUALS
            value: true
        - subject: $LEEFTIJD
          operation: GREATER_THAN_OR_EQUAL
          value: $MINIMUM_LEEFTIJD
        - subject: $IS_GEDETINEERD
          operation: EQUALS
          value: false
        - subject: $IS_FORENSISCH
          operation: EQUALS
          value: false
      actions:
      - output: is_verzekerde_zorgtoeslag
        value: true
      - output: hoogte_toeslag
        value:
          operation: IF
          cases:
          - when:
              operation: EQUALS
              subject: $HEEFT_PARTNER
              value: false
            then:
              operation: IF
              cases:
              - when:
                  operation: GREATER_THAN
                  subject: $INKOMEN
                  value: $DREMPELINKOMEN_ALLEENSTAANDE
                then: 0
              - when:
                  operation: GREATER_THAN
                  subject: $VERMOGEN
                  value: $VERMOGENSGRENS_ALLEENSTAANDE
                then: 0
              default:
                operation: SUBTRACT
                values:
                - $STANDAARDPREMIE
                - operation: ADD
                  values:
                  - operation: MULTIPLY
                    values:
                    - $PERCENTAGE_DREMPELINKOMEN_ALLEENSTAAND
                    - operation: MIN
                      values:
                      - $INKOMEN
                      - $DREMPELINKOMEN_ALLEENSTAANDE
                  - operation: IF
                    cases:
                    - when:
                        operation: GREATER_THAN
                        subject: $INKOMEN
                        value: $DREMPELINKOMEN_ALLEENSTAANDE
                      then:
                        operation: MULTIPLY
                        values:
                        - operation: SUBTRACT
                          values:
                          - $INKOMEN
                          - $DREMPELINKOMEN_ALLEENSTAANDE
                        - $AFBOUWPERCENTAGE_MINIMUM
                    default: 0
          - when:
              operation: EQUALS
              subject: $HEEFT_PARTNER
              value: true
            then:
              operation: IF
              cases:
              - when:
                  operation: GREATER_THAN
                  subject:
                    operation: ADD
                    values:
                    - $INKOMEN
                    - $PARTNER_INKOMEN
                  value: $DREMPELINKOMEN_TOESLAGPARTNER
                then: 0
              - when:
                  operation: GREATER_THAN
                  subject: $GEZAMENLIJK_VERMOGEN
                  value: $VERMOGENSGRENS_TOESLAGPARTNER
                then: 0
              default:
                operation: SUBTRACT
                values:
                - operation: MULTIPLY
                  values:
                  - $STANDAARDPREMIE
                  - 2
                - operation: ADD
                  values:
                  - operation: MULTIPLY
                    values:
                    - $PERCENTAGE_DREMPELINKOMEN_MET_PARTNER
                    - operation: MIN
                      values:
                      - operation: ADD
                        values:
                        - $INKOMEN
                        - $PARTNER_INKOMEN
                      - $DREMPELINKOMEN_TOESLAGPARTNER
                  - operation: IF
                    cases:
                    - when:
                        operation: GREATER_THAN
                        subject:
                          operation: ADD
                          values:
                          - $INKOMEN
                          - $PARTNER_INKOMEN
                        value: $DREMPELINKOMEN_TOESLAGPARTNER
                      then:
                        operation: MULTIPLY
                        values:
                        - operation: SUBTRACT
                          values:
                          - operation: ADD
                            values:
                            - $INKOMEN
                            - $PARTNER_INKOMEN
                          - $DREMPELINKOMEN_TOESLAGPARTNER
                        - $AFBOUWPERCENTAGE_BOVEN_DREMPEL
                    default: 0
