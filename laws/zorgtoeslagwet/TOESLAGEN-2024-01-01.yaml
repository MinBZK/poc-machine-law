$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.0/schema.json
$id: zorgtoeslagwet
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Zorgtoeslag
url: https://wetten.overheid.nl/2024-01-01
service: TOESLAGEN
uuid: 5be9dbe7-f565-40e2-8931-da82825dcf21
discoverable: CITIZEN
articles:
- number: '1'
  text: ''
  url: https://wetten.overheid.nl/2024-01-01#Artikel1
  machine_readable:
    definitions:
      MINIMUM_LEEFTIJD:
        value: 18
      PERCENTAGE_DREMPELINKOMEN_MET_PARTNER:
        value: 0.0486
      PERCENTAGE_DREMPELINKOMEN_ALLEENSTAAND:
        value: 0.0486
      AFBOUWPERCENTAGE_MINIMUM:
        value: 0.1367
      AFBOUWPERCENTAGE_BOVEN_DREMPEL:
        value: 0.0387
      DREMPELINKOMEN_ALLEENSTAANDE:
        value: 3749600
      DREMPELINKOMEN_TOESLAGPARTNER:
        value: 4821800
      VERMOGENSGRENS_ALLEENSTAANDE:
        value: 14193900
      VERMOGENSGRENS_TOESLAGPARTNER:
        value: 17942900
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: LEEFTIJD
        type: number
        type_spec:
          unit: years
          precision: 0
          min: 0
        source:
          regulation: wet_brp
          output: leeftijd
          service: RvIG
        temporal:
          type: point_in_time
          reference: $prev_january_first
      - name: HEEFT_PARTNER
        type: boolean
        source:
          regulation: wet_brp
          output: heeft_partner
          service: RvIG
        temporal:
          type: point_in_time
          reference: $prev_january_first
      - name: HEEFT_VERZEKERING
        type: boolean
        source:
          regulation: zvw
          output: heeft_verzekering
          service: RVZ
        temporal:
          type: period
          period_type: month
      - name: HEEFT_VERDRAGSVERZEKERING
        type: boolean
        source:
          regulation: zvw
          output: heeft_verdragsverzekering
          service: RVZ
        temporal:
          type: period
          period_type: month
      - name: IS_GEDETINEERD
        type: boolean
        source:
          regulation: penitentiaire_beginselenwet
          output: is_gedetineerd
          service: DJI
        temporal:
          type: point_in_time
          reference: $prev_january_first
      - name: IS_FORENSISCH
        type: boolean
        source:
          regulation: wet_forensische_zorg
          output: is_forensisch
          service: DJI
        temporal:
          type: point_in_time
          reference: $prev_january_first
      - name: INKOMEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: inkomen
          service: UWV
        temporal:
          type: period
          period_type: year
          immutable_after: P2Y
      - name: VERMOGEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: vermogen
          service: BELASTINGDIENST
        temporal:
          type: point_in_time
          reference: $prev_january_first
      - name: GEZAMENLIJK_VERMOGEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: gezamenlijk_vermogen
          service: BELASTINGDIENST
        temporal:
          type: point_in_time
          reference: $prev_january_first
      - name: PARTNER_INKOMEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: partner_inkomen
          service: UWV
        temporal:
          type: period
          period_type: year
          immutable_after: P2Y
      - name: STANDAARDPREMIE
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: zorgtoeslagwet/regelingen/regeling_vaststelling_standaardpremie_en_bestuursrechtelijke_premies
          output: standaardpremie
          service: VWS
      output:
      - name: is_verzekerde_zorgtoeslag
        type: boolean
      - name: hoogte_toeslag
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      requirements:
      - all:
        - or:
          - subject: $HEEFT_VERZEKERING
            operation: EQUALS
            value: true
          - subject: $HEEFT_VERDRAGSVERZEKERING
            operation: EQUALS
            value: true
        - subject: $LEEFTIJD
          operation: GREATER_OR_EQUAL
          value: $MINIMUM_LEEFTIJD
        - subject: $IS_GEDETINEERD
          operation: EQUALS
          value: false
        - subject: $IS_FORENSISCH
          operation: EQUALS
          value: false
      actions:
      - output: is_verzekerde_zorgtoeslag
        value: true
      - output: hoogte_toeslag
        value:
          operation: IF
          conditions:
          - test:
              operation: EQUALS
              subject: $HEEFT_PARTNER
              value: false
            then:
              operation: IF
              conditions:
              - test:
                  operation: GREATER_THAN
                  subject: $INKOMEN
                  value: $DREMPELINKOMEN_ALLEENSTAANDE
                then: 0
              - test:
                  operation: GREATER_THAN
                  subject: $VERMOGEN
                  value: $VERMOGENSGRENS_ALLEENSTAANDE
                then: 0
              - else:
                  operation: SUBTRACT
                  values:
                  - $STANDAARDPREMIE
                  - operation: ADD
                    values:
                    - operation: MULTIPLY
                      values:
                      - $PERCENTAGE_DREMPELINKOMEN_ALLEENSTAAND
                      - operation: MIN
                        values:
                        - $INKOMEN
                        - $DREMPELINKOMEN_ALLEENSTAANDE
                    - operation: IF
                      conditions:
                      - test:
                          operation: GREATER_THAN
                          subject: $INKOMEN
                          value: $DREMPELINKOMEN_ALLEENSTAANDE
                        then:
                          operation: MULTIPLY
                          values:
                          - operation: SUBTRACT
                            values:
                            - $INKOMEN
                            - $DREMPELINKOMEN_ALLEENSTAANDE
                          - $AFBOUWPERCENTAGE_MINIMUM
                      - else: 0
          - test:
              operation: EQUALS
              subject: $HEEFT_PARTNER
              value: true
            then:
              operation: IF
              conditions:
              - test:
                  operation: GREATER_THAN
                  subject:
                    operation: ADD
                    values:
                    - $INKOMEN
                    - $PARTNER_INKOMEN
                  value: $DREMPELINKOMEN_TOESLAGPARTNER
                then: 0
              - test:
                  operation: GREATER_THAN
                  subject: $GEZAMENLIJK_VERMOGEN
                  value: $VERMOGENSGRENS_TOESLAGPARTNER
                then: 0
              - else:
                  operation: SUBTRACT
                  values:
                  - operation: MULTIPLY
                    values:
                    - $STANDAARDPREMIE
                    - 2
                  - operation: ADD
                    values:
                    - operation: MULTIPLY
                      values:
                      - $PERCENTAGE_DREMPELINKOMEN_MET_PARTNER
                      - operation: MIN
                        values:
                        - operation: ADD
                          values:
                          - $INKOMEN
                          - $PARTNER_INKOMEN
                        - $DREMPELINKOMEN_TOESLAGPARTNER
                    - operation: IF
                      conditions:
                      - test:
                          operation: GREATER_THAN
                          subject:
                            operation: ADD
                            values:
                            - $INKOMEN
                            - $PARTNER_INKOMEN
                          value: $DREMPELINKOMEN_TOESLAGPARTNER
                        then:
                          operation: MULTIPLY
                          values:
                          - operation: SUBTRACT
                            values:
                            - operation: ADD
                              values:
                              - $INKOMEN
                              - $PARTNER_INKOMEN
                            - $DREMPELINKOMEN_TOESLAGPARTNER
                          - $AFBOUWPERCENTAGE_BOVEN_DREMPEL
                      - else: 0
