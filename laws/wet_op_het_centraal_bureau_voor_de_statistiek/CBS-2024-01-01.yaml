articles:
- number: '3'
  text: '1. Het CBS heeft tot taak het van overheidswege verrichten van statistisch onderzoek ten behoeve van praktijk, beleid en wetenschap en het openbaar maken van de op grond van zodanig onderzoek samengestelde statistieken. 2. Het CBS bevordert: a. een statistische informatievoorziening van overheidswege die voorziet in de behoeften van praktijk, beleid en wetenschap; b. de nauwkeurigheid en volledigheid van de van overheidswege openbaar te maken statistieken. 3. Door Onze Minister of een van Onze andere Ministers wordt slechts een nieuw statistisch onderzoek ingesteld of in een onderzoek dat reeds plaatsvindt wijziging gebracht, nadat de directeur-generaal is gehoord.'
