articles:
- number: B1
  text: ''
  url: https://wetten.overheid.nl/BWBR0004627/2024-01-01#ArtikelB1
  machine_readable:
    definitions:
      MINIMUM_LEEFTIJD:
        value: 18
    execution:
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: LEEFTIJD
        type: number
        source:
          regulation: wet_brp
          output: leeftijd
          service: RvIG
          parameters:
            BSN: $BSN
            REFERENTIEDATUM: $VERKIEZINGSDATUM
      - name: NATIONALITEIT
        type: boolean
        source:
          regulation: wet_brp
          output: heeft_nederlandse_nationaliteit
          service: RvIG
          parameters:
            BSN: $BSN
      - name: IS_GEDETINEERD
        type: boolean
        source:
          regulation: penitentiaire_beginselenwet
          output: is_gedetineerd
          service: DJI
          parameters:
            BSN: $BSN
      - name: GERECHTELIJKE_UITSLUITING
        type: boolean
        source:
          regulation: wetboek_van_strafrecht
          output: heeft_stemrecht_uitsluiting
          service: JUSTID
          parameters:
            BSN: $BSN
        temporal:
          type: point_in_time
          reference: $VERKIEZINGSDATUM
      - name: VERKIEZINGSDATUM
        type: date
        source_reference:
          table: verkiezingen
          field: verkiezingsdatum
          select_on:
          - name: type
            value: TWEEDE_KAMER
            description: Type verkiezing
            type: string
      output:
      - name: heeft_stemrecht
        type: boolean
      requirements:
      - legal_basis:
          law: Kieswet
          bwb_id: BWBR0004627
          article: B1
          url: https://wetten.overheid.nl/BWBR0004627/2025-02-12#AfdelingII_HoofdstukB_ArtikelB1
          juriconnect: jci1.3:c:BWBR0004627&artikel=B1&z=2025-02-12&g=2025-02-12
          explanation: De vereisten voor kiesrecht zijn bepaald in artikel B1 en B3 van de Kieswet
        all:
        - subject: $NATIONALITEIT
          operation: EQUALS
          value: true
        - subject: $LEEFTIJD
          operation: GREATER_OR_EQUAL
          value: $MINIMUM_LEEFTIJD
        - subject: $GERECHTELIJKE_UITSLUITING
          operation: EQUALS
          value: false
      actions:
      - output: heeft_stemrecht
        value:
          operation: AND
          values:
          - operation: EQUALS
            subject: $NATIONALITEIT
            value: true
          - operation: GREATER_OR_EQUAL
            subject: $LEEFTIJD
            value: $MINIMUM_LEEFTIJD
          - operation: EQUALS
            subject: $GERECHTELIJKE_UITSLUITING
            value: false
        legal_basis:
          law: Kieswet
          bwb_id: BWBR0004627
          article: B1
          url: https://wetten.overheid.nl/BWBR0004627/2025-02-12#AfdelingII_HoofdstukB_ArtikelB1
          juriconnect: jci1.3:c:BWBR0004627&artikel=B1&z=2025-02-12&g=2025-02-12
          explanation: De bepaling van stemrecht gebeurt volgens de cumulatieve voorwaarden uit artikel B1 en B3 van de Kieswet
