$id: kieswet
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Kiesrecht Tweede Kamer
bwb_id: BWBR0004627
url: https://wetten.overheid.nl/BWBR0004627/2024-01-01
service: KIESRAAD
uuid: 96d926a0-b45f-4cf3-92af-01b167221a00
discoverable: CITIZEN
articles:
- number: B1
  text: '1. De leden van de Tweede Kamer der Staten-Generaal worden gekozen door degenen
    die op de dag van de kandidaatstelling Nederlander zijn en op de dag van de stemming
    de leeftijd van achttien jaar hebben bereikt, met uitzondering van degenen die
    op de dag van de kandidaatstelling hun werkelijke woonplaats hebben in Aruba,
    Curacao of Sint Maarten. 2. Deze uitzondering geldt niet voor: a. de Nederlander
    die gedurende ten minste tien jaren ingezetene van Nederland is geweest; b. de
    Nederlander die in Nederlandse openbare dienst in Aruba, Curacao of Sint Maarten
    werkzaam is, alsmede zijn Nederlandse echtgenoot, geregistreerde partner of levensgezel
    en kinderen, voor zover dezen met hem een gemeenschappelijke huishouding voeren.'
  url: https://wetten.overheid.nl/BWBR0004627/2024-01-01#ArtikelB1
  machine_readable:
    definitions:
      minimum_leeftijd: 18
    execution:
      parameters:
      - name: bsn
        type: string
        required: true
      input:
      - name: leeftijd
        type: number
        source:
          regulation: wet_brp
          output: leeftijd
          service: RvIG
          parameters:
            bsn: $bsn
            referentiedatum: $verkiezingsdatum
      - name: nationaliteit
        type: boolean
        source:
          regulation: wet_brp
          output: heeft_nederlandse_nationaliteit
          service: RvIG
          parameters:
            bsn: $bsn
      - name: is_gedetineerd
        type: boolean
        source:
          regulation: penitentiaire_beginselenwet
          output: is_gedetineerd
          service: DJI
          parameters:
            bsn: $bsn
      - name: gerechtelijke_uitsluiting
        type: boolean
        source:
          regulation: wetboek_van_strafrecht
          output: heeft_stemrecht_uitsluiting
          service: JUSTID
          parameters:
            bsn: $bsn
        temporal:
          type: point_in_time
          reference: $verkiezingsdatum
      - name: verkiezingsdatum
        type: date
        source:
          table: verkiezingen
          field: verkiezingsdatum
          select_on:
          - name: type
            value: TWEEDE_KAMER
      output:
      - name: voldoet_aan_voorwaarden
        type: boolean
      - name: heeft_stemrecht
        type: boolean
      actions:
      - output: voldoet_aan_voorwaarden
        value:
          operation: AND
          conditions:
          - subject: $nationaliteit
            operation: EQUALS
            value: true
          - subject: $leeftijd
            operation: GREATER_THAN_OR_EQUAL
            value: $minimum_leeftijd
          - subject: $gerechtelijke_uitsluiting
            operation: EQUALS
            value: false
      - output: heeft_stemrecht
        value:
          operation: AND
          conditions:
          - operation: EQUALS
            subject: $nationaliteit
            value: true
          - operation: GREATER_THAN_OR_EQUAL
            subject: $leeftijd
            value: $minimum_leeftijd
          - operation: EQUALS
            subject: $gerechtelijke_uitsluiting
            value: false
        legal_basis:
          law: Kieswet
          bwb_id: BWBR0004627
          article: B1
          url: https://wetten.overheid.nl/BWBR0004627/2025-02-12#AfdelingII_HoofdstukB_ArtikelB1
          juriconnect: jci1.3:c:BWBR0004627&artikel=B1&z=2025-02-12&g=2025-02-12
          explanation: De bepaling van stemrecht gebeurt volgens de cumulatieve voorwaarden
            uit artikel B1 en B3 van de Kieswet
