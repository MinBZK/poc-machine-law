$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.1/schema.json
$id: burgerlijk_wetboek_minderjarigheid
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Bepalen handelingsbekwaamheid minderjarigen
bwb_id: BWBR0002656
url: https://wetten.overheid.nl/BWBR0002656/2024-01-01
service: RvIG
uuid: 848e8af1-5b25-454d-9813-8d295a93fd44
discoverable: DELEGATION_PROVIDER
articles:
- number: '234'
  text: '1 Een minderjarige is, mits hij met toestemming van zijn wettelijke vertegenwoordiger handelt, bekwaam rechtshandelingen
    te verrichten, voor zover de wet niet anders bepaalt.

    2 De toestemming kan slechts worden verleend voor een bepaalde rechtshandeling of voor een bepaald doel.

    3 De toestemming wordt aan de minderjarige verondersteld te zijn verleend, indien het een rechtshandeling betreft ten
    aanzien waarvan in het maatschappelijk verkeer gebruikelijk is dat minderjarigen van zijn leeftijd deze zelfstandig verrichten.'
  url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Artikel234
  machine_readable:
    definitions:
      MEERDERJARIGHEID_LEEFTIJD:
        value: 18
      MINDERJARIGE_RECHTEN:
        value:
        - LEZEN
      VOLLEDIGE_RECHTEN:
        value:
        - LEZEN
        - CLAIMS_INDIENEN
        - BESLUITEN_ONTVANGEN
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: ANDERE_HANDELING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: PERSOONSGEGEVENS
        type: object
        source_reference:
          table: personen
          fields:
          - geboortedatum
          - heeft_handlichting
          - handlichting_gebieden
          select_on:
          - name: bsn
            description: BSN nummer van de persoon
            type: string
            value: $BSN
      output:
      - name: is_minderjarig
        type: boolean
      - name: leeftijd
        type: number
      - name: base_permissions
        type: array
      - name: heeft_handlichting
        type: boolean
      - name: handlichting_gebieden
        type: array
      - name: heeft_delegaties
        type: boolean
      - name: subject_ids
        type: array
      - name: subject_names
        type: array
      - name: subject_types
        type: array
      - name: delegation_types
        type: array
      - name: permissions
        type: array
      - name: valid_from_dates
        type: array
      - name: valid_until_dates
        type: array
      requirements:
      - operation: EXISTS
        subject: $PERSOONSGEGEVENS
        legal_basis:
          law: Wet basisregistratie personen
          bwb_id: BWBR0033715
          article: '2.7'
          url: https://wetten.overheid.nl/BWBR0033715/2024-01-01#Hoofdstuk2_Paragraaf2.2_Artikel2.7
          juriconnect: jci1.3:c:BWBR0033715&artikel=2.7&z=2024-01-01&g=2024-01-01
          explanation: Persoon moet geregistreerd zijn in de BRP
      actions:
      - output: leeftijd
        value:
          operation: SUBTRACT_DATE
          unit: years
          values:
          - $calculation_date
          - $PERSOONSGEGEVENS.geboortedatum
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '233'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel13_Artikel233
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=233&z=2024-01-01&g=2024-01-01
          explanation: Leeftijdsberekening voor bepaling minderjarigheid
      - output: is_minderjarig
        value:
          operation: LESS_THAN
          subject: $leeftijd
          value: $MEERDERJARIGHEID_LEEFTIJD
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '233'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel13_Artikel233
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=233&z=2024-01-01&g=2024-01-01
          explanation: 'Art. 1:233 BW: minderjarigen zijn personen onder 18 jaar'
      - output: heeft_handlichting
        value:
          operation: COALESCE
          values:
          - $PERSOONSGEGEVENS.heeft_handlichting
          - false
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '235'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel13_Afdeling2_Artikel235
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=235&z=2024-01-01&g=2024-01-01
          explanation: Handlichting uit BRP registratie, default false
      - output: handlichting_gebieden
        value:
          operation: COALESCE
          values:
          - $PERSOONSGEGEVENS.handlichting_gebieden
          - []
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '235'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel13_Afdeling2_Artikel235
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=235&z=2024-01-01&g=2024-01-01
          explanation: Handlichting gebieden uit BRP registratie, default leeg
      - output: base_permissions
        value:
          operation: IF
          conditions:
          - test:
              operation: AND
              values:
              - $is_minderjarig
              - operation: EQUALS
                subject: $heeft_handlichting
                value: false
            then: $MINDERJARIGE_RECHTEN
          - else: $VOLLEDIGE_RECHTEN
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '234'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel13_Artikel234
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=234&lid=1&z=2024-01-01&g=2024-01-01
          explanation: 'Art. 1:234 lid 1 BW: minderjarigen hebben beperkte handelingsbekwaamheid zonder toestemming wettelijk
            vertegenwoordiger. Bij handlichting hebben zij voor bepaalde gebieden wel volledige rechten (Art. 1:235 BW).

            '
      - output: heeft_delegaties
        value: true
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '234'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel13_Artikel234
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=234&z=2024-01-01&g=2024-01-01
          explanation: Iedereen heeft een SELF delegatie
      - output: subject_ids
        value:
        - $BSN
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '234'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel13_Artikel234
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=234&z=2024-01-01&g=2024-01-01
          explanation: BSN van de persoon zelf
      - output: subject_names
        value:
        - Mezelf
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '234'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel13_Artikel234
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=234&z=2024-01-01&g=2024-01-01
          explanation: Weergavenaam voor SELF delegatie
      - output: subject_types
        value:
        - SELF
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '234'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel13_Artikel234
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=234&z=2024-01-01&g=2024-01-01
          explanation: SELF type voor eigen zaken
      - output: delegation_types
        value:
        - EIGEN_ZAKEN
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '234'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel13_Artikel234
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=234&z=2024-01-01&g=2024-01-01
          explanation: EIGEN_ZAKEN type voor SELF delegatie
      - output: permissions
        value:
        - $base_permissions
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '234'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel13_Artikel234
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=234&lid=1&z=2024-01-01&g=2024-01-01
          explanation: Rechten afhankelijk van minderjarigheid
      - output: valid_from_dates
        value:
        - null
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '234'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel13_Artikel234
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=234&z=2024-01-01&g=2024-01-01
          explanation: SELF delegatie heeft geen ingangsdatum
      - output: valid_until_dates
        value:
        - null
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '234'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel13_Artikel234
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=234&z=2024-01-01&g=2024-01-01
          explanation: SELF delegatie heeft geen einddatum
