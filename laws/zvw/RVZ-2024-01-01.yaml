$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.0/schema.json
$id: zvw
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Bepalen verzekeringsstatus 2024
bwb_id: BWBR0018450
url: https://wetten.overheid.nl/BWBR0018450/2024-01-01
service: RVZ
uuid: aba2b8fa-4b34-420f-883a-e78da326a8f4
articles:
- number: '1'
  text: ''
  url: https://wetten.overheid.nl/BWBR0018450/2024-01-01#Artikel1
  machine_readable:
    definitions:
      ACTIEVE_POLIS_STATUSSEN:
        value:
        - ACTIEF
        - GESCHORST_MET_TERUGWERKENDE_KRACHT
      GELDIGE_VERDRAGSLANDEN:
        value:
        - BELGIE
        - DUITSLAND
        - FRANKRIJK
        - VERENIGD_KONINKRIJK
        - ZWITSERLAND
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: VERBLIJFSLAND
        type: string
        source:
          regulation: wet_brp
          output: land_van_verblijf
          service: RvIG
        temporal:
          type: period
          period_type: continuous
      - name: IS_GEDETINEERD
        type: boolean
        source:
          regulation: penitentiaire_beginselenwet
          output: is_gedetineerd
          service: DJI
        temporal:
          type: point_in_time
          reference: $prev_january_first
      - name: VERZEKERINGSPOLIS
        type: object
        source_reference:
          table: verzekeringen
          field: polis_status
          select_on:
          - name: bsn
            description: Burgerservicenummer van de persoon
            type: string
            value: $BSN
      - name: VERDRAGSINSCHRIJVING
        type: object
        source_reference:
          table: verdragsverzekeringen
          field: registratie
          select_on:
          - name: bsn
            description: Burgerservicenummer van de persoon
            type: string
            value: $BSN
      output:
      - name: heeft_verzekering
        type: boolean
      - name: heeft_verdragsverzekering
        type: boolean
      - name: is_verzekerde
        type: boolean
      actions:
      - output: heeft_verzekering
        value:
          operation: AND
          values:
          - operation: NOT_NULL
            subject: $VERZEKERINGSPOLIS
          - operation: IN
            subject: $VERZEKERINGSPOLIS
            values: $ACTIEVE_POLIS_STATUSSEN
        legal_basis:
          law: Zorgverzekeringswet
          bwb_id: BWBR0018450
          article: '2'
          url: https://wetten.overheid.nl/BWBR0018450/2025-01-01#Hoofdstuk2_Paragraaf2.1_Artikel2
          juriconnect: jci1.3:c:BWBR0018450&artikel=2&z=2025-01-01&g=2025-01-01
          explanation: Artikel 2 Zvw bepaalt de vaststelling van verzekeringsstatus
      - output: heeft_verdragsverzekering
        value:
          operation: AND
          values:
          - operation: NOT_NULL
            subject: $VERDRAGSINSCHRIJVING
          - operation: IN
            subject: $VERBLIJFSLAND
            values: $GELDIGE_VERDRAGSLANDEN
          - operation: EQUALS
            subject: $VERDRAGSINSCHRIJVING
            value: ACTIEF
        legal_basis:
          law: Zorgverzekeringswet
          bwb_id: BWBR0018450
          article: '9'
          url: https://wetten.overheid.nl/BWBR0018450/2025-01-01#Hoofdstuk2_Paragraaf2.2_Artikel9
          juriconnect: jci1.3:c:BWBR0018450&artikel=9&z=2025-01-01&g=2025-01-01
          explanation: Artikel 9 Zvw bepaalt de vaststelling van verdragsverzekering
      - output: is_verzekerde
        value:
          operation: AND
          values:
          - operation: OR
            values:
            - operation: EQUALS
              subject: $heeft_verzekering
              value: true
            - operation: EQUALS
              subject: $heeft_verdragsverzekering
              value: true
          - operation: NOT_EQUALS
            subject: $IS_GEDETINEERD
            value: true
        legal_basis:
          law: Zorgverzekeringswet
          bwb_id: BWBR0018450
          article: '1'
          url: https://wetten.overheid.nl/BWBR0018450/2025-01-01#Hoofdstuk1_Artikel1
          juriconnect: jci1.3:c:BWBR0018450&artikel=1&z=2025-01-01&g=2025-01-01
          explanation: Artikel 1 Zvw definieert wie als verzekerde geldt
