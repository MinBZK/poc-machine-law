      - BELGIE
      - DUITSLAND
      - FRANKRIJK
      - VERENIGD_KONINKRIJK
      - ZWITSERLAND
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: bsn
        type: string
        required: true
      input:
      - name: verblijfsland
