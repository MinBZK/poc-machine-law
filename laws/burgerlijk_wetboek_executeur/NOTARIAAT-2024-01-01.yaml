$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.1/schema.json
$id: burgerlijk_wetboek_executeur
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Bepalen executeurschap en vertegenwoordigingsbevoegdheid executeur
bwb_id: BWBR0002761
url: https://wetten.overheid.nl/BWBR0002761/2024-01-01
service: NOTARIAAT
uuid: 9e69492c-c73d-44ea-9672-8a1d36f53ad5
discoverable: DELEGATION_PROVIDER
articles:
- number: '144'
  text: '1. Onverminderd de testamentaire lasten die de erflater aan de executeur mocht hebben opgelegd, heeft deze, voor zover de erflater niet anders heeft beschikt, tot taak de goederen der nalatenschap te beheren en de schulden der nalatenschap te voldoen, die tijdens zijn beheer uit die goederen behoren te worden voldaan. 2. Tenzij bij uiterste wil anders is geregeld, komt de executeur, of als er meer dan een executeur is, hun tezamen, een ten honderd van de waarde van het vermogen van de erflater op diens sterfdag toe. 3. Artikel 159 leden 2 en 3 is van overeenkomstige toepassing.'
  url: https://wetten.overheid.nl/BWBR0002761/2024-01-01#Artikel144
  machine_readable:
    definitions:
      EXECUTEUR_RECHTEN:
        value:
        - LEZEN
        - CLAIMS_INDIENEN
        - BESLUITEN_ONTVANGEN
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: ANDERE_HANDELING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: EXECUTEUR_REGISTRATIES
        type: array
        source_reference:
          table: executeur_registraties
          fields:
          - bsn_erflater
          - naam_erflater
          - nalatenschap_id
          - datum_overlijden
          - datum_aanvaarding
          - datum_einde
          - status
          select_on:
          - name: bsn_executeur
            description: BSN nummer van de executeur
            type: string
            value: $BSN
      output:
      - name: heeft_delegaties
        type: boolean
      - name: subject_ids
        type: array
      - name: subject_names
        type: array
      - name: subject_types
        type: array
      - name: delegation_types
        type: array
      - name: permissions
        type: array
      - name: valid_from_dates
        type: array
      - name: valid_until_dates
        type: array
      requirements:
      - operation: EXISTS
        subject: $EXECUTEUR_REGISTRATIES
        legal_basis:
          law: Burgerlijk Wetboek Boek 4
          bwb_id: BWBR0002761
          article: '144'
          url: https://wetten.overheid.nl/BWBR0002761/2024-01-01#Boek4_Titeldeel7_Artikel144
          juriconnect: jci1.3:c:BWBR0002761&boek=4&artikel=144&z=2024-01-01&g=2024-01-01
          explanation: Persoon moet als executeur zijn geregistreerd in het CTR
      actions:
      - output: actief_executeurschap
        value:
          operation: FOREACH
          subject: $EXECUTEUR_REGISTRATIES
          where:
            operation: AND
            values:
            - operation: EQUALS
              subject: $current.status
              value: ACTIEF
            - operation: OR
              values:
              - operation: IS_NULL
                subject: $current.datum_einde
              - operation: EQUALS
                subject: $current.datum_einde
                value: ''
              - operation: GREATER_THAN
                subject: $current.datum_einde
                value: $calculation_date
          value: $current
        legal_basis:
          law: Burgerlijk Wetboek Boek 4
          bwb_id: BWBR0002761
          article: '149'
          url: https://wetten.overheid.nl/BWBR0002761/2024-01-01#Boek4_Titeldeel7_Artikel149
          juriconnect: jci1.3:c:BWBR0002761&boek=4&artikel=149&z=2024-01-01&g=2024-01-01
          explanation: 'Alleen actieve executeurschappen geven vertegenwoordigingsbevoegdheid. Art. 4:149 BW: taak executeur
            eindigt bij voltooiing of ontslag.

            '
      - output: heeft_delegaties
        value:
          operation: EXISTS
          subject: $actief_executeurschap
        legal_basis:
          law: Burgerlijk Wetboek Boek 4
          bwb_id: BWBR0002761
          article: '145'
          url: https://wetten.overheid.nl/BWBR0002761/2024-01-01#Boek4_Titeldeel7_Artikel145
          juriconnect: jci1.3:c:BWBR0002761&boek=4&artikel=145&z=2024-01-01&g=2024-01-01
          explanation: 'Art. 4:145 BW bepaalt dat de executeur de nalatenschap beheert.

            '
      - output: subject_ids
        value: $actief_executeurschap.nalatenschap_id
        legal_basis:
          law: Burgerlijk Wetboek Boek 4
          bwb_id: BWBR0002761
          article: '144'
          url: https://wetten.overheid.nl/BWBR0002761/2024-01-01#Boek4_Titeldeel7_Artikel144
          juriconnect: jci1.3:c:BWBR0002761&boek=4&artikel=144&z=2024-01-01&g=2024-01-01
          explanation: Nalatenschap identifiers uit CTR registratie
      - output: subject_names
        value:
          operation: FOREACH
          subject: $actief_executeurschap
          value:
            operation: CONCAT
            values:
            - 'Nalatenschap '
            - $current.naam_erflater
        legal_basis:
          law: Burgerlijk Wetboek Boek 4
          bwb_id: BWBR0002761
          article: '144'
          url: https://wetten.overheid.nl/BWBR0002761/2024-01-01#Boek4_Titeldeel7_Artikel144
          juriconnect: jci1.3:c:BWBR0002761&boek=4&artikel=144&z=2024-01-01&g=2024-01-01
          explanation: Namen van erflaters wiens nalatenschap wordt beheerd
      - output: subject_types
        value:
          operation: FOREACH
          subject: $actief_executeurschap
          value: CITIZEN
        legal_basis:
          law: Burgerlijk Wetboek Boek 4
          bwb_id: BWBR0002761
          article: '144'
          url: https://wetten.overheid.nl/BWBR0002761/2024-01-01#Boek4_Titeldeel7_Artikel144
          juriconnect: jci1.3:c:BWBR0002761&boek=4&artikel=144&z=2024-01-01&g=2024-01-01
          explanation: Nalatenschap van natuurlijk persoon, behandeld als CITIZEN
      - output: delegation_types
        value:
          operation: FOREACH
          subject: $actief_executeurschap
          value: EXECUTEUR_NALATENSCHAP
        legal_basis:
          law: Burgerlijk Wetboek Boek 4
          bwb_id: BWBR0002761
          article: '144'
          url: https://wetten.overheid.nl/BWBR0002761/2024-01-01#Boek4_Titeldeel7_Artikel144
          juriconnect: jci1.3:c:BWBR0002761&boek=4&artikel=144&z=2024-01-01&g=2024-01-01
          explanation: Type delegatie is EXECUTEUR_NALATENSCHAP voor executeurschap
      - output: permissions
        value:
          operation: FOREACH
          subject: $actief_executeurschap
          value: $EXECUTEUR_RECHTEN
        legal_basis:
          law: Burgerlijk Wetboek Boek 4
          bwb_id: BWBR0002761
          article: '145'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002761/2024-01-01#Boek4_Titeldeel7_Artikel145
          juriconnect: jci1.3:c:BWBR0002761&boek=4&artikel=145&lid=1&z=2024-01-01&g=2024-01-01
          explanation: 'Art. 4:145 lid 1 BW: De executeur heeft privatieve bevoegdheid tot beheer en beschikking over de goederen
            der nalatenschap.

            '
      - output: valid_from_dates
        value: $actief_executeurschap.datum_aanvaarding
        legal_basis:
          law: Burgerlijk Wetboek Boek 4
          bwb_id: BWBR0002761
          article: '144'
          url: https://wetten.overheid.nl/BWBR0002761/2024-01-01#Boek4_Titeldeel7_Artikel144
          juriconnect: jci1.3:c:BWBR0002761&boek=4&artikel=144&z=2024-01-01&g=2024-01-01
          explanation: Datum aanvaarding executeurschap uit CTR
      - output: valid_until_dates
        value: $actief_executeurschap.datum_einde
        legal_basis:
          law: Burgerlijk Wetboek Boek 4
          bwb_id: BWBR0002761
          article: '149'
          url: https://wetten.overheid.nl/BWBR0002761/2024-01-01#Boek4_Titeldeel7_Artikel149
          juriconnect: jci1.3:c:BWBR0002761&boek=4&artikel=149&z=2024-01-01&g=2024-01-01
          explanation: Einddatum executeurschap, null indien nog actief
