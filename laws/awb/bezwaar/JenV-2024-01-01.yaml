$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: awb/bezwaar
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Algemene wet bestuursrecht - Bezwaarmogelijkheid en Termijnen
bwb_id: BWBR0005537
url: https://wetten.overheid.nl/BWBR0005537/2024-01-01
service: JenV
uuid: b6679cca-4555-44b4-9b8f-caa6886b74a0
articles:
- number: '7:1'
  text: |-
    1 Degene aan wie het recht is toegekend beroep bij een bestuursrechter in te stellen, dient alvorens beroep in te stellen bezwaar te maken, tenzij:
      a. het besluit in bezwaar of in administratief beroep is genomen,
      b. het besluit aan goedkeuring is onderworpen,
      c. het besluit een goedkeuring of een weigering daarvan inhoudt,
      d. het besluit is voorbereid met toepassing van afdeling 3.4,
      e. het besluit is genomen op basis van een uitspraak waarin de bestuursrechter met toepassing van artikel 8:72, vierde lid, onderdeel a, heeft bepaald dat afdeling 3.4 geheel of gedeeltelijk buiten toepassing blijft,
      f. het beroep zich richt tegen het niet tijdig nemen van een besluit,
      g. het besluit is genomen op grond van een voorschrift als genoemd in de bij deze wet behorende Regeling rechtstreeks beroep dan wel het besluit anderszins in die regeling is omschreven.
    2 Tegen de beslissing op het bezwaar kan beroep worden ingesteld met toepassing van de voorschriften die gelden voor het instellen van beroep tegen het besluit waartegen bezwaar is gemaakt.
  url: https://wetten.overheid.nl/BWBR0005537/2024-01-01#Artikel7:1
  machine_readable:
    definitions:
      excluded_decision_types:
        value:
        - ALGEMEEN_VERBINDEND_VOORSCHRIFT
        - BELEIDSREGEL
        - VOORBEREIDINGSBESLUIT
        - ANDERE_HANDELING
      required_legal_character:
        value:
        - BESCHIKKING
        - BESLUIT_VAN_ALGEMENE_STREKKING
      default_termijn_bezwaar_weken:
        value: 6
      default_termijn_beslissing_weken:
        value: 6
      default_termijn_verdaging_weken:
        value: 6
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      input:
      - name: wet
        type: object
        source_reference:
          source_type: laws
          table: laws
          fields:
          - decision_type
          - name
          - valid_from
          - legal_character
          - bezwaartermijn_weken
          - beslistermijn_weken
          - verdagingstermijn_weken
          select_on:
          - name: uuid
            description: UUID van de wet
            type: string
            value: $zaak.rulespec_uuid
      - name: gebeurtenissen
        type: object
        source_reference:
          source_type: events
          table: events
          fields:
          - case_id
          - event_type
          select_on:
          - name: case_id
            description: Zaak identifier
            type: string
            value: $zaak.id
      output:
      - name: bezwaar_mogelijk
        type: boolean
      - name: reden_niet_mogelijk
        type: string
      - name: bezwaartermijn
        type: number
        type_spec:
          unit: weeks
          precision: 0
          min: 0
      - name: beslistermijn
        type: number
        type_spec:
          unit: weeks
          precision: 0
          min: 0
      - name: verdagingstermijn
        type: number
        type_spec:
          unit: weeks
          precision: 0
          min: 0
      actions:
      - output: bezwaar_mogelijk
        value:
          operation: AND
          conditions:
          - operation: NOT_IN
            subject: $wet.decision_type
            values: $excluded_decision_types
          - operation: IN
            subject: $wet.legal_character
            values: $required_legal_character
          - operation: EQUALS
            subject:
              operation: FOREACH
              subject: $gebeurtenissen
              value:
              - operation: EQUALS
                subject: $event_type
                value: Objected
              combine: ADD
            value: 0
        legal_basis:
          law: Algemene wet bestuursrecht
          bwb_id: BWBR0005537
          article: '7:1'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0005537/2024-01-01#Hoofdstuk7_Afdeling7.1_Artikel7:1
          juriconnect: jci1.3:c:BWBR0005537&artikel=7:1&lid=1&z=2024-01-01&g=2024-01-01
          explanation: Artikel 7:1 lid 1 Awb bepaalt de voorwaarden waaronder bezwaar mogelijk is
      - output: reden_niet_mogelijk
        value:
          operation: IF
          cases:
          - when:
              operation: IN
              subject: $wet.decision_type
              values: $excluded_decision_types
            then: tegen dit type besluit is geen bezwaar mogelijk
          - when:
              operation: NOT_IN
              subject: $wet.legal_character
              values: $required_legal_character
            then: dit is geen besluit in de zin van de AWB
          - when:
              operation: NOT
              value:
                operation: EQUALS
                values:
                - operation: FOREACH
                  subject: $gebeurtenissen
                  value:
                  - operation: EQUALS
                    subject: $event_type
                    value: Objected
                  combine: ADD
                - 0
            then: er is al eerder bezwaar gemaakt tegen dit besluit
        legal_basis:
          law: Algemene wet bestuursrecht
          bwb_id: BWBR0005537
          article: '8:3'
          url: https://wetten.overheid.nl/BWBR0005537/2024-01-01#Hoofdstuk8_Titeldeel8.1_Artikel8:3
          juriconnect: jci1.3:c:BWBR0005537&artikel=8:3&z=2024-01-01&g=2024-01-01
          explanation: Artikel 8:3 Awb bepaalt waarom geen bezwaar mogelijk is
      - output: bezwaartermijn
        value:
          operation: IF
          cases:
          - when:
              operation: NOT
              value:
                operation: IS_NULL
                subject: $wet.bezwaartermijn_weken
            then: $wet.bezwaartermijn_weken
          default: $default_termijn_bezwaar_weken
        legal_basis:
          law: Algemene wet bestuursrecht
          bwb_id: BWBR0005537
          article: '6:7'
          url: https://wetten.overheid.nl/BWBR0005537/2024-01-01#Hoofdstuk6_Afdeling6.2_Artikel6:7
          juriconnect: jci1.3:c:BWBR0005537&artikel=6:7&z=2024-01-01&g=2024-01-01
          explanation: Artikel 6:7 Awb bepaalt de termijn voor het indienen van bezwaar
      - output: beslistermijn
        value:
          operation: IF
          cases:
          - when:
              operation: NOT
              value:
                operation: IS_NULL
                subject: $wet.beslistermijn_weken
            then: $wet.beslistermijn_weken
          default: $default_termijn_beslissing_weken
        legal_basis:
          law: Algemene wet bestuursrecht
          bwb_id: BWBR0005537
          article: '7:10'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0005537/2024-01-01#Hoofdstuk7_Afdeling7.2_Artikel7:10
          juriconnect: jci1.3:c:BWBR0005537&artikel=7:10&lid=1&z=2024-01-01&g=2024-01-01
          explanation: Artikel 7:10 lid 1 Awb bepaalt de termijn voor beslissing op bezwaar
      - output: verdagingstermijn
        value:
          operation: IF
          cases:
          - when:
              operation: NOT
              value:
                operation: IS_NULL
                subject: $wet.verdagingstermijn_weken
            then: $wet.verdagingstermijn_weken
          default: $default_termijn_verdaging_weken
        legal_basis:
          law: Algemene wet bestuursrecht
          bwb_id: BWBR0005537
          article: '7:10'
          paragraph: '3'
          url: https://wetten.overheid.nl/BWBR0005537/2024-01-01#Hoofdstuk7_Afdeling7.2_Artikel7:10
          juriconnect: jci1.3:c:BWBR0005537&artikel=7:10&lid=3&z=2024-01-01&g=2024-01-01
          explanation: Artikel 7:10 lid 3 Awb bepaalt de verdagingstermijn
