$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.1/schema.json
$id: burgerlijk_wetboek_volmacht
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Bepalen volmacht en vertegenwoordigingsbevoegdheid gevolmachtigde
bwb_id: BWBR0005291
url: https://wetten.overheid.nl/BWBR0005291/2024-01-01
service: NOTARIAAT
uuid: 5a437c98-30bb-4044-af1a-11701a9bf7ea
discoverable: DELEGATION_PROVIDER
articles:
- number: '60'
  text: '1. Volmacht is de bevoegdheid die een volmachtgever verleent aan een ander, de gevolmachtigde, om in zijn naam rechtshandelingen te verrichten. 2. Waar in deze titel van rechtshandeling wordt gesproken, is daaronder het in ontvangst nemen van een verklaring begrepen.'
  url: https://wetten.overheid.nl/BWBR0005291/2024-01-01#Artikel60
  machine_readable:
    definitions:
      ALGEMENE_VOLMACHT_RECHTEN:
        value:
        - LEZEN
        - CLAIMS_INDIENEN
        - BESLUITEN_ONTVANGEN
      BIJZONDERE_VOLMACHT_RECHTEN:
        value:
        - LEZEN
      VOLMACHT_TYPEN:
        value:
          ALGEMENE_VOLMACHT: GEVOLMACHTIGDE_ALGEMEEN
          BIJZONDERE_VOLMACHT: GEVOLMACHTIGDE_BIJZONDER
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: ANDERE_HANDELING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: VOLMACHT_REGISTRATIES
        type: array
        source_reference:
          table: volmacht_registraties
          fields:
          - bsn_volmachtgever
          - naam_volmachtgever
          - volmacht_type
          - datum_ingang
          - datum_einde
          - status
          - is_herroepen
          select_on:
          - name: bsn_gevolmachtigde
            description: BSN nummer van de gevolmachtigde
            type: string
            value: $BSN
      output:
      - name: heeft_delegaties
        type: boolean
      - name: subject_ids
        type: array
      - name: subject_names
        type: array
      - name: subject_types
        type: array
      - name: delegation_types
        type: array
      - name: permissions
        type: array
      - name: valid_from_dates
        type: array
      - name: valid_until_dates
        type: array
      requirements:
      - operation: EXISTS
        subject: $VOLMACHT_REGISTRATIES
        legal_basis:
          law: Burgerlijk Wetboek Boek 3
          bwb_id: BWBR0005291
          article: '61'
          url: https://wetten.overheid.nl/BWBR0005291/2024-01-01#Boek3_Titeldeel3_Artikel61
          juriconnect: jci1.3:c:BWBR0005291&boek=3&artikel=61&z=2024-01-01&g=2024-01-01
          explanation: Persoon moet als gevolmachtigde zijn geregistreerd
      actions:
      - output: actieve_volmachten
        value:
          operation: FOREACH
          subject: $VOLMACHT_REGISTRATIES
          where:
            operation: AND
            values:
            - operation: EQUALS
              subject: $current.status
              value: ACTIEF
            - operation: NOT_EQUALS
              subject: $current.is_herroepen
              value: true
            - operation: OR
              values:
              - operation: IS_NULL
                subject: $current.datum_einde
              - operation: EQUALS
                subject: $current.datum_einde
                value: ''
              - operation: GREATER_THAN
                subject: $current.datum_einde
                value: $calculation_date
          value: $current
        legal_basis:
          law: Burgerlijk Wetboek Boek 3
          bwb_id: BWBR0005291
          article: '72'
          url: https://wetten.overheid.nl/BWBR0005291/2024-01-01#Boek3_Titeldeel3_Artikel72
          juriconnect: jci1.3:c:BWBR0005291&boek=3&artikel=72&z=2024-01-01&g=2024-01-01
          explanation: 'Art. 3:72 BW: volmacht eindigt door herroeping, dood volmachtgever, faillissement, etc. Alleen actieve
            volmachten geven bevoegdheid.

            '
      - output: heeft_delegaties
        value:
          operation: EXISTS
          subject: $actieve_volmachten
        legal_basis:
          law: Burgerlijk Wetboek Boek 3
          bwb_id: BWBR0005291
          article: '60'
          url: https://wetten.overheid.nl/BWBR0005291/2024-01-01#Boek3_Titeldeel3_Artikel60
          juriconnect: jci1.3:c:BWBR0005291&boek=3&artikel=60&z=2024-01-01&g=2024-01-01
          explanation: 'Art. 3:60 BW bepaalt dat volmacht vertegenwoordigingsbevoegdheid geeft.

            '
      - output: subject_ids
        value: $actieve_volmachten.bsn_volmachtgever
        legal_basis:
          law: Burgerlijk Wetboek Boek 3
          bwb_id: BWBR0005291
          article: '60'
          url: https://wetten.overheid.nl/BWBR0005291/2024-01-01#Boek3_Titeldeel3_Artikel60
          juriconnect: jci1.3:c:BWBR0005291&boek=3&artikel=60&z=2024-01-01&g=2024-01-01
          explanation: BSN nummers van volmachtgevers uit notarieel register
      - output: subject_names
        value: $actieve_volmachten.naam_volmachtgever
        legal_basis:
          law: Burgerlijk Wetboek Boek 3
          bwb_id: BWBR0005291
          article: '60'
          url: https://wetten.overheid.nl/BWBR0005291/2024-01-01#Boek3_Titeldeel3_Artikel60
          juriconnect: jci1.3:c:BWBR0005291&boek=3&artikel=60&z=2024-01-01&g=2024-01-01
          explanation: Namen van volmachtgevers uit notarieel register
      - output: subject_types
        value:
          operation: FOREACH
          subject: $actieve_volmachten
          value: CITIZEN
        legal_basis:
          law: Burgerlijk Wetboek Boek 3
          bwb_id: BWBR0005291
          article: '60'
          url: https://wetten.overheid.nl/BWBR0005291/2024-01-01#Boek3_Titeldeel3_Artikel60
          juriconnect: jci1.3:c:BWBR0005291&boek=3&artikel=60&z=2024-01-01&g=2024-01-01
          explanation: Dit register betreft alleen natuurlijke personen, altijd CITIZEN
      - output: delegation_types
        value:
          operation: FOREACH
          subject: $actieve_volmachten
          value:
            operation: IF
            conditions:
            - test:
                operation: EQUALS
                subject: $current.volmacht_type
                value: ALGEMENE_VOLMACHT
              then: GEVOLMACHTIGDE_ALGEMEEN
            - else: GEVOLMACHTIGDE_BIJZONDER
        legal_basis:
          law: Burgerlijk Wetboek Boek 3
          bwb_id: BWBR0005291
          article: '62'
          url: https://wetten.overheid.nl/BWBR0005291/2024-01-01#Boek3_Titeldeel3_Artikel62
          juriconnect: jci1.3:c:BWBR0005291&boek=3&artikel=62&z=2024-01-01&g=2024-01-01
          explanation: 'Art. 3:62 BW: onderscheid algemene en bijzondere volmacht'
      - output: permissions
        value:
          operation: FOREACH
          subject: $actieve_volmachten
          value:
            operation: IF
            conditions:
            - test:
                operation: EQUALS
                subject: $current.volmacht_type
                value: ALGEMENE_VOLMACHT
              then: $ALGEMENE_VOLMACHT_RECHTEN
            - else: $BIJZONDERE_VOLMACHT_RECHTEN
        legal_basis:
          law: Burgerlijk Wetboek Boek 3
          bwb_id: BWBR0005291
          article: '62'
          url: https://wetten.overheid.nl/BWBR0005291/2024-01-01#Boek3_Titeldeel3_Artikel62
          juriconnect: jci1.3:c:BWBR0005291&boek=3&artikel=62&z=2024-01-01&g=2024-01-01
          explanation: 'Art. 3:62 BW: Algemene volmacht strekt tot alle rechtshandelingen (volledige rechten), bijzondere
            tot specifieke handelingen (beperkt).

            '
      - output: valid_from_dates
        value: $actieve_volmachten.datum_ingang
        legal_basis:
          law: Burgerlijk Wetboek Boek 3
          bwb_id: BWBR0005291
          article: '61'
          url: https://wetten.overheid.nl/BWBR0005291/2024-01-01#Boek3_Titeldeel3_Artikel61
          juriconnect: jci1.3:c:BWBR0005291&boek=3&artikel=61&z=2024-01-01&g=2024-01-01
          explanation: Ingangsdatum volmacht uit notarieel register
      - output: valid_until_dates
        value: $actieve_volmachten.datum_einde
        legal_basis:
          law: Burgerlijk Wetboek Boek 3
          bwb_id: BWBR0005291
          article: '72'
          url: https://wetten.overheid.nl/BWBR0005291/2024-01-01#Boek3_Titeldeel3_Artikel72
          juriconnect: jci1.3:c:BWBR0005291&boek=3&artikel=72&z=2024-01-01&g=2024-01-01
          explanation: Einddatum volmacht, null indien onbepaalde tijd
