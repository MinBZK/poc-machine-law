$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.1/schema.json
$id: participatiewet/bijstand
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Bijstand Gemeente Amsterdam
bwb_id: BWBR0015703
url: https://wetten.overheid.nl/BWBR0015703/2024-01-01
service: GEMEENTE_AMSTERDAM
uuid: b1d3a15b-45a2-44a3-b26a-d636785032c0
discoverable: CITIZEN
articles:
- number: '11'
  text: "1 Iedere in Nederland woonachtige Nederlander die hier te lande in zodanige omstandigheden verkeert of dreigt te\
    \ geraken dat hij niet over de middelen beschikt om in de noodzakelijke kosten van bestaan te voorzien, heeft recht op\
    \ bijstand van overheidswege.\n2 Met de Nederlander, bedoeld in het eerste lid, wordt gelijkgesteld de hier te lande woonachtige\
    \ vreemdeling die rechtmatig in Nederland verblijf houdt in de zin van artikel 8, onderdelen a tot en met e en l, van\
    \ de Vreemdelingenwet 2000, met uitzondering van de gevallen, bedoeld in artikel 24, tweede lid, van Richtlijn 2004/38/EG.\n\
    3 Bij algemene maatregel van bestuur kunnen andere hier te lande woonachtige vreemdelingen dan de in het tweede lid bedoelde\
    \ voor de toepassing van deze wet met een Nederlander gelijk worden gesteld:\n  a. ter uitvoering van een verdrag dan\
    \ wel van een besluit van een volkenrechtelijke organisatie, of\n  b. indien zij, na rechtmatig verblijf te hebben gehouden\
    \ in de zin van artikel 8, onderdelen a tot en met e en l, van de Vreemdelingenwet 2000, rechtmatig in Nederland verblijf\
    \ hebben als bedoeld in artikel 8, onderdeel g of h, van die wet en zij aan de in die algemene maatregel van bestuur gestelde\
    \ voorwaarden voldoen.\n4 Het recht op bijstand komt de echtgenoten gezamenlijk toe, tenzij een van de echtgenoten geen\
    \ recht op bijstand heeft."
  url: https://wetten.overheid.nl/BWBR0015703/2024-01-01#Artikel11
  machine_readable:
    definitions:
      JEUGD_TOESLAG:
        value: 25000
      JEUGD_MAX_LEEFTIJD:
        value: 27
      ZZP_INKOMEN_VRIJLATING_PERCENTAGE:
        value: 0.2
      MAANDEN_PER_JAAR:
        value: 12
      WOONKOSTENTOESLAG_BEDRAG:
        value: 60000
      STARTKAPITAAL_MAXIMUM:
        value: 200000
      RE_INTEGRATIE_TOESLAG:
        value: 15000
      GELDIGE_POST_ADRESSEN:
        value:
        - De Regenboog Groep 1, 1012NX Amsterdam
        - HVO-Querido
        - Leger des Heils Amsterdam
      VOLLEDIGE_ONTHEFFING_REDENEN:
        value:
        - MEDISCH_VOLLEDIG
        - MANTELZORG_VOLLEDIG
        - SOCIALE_OMSTANDIGHEDEN_VOLLEDIG
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: VOLDOET_AAN_LANDELIJKE_VOORWAARDEN
        type: boolean
        source:
          regulation: participatiewet/bijstand
          output: is_gerechtigd
          service: SZW
          parameters:
            BSN: $BSN
      - name: LANDELIJK_BASISBEDRAG
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: participatiewet/bijstand
          output: basisbedrag
          service: SZW
          parameters:
            BSN: $BSN
      - name: KOSTENDELERSNORM
        type: number
        source:
          regulation: participatiewet/bijstand
          output: kostendelersnorm
          service: SZW
          parameters:
            BSN: $BSN
      - name: LEEFTIJD
        type: number
        source:
          regulation: wet_brp
          output: leeftijd
          service: RvIG
          parameters:
            BSN: $BSN
      - name: HEEFT_VAST_ADRES
        type: boolean
        source:
          regulation: wet_brp
          output: heeft_vast_adres
          service: RvIG
          parameters:
            BSN: $BSN
      - name: POSTADRES
        type: string
        source:
          regulation: wet_brp
          output: postadres
          service: RvIG
          parameters:
            BSN: $BSN
      - name: IS_ONDERNEMER
        type: boolean
        source:
          regulation: handelsregisterwet
          output: is_actieve_ondernemer
          service: KVK
          parameters:
            BSN: $BSN
      - name: BEDRIJFSINKOMEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: bedrijfsinkomen
          service: BELASTINGDIENST
          parameters:
            BSN: $BSN
      - name: ARBEIDSVERMOGEN
        type: object
        source_reference:
          table: werk_en_re_integratie
          fields:
          - arbeidsvermogen
          - ontheffing_reden
          - ontheffing_einddatum
          - re_integratie_traject
          select_on:
          - name: bsn
            description: BSN van de persoon
            type: string
            value: $BSN
      output:
      - name: is_gerechtigd
        type: boolean
      - name: uitkeringsbedrag
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: woonkostentoeslag
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: startkapitaal
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      requirements:
      - all:
        - subject: $VOLDOET_AAN_LANDELIJKE_VOORWAARDEN
          operation: EQUALS
          value: true
        - or:
          - subject: $HEEFT_VAST_ADRES
            operation: EQUALS
            value: true
          - operation: IN
            subject: $POSTADRES
            values: $GELDIGE_POST_ADRESSEN
        - or:
          - operation: IN
            subject: $ARBEIDSVERMOGEN.arbeidsvermogen
            values: $VOLLEDIGE_ONTHEFFING_REDENEN
          - operation: NOT_NULL
            subject: $ARBEIDSVERMOGEN.re_integratie_traject
      actions:
      - output: is_gerechtigd
        value: true
      - output: uitkeringsbedrag
        value:
          operation: ADD
          values:
          - operation: MULTIPLY
            values:
            - $LANDELIJK_BASISBEDRAG
            - $KOSTENDELERSNORM
          - operation: IF
            conditions:
            - test:
                operation: AND
                values:
                - operation: LESS_OR_EQUAL
                  subject: $LEEFTIJD
                  value: $JEUGD_MAX_LEEFTIJD
                - operation: EQUALS
                  subject: $HEEFT_VAST_ADRES
                  value: true
              then: $JEUGD_TOESLAG
            - else: 0
          - operation: IF
            conditions:
            - test:
                operation: AND
                values:
                - operation: EQUALS
                  subject: $IS_ONDERNEMER
                  value: true
                - operation: GREATER_THAN
                  subject: $BEDRIJFSINKOMEN
                  value: 0
                - operation: LESS_THAN
                  subject:
                    operation: DIVIDE
                    values:
                    - $BEDRIJFSINKOMEN
                    - $MAANDEN_PER_JAAR
                  value:
                    operation: MULTIPLY
                    values:
                    - $LANDELIJK_BASISBEDRAG
                    - $KOSTENDELERSNORM
              then:
                operation: MULTIPLY
                values:
                - operation: DIVIDE
                  values:
                  - $BEDRIJFSINKOMEN
                  - $MAANDEN_PER_JAAR
                - $ZZP_INKOMEN_VRIJLATING_PERCENTAGE
            - else: 0
          - operation: IF
            conditions:
            - operation: NOT_NULL
              test: null
              subject: $ARBEIDSVERMOGEN.re_integratie_traject
              then: $RE_INTEGRATIE_TOESLAG
            - else: 0
      - output: woonkostentoeslag
        value:
          operation: IF
          conditions:
          - test:
              operation: AND
              values:
              - operation: EQUALS
                subject: $HEEFT_VAST_ADRES
                value: false
              - operation: IN
                subject: $POSTADRES
                values: $GELDIGE_POST_ADRESSEN
            then: $WOONKOSTENTOESLAG_BEDRAG
          - else: 0
      - output: startkapitaal
        value:
          operation: IF
          conditions:
          - test:
              operation: AND
              values:
              - operation: EQUALS
                subject: $IS_ONDERNEMER
                value: true
              - operation: LESS_THAN
                subject:
                  operation: DIVIDE
                  values:
                  - $BEDRIJFSINKOMEN
                  - $MAANDEN_PER_JAAR
                value:
                  operation: MULTIPLY
                  values:
                  - $LANDELIJK_BASISBEDRAG
                  - $KOSTENDELERSNORM
            then: $STARTKAPITAAL_MAXIMUM
          - else: 0
