$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: participatiewet/bijstand
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Bijstand Gemeente Amsterdam
bwb_id: BWBR0015703
url: https://wetten.overheid.nl/BWBR0015703/2024-01-01
service: GEMEENTE_AMSTERDAM
uuid: b1d3a15b-45a2-44a3-b26a-d636785032c0
discoverable: CITIZEN
articles:
- number: '11'
  text: |-
    1 Iedere in Nederland woonachtige Nederlander die hier te lande in zodanige omstandigheden verkeert of dreigt te geraken dat hij niet over de middelen beschikt om in de noodzakelijke kosten van bestaan te voorzien, heeft recht op bijstand van overheidswege.
    2 Met de Nederlander, bedoeld in het eerste lid, wordt gelijkgesteld de hier te lande woonachtige vreemdeling die rechtmatig in Nederland verblijf houdt in de zin van artikel 8, onderdelen a tot en met e en l, van de Vreemdelingenwet 2000, met uitzondering van de gevallen, bedoeld in artikel 24, tweede lid, van Richtlijn 2004/38/EG.
    3 Bij algemene maatregel van bestuur kunnen andere hier te lande woonachtige vreemdelingen dan de in het tweede lid bedoelde voor de toepassing van deze wet met een Nederlander gelijk worden gesteld:
      a. ter uitvoering van een verdrag dan wel van een besluit van een volkenrechtelijke organisatie, of
      b. indien zij, na rechtmatig verblijf te hebben gehouden in de zin van artikel 8, onderdelen a tot en met e en l, van de Vreemdelingenwet 2000, rechtmatig in Nederland verblijf hebben als bedoeld in artikel 8, onderdeel g of h, van die wet en zij aan de in die algemene maatregel van bestuur gestelde voorwaarden voldoen.
    4 Het recht op bijstand komt de echtgenoten gezamenlijk toe, tenzij een van de echtgenoten geen recht op bijstand heeft.
  url: https://wetten.overheid.nl/BWBR0015703/2024-01-01#Artikel11
  machine_readable:
    definitions:
      jeugd_toeslag:
        value: 25000
      jeugd_max_leeftijd:
        value: 27
      zzp_inkomen_vrijlating_percentage:
        value: 0.2
      maanden_per_jaar:
        value: 12
      woonkostentoeslag_bedrag:
        value: 60000
      startkapitaal_maximum:
        value: 200000
      re_integratie_toeslag:
        value: 15000
      geldige_post_adressen:
        value:
        - De Regenboog Groep 1, 1012NX Amsterdam
        - HVO-Querido
        - Leger des Heils Amsterdam
      volledige_ontheffing_redenen:
        value:
        - MEDISCH_VOLLEDIG
        - MANTELZORG_VOLLEDIG
        - SOCIALE_OMSTANDIGHEDEN_VOLLEDIG
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: bsn
        type: string
        required: true
      input:
      - name: voldoet_aan_landelijke_voorwaarden
        type: boolean
        source:
          regulation: participatiewet/bijstand
          output: is_gerechtigd
          service: SZW
          parameters:
            bsn: $bsn
      - name: landelijk_basisbedrag
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: participatiewet/bijstand
          output: basisbedrag
          service: SZW
          parameters:
            bsn: $bsn
      - name: kostendelersnorm
        type: number
        source:
          regulation: participatiewet/bijstand
          output: kostendelersnorm
          service: SZW
          parameters:
            bsn: $bsn
      - name: leeftijd
        type: number
        source:
          regulation: wet_brp
          output: leeftijd
          service: RvIG
          parameters:
            bsn: $bsn
      - name: heeft_vast_adres
        type: boolean
        source:
          regulation: wet_brp
          output: heeft_vast_adres
          service: RvIG
          parameters:
            bsn: $bsn
      - name: postadres
        type: string
        source:
          regulation: wet_brp
          output: postadres
          service: RvIG
          parameters:
            bsn: $bsn
      - name: is_ondernemer
        type: boolean
        source:
          regulation: handelsregisterwet
          output: is_actieve_ondernemer
          service: KVK
          parameters:
            bsn: $bsn
      - name: bedrijfsinkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: bedrijfsinkomen
          service: BELASTINGDIENST
          parameters:
            bsn: $bsn
      - name: arbeidsvermogen
        type: object
        source_reference:
          table: werk_en_re_integratie
          fields:
          - arbeidsvermogen
          - ontheffing_reden
          - ontheffing_einddatum
          - re_integratie_traject
          select_on:
          - name: bsn
            description: BSN van de persoon
            type: string
            value: $bsn
      output:
      - name: voldoet_aan_voorwaarden
        type: boolean
      - name: is_gerechtigd
        type: boolean
      - name: uitkeringsbedrag
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: woonkostentoeslag
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: startkapitaal
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      actions:
      - output: voldoet_aan_voorwaarden
        value:
          operation: AND
          conditions:
          - subject: $voldoet_aan_landelijke_voorwaarden
            operation: EQUALS
            value: true
          - operation: OR
            conditions:
            - subject: $heeft_vast_adres
              operation: EQUALS
              value: true
            - operation: IN
              subject: $postadres
              values: $geldige_post_adressen
          - operation: OR
            conditions:
            - operation: IN
              subject: $arbeidsvermogen.arbeidsvermogen
              values: $volledige_ontheffing_redenen
            - operation: NOT
              value:
                operation: IS_NULL
                subject: $arbeidsvermogen.re_integratie_traject
      - output: is_gerechtigd
        value: true
      - output: uitkeringsbedrag
        value:
          operation: ADD
          values:
          - operation: MULTIPLY
            values:
            - $landelijk_basisbedrag
            - $kostendelersnorm
          - operation: IF
            cases:
            - when:
                operation: AND
                conditions:
                - operation: LESS_THAN_OR_EQUAL
                  subject: $leeftijd
                  value: $jeugd_max_leeftijd
                - operation: EQUALS
                  subject: $heeft_vast_adres
                  value: true
              then: $jeugd_toeslag
            default: 0
          - operation: IF
            cases:
            - when:
                operation: AND
                conditions:
                - operation: EQUALS
                  subject: $is_ondernemer
                  value: true
                - operation: GREATER_THAN
                  subject: $bedrijfsinkomen
                  value: 0
                - operation: LESS_THAN
                  subject:
                    operation: DIVIDE
                    values:
                    - $bedrijfsinkomen
                    - $maanden_per_jaar
                  value:
                    operation: MULTIPLY
                    values:
                    - $landelijk_basisbedrag
                    - $kostendelersnorm
              then:
                operation: MULTIPLY
                values:
                - operation: DIVIDE
                  values:
                  - $bedrijfsinkomen
                  - $maanden_per_jaar
                - $zzp_inkomen_vrijlating_percentage
            default: 0
          - operation: IF
            cases: []
            default: 0
      - output: woonkostentoeslag
        value:
          operation: IF
          cases:
          - when:
              operation: AND
              conditions:
              - operation: EQUALS
                subject: $heeft_vast_adres
                value: false
              - operation: IN
                subject: $postadres
                values: $geldige_post_adressen
            then: $woonkostentoeslag_bedrag
          default: 0
      - output: startkapitaal
        value:
          operation: IF
          cases:
          - when:
              operation: AND
              conditions:
              - operation: EQUALS
                subject: $is_ondernemer
                value: true
              - operation: LESS_THAN
                subject:
                  operation: DIVIDE
                  values:
                  - $bedrijfsinkomen
                  - $maanden_per_jaar
                value:
                  operation: MULTIPLY
                  values:
                  - $landelijk_basisbedrag
                  - $kostendelersnorm
            then: $startkapitaal_maximum
          default: 0
