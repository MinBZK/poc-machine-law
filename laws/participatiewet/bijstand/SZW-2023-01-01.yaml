$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: participatiewet/bijstand
regulatory_layer: WET
publication_date: '2025-01-01'
valid_from: '2025-01-01'
name: Bepalen recht op bijstand landelijk
bwb_id: BWBR0015703
url: https://wetten.overheid.nl/BWBR0015703/2025-01-01
service: SZW
uuid: c00f6a8b-b387-45d0-ab15-6f5aa34b7287
articles:
- number: '11'
  text: "1 Iedere in Nederland woonachtige Nederlander die hier te lande in zodanige omstandigheden verkeert of dreigt te\
    \ geraken dat hij niet over de middelen beschikt om in de noodzakelijke kosten van bestaan te voorzien, heeft recht op\
    \ bijstand van overheidswege.\n2 Met de Nederlander, bedoeld in het eerste lid, wordt gelijkgesteld de hier te lande woonachtige\
    \ vreemdeling die rechtmatig in Nederland verblijf houdt in de zin van artikel 8, onderdelen a tot en met e en l, van\
    \ de Vreemdelingenwet 2000, met uitzondering van de gevallen, bedoeld in artikel 24, tweede lid, van Richtlijn 2004/38/EG.\n\
    3 Bij algemene maatregel van bestuur kunnen andere hier te lande woonachtige vreemdelingen dan de in het tweede lid bedoelde\
    \ voor de toepassing van deze wet met een Nederlander gelijk worden gesteld:\n  a. ter uitvoering van een verdrag dan\
    \ wel van een besluit van een volkenrechtelijke organisatie, of\n  b. indien zij, na rechtmatig verblijf te hebben gehouden\
    \ in de zin van artikel 8, onderdelen a tot en met e en l, van de Vreemdelingenwet 2000, rechtmatig in Nederland verblijf\
    \ hebben als bedoeld in artikel 8, onderdeel g of h, van die wet en zij aan de in die algemene maatregel van bestuur gestelde\
    \ voorwaarden voldoen.\n4 Het recht op bijstand komt de echtgenoten gezamenlijk toe, tenzij een van de echtgenoten geen\
    \ recht op bijstand heeft."
  url: https://wetten.overheid.nl/BWBR0015703/2025-01-01#Artikel11
  machine_readable:
    definitions:
      MINIMUM_LEEFTIJD:
        value: 18
      BASISBEDRAG_ALLEENSTAAND_21_PLUS:
        value: 108900
      BASISBEDRAG_PARTNERS_21_PLUS:
        value: 155600
      GELDIGE_VERBLIJFSVERGUNNINGEN:
        value:
        - PERMANENT
        - EU
        - FAMILY_REUNIFICATION
      VERMOGENSGRENS_ALLEENSTAAND:
        value: 750000
      VERMOGENSGRENS_PARTNER:
        value: 1500000
      KOSTENDELERSNORM_FACTOREN:
        value:
          1: 1.0
          2: 0.5
          3: 0.43
          4: 0.4
    execution:
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: LEEFTIJD
        type: number
        source:
          regulation: wet_brp
          output: leeftijd
          service: RvIG
          parameters:
            BSN: $BSN
      - name: GEBOORTEDATUM
        type: date
        source:
          regulation: wet_brp
          output: geboortedatum
          service: RvIG
          parameters:
            BSN: $BSN
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: PENSIOENLEEFTIJD
        type: number
        source:
          regulation: algemene_ouderdomswet/leeftijdsbepaling
          output: pensioenleeftijd
          service: SVB
          parameters:
            GEBOORTEDATUM: $GEBOORTEDATUM
      - name: HEEFT_NEDERLANDSE_NATIONALITEIT
        type: boolean
        source:
          regulation: wet_brp
          output: heeft_nederlandse_nationaliteit
          service: RvIG
          parameters:
            BSN: $BSN
      - name: VERBLIJFSVERGUNNING_TYPE
        type: string
        source:
          regulation: vreemdelingenwet
          output: verblijfsvergunning_type
          service: IND
          parameters:
            BSN: $BSN
      - name: VERBLIJFSADRES
        type: string
        source:
          regulation: wet_brp
          output: verblijfsadres
          service: RvIG
          parameters:
            BSN: $BSN
      - name: INKOMEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: maandelijks_inkomen
          service: BELASTINGDIENST
          parameters:
            BSN: $BSN
      - name: BEDRIJFSINKOMEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: bedrijfsinkomen
          service: BELASTINGDIENST
          parameters:
            BSN: $BSN
      - name: BEZITTINGEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: bezittingen
          service: BELASTINGDIENST
          parameters:
            BSN: $BSN
      - name: HEEFT_PARTNER
        type: boolean
        source:
          regulation: wet_brp
          output: heeft_partner
          service: RvIG
          parameters:
            BSN: $BSN
      - name: PARTNER_BSN
        type: string
        source:
          regulation: wet_brp
          output: partner_bsn
          service: RvIG
          parameters:
            BSN: $BSN
      - name: PARTNER_INKOMEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: maandelijks_inkomen
          service: BELASTINGDIENST
          parameters:
            BSN: $PARTNER_BSN
      - name: PARTNER_BEZITTINGEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: bezittingen
          service: BELASTINGDIENST
          parameters:
            BSN: $PARTNER_BSN
      - name: HUISHOUDLEDEN
        type: number
        source:
          regulation: wet_brp
          output: huishoudgrootte
          service: RvIG
          parameters:
            BSN: $BSN
      - name: IS_STUDENT
        type: boolean
        source:
          regulation: wet_studiefinanciering
          output: is_student
          service: DUO
          parameters:
            BSN: $BSN
      - name: ONTVANGT_STUDIEFINANCIERING
        type: boolean
        source:
          regulation: wet_studiefinanciering
          output: ontvangt_studiefinanciering
          service: DUO
          parameters:
            BSN: $BSN
      - name: IS_GEDETINEERDE
        type: boolean
        source:
          regulation: penitentiaire_beginselenwet
          output: is_gedetineerd
          service: DJI
          parameters:
            BSN: $BSN
      output:
      - name: is_gerechtigd
        type: boolean
      - name: basisbedrag
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: kostendelersnorm
        type: number
        type_spec:
          precision: 2
          min: 0
          max: 1
      requirements:
      - all:
        - subject: $LEEFTIJD
          operation: GREATER_OR_EQUAL
          value: $MINIMUM_LEEFTIJD
          legal_basis:
            law: Participatiewet
            bwb_id: BWBR0015703
            article: '9'
            paragraph: '1'
            url: https://wetten.overheid.nl/BWBR0015703/2025-01-01#Hoofdstuk2_Paragraaf2.1_Artikel9
            juriconnect: jci1.3:c:BWBR0015703&artikel=9&lid=1&z=2025-01-01&g=2025-01-01
            explanation: Artikel 9 lid 1 bepaalt de minimumleeftijd van 18 jaar
        - subject: $LEEFTIJD
          operation: LESS_THAN
          value: $PENSIOENLEEFTIJD
          legal_basis:
            law: Participatiewet
            bwb_id: BWBR0015703
            article: '9'
            paragraph: '1'
            url: https://wetten.overheid.nl/BWBR0015703/2025-01-01#Hoofdstuk2_Paragraaf2.1_Artikel9
            juriconnect: jci1.3:c:BWBR0015703&artikel=9&lid=1&z=2025-01-01&g=2025-01-01
            explanation: Artikel 9 lid 1 bepaalt de maximumleeftijd als de pensioengerechtigde leeftijd
        - or:
          - subject: $HEEFT_NEDERLANDSE_NATIONALITEIT
            operation: EQUALS
            value: true
            legal_basis:
              law: Participatiewet
              bwb_id: BWBR0015703
              article: '11'
              paragraph: '1'
              url: https://wetten.overheid.nl/BWBR0015703/2025-01-01#Hoofdstuk2_Paragraaf2.2_Artikel11
              juriconnect: jci1.3:c:BWBR0015703&artikel=11&lid=1&z=2025-01-01&g=2025-01-01
              explanation: Artikel 11 lid 1 geeft Nederlanders recht op bijstand
          - operation: IN
            subject: $VERBLIJFSVERGUNNING_TYPE
            values: $GELDIGE_VERBLIJFSVERGUNNINGEN
            legal_basis:
              law: Participatiewet
              bwb_id: BWBR0015703
              article: '11'
              paragraph: '2'
              url: https://wetten.overheid.nl/BWBR0015703/2025-01-01#Hoofdstuk2_Paragraaf2.2_Artikel11
              juriconnect: jci1.3:c:BWBR0015703&artikel=11&lid=2&z=2025-01-01&g=2025-01-01
              explanation: Artikel 11 lid 2 geeft vreemdelingen met rechtmatig verblijf recht op bijstand
        - subject: $VERBLIJFSADRES
          operation: NOT_NULL
          legal_basis:
            law: Participatiewet
            bwb_id: BWBR0015703
            article: '11'
            paragraph: '1'
            url: https://wetten.overheid.nl/BWBR0015703/2025-01-01#Hoofdstuk2_Paragraaf2.2_Artikel11
            juriconnect: jci1.3:c:BWBR0015703&artikel=11&lid=1&z=2025-01-01&g=2025-01-01
            explanation: Artikel 11 lid 1 vereist dat men in Nederland verblijft
        - or:
          - subject: $IS_STUDENT
            operation: EQUALS
            value: false
            legal_basis:
              law: Participatiewet
              bwb_id: BWBR0015703
              article: '13'
              paragraph: '2'
              sentence: h
              url: https://wetten.overheid.nl/BWBR0015703/2025-01-01#Hoofdstuk2_Paragraaf2.2_Artikel13
              juriconnect: jci1.3:c:BWBR0015703&artikel=13&lid=2&z=2025-01-01&g=2025-01-01
              explanation: Artikel 13 lid 2 onder h sluit studenten uit
          - subject: $ONTVANGT_STUDIEFINANCIERING
            operation: EQUALS
            value: false
            legal_basis:
              law: Participatiewet
              bwb_id: BWBR0015703
              article: '13'
              paragraph: '2'
              sentence: h
              url: https://wetten.overheid.nl/BWBR0015703/2025-01-01#Hoofdstuk2_Paragraaf2.2_Artikel13
              juriconnect: jci1.3:c:BWBR0015703&artikel=13&lid=2&z=2025-01-01&g=2025-01-01
              explanation: Artikel 13 lid 2 onder h sluit personen met studiefinanciering uit
        - subject: $IS_GEDETINEERDE
          operation: EQUALS
          value: false
          legal_basis:
            law: Participatiewet
            bwb_id: BWBR0015703
            article: '13'
            paragraph: '1'
            sentence: a
            url: https://wetten.overheid.nl/BWBR0015703/2025-01-01#Hoofdstuk2_Paragraaf2.2_Artikel13
            juriconnect: jci1.3:c:BWBR0015703&artikel=13&lid=1&z=2025-01-01&g=2025-01-01
            explanation: Artikel 13 lid 1 onder a sluit gedetineerden uit van bijstand
        - operation: IF
          legal_basis:
            law: Participatiewet
            bwb_id: BWBR0015703
            article: '34'
            url: https://wetten.overheid.nl/BWBR0015703/2025-01-01#Hoofdstuk3_Paragraaf3.2_Artikel34
            juriconnect: jci1.3:c:BWBR0015703&artikel=34&z=2025-01-01&g=2025-01-01
            explanation: Artikel 34 bepaalt de vermogenstoets voor het recht op bijstand
          conditions:
          - test:
              subject: $HEEFT_PARTNER
              operation: EQUALS
              value: true
            then:
              operation: LESS_THAN
              legal_basis:
                law: Participatiewet
                bwb_id: BWBR0015703
                article: '34'
                paragraph: '3'
                url: https://wetten.overheid.nl/BWBR0015703/2025-01-01#Hoofdstuk3_Paragraaf3.2_Artikel34
                juriconnect: jci1.3:c:BWBR0015703&artikel=34&lid=3&z=2025-01-01&g=2025-01-01
                explanation: Artikel 34 lid 3 bepaalt de vermogensgrens voor gehuwden
              values:
              - operation: ADD
                legal_basis:
                  law: Participatiewet
                  bwb_id: BWBR0015703
                  article: '34'
                  paragraph: '2'
                  url: https://wetten.overheid.nl/BWBR0015703/2025-01-01#Hoofdstuk3_Paragraaf3.2_Artikel34
                  juriconnect: jci1.3:c:BWBR0015703&artikel=34&lid=2&z=2025-01-01&g=2025-01-01
                  explanation: Artikel 34 lid 2 bepaalt dat vermogen van beide partners meetelt
                values:
                - $BEZITTINGEN
                - $PARTNER_BEZITTINGEN
              - $VERMOGENSGRENS_PARTNER
          - else:
              operation: LESS_THAN
              legal_basis:
                law: Participatiewet
                bwb_id: BWBR0015703
                article: '34'
                paragraph: '3'
                url: https://wetten.overheid.nl/BWBR0015703/2025-01-01#Hoofdstuk3_Paragraaf3.2_Artikel34
                juriconnect: jci1.3:c:BWBR0015703&artikel=34&lid=3&z=2025-01-01&g=2025-01-01
                explanation: Artikel 34 lid 3 bepaalt de vermogensgrens voor alleenstaanden
              values:
              - $BEZITTINGEN
              - $VERMOGENSGRENS_ALLEENSTAAND
        - operation: IF
          legal_basis:
            law: Participatiewet
            bwb_id: BWBR0015703
            article: '19'
            url: https://wetten.overheid.nl/BWBR0015703/2025-01-01#Hoofdstuk3_Paragraaf3.1_Artikel19
            juriconnect: jci1.3:c:BWBR0015703&artikel=19&z=2025-01-01&g=2025-01-01
            explanation: Artikel 19 bepaalt dat bijstand wordt verleend voor zover de belanghebbende niet over voldoende middelen
              beschikt om in de noodzakelijke kosten van het bestaan te voorzien
          conditions:
          - test:
              subject: $HEEFT_PARTNER
              operation: EQUALS
              value: true
            then:
              operation: LESS_THAN
              legal_basis:
                law: Participatiewet
                bwb_id: BWBR0015703
                article: '31'
                paragraph: '2'
                url: https://wetten.overheid.nl/BWBR0015703/2025-01-01#Hoofdstuk3_Paragraaf3.2_Artikel31
                juriconnect: jci1.3:c:BWBR0015703&artikel=31&lid=2&z=2025-01-01&g=2025-01-01
                explanation: Artikel 31 lid 2 bepaalt dat het inkomen van beide partners in aanmerking wordt genomen
              values:
              - operation: ADD
                values:
                - $INKOMEN
                - $BEDRIJFSINKOMEN
                - $PARTNER_INKOMEN
              - $BASISBEDRAG_PARTNERS_21_PLUS
          - else:
              operation: LESS_THAN
              legal_basis:
                law: Participatiewet
                bwb_id: BWBR0015703
                article: '31'
                paragraph: '2'
                url: https://wetten.overheid.nl/BWBR0015703/2025-01-01#Hoofdstuk3_Paragraaf3.2_Artikel31
                juriconnect: jci1.3:c:BWBR0015703&artikel=31&lid=2&z=2025-01-01&g=2025-01-01
                explanation: Artikel 31 lid 2 bepaalt welke inkomsten in aanmerking worden genomen voor de bijstandsberekening
              values:
              - operation: ADD
                values:
                - $INKOMEN
                - $BEDRIJFSINKOMEN
              - $BASISBEDRAG_ALLEENSTAAND_21_PLUS
      actions:
      - output: is_gerechtigd
        value: true
        legal_basis:
          law: Participatiewet
          bwb_id: BWBR0015703
          article: '11'
          url: https://wetten.overheid.nl/BWBR0015703/2025-01-01#Hoofdstuk2_Paragraaf2.2_Artikel11
          juriconnect: jci1.3:c:BWBR0015703&artikel=11&z=2025-01-01&g=2025-01-01
          explanation: Als aan alle voorwaarden is voldaan, is men gerechtigd tot bijstand volgens artikel 11 dat bepaalt
            wie recht heeft op algemene bijstand
      - output: basisbedrag
        value:
          operation: IF
          conditions:
          - test:
              operation: EQUALS
              subject: $HEEFT_PARTNER
              value: true
            then: $BASISBEDRAG_PARTNERS_21_PLUS
          - else: $BASISBEDRAG_ALLEENSTAAND_21_PLUS
        legal_basis:
          law: Participatiewet
          bwb_id: BWBR0015703
          article: '20'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0015703/2025-01-01#Hoofdstuk3_Paragraaf3.1_Artikel20
          juriconnect: jci1.3:c:BWBR0015703&artikel=20&lid=1&z=2025-01-01&g=2025-01-01
          explanation: Artikel 20 lid 1 bepaalt de hoogte van de bijstandsnorm voor personen van 21 jaar en ouder afhankelijk
            van de leefsituatie
      - output: kostendelersnorm
        value:
          operation: IF
          conditions:
          - test:
              operation: IN
              subject: $HUISHOUDLEDEN
              values: $KOSTENDELERSNORM_FACTOREN
            then:
              operation: GET
              subject: $HUISHOUDLEDEN
              values: $KOSTENDELERSNORM_FACTOREN
          - else: 0.38
        legal_basis:
          law: Participatiewet
          bwb_id: BWBR0015703
          article: 22a
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0015703/2025-01-01#Hoofdstuk3_Paragraaf3.1_Artikel22a
          juriconnect: jci1.3:c:BWBR0015703&artikel=22a&lid=1&z=2025-01-01&g=2025-01-01
          explanation: Artikel 22a lid 1 bepaalt dat de bijstandsnorm wordt verlaagd wanneer belanghebbende zijn woning deelt
            met een of meer meerderjarigen (kostendelersnorm)
