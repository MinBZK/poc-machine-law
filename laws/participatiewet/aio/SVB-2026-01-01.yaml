$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: participatiewet/aio
regulatory_layer: WET
publication_date: '2026-01-01'
valid_from: '2026-01-01'
name: AIO-aanvulling
bwb_id: BWBR0015703
url: https://wetten.overheid.nl/BWBR0015703/2026-01-01
service: SVB
uuid: 4d6e8f0a-3c5b-4e7f-a8b9-1c2d3e4f5a6b
discoverable: CITIZEN
articles:
- number: 47a
  text: |-
    1 De Sociale verzekeringsbank heeft tot taak het verlenen van algemene bijstand in de vorm van een aanvullende inkomensvoorziening ouderen aan:
      a. alleenstaanden en alleenstaande ouders die de pensioengerechtigde leeftijd hebben bereikt;
      b. gehuwden, van wie beide echtgenoten de pensioengerechtigde leeftijd hebben bereikt dan wel van wie één echtgenoot de pensioengerechtigde leeftijd heeft bereikt;
    hier te lande die in zodanige omstandigheden verkeren of dreigen te geraken dat zij niet over de middelen beschikken om in de noodzakelijke kosten van het bestaan te voorzien.
    2 De artikelen 1 tot en met 6, hoofdstuk 2, met uitzondering van artikel 18, hoofdstuk 3, de paragrafen 5.1 en 5.2, hoofdstuk 6 en de artikelen 79, 80 en 81 zijn van toepassing op de uitvoering van de taak, bedoeld in het eerste lid, door de Sociale verzekeringsbank, tenzij in deze paragraaf anders is bepaald.
  url: https://wetten.overheid.nl/BWBR0015703/2026-01-01#Artikel47a
  machine_readable:
    definitions:
      norm_alleenstaand:
        value: 138000
      norm_gehuwden:
        value: 197000
      vermogensgrens_alleenstaand:
        value: 800000
      vermogensgrens_gehuwden:
        value: 1600000
      maanden_per_jaar:
        value: 12
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: bsn
        type: string
        required: true
      input:
      - name: leeftijd
        type: number
        type_spec:
          unit: years
          precision: 0
          min: 0
        source:
          regulation: wet_brp
          output: leeftijd
          service: RvIG
          parameters:
            bsn: $bsn
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: geboortedatum
        type: date
        source:
          regulation: wet_brp
          output: geboortedatum
          service: RvIG
          parameters:
            bsn: $bsn
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: pensioenleeftijd
        type: number
        type_spec:
          unit: years
          precision: 2
          min: 65
        source:
          regulation: algemene_ouderdomswet/leeftijdsbepaling
          output: pensioenleeftijd
          service: SVB
          parameters:
            geboortedatum: $geboortedatum
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: heeft_partner
        type: boolean
        source:
          regulation: wet_brp
          output: heeft_partner
          service: RvIG
          parameters:
            bsn: $bsn
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: inkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: inkomen
          service: BELASTINGDIENST
          parameters:
            bsn: $bsn
        temporal:
          type: period
          period_type: year
      - name: vermogen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: vermogen
          service: BELASTINGDIENST
          parameters:
            bsn: $bsn
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: aow_uitkering
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: algemene_ouderdomswet
          output: pensioenbedrag
          service: SVB
          parameters:
            bsn: $bsn
        temporal:
          type: period
          period_type: month
      output:
      - name: voldoet_aan_voorwaarden
        type: boolean
      - name: is_gerechtigd
        type: boolean
      - name: sociaal_minimum
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: totaal_inkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: aio_aanvulling
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      actions:
      - output: voldoet_aan_voorwaarden
        value:
          operation: AND
          conditions:
          - subject: $leeftijd
            operation: GREATER_THAN_OR_EQUAL
            value: $pensioenleeftijd
          - operation: OR
            conditions:
            - operation: AND
              conditions:
              - subject: $heeft_partner
                operation: EQUALS
                value: false
              - subject: $vermogen
                operation: LESS_THAN
                value: $vermogensgrens_alleenstaand
            - operation: AND
              conditions:
              - subject: $heeft_partner
                operation: EQUALS
                value: true
              - subject: $vermogen
                operation: LESS_THAN
                value: $vermogensgrens_gehuwden
      - output: is_gerechtigd
        value: true
        legal_basis:
          law: Participatiewet
          bwb_id: BWBR0015703
          article: 47a
          url: https://wetten.overheid.nl/BWBR0015703/2024-01-01#Hoofdstuk3_Paragraaf3.4_Artikel47a
          juriconnect: jci1.3:c:BWBR0015703&artikel=47a&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 47a: toekenning AIO-aanvulling'
      - output: sociaal_minimum
        value:
          operation: IF
          cases:
          - when:
              operation: EQUALS
              subject: $heeft_partner
              value: true
            then: $norm_gehuwden
          default: $norm_alleenstaand
        legal_basis:
          law: Participatiewet
          bwb_id: BWBR0015703
          article: '21'
          url: https://wetten.overheid.nl/BWBR0015703/2024-01-01#Hoofdstuk3_Paragraaf3.2_Artikel21
          juriconnect: jci1.3:c:BWBR0015703&artikel=21&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 21: bijstandsnorm afhankelijk van leefsituatie'
      - output: totaal_inkomen
        value:
          operation: ADD
          values:
          - $aow_uitkering
          - operation: SUBTRACT
            values:
            - operation: DIVIDE
              values:
              - $inkomen
              - $maanden_per_jaar
            - $aow_uitkering
        legal_basis:
          law: Participatiewet
          bwb_id: BWBR0015703
          article: '32'
          url: https://wetten.overheid.nl/BWBR0015703/2024-01-01#Hoofdstuk3_Paragraaf3.4_Artikel32
          juriconnect: jci1.3:c:BWBR0015703&artikel=32&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 32: totaal inkomen voor AIO-berekening'
      - output: aio_aanvulling
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - $sociaal_minimum
            - $totaal_inkomen
          - 0
        legal_basis:
          law: Participatiewet
          bwb_id: BWBR0015703
          article: 47a
          url: https://wetten.overheid.nl/BWBR0015703/2024-01-01#Hoofdstuk3_Paragraaf3.4_Artikel47a
          juriconnect: jci1.3:c:BWBR0015703&artikel=47a&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 47a: berekening AIO als verschil tussen norm en inkomen'
