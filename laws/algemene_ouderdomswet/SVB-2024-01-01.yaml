$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.0/schema.json
$id: algemene_ouderdomswet
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: AOW-uitkering
bwb_id: BWBR0002221
url: https://wetten.overheid.nl/BWBR0002221/2024-01-01
service: SVB
uuid: 13dc8a31-91eb-4598-998c-012c9129b9ea
discoverable: CITIZEN
articles:
- number: '7'
  text: ''
  url: https://wetten.overheid.nl/BWBR0002221/2024-01-01#Artikel7
  machine_readable:
    definitions:
      JAREN_VOOR_VOLLEDIG_PENSIOEN:
        value: 50
      OPBOUW_PER_JAAR:
        value: 0.02
      BASISBEDRAG_ALLEENSTAAND:
        value: 138000
      BASISBEDRAG_GEDEELD:
        value: 95200
      PARTNER_TOESLAG_MAXIMUM:
        value: 25800
      INKOMENSGRENS_PARTNER:
        value: 280000
      KORTINGSPERCENTAGE:
        value: 0.02
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: WERKZAME_VERZEKERDE_JAREN
        type: number
        type_spec:
          precision: 2
          min: 0
          max: 50
        source:
          regulation: wet_structuur_uitvoeringsorganisatie_werk_en_inkomen
          output: verzekerde_jaren
          service: UWV
          parameters:
            BSN: $BSN
        temporal:
          type: period
          period_type: continuous
      - name: GEBOORTEDATUM
        type: date
        source:
          regulation: wet_brp
          output: geboortedatum
          service: RvIG
          parameters:
            BSN: $BSN
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: PARTNER_GEBOORTEDATUM
        type: date
        source:
          regulation: wet_brp
          output: partner_geboortedatum
          service: RvIG
          parameters:
            BSN: $BSN
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: LEEFTIJD
        type: number
        type_spec:
          unit: years
          precision: 0
          min: 0
        source:
          regulation: wet_brp
          output: leeftijd
          service: RvIG
          parameters:
            BSN: $BSN
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: HEEFT_PARTNER
        type: boolean
        source:
          regulation: wet_brp
          output: heeft_partner
          service: RvIG
          parameters:
            BSN: $BSN
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: PARTNER_BSN
        type: string
        source:
          regulation: wet_brp
          output: partner_bsn
          service: RvIG
          parameters:
            BSN: $BSN
      - name: PARTNER_LEEFTIJD
        type: number
        type_spec:
          unit: years
          precision: 0
          min: 0
        source:
          regulation: wet_brp
          output: leeftijd
          service: RvIG
          parameters:
            BSN: $PARTNER_BSN
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: INKOMEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: inkomen
          service: BELASTINGDIENST
          parameters:
            BSN: $BSN
        temporal:
          type: period
          period_type: year
      - name: PARTNER_INKOMEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: partner_inkomen
          service: BELASTINGDIENST
          parameters:
            BSN: $BSN
        temporal:
          type: period
          period_type: year
      - name: PENSIOENLEEFTIJD
        type: number
        type_spec:
          unit: years
          precision: 2
          min: 65
        source:
          regulation: algemene_ouderdomswet/leeftijdsbepaling
          output: pensioenleeftijd
          service: SVB
          parameters:
            GEBOORTEDATUM: $GEBOORTEDATUM
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: PARTNER_PENSIOENLEEFTIJD
        type: number
        type_spec:
          unit: years
          precision: 2
          min: 65
        source:
          regulation: algemene_ouderdomswet/leeftijdsbepaling
          output: pensioenleeftijd
          service: SVB
          parameters:
            GEBOORTEDATUM: $PARTNER_GEBOORTEDATUM
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: WOONACHTIGE_VERZEKERDE_JAREN
        type: number
        source_reference:
          table: verzekerde_tijdvakken
          field: woonperiodes
          select_on:
          - name: bsn
            description: Burgerservicenummer van de persoon
            type: string
            value: $BSN
      output:
      - name: is_gerechtigd
        type: boolean
      - name: basisbedrag
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: opbouwpercentage
        type: number
        type_spec:
          precision: 4
          min: 0
          max: 1
      - name: pensioenbedrag
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      requirements:
      - all:
        - subject: $LEEFTIJD
          operation: GREATER_OR_EQUAL
          value: $PENSIOENLEEFTIJD
        - operation: GREATER_THAN
          values:
          - operation: ADD
            values:
            - $WOONACHTIGE_VERZEKERDE_JAREN
            - $WERKZAME_VERZEKERDE_JAREN
          - 0
      actions:
      - output: is_gerechtigd
        value: true
        legal_basis:
          law: Algemene Ouderdomswet
          bwb_id: BWBR0002221
          article: '7'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002221/2024-01-01#HoofdstukIII_Artikel7
          juriconnect: jci1.3:c:BWBR0002221&artikel=7&lid=1&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 7 lid 1 AOW: toekenning recht op ouderdomspensioen'
      - output: basisbedrag
        value:
          operation: IF
          conditions:
          - test:
              operation: EQUALS
              subject: $HEEFT_PARTNER
              value: true
            then: $BASISBEDRAG_GEDEELD
          - else: $BASISBEDRAG_ALLEENSTAAND
        legal_basis:
          law: Algemene Ouderdomswet
          bwb_id: BWBR0002221
          article: '9'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002221/2024-01-01#HoofdstukIII_Artikel9
          juriconnect: jci1.3:c:BWBR0002221&artikel=9&lid=1&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 9 lid 1 AOW bepaalt bruto-ouderdomspensioen: gehuwde 50%, ongehuwde 70% van netto-minimumloon'
      - output: opbouwpercentage
        value:
          operation: DIVIDE
          values:
          - operation: MIN
            values:
            - operation: ADD
              values:
              - $WOONACHTIGE_VERZEKERDE_JAREN
              - $WERKZAME_VERZEKERDE_JAREN
            - $JAREN_VOOR_VOLLEDIG_PENSIOEN
          - $JAREN_VOOR_VOLLEDIG_PENSIOEN
        legal_basis:
          law: Algemene Ouderdomswet
          bwb_id: BWBR0002221
          article: '13'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002221/2024-01-01#HoofdstukIII_Artikel13
          juriconnect: jci1.3:c:BWBR0002221&artikel=13&lid=1&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 13 lid 1 AOW: pensioen verminderd met 2% voor elk niet-verzekerd jaar'
      - output: pensioenbedrag
        value:
          operation: MULTIPLY
          values:
          - $basisbedrag
          - $opbouwpercentage
          - operation: IF
            conditions:
            - test:
                operation: EQUALS
                subject: $HEEFT_PARTNER
                value: true
              then:
                operation: ADD
                values:
                - 1
                - operation: IF
                  conditions:
                  - test:
                      operation: AND
                      values:
                      - operation: LESS_THAN
                        subject: $PARTNER_LEEFTIJD
                        value: $PARTNER_PENSIOENLEEFTIJD
                      - operation: LESS_THAN
                        subject: $PARTNER_INKOMEN
                        value: $INKOMENSGRENS_PARTNER
                    then:
                      operation: MIN
                      values:
                      - operation: DIVIDE
                        values:
                        - $PARTNER_TOESLAG_MAXIMUM
                        - $BASISBEDRAG_GEDEELD
                      - operation: MULTIPLY
                        values:
                        - operation: SUBTRACT
                          values:
                          - $INKOMENSGRENS_PARTNER
                          - $PARTNER_INKOMEN
                        - $KORTINGSPERCENTAGE
                  - else: 0
            - else: 1
        legal_basis:
          law: Algemene Ouderdomswet
          bwb_id: BWBR0002221
          article: '9'
          url: https://wetten.overheid.nl/BWBR0002221/2024-01-01#HoofdstukIII_Artikel9
          juriconnect: jci1.3:c:BWBR0002221&artikel=9&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 9 AOW: berekening totaal ouderdomspensioen inclusief eventuele toeslag volgens artikel 8'
