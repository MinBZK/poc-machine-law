$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.0/schema.json
$id: wet_op_de_huurtoeslag
regulatory_layer: WET
publication_date: '2025-01-01'
valid_from: '2025-01-01'
name: Huurtoeslag
bwb_id: BWBR0008659
url: https://wetten.overheid.nl/BWBR0008659/2025-01-01
service: TOESLAGEN
uuid: a611a7ea-98d5-42f5-a05c-475b1be4590e
discoverable: CITIZEN
articles:
- number: '1'
  text: ''
  url: https://wetten.overheid.nl/BWBR0008659/2025-01-01#Artikel1
  machine_readable:
    definitions:
      MINIMUM_LEEFTIJD:
        value: 18
      KWALITEITSKORTINGSGRENS:
        value: 47720
      AFTOPPINGSGRENS_1_2:
        value: 68296
      AFTOPPINGSGRENS_3_PLUS:
        value: 73193
      MAXIMALE_HUURGRENS:
        value: 90007
      VERMOGENSGRENS_ALLEENSTAANDE:
        value: 3695200
      VERMOGENSGRENS_PARTNERS:
        value: 7390400
      INKOMENSGRENS_ALLEENSTAANDE:
        value: 4400000
      INKOMENSGRENS_PARTNERS:
        value: 5400000
      SUBSIDIEPERCENTAGE_ONDER_KWALITEITSKORTINGSGRENS:
        value: 1.0
      SUBSIDIEPERCENTAGE_TUSSEN_KWALITEIT_AFTOP:
        value: 0.65
      SUBSIDIEPERCENTAGE_BOVEN_AFTOP:
        value: 0.4
      MINIMUM_BASISHUUR_PERCENTAGE:
        value: 0.0486
      MAXIMALE_SERVICEKOSTEN:
        value: 4800
      KIND_VRIJSTELLING:
        value: 543200
      LEEFTIJDSGRENS_KIND_INKOMEN:
        value: 23
      MINIMUM_INKOMENSIJKPUNT_ALLEENSTAANDE:
        value: 1800000
      MINIMUM_INKOMENSIJKPUNT_PARTNERS:
        value: 2400000
      REFERENTIE_INKOMENSIJKPUNT_ALLEENSTAANDE:
        value: 3262500
      REFERENTIE_INKOMENSIJKPUNT_PARTNERS:
        value: 4247500
      NORMHUUR_BIJ_MINIMUM_INKOMEN:
        value: 23801
      NORMHUUR_BIJ_REFERENTIE_INKOMEN:
        value: 48378
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: HUISHOUDLEDEN
        type: array
        source:
          regulation: wet_brp
          output: huishoudleden
          service: RvIG
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: KINDEREN
        type: array
        source:
          regulation: wet_brp
          output: kinderen
          service: RvIG
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: PARTNER_BSN
        type: string
        source:
          regulation: wet_brp
          output: partner_bsn
          service: RvIG
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: PARTNER_ADRES
        type: string
        source:
          regulation: wet_brp
          output: verblijfsadres
          service: RvIG
          parameters:
            BSN: $PARTNER_BSN
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: LEEFTIJD
        type: number
        source:
          regulation: wet_brp
          output: leeftijd
          service: RvIG
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: HEEFT_PARTNER
        type: boolean
        source:
          regulation: wet_brp
          output: heeft_partner
          service: RvIG
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: HUISHOUDGROOTTE
        type: number
        source:
          regulation: wet_brp
          output: huishoudgrootte
          service: RvIG
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: VERBLIJFSADRES
        type: string
        source:
          regulation: wet_brp
          output: verblijfsadres
          service: RvIG
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: INKOMEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: inkomen
          service: UWV
        temporal:
          type: period
          period_type: year
      - name: PARTNER_INKOMEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: partner_inkomen
          service: UWV
        temporal:
          type: period
          period_type: year
      - name: VERMOGEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: vermogen
          service: BELASTINGDIENST
        temporal:
          type: point_in_time
          reference: $prev_january_first
      - name: GEZAMENLIJK_VERMOGEN
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: gezamenlijk_vermogen
          service: BELASTINGDIENST
        temporal:
          type: point_in_time
          reference: $prev_january_first
      - name: HUURPRIJS
        type: amount
        source_reference:
          source_type: claim
          wallet_attribute: rent
      - name: SERVICEKOSTEN
        type: amount
        source_reference:
          source_type: claim
          wallet_attribute: service_charges
      - name: SUBSIDIABELE_SERVICEKOSTEN
        type: amount
        source_reference:
          source_type: claim
          wallet_attribute: eligible_service_charges
      output:
      - name: is_gerechtigd
        type: boolean
      - name: basishuur
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: subsidiebedrag
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      requirements:
      - all:
        - subject: $LEEFTIJD
          operation: GREATER_OR_EQUAL
          value: $MINIMUM_LEEFTIJD
          legal_basis:
            law: Wet op de huurtoeslag
            bwb_id: BWBR0008659
            article: '8'
            url: https://wetten.overheid.nl/BWBR0008659/2025-01-01#Paragraaf2_Artikel8
            juriconnect: jci1.3:c:BWBR0008659&artikel=8&z=2025-01-01&g=2025-01-01
            explanation: De aanvrager moet meerderjarig zijn voor recht op huurtoeslag conform artikel 8
        - operation: LESS_THAN
          legal_basis:
            law: Algemene wet inkomensafhankelijke regelingen
            bwb_id: BWBR0018472
            article: '7'
            url: https://wetten.overheid.nl/BWBR0018472/2025-01-01#Hoofdstuk1_Paragraaf1.3_Artikel7
            juriconnect: jci1.3:c:BWBR0018472&artikel=7&z=2025-01-01&g=2025-01-01
            explanation: Het toetsingsinkomen inclusief medebewoners en kinderen wordt bepaald conform artikel 7 AWIR
          values:
          - operation: ADD
            values:
            - $INKOMEN
            - $PARTNER_INKOMEN
            - operation: FOREACH
              subject: $HUISHOUDLEDEN
              combine: ADD
              value:
                operation: IF
                conditions:
                - test:
                    operation: GREATER_OR_EQUAL
                    values:
                    - $leeftijd
                    - 21
                  then: $inkomen
                - else:
                    operation: SUBTRACT
                    values:
                    - $inkomen
                    - $KIND_VRIJSTELLING
            - operation: FOREACH
              subject: $KINDEREN
              combine: ADD
              value:
                operation: IF
                conditions:
                - test:
                    operation: LESS_THAN
                    values:
                    - $leeftijd
                    - $LEEFTIJDSGRENS_KIND_INKOMEN
                  then:
                    operation: SUBTRACT
                    values:
                    - $inkomen
                    - $KIND_VRIJSTELLING
                - else: $inkomen
          - operation: IF
            conditions:
            - test:
                subject: $HEEFT_PARTNER
                operation: EQUALS
                value: true
              then: $INKOMENSGRENS_PARTNERS
            - else: $INKOMENSGRENS_ALLEENSTAANDE
        - operation: IF
          legal_basis:
            law: Algemene wet inkomensafhankelijke regelingen
            bwb_id: BWBR0018472
            article: '3'
            paragraph: '1'
            url: https://wetten.overheid.nl/BWBR0018472/2025-01-01#Hoofdstuk1_Paragraaf1.2_Artikel3
            juriconnect: jci1.3:c:BWBR0018472&artikel=3&lid=1&z=2025-01-01&g=2025-01-01
            explanation: Partners moeten op hetzelfde adres wonen volgens artikel 3 lid 1 AWIR
          conditions:
          - test:
              subject: $HEEFT_PARTNER
              operation: EQUALS
              value: true
            then:
              operation: EQUALS
              values:
              - $VERBLIJFSADRES
              - $PARTNER_ADRES
          - else: true
        - operation: IF
          legal_basis:
            law: Algemene wet inkomensafhankelijke regelingen
            bwb_id: BWBR0018472
            article: '8'
            url: https://wetten.overheid.nl/BWBR0018472/2025-01-01#Hoofdstuk1_Paragraaf1.3_Artikel8
            juriconnect: jci1.3:c:BWBR0018472&artikel=8&z=2025-01-01&g=2025-01-01
            explanation: De vermogenstoets wordt bepaald conform artikel 8 AWIR
          conditions:
          - test:
              subject: $HEEFT_PARTNER
              operation: EQUALS
              value: true
            then:
              operation: LESS_THAN
              values:
              - $GEZAMENLIJK_VERMOGEN
              - $VERMOGENSGRENS_PARTNERS
          - else:
              operation: LESS_THAN
              values:
              - $VERMOGEN
              - $VERMOGENSGRENS_ALLEENSTAANDE
        - operation: IF
          legal_basis:
            law: Wet op de huurtoeslag
            bwb_id: BWBR0008659
            article: '14'
            url: https://wetten.overheid.nl/BWBR0008659/2025-01-01#Paragraaf2_Artikel14
            juriconnect: jci1.3:c:BWBR0008659&artikel=14&z=2025-01-01&g=2025-01-01
            explanation: De inkomenstoets voor huurtoeslag wordt bepaald conform artikel 14
          conditions:
          - test:
              subject: $HEEFT_PARTNER
              operation: EQUALS
              value: true
            then:
              operation: LESS_THAN
              values:
              - operation: ADD
                values:
                - $INKOMEN
                - $PARTNER_INKOMEN
              - $INKOMENSGRENS_PARTNERS
          - else:
              operation: LESS_THAN
              values:
              - $INKOMEN
              - $INKOMENSGRENS_ALLEENSTAANDE
        - operation: LESS_THAN
          legal_basis:
            law: Wet op de huurtoeslag
            bwb_id: BWBR0008659
            article: '13'
            paragraph: '1'
            url: https://wetten.overheid.nl/BWBR0008659/2025-01-01#Paragraaf2_Artikel13
            juriconnect: jci1.3:c:BWBR0008659&artikel=13&lid=1&z=2025-01-01&g=2025-01-01
            explanation: De maximale huurgrens voor huurtoeslag wordt bepaald conform artikel 13 lid 1
          values:
          - operation: ADD
            values:
            - $HUURPRIJS
            - operation: MIN
              values:
              - $SUBSIDIABELE_SERVICEKOSTEN
              - $MAXIMALE_SERVICEKOSTEN
          - $MAXIMALE_HUURGRENS
      actions:
      - output: is_gerechtigd
        value: true
        legal_basis:
          law: Wet op de huurtoeslag
          bwb_id: BWBR0008659
          article: '7'
          url: https://wetten.overheid.nl/BWBR0008659/2025-01-01#Paragraaf2_Artikel7
          juriconnect: jci1.3:c:BWBR0008659&artikel=7&z=2025-01-01&g=2025-01-01
          explanation: Het recht op huurtoeslag wordt toegekend als aan alle voorwaarden wordt voldaan conform artikel 7
      - output: basishuur
        value:
          operation: IF
          conditions:
          - test:
              operation: LESS_OR_EQUAL
              subject:
                operation: IF
                conditions:
                - test:
                    operation: EQUALS
                    subject: $HEEFT_PARTNER
                    value: true
                  then:
                    operation: ADD
                    values:
                    - $INKOMEN
                    - $PARTNER_INKOMEN
                - else: $INKOMEN
              value:
                operation: IF
                conditions:
                - test:
                    operation: EQUALS
                    subject: $HEEFT_PARTNER
                    value: true
                  then: $MINIMUM_INKOMENSIJKPUNT_PARTNERS
                - else: $MINIMUM_INKOMENSIJKPUNT_ALLEENSTAANDE
            then: $NORMHUUR_BIJ_MINIMUM_INKOMEN
          - else:
              operation: ADD
              values:
              - $NORMHUUR_BIJ_MINIMUM_INKOMEN
              - operation: MULTIPLY
                values:
                - operation: DIVIDE
                  values:
                  - operation: SUBTRACT
                    values:
                    - operation: IF
                      conditions:
                      - test:
                          operation: EQUALS
                          subject: $HEEFT_PARTNER
                          value: true
                        then:
                          operation: ADD
                          values:
                          - $INKOMEN
                          - $PARTNER_INKOMEN
                      - else: $INKOMEN
                    - operation: IF
                      conditions:
                      - test:
                          operation: EQUALS
                          subject: $HEEFT_PARTNER
                          value: true
                        then: $MINIMUM_INKOMENSIJKPUNT_PARTNERS
                      - else: $MINIMUM_INKOMENSIJKPUNT_ALLEENSTAANDE
                  - operation: SUBTRACT
                    values:
                    - operation: IF
                      conditions:
                      - test:
                          operation: EQUALS
                          subject: $HEEFT_PARTNER
                          value: true
                        then: $REFERENTIE_INKOMENSIJKPUNT_PARTNERS
                      - else: $REFERENTIE_INKOMENSIJKPUNT_ALLEENSTAANDE
                    - operation: IF
                      conditions:
                      - test:
                          operation: EQUALS
                          subject: $HEEFT_PARTNER
                          value: true
                        then: $MINIMUM_INKOMENSIJKPUNT_PARTNERS
                      - else: $MINIMUM_INKOMENSIJKPUNT_ALLEENSTAANDE
                - operation: SUBTRACT
                  values:
                  - $NORMHUUR_BIJ_REFERENTIE_INKOMEN
                  - $NORMHUUR_BIJ_MINIMUM_INKOMEN
        legal_basis:
          law: Wet op de huurtoeslag
          bwb_id: BWBR0008659
          article: '19'
          url: https://wetten.overheid.nl/BWBR0008659/2025-01-01#Paragraaf3_Artikel19
          juriconnect: jci1.3:c:BWBR0008659&artikel=19&z=2025-01-01&g=2025-01-01
          explanation: De basishuur is gelijk aan de normhuur berekend op basis van inkomen conform artikel 19
      - output: subsidiebedrag
        value:
          operation: ADD
          values:
          - operation: MULTIPLY
            values:
            - operation: MIN
              values:
              - operation: MAX
                values:
                - 0
                - operation: SUBTRACT
                  values:
                  - operation: ADD
                    values:
                    - $HUURPRIJS
                    - $SUBSIDIABELE_SERVICEKOSTEN
                  - $basishuur
              - operation: SUBTRACT
                values:
                - $KWALITEITSKORTINGSGRENS
                - $basishuur
            - $SUBSIDIEPERCENTAGE_ONDER_KWALITEITSKORTINGSGRENS
          - operation: MULTIPLY
            values:
            - operation: MAX
              values:
              - 0
              - operation: MIN
                values:
                - operation: SUBTRACT
                  values:
                  - operation: ADD
                    values:
                    - $HUURPRIJS
                    - $SUBSIDIABELE_SERVICEKOSTEN
                  - $KWALITEITSKORTINGSGRENS
                - operation: SUBTRACT
                  values:
                  - operation: IF
                    conditions:
                    - test:
                        operation: LESS_OR_EQUAL
                        subject: $HUISHOUDGROOTTE
                        value: 2
                      then: $AFTOPPINGSGRENS_1_2
                    - else: $AFTOPPINGSGRENS_3_PLUS
                  - $KWALITEITSKORTINGSGRENS
            - $SUBSIDIEPERCENTAGE_TUSSEN_KWALITEIT_AFTOP
          - operation: MULTIPLY
            values:
            - operation: MAX
              values:
              - 0
              - operation: SUBTRACT
                values:
                - operation: ADD
                  values:
                  - $HUURPRIJS
                  - $SUBSIDIABELE_SERVICEKOSTEN
                - operation: IF
                  conditions:
                  - test:
                      operation: LESS_OR_EQUAL
                      subject: $HUISHOUDGROOTTE
                      value: 2
                    then: $AFTOPPINGSGRENS_1_2
                  - else: $AFTOPPINGSGRENS_3_PLUS
            - $SUBSIDIEPERCENTAGE_BOVEN_AFTOP
        legal_basis:
          law: Wet op de huurtoeslag
          bwb_id: BWBR0008659
          article: '21'
          url: https://wetten.overheid.nl/BWBR0008659/2025-01-01#Paragraaf3_Artikel21
          juriconnect: jci1.3:c:BWBR0008659&artikel=21&z=2025-01-01&g=2025-01-01
          explanation: De hoogte van de huurtoeslag wordt berekend volgens de formule in artikel 21
