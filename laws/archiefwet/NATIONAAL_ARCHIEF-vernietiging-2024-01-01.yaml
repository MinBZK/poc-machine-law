$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: archiefwet/vernietiging
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Archiefwet - Vernietiging archiefbescheiden
bwb_id: BWBR0007376
url: https://wetten.overheid.nl/BWBR0007376/2024-01-01
service: NATIONAAL_ARCHIEF
uuid: 81c1b431-545b-4a8a-b1e2-eacfc6c3915a
articles:
- number: '5'
  text: '1. De zorgdrager is verplicht tot het ontwerpen van selectielijsten waarin tenminste wordt aangegeven welke archiefbescheiden voor vernietiging in aanmerking komen. 2. De lijsten worden vastgesteld, voor zover het betreft: a. archiefbescheiden van de Eerste en de Tweede Kamer der Staten-Generaal, de andere Hoge Colleges van Staat en het Kabinet van de Koning: bij koninklijk besluit, op voordracht van Onze minister, in overeenstemming met het betrokken overheidsorgaan; b. archiefbescheiden van de ministeries: door Onze minister en Onze minister wie het mede aangaat; c. archiefbescheiden van andere overheidsorganen: door Onze minister. 3. Een besluit tot vaststelling van een selectielijst wordt bekendgemaakt in de Staatscourant.'
  url: https://wetten.overheid.nl/BWBR0007376/2024-01-01#Artikel5
  machine_readable:
    definitions:
      MINIMALE_BEWAARTERMIJN_JAREN:
        value: 0
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: ARCHIEFSTUK_ID
        type: string
        required: true
      - name: AANMAAKDATUM
        type: date
        required: true
      - name: DOCUMENTTYPE
        type: string
        required: true
      - name: OP_SELECTIELIJST_VERNIETIGING
        type: boolean
        required: true
      - name: BEWAARTERMIJN_JAREN
        type: number
        type_spec:
          unit: years
          precision: 0
          min: 0
      - name: SELECTIELIJST_VASTGESTELD
        type: boolean
        required: true
      - name: SELECTIELIJST_GEPUBLICEERD
        type: boolean
        required: true
      output:
      - name: mag_vernietigd_worden
        type: boolean
      - name: vernietig_vanaf_datum
        type: date
      - name: reden_niet_vernietigen
        type: string
      actions:
      - output: mag_vernietigd_worden
        value:
          operation: AND
          values:
          - operation: EQUALS
            subject: $OP_SELECTIELIJST_VERNIETIGING
            value: true
          - operation: EQUALS
            subject: $SELECTIELIJST_VASTGESTELD
            value: true
          - operation: EQUALS
            subject: $SELECTIELIJST_GEPUBLICEERD
            value: true
          - operation: IF
            conditions:
            - test:
                operation: NOT_NULL
                subject: $BEWAARTERMIJN_JAREN
              then:
                operation: GREATER_OR_EQUAL
                subject:
                  operation: SUBTRACT_DATE
                  unit: years
                  values:
                  - $calculation_date
                  - $AANMAAKDATUM
                value: $BEWAARTERMIJN_JAREN
            - else: true
        legal_basis:
          law: Archiefwet 1995
          bwb_id: BWBR0007376
          article: '3'
          url: https://wetten.overheid.nl/BWBR0007376/2024-01-01#Hoofdstuk2_Artikel3
          juriconnect: jci1.3:c:BWBR0007376&artikel=3&z=2024-01-01&g=2024-01-01
          explanation: Artikel 3 bepaalt de zorgplicht voor vernietiging van daarvoor in aanmerking komende archiefbescheiden
      - output: vernietig_vanaf_datum
        value:
          operation: IF
          conditions:
          - test:
              operation: AND
              values:
              - operation: EQUALS
                subject: $OP_SELECTIELIJST_VERNIETIGING
                value: true
              - operation: NOT_NULL
                subject: $BEWAARTERMIJN_JAREN
            then:
              operation: ADD_DATE
              unit: years
              values:
              - $AANMAAKDATUM
              - $BEWAARTERMIJN_JAREN
          - else: null
        legal_basis:
          law: Archiefwet 1995
          bwb_id: BWBR0007376
          article: '5'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0007376/2024-01-01#Hoofdstuk2_Artikel5
          juriconnect: jci1.3:c:BWBR0007376&artikel=5&lid=1&z=2024-01-01&g=2024-01-01
          explanation: De selectielijst bepaalt de termijn na welke vernietiging plaats mag vinden
      - output: reden_niet_vernietigen
        value:
          operation: IF
          conditions:
          - test:
              operation: EQUALS
              subject: $mag_vernietigd_worden
              value: false
            then:
              operation: IF
              conditions:
              - test:
                  operation: EQUALS
                  subject: $OP_SELECTIELIJST_VERNIETIGING
                  value: false
                then: Archiefstuk komt niet voor op een selectielijst voor vernietiging (mogelijk blijvend te bewaren)
              - test:
                  operation: EQUALS
                  subject: $SELECTIELIJST_VASTGESTELD
                  value: false
                then: Selectielijst is niet formeel vastgesteld volgens artikel 5 lid 2 Archiefwet
              - test:
                  operation: EQUALS
                  subject: $SELECTIELIJST_GEPUBLICEERD
                  value: false
                then: Selectielijst is niet bekendgemaakt in de Staatscourant volgens artikel 5 lid 3 Archiefwet
              - test:
                  operation: AND
                  values:
                  - operation: NOT_NULL
                    subject: $BEWAARTERMIJN_JAREN
                  - operation: LESS_THAN
                    subject:
                      operation: SUBTRACT_DATE
                      unit: years
                      values:
                      - $calculation_date
                      - $AANMAAKDATUM
                    value: $BEWAARTERMIJN_JAREN
                then: Bewaartermijn is nog niet verstreken
              - else: Onbekende reden
          - else: null
        legal_basis:
          law: Archiefwet 1995
          bwb_id: BWBR0007376
          article: '5'
          url: https://wetten.overheid.nl/BWBR0007376/2024-01-01#Hoofdstuk2_Artikel5
          juriconnect: jci1.3:c:BWBR0007376&artikel=5&z=2024-01-01&g=2024-01-01
          explanation: Artikel 5 bepaalt de voorwaarden voor vernietiging
