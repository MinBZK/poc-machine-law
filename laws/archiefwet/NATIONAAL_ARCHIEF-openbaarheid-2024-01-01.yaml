$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.0/schema.json
$id: archiefwet/openbaarheid
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Archiefwet - Openbaarheid archiefbescheiden
bwb_id: BWBR0007376
url: https://wetten.overheid.nl/BWBR0007376/2024-01-01
service: NATIONAAL_ARCHIEF
uuid: 3fc7f637-fe3e-44c8-a735-98f11584c2c9
articles:
- number: '15'
  text: ''
  url: https://wetten.overheid.nl/BWBR0007376/2024-01-01#Artikel15
  machine_readable:
    definitions:
      MAXIMALE_BEPERKING_JAREN:
        value: 75
      BEPERKING_PRIVACY:
        value: PRIVACY
      BEPERKING_STAATSBELANG:
        value: STAATSBELANG
      BEPERKING_ONEVENREDIGE_GEVOLGEN:
        value: ONEVENREDIGE_GEVOLGEN
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: ARCHIEFSTUK_ID
        type: string
        required: true
      - name: AANMAAKDATUM
        type: date
        required: true
      - name: OVERBRENGDATUM
        type: date
      - name: BEPERKING_TYPE
        type: string
      - name: BEPERKING_TERMIJN_JAREN
        type: number
        type_spec:
          unit: years
          precision: 0
          min: 0
          max: 75
      - name: MINISTERRAAD_BESLUIT_STAATSBELANG
        type: boolean
      output:
      - name: is_openbaar
        type: boolean
      - name: beperking_reden
        type: string
      - name: openbaar_vanaf_datum
        type: date
      actions:
      - output: is_openbaar
        value:
          operation: OR
          values:
          - operation: AND
            values:
            - operation: IS_NULL
              subject: $BEPERKING_TYPE
            - operation: NOT_NULL
              subject: $OVERBRENGDATUM
          - operation: AND
            values:
            - operation: GREATER_OR_EQUAL
              subject:
                operation: SUBTRACT_DATE
                unit: years
                values:
                - $calculation_date
                - $AANMAAKDATUM
              value: $MAXIMALE_BEPERKING_JAREN
            - operation: OR
              values:
              - operation: NOT_EQUALS
                subject: $BEPERKING_TYPE
                value: $BEPERKING_STAATSBELANG
              - operation: AND
                values:
                - operation: EQUALS
                  subject: $BEPERKING_TYPE
                  value: $BEPERKING_STAATSBELANG
                - operation: EQUALS
                  subject: $MINISTERRAAD_BESLUIT_STAATSBELANG
                  value: false
          - operation: AND
            values:
            - operation: NOT_NULL
              subject: $BEPERKING_TERMIJN_JAREN
            - operation: NOT_NULL
              subject: $OVERBRENGDATUM
            - operation: GREATER_OR_EQUAL
              subject:
                operation: SUBTRACT_DATE
                unit: years
                values:
                - $calculation_date
                - $OVERBRENGDATUM
              value: $BEPERKING_TERMIJN_JAREN
        legal_basis:
          law: Archiefwet 1995
          bwb_id: BWBR0007376
          article: '15'
          url: https://wetten.overheid.nl/BWBR0007376/2024-01-01#Hoofdstuk2_Artikel15
          juriconnect: jci1.3:c:BWBR0007376&artikel=15&z=2024-01-01&g=2024-01-01
          explanation: Artikel 15 bepaalt de voorwaarden voor openbaarheid van archiefbescheiden
      - output: beperking_reden
        value:
          operation: IF
          conditions:
          - test:
              operation: EQUALS
              subject: $is_openbaar
              value: false
            then:
              operation: IF
              conditions:
              - test:
                  operation: EQUALS
                  subject: $BEPERKING_TYPE
                  value: $BEPERKING_PRIVACY
                then: Beperkt vanwege eerbiediging van de persoonlijke levenssfeer
              - test:
                  operation: EQUALS
                  subject: $BEPERKING_TYPE
                  value: $BEPERKING_STAATSBELANG
                then: Beperkt vanwege het belang van de Staat of zijn bondgenoten
              - test:
                  operation: EQUALS
                  subject: $BEPERKING_TYPE
                  value: $BEPERKING_ONEVENREDIGE_GEVOLGEN
                then: Beperkt om onevenredige bevoordeling of benadeling te voorkomen
              - else: Beperkt, reden onbekend
          - else: null
        legal_basis:
          law: Archiefwet 1995
          bwb_id: BWBR0007376
          article: '15'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0007376/2024-01-01#Hoofdstuk2_Artikel15
          juriconnect: jci1.3:c:BWBR0007376&artikel=15&lid=1&z=2024-01-01&g=2024-01-01
          explanation: Artikel 15 lid 1 noemt de drie gronden voor beperkingen
      - output: openbaar_vanaf_datum
        value:
          operation: IF
          conditions:
          - test:
              operation: EQUALS
              subject: $is_openbaar
              value: false
            then:
              operation: IF
              conditions:
              - test:
                  operation: AND
                  values:
                  - operation: EQUALS
                    subject: $BEPERKING_TYPE
                    value: $BEPERKING_STAATSBELANG
                  - operation: EQUALS
                    subject: $MINISTERRAAD_BESLUIT_STAATSBELANG
                    value: true
                then: null
              - else:
                  operation: ADD_DATE
                  unit: years
                  values:
                  - $AANMAAKDATUM
                  - $MAXIMALE_BEPERKING_JAREN
          - else: null
        legal_basis:
          law: Archiefwet 1995
          bwb_id: BWBR0007376
          article: '15'
          paragraph: '4'
          url: https://wetten.overheid.nl/BWBR0007376/2024-01-01#Hoofdstuk2_Artikel15
          juriconnect: jci1.3:c:BWBR0007376&artikel=15&lid=4&z=2024-01-01&g=2024-01-01
          explanation: Artikel 15 lid 4 bepaalt dat beperkingen niet gelden voor archiefbescheiden ouder dan 75 jaar
