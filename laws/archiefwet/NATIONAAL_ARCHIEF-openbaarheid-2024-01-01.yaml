$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: archiefwet/openbaarheid
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Archiefwet - Openbaarheid archiefbescheiden
bwb_id: BWBR0007376
url: https://wetten.overheid.nl/BWBR0007376/2024-01-01
service: NATIONAAL_ARCHIEF
uuid: 3fc7f637-fe3e-44c8-a735-98f11584c2c9
articles:
- number: '15'
  text: '1. Bij de overbrenging van de in artikel 1, onder c 1° en 2°, bedoelde archiefbescheiden
    kan de zorgdrager, na advies van de beheerder van de archiefbewaarplaats, slechts
    beperkingen aan de openbaarheid stellen voor een bepaalde termijn en met het oog
    op: a. de eerbiediging van de persoonlijke levenssfeer; b. het belang van de Staat
    of zijn bondgenoten; c. de onevenredige benadeling van een ander belang dan genoemd
    in onderdeel a of onderdeel b. Voor zover de beheerder van een archiefbewaarplaats
    een rijksarchivaris is als bedoeld in artikel 26, tweede lid, wordt het advies,
    bedoeld in de eerste volzin, gevraagd aan de algemene rijksarchivaris, bedoeld
    in artikel 25, eerste lid. 2. De zorgdrager ten aanzien van de in de archiefbewaarplaats
    berustende archiefbescheiden kan, na de in het eerste lid bedoelde overbrenging,
    niet alsnog beperkingen als bedoeld in het eerste lid stellen, tenzij zich na
    het tijdstip van overbrenging omstandigheden hebben voorgedaan die, waren zij
    op dat tijdstip bekend geweest, tot het stellen van beperkingen aan de openbaarheid
    ingevolge het eerste lid zouden hebben geleid. 3. De zorgdrager ten aanzien van
    de in de archiefbewaarplaats berustende archiefbescheiden, kan, gehoord degene
    op wiens last de archiefbescheiden zijn overgebracht, de ingevolge het eerste
    of het tweede lid aan de openbaarheid gestelde beperkingen opheffen, dan wel ten
    aanzien van een verzoeker buiten toepassing laten, indien het belang van de gestelde
    beperking niet opweegt tegen diens belang tot raadpleging of gebruik van de archiefbescheiden.
    4. Ingevolge het eerste of het tweede lid aan de openbaarheid gestelde beperkingen
    hebben geen betrekking op archiefbescheiden die ouder zijn dan vijfenzeventig
    jaar, tenzij door Onze minister dan wel, indien het archiefbescheiden betreft
    voor de bewaring waarvan een andere dan een rijksarchiefbewaarplaats of een provinciale
    archiefbewaarplaats is aangewezen, door gedeputeerde staten anders wordt beslist.
    5. Het derde lid is niet van toepassing op archiefbescheiden aan de openbaarheid
    waarvan beperkingen zijn gesteld met het oog op het belang van de Staat of zijn
    bondgenoten. 6. In geval van archiefbescheiden die het belang van de Staat of
    zijn bondgenoten betreffen vindt het vierde lid slechts toepassing voor zover
    de ministerraad niet anders beslist. 7. Met betrekking tot de in het vijfde lid
    bedoelde archiefbescheiden zijn van toepassing de regelingen inzake het recht
    op informatie die zouden gelden indien de archiefbescheiden niet naar een archiefbewaarplaats
    waren overgebracht.'
  url: https://wetten.overheid.nl/BWBR0007376/2024-01-01#Artikel15
  machine_readable:
    definitions:
      maximale_beperking_jaren: 75
      beperking_privacy: PRIVACY
      beperking_staatsbelang: STAATSBELANG
      beperking_onevenredige_gevolgen: ONEVENREDIGE_GEVOLGEN
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: archiefstuk_id
        type: string
        required: true
      - name: aanmaakdatum
        type: date
        required: true
      - name: overbrengdatum
        type: date
      - name: beperking_type
        type: string
      - name: beperking_termijn_jaren
        type: number
        type_spec:
          unit: years
          precision: 0
          min: 0
          max: 75
      - name: ministerraad_besluit_staatsbelang
        type: boolean
      output:
      - name: is_openbaar
        type: boolean
      - name: beperking_reden
        type: string
      - name: openbaar_vanaf_datum
        type: date
      actions:
      - output: is_openbaar
        value:
          operation: OR
          conditions:
          - operation: AND
            conditions:
            - operation: IS_NULL
              subject: $beperking_type
            - operation: EXISTS
              subject: $overbrengdatum
          - operation: AND
            conditions:
            - operation: GREATER_THAN_OR_EQUAL
              subject:
                operation: AGE
                reference_date: $referencedate
                date_of_birth: $aanmaakdatum
              value: $maximale_beperking_jaren
            - operation: OR
              conditions:
              - operation: NOT
                value:
                  operation: EQUALS
                  subject: $beperking_type
                  value: $beperking_staatsbelang
              - operation: AND
                conditions:
                - operation: EQUALS
                  subject: $beperking_type
                  value: $beperking_staatsbelang
                - operation: EQUALS
                  subject: $ministerraad_besluit_staatsbelang
                  value: false
          - operation: AND
            conditions:
            - operation: EXISTS
              subject: $beperking_termijn_jaren
            - operation: EXISTS
              subject: $overbrengdatum
            - operation: GREATER_THAN_OR_EQUAL
              subject:
                operation: AGE
                reference_date: $referencedate
                date_of_birth: $overbrengdatum
              value: $beperking_termijn_jaren
        legal_basis:
          law: Archiefwet 1995
          bwb_id: BWBR0007376
          article: '15'
          url: https://wetten.overheid.nl/BWBR0007376/2024-01-01#Hoofdstuk2_Artikel15
          juriconnect: jci1.3:c:BWBR0007376&artikel=15&z=2024-01-01&g=2024-01-01
          explanation: Artikel 15 bepaalt de voorwaarden voor openbaarheid van archiefbescheiden
      - output: beperking_reden
        value:
          operation: IF
          cases:
          - when:
              operation: EQUALS
              subject: $is_openbaar
              value: false
            then:
              operation: IF
              cases:
              - when:
                  operation: EQUALS
                  subject: $beperking_type
                  value: $beperking_privacy
                then: Beperkt vanwege eerbiediging van de persoonlijke levenssfeer
              - when:
                  operation: EQUALS
                  subject: $beperking_type
                  value: $beperking_staatsbelang
                then: Beperkt vanwege het belang van de Staat of zijn bondgenoten
              - when:
                  operation: EQUALS
                  subject: $beperking_type
                  value: $beperking_onevenredige_gevolgen
                then: Beperkt om onevenredige bevoordeling of benadeling te voorkomen
              default: Beperkt, reden onbekend
        legal_basis:
          law: Archiefwet 1995
          bwb_id: BWBR0007376
          article: '15'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0007376/2024-01-01#Hoofdstuk2_Artikel15
          juriconnect: jci1.3:c:BWBR0007376&artikel=15&lid=1&z=2024-01-01&g=2024-01-01
          explanation: Artikel 15 lid 1 noemt de drie gronden voor beperkingen
      - output: openbaar_vanaf_datum
        value:
          operation: IF
          cases:
          - when:
              operation: EQUALS
              subject: $is_openbaar
              value: false
            then:
              operation: IF
              cases:
              - when:
                  operation: AND
                  conditions:
                  - operation: EQUALS
                    subject: $beperking_type
                    value: $beperking_staatsbelang
                  - operation: EQUALS
                    subject: $ministerraad_besluit_staatsbelang
                    value: true
                then: null
              default:
                operation: DATE_ADD
                date: $aanmaakdatum
                years: $maximale_beperking_jaren
        legal_basis:
          law: Archiefwet 1995
          bwb_id: BWBR0007376
          article: '15'
          paragraph: '4'
          url: https://wetten.overheid.nl/BWBR0007376/2024-01-01#Hoofdstuk2_Artikel15
          juriconnect: jci1.3:c:BWBR0007376&artikel=15&lid=4&z=2024-01-01&g=2024-01-01
          explanation: Artikel 15 lid 4 bepaalt dat beperkingen niet gelden voor archiefbescheiden
            ouder dan 75 jaar
