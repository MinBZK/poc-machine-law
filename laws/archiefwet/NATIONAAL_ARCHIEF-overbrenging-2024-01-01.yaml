$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: archiefwet/overbrenging
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Archiefwet - Overbrenging archiefbescheiden
bwb_id: BWBR0007376
url: https://wetten.overheid.nl/BWBR0007376/2024-01-01
service: NATIONAAL_ARCHIEF
uuid: 5cebc6f0-caa4-4f2f-908e-37c0fcb7337a
articles:
- number: '12'
  text: 1. De zorgdrager brengt de archiefbescheiden die niet voor vernietiging in
    aanmerking komen en ouder zijn dan twintig jaar over naar een archiefbewaarplaats.
    2. Bij of krachtens algemene maatregel van bestuur worden regels gesteld, die
    bij de overbrenging van archiefbescheiden in acht dienen te worden genomen.
  url: https://wetten.overheid.nl/BWBR0007376/2024-01-01#Artikel12
  machine_readable:
    definitions:
      minimale_leeftijd_jaren: 20
      maximale_termijn_overbrengen_jaren: 10
      uiterste_leeftijd_jaren: 30
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: archiefstuk_id
        type: string
        required: true
      - name: aanmaakdatum
        type: date
        required: true
      - name: voor_vernietiging
        type: boolean
        required: true
      - name: veelvuldig_gebruik
        type: boolean
      - name: opschortingsmachtiging
        type: boolean
      output:
      - name: moet_overgebracht_worden
        type: boolean
      - name: uiterste_overbrengdatum
        type: date
      actions:
      - output: moet_overgebracht_worden
        value:
          operation: AND
          conditions:
          - operation: EQUALS
            subject: $voor_vernietiging
            value: false
          - operation: GREATER_THAN_OR_EQUAL
            subject:
              operation: AGE
              reference_date: $referencedate
              date_of_birth: $aanmaakdatum
            value: $minimale_leeftijd_jaren
          - operation: OR
            conditions:
            - operation: NOT
              value:
                operation: EQUALS
                subject: $opschortingsmachtiging
                value: true
            - operation: NOT
              value:
                operation: EQUALS
                subject: $veelvuldig_gebruik
                value: true
        legal_basis:
          law: Archiefwet 1995
          bwb_id: BWBR0007376
          article: '12'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0007376/2024-01-01#Hoofdstuk2_Artikel12
          juriconnect: jci1.3:c:BWBR0007376&artikel=12&lid=1&z=2024-01-01&g=2024-01-01
          explanation: Artikel 12 lid 1 bepaalt wanneer archiefbescheiden overgebracht
            moeten worden
      - output: uiterste_overbrengdatum
        value:
          operation: IF
          cases:
          - when:
              operation: EQUALS
              subject: $moet_overgebracht_worden
              value: true
            then:
              operation: DATE_ADD
              date: $aanmaakdatum
              years: $uiterste_leeftijd_jaren
        legal_basis:
          law: Archiefbesluit 1995
          bwb_id: BWBR0007748
          article: '11'
          url: https://wetten.overheid.nl/BWBR0007748/2020-01-01#Artikel11
          juriconnect: jci1.3:c:BWBR0007748&artikel=11&z=2020-01-01&g=2020-01-01
          explanation: Artikel 11 Archiefbesluit bepaalt de uiterste termijn voor
            overbrenging
