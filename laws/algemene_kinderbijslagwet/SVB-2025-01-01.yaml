articles:
- number: '6'
  text: "1 Verzekerd overeenkomstig de bepalingen van deze wet is degene, die\n  a.\
    \ ingezetene is;\n  b. geen ingezetene is, doch ter zake van in Nederland of op\
    \ het continentaal plat in dienstbetrekking verrichte arbeid aan de loonbelasting\
    \ is onderworpen.\n2 Niet verzekerd is de vreemdeling die niet rechtmatig in Nederland\
    \ verblijf houdt in de zin van artikel 8, onder a tot en met e en l, van de Vreemdelingenwet\
    \ 2000.\n3 Bij of krachtens algemene maatregel van bestuur kan, in afwijking van\
    \ het eerste en tweede lid, uitbreiding dan wel beperking worden gegeven aan de\
    \ kring der verzekerden.\n4 Bij een maatregel, als bedoeld in het derde lid, kan\
    \ worden bepaald dat bij een niet rechtmatig verblijf in Nederland in de zin van\
    \ artikel 8, onder a tot en met e en l, verzekerd zijn:\n  a. vreemdelingen die\
    \ rechtmatig in Nederland arbeid verrichten, dan wel hebben verricht;\n  b. vreemdelingen\
    \ die, na rechtmatig verblijf te hebben gehouden in de zin van artikel 8, onder\
    \ a tot en met e en l, van de Vreemdelingenwet 2000, rechtmatig in Nederland verblijf\
    \ hebben als bedoeld in artikel 8, onder g of h, van de Vreemdelingenwet 2000."
  url: https://wetten.overheid.nl/BWBR0002368/2020-01-01#Artikel6
