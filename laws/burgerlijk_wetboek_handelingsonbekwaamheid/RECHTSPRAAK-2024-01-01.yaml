$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: burgerlijk_wetboek_handelingsonbekwaamheid
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Bepalen handelingsonbekwaamheid volwassenen
bwb_id: BWBR0002656
url: https://wetten.overheid.nl/BWBR0002656/2024-01-01
service: RECHTSPRAAK
uuid: 9f2a3b4c-1d5e-4f6a-b7c8-2e3d4f5a6b7c
discoverable: DELEGATION_PROVIDER
articles:
- number: '381'
  text: '1 De curatele werkt met ingang van de dag waarop zij is uitgesproken. In het geval, bedoeld in artikel 378, tweede
    lid, werkt de curatele met ingang van het tijdstip waarop de onder curatele gestelde meerderjarig wordt.

    2 Van deze tijdstippen is de onder curatele gestelde onbekwaam rechtshandelingen te verrichten voor zover de wet niet
    anders bepaalt.

    3 Een onder curatele gestelde is bekwaam rechtshandelingen te verrichten met toestemming van zijn curator, voor zover
    deze bevoegd is die rechtshandelingen voor de onder curatele gestelde te verrichten. De toestemming kan slechts worden
    verleend voor een bepaalde rechtshandeling of voor een bepaald doel. De toestemming voor een bepaald doel moet schriftelijk
    worden verleend.

    4 Met betrekking tot aangelegenheden betreffende verzorging, verpleging, behandeling en begeleiding van een onder curatele
    gestelde zijn de artikelen 453 en 454 van dit boek van overeenkomstige toepassing.

    5 Hij is bekwaam over gelden die zijn curator voor levensonderhoud te zijner beschikking heeft gesteld, overeenkomstig
    deze bestemming te beschikken.

    6 In zaken van curatele is degene wiens curatele het betreft bekwaam in rechte op te treden en tegen een uitspraak beroep
    in te stellen.'
  url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Artikel381
  machine_readable:
    definitions:
      HANDELINGSONBEKWAME_RECHTEN:
        value:
        - LEZEN
      VOLLEDIGE_RECHTEN:
        value:
        - LEZEN
        - CLAIMS_INDIENEN
        - BESLUITEN_ONTVANGEN
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: ANDERE_HANDELING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: CURATELE_ALS_CURANDUS
        type: array
        source_reference:
          table: curatele_registraties
          fields:
          - bsn_curator
          - bsn_curandus
          - naam_curandus
          - datum_ingang
          - datum_einde
          - status
          select_on:
          - name: bsn_curandus
            description: BSN van de persoon als curandus
            type: string
            value: $BSN
      output:
      - name: is_onder_curatele
        type: boolean
      - name: is_handelingsonbekwaam
        type: boolean
      - name: base_permissions
        type: array
      - name: curator_bsn
        type: string
      - name: heeft_delegaties
        type: boolean
      - name: subject_ids
        type: array
      - name: subject_names
        type: array
      - name: subject_types
        type: array
      - name: delegation_types
        type: array
      - name: permissions
        type: array
      - name: valid_from_dates
        type: array
      - name: valid_until_dates
        type: array
      actions:
      - output: actieve_curatele
        value:
          operation: FOREACH
          subject: $CURATELE_ALS_CURANDUS
          where:
            operation: AND
            values:
            - operation: EQUALS
              subject: $current.status
              value: ACTIEF
            - operation: OR
              values:
              - operation: IS_NULL
                subject: $current.datum_einde
              - operation: EQUALS
                subject: $current.datum_einde
                value: ''
              - operation: GREATER_THAN
                subject: $current.datum_einde
                value: $calculation_date
          value: $current
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '389'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling3_Artikel389
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=389&z=2024-01-01&g=2024-01-01
          explanation: 'Art. 1:389 BW: curatele eindigt door opheffing. Alleen actieve curatele zonder einddatum of met toekomstige
            einddatum is van kracht.

            '
      - output: is_onder_curatele
        value:
          operation: EXISTS
          subject: $actieve_curatele
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '381'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling1_Artikel381
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=381&lid=1&z=2024-01-01&g=2024-01-01
          explanation: Persoon staat onder curatele als er actieve registratie is
      - output: is_handelingsonbekwaam
        value: $is_onder_curatele
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '381'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling1_Artikel381
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=381&lid=1&z=2024-01-01&g=2024-01-01
          explanation: 'Art. 1:381 lid 1 BW: onder curatele gestelden zijn handelingsonbekwaam'
      - output: curator_bsn
        value:
          operation: COALESCE
          values:
          - $actieve_curatele.bsn_curator
          - null
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '386'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling2_Artikel386
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=386&z=2024-01-01&g=2024-01-01
          explanation: BSN van curator uit curatele registratie
      - output: base_permissions
        value:
          operation: IF
          conditions:
          - test: $is_handelingsonbekwaam
            then: $HANDELINGSONBEKWAME_RECHTEN
          - else: $VOLLEDIGE_RECHTEN
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '381'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling1_Artikel381
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=381&lid=1&z=2024-01-01&g=2024-01-01
          explanation: 'Art. 1:381 lid 1 BW: handelingsonbekwamen kunnen geen rechtshandelingen zelfstandig verrichten. Zij
            hebben alleen leesrecht.

            '
      - output: heeft_delegaties
        value: true
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '381'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling1_Artikel381
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=381&z=2024-01-01&g=2024-01-01
          explanation: Iedereen heeft een SELF delegatie
      - output: subject_ids
        value:
        - $BSN
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '381'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling1_Artikel381
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=381&z=2024-01-01&g=2024-01-01
          explanation: BSN van de persoon zelf
      - output: subject_names
        value:
        - Mezelf
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '381'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling1_Artikel381
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=381&z=2024-01-01&g=2024-01-01
          explanation: Weergavenaam voor SELF delegatie
      - output: subject_types
        value:
        - SELF
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '381'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling1_Artikel381
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=381&z=2024-01-01&g=2024-01-01
          explanation: SELF type voor eigen zaken
      - output: delegation_types
        value:
        - EIGEN_ZAKEN
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '381'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling1_Artikel381
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=381&z=2024-01-01&g=2024-01-01
          explanation: EIGEN_ZAKEN type voor SELF delegatie
      - output: permissions
        value:
        - $base_permissions
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '381'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling1_Artikel381
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=381&lid=1&z=2024-01-01&g=2024-01-01
          explanation: Rechten afhankelijk van handelingsbekwaamheid
      - output: valid_from_dates
        value:
        - null
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '381'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel19_Afdeling1_Artikel381
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=381&z=2024-01-01&g=2024-01-01
          explanation: SELF delegatie heeft geen ingangsdatum
      - output: valid_until_dates
