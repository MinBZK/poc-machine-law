$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: faillissementswet_curator
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Bepalen faillissementscurator en vertegenwoordigingsbevoegdheid curator boedel
bwb_id: BWBR0001860
url: https://wetten.overheid.nl/BWBR0001860/2024-01-01
service: RECHTSPRAAK
uuid: e1199fc0-2fbc-4bc7-aab5-e4f3790a5cc7
discoverable: DELEGATION_PROVIDER
articles:
- number: '68'
  text: |-
    1 De curator is belast met het beheer en de vereffening van de failliete boedel.
    2 De curator:
      a. beziet bij het beheer en de vereffening van de failliete boedel of er sprake is van onregelmatigheden die het faillissement, althans mede, hebben veroorzaakt, de vereffening van de failliete boedel bemoeilijken of het tekort in het faillissement hebben vergroot;
      b. informeert hierover de rechter-commissaris vertrouwelijk; en
      c. doet, zo hij of de rechter-commissaris dit nodig acht, melding of aangifte van onregelmatigheden bij de bevoegde instanties.
    3 Alvorens in rechte op te treden, behalve waar het verificatiegeschillen betreft, alsmede in de gevallen van de artikelen 37, 39, 40, 58, tweede lid, 60, tweede en derde lid, en 60a, eerste lid, behoeft de curator machtiging van de rechter-commissaris.
    4 Ingeval in Nederland geen secundaire insolventieprocedure is geopend, wordt de machtiging tot beëindiging van arbeidsovereenkomsten, bedoeld in artikel 13 van de in artikel 5, derde lid, genoemde verordening op verzoek van de insolventiefunctionaris in de hoofdinsolventieprocedure verleend door de rechter-commissaris van de rechtbank, aangewezen in artikel 2. De rechtbank benoemt de rechter-commissaris binnen vijf werkdagen na ontvangst van dit machtigingsverzoek.
  url: https://wetten.overheid.nl/BWBR0001860/2024-01-01#Artikel68
  machine_readable:
    definitions:
      CURATOR_BOEDEL_RECHTEN:
        value:
        - LEZEN
        - CLAIMS_INDIENEN
        - BESLUITEN_ONTVANGEN
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: ANDERE_HANDELING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: FAILLISSEMENT_REGISTRATIES
        type: array
        source_reference:
          table: faillissement_registraties
          fields:
          - gefailleerde_id
          - gefailleerde_naam
          - gefailleerde_type
          - insolventie_nummer
          - datum_uitspraak
          - datum_einde
          - status
          select_on:
          - name: bsn_curator
            description: BSN nummer van de curator
            type: string
            value: $BSN
      output:
      - name: heeft_delegaties
        type: boolean
      - name: subject_ids
        type: array
      - name: subject_names
        type: array
      - name: subject_types
        type: array
      - name: delegation_types
        type: array
      - name: permissions
        type: array
      - name: valid_from_dates
        type: array
      - name: valid_until_dates
        type: array
      requirements:
      - operation: NOT
        value:
          operation: IS_NULL
          subject: $FAILLISSEMENT_REGISTRATIES
        legal_basis:
          law: Faillissementswet
          bwb_id: BWBR0001860
          article: '19'
          url: https://wetten.overheid.nl/BWBR0001860/2024-01-01#TiteldeelI_Artikel19
          juriconnect: jci1.3:c:BWBR0001860&artikel=19&z=2024-01-01&g=2024-01-01
          explanation: Persoon moet als curator zijn geregistreerd in het CIR
      actions:
      - output: actieve_faillissementen
        value:
          operation: FOREACH
          subject: $FAILLISSEMENT_REGISTRATIES
          where:
            operation: AND
            conditions:
            - operation: EQUALS
              subject: $current.status
              value: ACTIEF
            - operation: OR
              conditions:
              - operation: IS_NULL
                subject: $current.datum_einde
              - operation: EQUALS
                subject: $current.datum_einde
                value: ''
              - operation: GREATER_THAN
                subject: $current.datum_einde
                value: $calculation_date
          value: $current
        legal_basis:
          law: Faillissementswet
          bwb_id: BWBR0001860
          article: '193'
          url: https://wetten.overheid.nl/BWBR0001860/2024-01-01#TiteldeelI_Artikel193
          juriconnect: jci1.3:c:BWBR0001860&artikel=193&z=2024-01-01&g=2024-01-01
          explanation: |
            Alleen actieve faillissementen geven curatorbevoegdheid. Art. 193 Fw: faillissement eindigt bij vereffening of opheffing.
      - output: heeft_delegaties
        value:
          operation: NOT
          value:
            operation: IS_NULL
            subject: $actieve_faillissementen
        legal_basis:
          law: Faillissementswet
          bwb_id: BWBR0001860
          article: '68'
          url: https://wetten.overheid.nl/BWBR0001860/2024-01-01#TiteldeelI_Artikel68
          juriconnect: jci1.3:c:BWBR0001860&artikel=68&z=2024-01-01&g=2024-01-01
          explanation: |
            Art. 68 Fw bepaalt dat de curator de failliete boedel beheert.
      - output: subject_ids
        value: $actieve_faillissementen.gefailleerde_id
        legal_basis:
          law: Faillissementswet
          bwb_id: BWBR0001860
          article: '19'
          url: https://wetten.overheid.nl/BWBR0001860/2024-01-01#TiteldeelI_Artikel19
          juriconnect: jci1.3:c:BWBR0001860&artikel=19&z=2024-01-01&g=2024-01-01
          explanation: Identifiers van gefailleerden uit CIR registratie
      - output: subject_names
        value:
          operation: FOREACH
          subject: $actieve_faillissementen
          value:
            operation: CONCAT
            values:
            - 'Boedel '
            - $current.gefailleerde_naam
        legal_basis:
          law: Faillissementswet
          bwb_id: BWBR0001860
          article: '68'
          url: https://wetten.overheid.nl/BWBR0001860/2024-01-01#TiteldeelI_Artikel68
          juriconnect: jci1.3:c:BWBR0001860&artikel=68&z=2024-01-01&g=2024-01-01
          explanation: Namen met 'Boedel' prefix om boedelvertegenwoordiging aan te geven
      - output: subject_types
        value:
          operation: FOREACH
          subject: $actieve_faillissementen
          value:
            operation: IF
            cases:
            - when:
                operation: EQUALS
                subject: $current.gefailleerde_type
                value: RECHTSPERSOON
              then: BUSINESS
            default: CITIZEN
        legal_basis:
          law: Faillissementswet
          bwb_id: BWBR0001860
          article: '1'
          url: https://wetten.overheid.nl/BWBR0001860/2024-01-01#TiteldeelI_Artikel1
          juriconnect: jci1.3:c:BWBR0001860&artikel=1&z=2024-01-01&g=2024-01-01
          explanation: Type afhankelijk van gefailleerde (persoon of rechtspersoon)
      - output: delegation_types
        value:
          operation: FOREACH
          subject: $actieve_faillissementen
          value: CURATOR_BOEDEL
        legal_basis:
          law: Faillissementswet
          bwb_id: BWBR0001860
          article: '68'
          url: https://wetten.overheid.nl/BWBR0001860/2024-01-01#TiteldeelI_Artikel68
          juriconnect: jci1.3:c:BWBR0001860&artikel=68&z=2024-01-01&g=2024-01-01
          explanation: Type delegatie is CURATOR_BOEDEL voor faillissementscurator
      - output: permissions
        value:
          operation: FOREACH
          subject: $actieve_faillissementen
          value: $CURATOR_BOEDEL_RECHTEN
        legal_basis:
          law: Faillissementswet
          bwb_id: BWBR0001860
          article: '68'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0001860/2024-01-01#TiteldeelI_Artikel68
          juriconnect: jci1.3:c:BWBR0001860&artikel=68&lid=1&z=2024-01-01&g=2024-01-01
          explanation: |
            Art. 68 lid 1 Fw: De curator beheert en vereffent de failliete boedel.
      - output: valid_from_dates
        value: $actieve_faillissementen.datum_uitspraak
        legal_basis:
          law: Faillissementswet
          bwb_id: BWBR0001860
          article: '14'
          url: https://wetten.overheid.nl/BWBR0001860/2024-01-01#TiteldeelI_Artikel14
          juriconnect: jci1.3:c:BWBR0001860&artikel=14&z=2024-01-01&g=2024-01-01
          explanation: Datum faillietverklaring uit CIR
      - output: valid_until_dates
        value: $actieve_faillissementen.datum_einde
        legal_basis:
          law: Faillissementswet
          bwb_id: BWBR0001860
          article: '193'
          url: https://wetten.overheid.nl/BWBR0001860/2024-01-01#TiteldeelI_Artikel193
          juriconnect: jci1.3:c:BWBR0001860&artikel=193&z=2024-01-01&g=2024-01-01
          explanation: Einddatum faillissement, null indien nog actief
