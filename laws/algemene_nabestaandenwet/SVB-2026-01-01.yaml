$id: algemene_nabestaandenwet
regulatory_layer: WET
publication_date: '2026-01-01'
valid_from: '2026-01-01'
name: Anw-uitkering
bwb_id: BWBR0007795
url: https://wetten.overheid.nl/BWBR0007795/2026-01-01
service: SVB
uuid: 3c5d7e9f-2b4a-4f6c-9d8e-0a1b2c3d4e5f
discoverable: CITIZEN
articles:
- number: '14'
  text: "1 Recht op nabestaandenuitkering heeft de nabestaande die:\n  a. een ongehuwd\
    \ kind heeft, dat jonger is dan 18 jaar en niet tot het huishouden van een ander\
    \ behoort; of\n  b. arbeidsongeschikt is\n  1°. op en sedert de dag van overlijden\
    \ van de verzekerde, of\n  2°. op en sedert de laatste dag van de maand waarin\
    \ hij niet meer voldoet aan de voorwaarde bedoeld in onderdeel a, en wiens arbeidsongeschiktheid\
    \ na de onderscheidenlijk onder 1° en 2° bedoelde dag ten minste drie maanden\
    \ voortduurt, dan wel ten aanzien van wie aannemelijk is dat de arbeidsongeschiktheid\
    \ ten minste drie maanden na de vorenbedoelde dag zal voortduren.\n2 Het recht\
    \ op nabestaandenuitkering gaat in op de eerste dag van de maand van overlijden\
    \ van de verzekerde.\n3 Voor de nabestaande die op de dag van overlijden van de\
    \ verzekerde niet voldoet aan de voorwaarde, genoemd in het eerste lid, onderdeel\
    \ a, omdat het kind op het moment van overlijden tot het huishouden van een ander\
    \ behoort, gaat het recht op nabestaandenuitkering in op de eerste dag van de\
    \ maand waarin hij als gevolg van het overlijden wel aan die voorwaarde voldoet.\n\
    4 Voor de nabestaande die geen recht heeft op een nabestaandenuitkering op grond\
    \ van artikel 15, eerste lid, onderdeel d, gaat het recht op een nabestaandenuitkering\
    \ in op de eerste dag van de maand dat hij, uiterlijk binnen zes maanden na het\
    \ overlijden van de verzekerde, deze gezamenlijke huishouding niet meer voert.\n\
    5 De Sociale verzekeringsbank kan, in afwijking van het vierde lid, een langere\
    \ termijn vaststellen indien de toepassing wat de termijn van zes maanden betreft,\
    \ zal leiden tot een onbillijkheid van overwegende aard."
  url: https://wetten.overheid.nl/BWBR0007795/2026-01-01#Artikel14
  machine_readable:
    definitions:
      bruto_uitkering: 146500
      vrijlating_maandelijks: 77000
      ao_drempel: 45
      maanden_per_jaar: 12
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: bsn
        type: string
        required: true
      input:
      - name: leeftijd
        type: number
        type_spec:
          unit: years
          precision: 0
          min: 0
        source:
          regulation: wet_brp
          output: leeftijd
          service: RvIG
          parameters:
            bsn: $bsn
        temporal:
          type: point_in_time
          reference: $referencedate
      - name: geboortedatum
        type: date
        source:
          regulation: wet_brp
          output: geboortedatum
          service: RvIG
          parameters:
            bsn: $bsn
        temporal:
          type: point_in_time
          reference: $referencedate
      - name: pensioenleeftijd
        type: number
        type_spec:
          unit: years
          precision: 2
          min: 65
        source:
          regulation: algemene_ouderdomswet/leeftijdsbepaling
          output: pensioenleeftijd
          service: SVB
          parameters:
            geboortedatum: $geboortedatum
        temporal:
          type: point_in_time
          reference: $referencedate
      - name: inkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: inkomen
          service: BELASTINGDIENST
          parameters:
            bsn: $bsn
        temporal:
          type: period
          period_type: year
      - name: partner_verzekerd
        type: boolean
        source: {}
      - name: overlijdensdatum_partner
        type: date
        source: {}
      - name: ao_percentage
        type: number
        source: {}
      - name: heeft_kinderen_onder_18
        type: boolean
        source: {}
      output:
      - name: voldoet_aan_voorwaarden
        type: boolean
      - name: is_gerechtigd
        type: boolean
      - name: bruto_uitkering
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: inkomenskorting
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: netto_uitkering
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      actions:
      - output: voldoet_aan_voorwaarden
        value:
          operation: AND
          conditions:
          - subject: $partner_verzekerd
            operation: EQUALS
            value: true
          - operation: EXISTS
            subject: $overlijdensdatum_partner
          - subject: $leeftijd
            operation: LESS_THAN
            value: $pensioenleeftijd
          - operation: OR
            conditions:
            - subject: $heeft_kinderen_onder_18
              operation: EQUALS
              value: true
            - subject: $ao_percentage
              operation: GREATER_THAN_OR_EQUAL
              value: $ao_drempel
      - output: is_gerechtigd
        value: true
        legal_basis:
          law: Algemene nabestaandenwet
          bwb_id: BWBR0007795
          article: '14'
          url: https://wetten.overheid.nl/BWBR0007795/2024-01-01#Hoofdstuk3_Paragraaf1_Artikel14
          juriconnect: jci1.3:c:BWBR0007795&artikel=14&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 14 Anw: toekenning recht op nabestaandenuitkering'
      - output: bruto_uitkering
        value: $bruto_uitkering
        legal_basis:
          law: Algemene nabestaandenwet
          bwb_id: BWBR0007795
          article: '17'
          url: https://wetten.overheid.nl/BWBR0007795/2024-01-01#Hoofdstuk3_Paragraaf1_Artikel17
          juriconnect: jci1.3:c:BWBR0007795&artikel=17&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 17 Anw: hoogte nabestaandenuitkering is 70% netto
            minimumloon'
      - output: inkomenskorting
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - operation: DIVIDE
              values:
              - $inkomen
              - $maanden_per_jaar
            - $vrijlating_maandelijks
          - 0
        legal_basis:
          law: Algemene nabestaandenwet
          bwb_id: BWBR0007795
          article: '18'
          url: https://wetten.overheid.nl/BWBR0007795/2024-01-01#Hoofdstuk3_Paragraaf2_Artikel18
          juriconnect: jci1.3:c:BWBR0007795&artikel=18&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 18 Anw: inkomensverrekening met vrijlating'
      - output: netto_uitkering
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - $bruto_uitkering
            - $inkomenskorting
          - 0
        legal_basis:
          law: Algemene nabestaandenwet
          bwb_id: BWBR0007795
          article: '18'
          url: https://wetten.overheid.nl/BWBR0007795/2024-01-01#Hoofdstuk3_Paragraaf2_Artikel18
          juriconnect: jci1.3:c:BWBR0007795&artikel=18&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 18 Anw: netto uitkering na inkomensverrekening'
