$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.0/schema.json
$id: algemene_wet_bestuursrecht
regulatory_layer: WET
publication_date: '1994-01-01'
valid_from: '1994-01-01'
name: Bestuursorgaan Definitie
url: https://wetten.overheid.nl/1994-01-01
service: AWB
uuid: 7b2c4d8e-3f91-4a6b-9c5e-8d7f6a5b4c3d
discoverable: BUSINESS
articles:
- number: '1'
  text: ''
  url: https://wetten.overheid.nl/1994-01-01#Artikel1
  machine_readable:
    definitions:
      TWEE_DERDE_DREMPEL:
        value: 66.67
    execution:
      parameters:
      - name: ORGANISATIE_ID
        type: string
        required: true
      input:
      - name: IS_ORGAAN_VAN_RECHTSPERSOON
        type: boolean
        source_reference:
          source_type: AWB
          table: organisaties
          field: is_orgaan_van_rechtspersoon
          select_on:
          - name: organisatie_id
            description: Identifier van de organisatie
            type: string
            value: $ORGANISATIE_ID
      - name: PUBLIEKRECHTELIJKE_RECHTSPERSOON_TYPE
        type: string
        source_reference:
          source_type: AWB
          table: organisaties
          field: publiekrechtelijke_rechtspersoon_type
          select_on:
          - name: organisatie_id
            description: Identifier van de organisatie
            type: string
            value: $ORGANISATIE_ID
      - name: HEEFT_PUBLIEKRECHTELIJKE_BEVOEGDHEID
        type: boolean
        source_reference:
          source_type: AWB
          table: organisaties
          field: heeft_publiekrechtelijke_bevoegdheid
          select_on:
          - name: organisatie_id
            description: Identifier van de organisatie
            type: string
            value: $ORGANISATIE_ID
      - name: BEVOEGDHEID_BIJ_OF_KRACHTENS_WET
        type: boolean
        source_reference:
          source_type: AWB
          table: organisaties
          field: bevoegdheid_bij_of_krachtens_wet
          select_on:
          - name: organisatie_id
            description: Identifier van de organisatie
            type: string
            value: $ORGANISATIE_ID
      - name: OVERHEIDSFINANCIERING_PERCENTAGE
        type: number
        source_reference:
          source_type: AWB
          table: organisaties
          field: overheidsfinanciering_percentage
          select_on:
          - name: organisatie_id
            description: Identifier van de organisatie
            type: string
            value: $ORGANISATIE_ID
      - name: CRITERIA_DOOR_OVERHEID_BEPAALD
        type: boolean
        source_reference:
          source_type: AWB
          table: organisaties
          field: criteria_door_overheid_bepaald
          select_on:
          - name: organisatie_id
            description: Identifier van de organisatie
            type: string
            value: $ORGANISATIE_ID
      - name: IS_UITSLUITEND_FINANCIELE_UITKERING
        type: boolean
        source_reference:
          source_type: AWB
          table: organisaties
          field: is_uitsluitend_financiele_uitkering
          select_on:
          - name: organisatie_id
            description: Identifier van de organisatie
            type: string
            value: $ORGANISATIE_ID
      - name: IS_VOLKSVERTEGENWOORDIGEND_ORGAAN
        type: boolean
        source_reference:
          source_type: AWB
          table: organisaties
          field: is_volksvertegenwoordigend_orgaan
          select_on:
          - name: organisatie_id
            description: Identifier van de organisatie
            type: string
            value: $ORGANISATIE_ID
      - name: IS_RECHTERLIJK_ORGAAN
        type: boolean
        source_reference:
          source_type: AWB
          table: organisaties
          field: is_rechterlijk_orgaan
          select_on:
          - name: organisatie_id
            description: Identifier van de organisatie
            type: string
            value: $ORGANISATIE_ID
      - name: IS_OMBUDSMAN
        type: boolean
        source_reference:
          source_type: AWB
          table: organisaties
          field: is_ombudsman
          select_on:
          - name: organisatie_id
            description: Identifier van de organisatie
            type: string
            value: $ORGANISATIE_ID
      - name: IS_ALGEMENE_REKENKAMER
        type: boolean
        source_reference:
          source_type: AWB
          table: organisaties
          field: is_algemene_rekenkamer
          select_on:
          - name: organisatie_id
            description: Identifier van de organisatie
            type: string
            value: $ORGANISATIE_ID
      output:
      - name: is_bestuursorgaan
        type: boolean
      - name: bestuursorgaan_type
        type: string
      - name: exclusion_reason
        type: string
      - name: is_excluded
        type: boolean
      - name: qualifies_as_bestuursorgaan
        type: boolean
      - name: is_a_orgaan
        type: boolean
      - name: is_b_orgaan
        type: boolean
      actions:
      - output: is_excluded
        value:
          operation: OR
          values:
          - operation: EQUALS
            subject: $IS_VOLKSVERTEGENWOORDIGEND_ORGAAN
            value: true
          - operation: EQUALS
            subject: $IS_RECHTERLIJK_ORGAAN
            value: true
          - operation: EQUALS
            subject: $IS_OMBUDSMAN
            value: true
          - operation: EQUALS
            subject: $IS_ALGEMENE_REKENKAMER
            value: true
      - output: qualifies_as_bestuursorgaan
        value:
          operation: OR
          values:
          - operation: AND
            values:
            - operation: EQUALS
              subject: $IS_ORGAAN_VAN_RECHTSPERSOON
              value: true
            - operation: IN
              subject: $PUBLIEKRECHTELIJKE_RECHTSPERSOON_TYPE
              values:
              - RIJK
              - PROVINCIE
              - WATERSCHAP
              - GEMEENTE
              - OPENBAAR_LICHAAM
          - operation: AND
            values:
            - operation: EQUALS
              subject: $HEEFT_PUBLIEKRECHTELIJKE_BEVOEGDHEID
              value: true
            - operation: EQUALS
              subject: $BEVOEGDHEID_BIJ_OF_KRACHTENS_WET
              value: true
            - operation: EQUALS
              subject: $IS_UITSLUITEND_FINANCIELE_UITKERING
              value: false
          - operation: AND
            values:
            - operation: EQUALS
              subject: $IS_UITSLUITEND_FINANCIELE_UITKERING
              value: true
            - operation: GREATER_OR_EQUAL
              subject: $OVERHEIDSFINANCIERING_PERCENTAGE
              value: $TWEE_DERDE_DREMPEL
            - operation: EQUALS
              subject: $CRITERIA_DOOR_OVERHEID_BEPAALD
              value: true
      - output: is_bestuursorgaan
        value:
          operation: AND
          values:
          - operation: EQUALS
            subject: $qualifies_as_bestuursorgaan
            value: true
          - operation: NOT_EQUALS
            subject: $is_excluded
            value: true
      - output: is_a_orgaan
        value:
          operation: AND
          values:
          - operation: EQUALS
            subject: $IS_ORGAAN_VAN_RECHTSPERSOON
            value: true
          - operation: IN
            subject: $PUBLIEKRECHTELIJKE_RECHTSPERSOON_TYPE
            values:
            - RIJK
            - PROVINCIE
            - WATERSCHAP
            - GEMEENTE
            - OPENBAAR_LICHAAM
      - output: is_b_orgaan
        value:
          operation: OR
          values:
          - operation: AND
            values:
            - operation: EQUALS
              subject: $HEEFT_PUBLIEKRECHTELIJKE_BEVOEGDHEID
              value: true
            - operation: EQUALS
              subject: $BEVOEGDHEID_BIJ_OF_KRACHTENS_WET
              value: true
            - operation: EQUALS
              subject: $IS_UITSLUITEND_FINANCIELE_UITKERING
              value: false
          - operation: AND
            values:
            - operation: EQUALS
              subject: $IS_UITSLUITEND_FINANCIELE_UITKERING
              value: true
            - operation: GREATER_OR_EQUAL
              subject: $OVERHEIDSFINANCIERING_PERCENTAGE
              value: $TWEE_DERDE_DREMPEL
            - operation: EQUALS
              subject: $CRITERIA_DOOR_OVERHEID_BEPAALD
              value: true
      - output: bestuursorgaan_type
        value: GEEN_BESTUURSORGAAN
      - output: bestuursorgaan_type
        value:
          operation: STATIC
          condition:
            operation: AND
            values:
            - operation: EQUALS
              subject: $is_bestuursorgaan
              value: true
            - operation: EQUALS
              subject: $is_a_orgaan
              value: true
          value: A_ORGAAN
      - output: bestuursorgaan_type
        value:
          operation: STATIC
          condition:
            operation: AND
            values:
            - operation: EQUALS
              subject: $is_bestuursorgaan
              value: true
            - operation: EQUALS
              subject: $is_b_orgaan
              value: true
          value: B_ORGAAN
      - output: exclusion_reason
        value:
          operation: STATIC
          condition:
            operation: EQUALS
            subject: $IS_VOLKSVERTEGENWOORDIGEND_ORGAAN
            value: true
          value: VOLKSVERTEGENWOORDIGEND_ORGAAN
      - output: exclusion_reason
        value:
          operation: STATIC
          condition:
            operation: EQUALS
            subject: $IS_RECHTERLIJK_ORGAAN
            value: true
          value: RECHTERLIJK_ORGAAN
      - output: exclusion_reason
        value:
          operation: STATIC
          condition:
            operation: EQUALS
            subject: $IS_OMBUDSMAN
            value: true
          value: OMBUDSMAN
      - output: exclusion_reason
        value:
          operation: STATIC
          condition:
            operation: EQUALS
            subject: $IS_ALGEMENE_REKENKAMER
            value: true
          value: ALGEMENE_REKENKAMER
