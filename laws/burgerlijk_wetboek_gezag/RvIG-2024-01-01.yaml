$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: burgerlijk_wetboek_gezag
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Bepalen vertegenwoordigingsbevoegdheid minderjarigen
bwb_id: BWBR0002656
url: https://wetten.overheid.nl/BWBR0002656/2024-01-01
service: RvIG
uuid: a87bbb48-0bde-487a-af4d-3dc7f4a7c220
discoverable: DELEGATION_PROVIDER
articles:
- number: '245'
  text: |-
    1 Minderjarigen staan onder gezag.
    2 Onder gezag wordt verstaan ouderlijk gezag dan wel voogdij.
    3 Ouderlijk gezag wordt door de ouders gezamenlijk of door één ouder uitgeoefend. Voogdij wordt door een ander dan een ouder uitgeoefend.
    4 Het gezag heeft betrekking op de persoon van de minderjarige, het bewind over zijn vermogen en zijn vertegenwoordiging in burgerlijke handelingen, zowel in als buiten rechte.
    5 Het gezag van de ouder die dit krachtens artikel 253sa of krachtens een rechterlijke beslissing overeenkomstig artikel 253t samen met een ander dan een ouder uitoefent, wordt aangemerkt als ouderlijk gezag dat door ouders gezamenlijk wordt uitgeoefend, tenzij uit een wettelijke bepaling het tegendeel voortvloeit.
  url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Artikel245
  machine_readable:
    definitions:
      bevoegde_gezag_typen:
        value:
        - OUDERLIJK_GEZAG
        - GEZAMENLIJK_GEZAG
        - VOOGDIJ
        - VOOGDIJ_INSTELLING
      meerderjarigheid_leeftijd:
        value: 18
      gezag_rechten:
        value:
        - LEZEN
        - CLAIMS_INDIENEN
        - BESLUITEN_ONTVANGEN
      beperkte_gezag_rechten:
        value:
        - LEZEN
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: ANDERE_HANDELING
      parameters:
      - name: bsn
        type: string
        required: true
      input:
      - name: gezag_relaties
        type: array
        source_reference:
          table: gezag_relaties
          fields:
          - bsn_kind
          - naam_kind
          - geboortedatum_kind
          - type_gezag
          - datum_ingang
          - datum_einde
          - status
          - heeft_handlichting
          select_on:
          - name: bsn_gezagdrager
            description: BSN nummer van de gezagsdrager
            type: string
            value: $bsn
      output:
      - name: voldoet_aan_voorwaarden
        type: boolean
      - name: heeft_delegaties
        type: boolean
      - name: subject_ids
        type: array
      - name: subject_names
        type: array
      - name: subject_types
        type: array
      - name: delegation_types
        type: array
      - name: permissions
        type: array
      - name: valid_from_dates
        type: array
      - name: valid_until_dates
        type: array
      actions:
      - output: voldoet_aan_voorwaarden
        value:
          operation: NOT
          value:
            operation: IS_NULL
            subject: $gezag_relaties
      - output: bevoegde_gezag_relaties
        value:
          operation: FOREACH
          collection: $gezag_relaties
          filter:
            operation: AND
            conditions:
            - operation: IN
              subject: $current.type_gezag
              values: $bevoegde_gezag_typen
            - operation: EQUALS
              subject: $current.status
              value: ACTIEF
            - operation: LESS_THAN
              subject:
                operation: AGE
                reference_date: $referencedate
                date_of_birth: $current.geboortedatum_kind
              value: $meerderjarigheid_leeftijd
            - operation: OR
              conditions:
              - operation: IS_NULL
                subject: $current.datum_einde
              - operation: EQUALS
                subject: $current.datum_einde
                value: ''
              - operation: GREATER_THAN
                subject: $current.datum_einde
                value: $referencedate
          body: $current
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '245'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel14_Artikel245
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=245&lid=1&z=2024-01-01&g=2024-01-01
          explanation: |
            Art. 1:245 lid 1 BW: alleen geldig gezag (ouderlijk gezag of voogdij) over minderjarigen geeft vertegenwoordigingsbevoegdheid. Art. 1:233 BW: minderjarigen zijn personen onder 18 jaar.
      - output: heeft_delegaties
        value:
          operation: NOT
          value:
            operation: IS_NULL
            subject: $bevoegde_gezag_relaties
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '245'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel14_Artikel245
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=245&z=2024-01-01&g=2024-01-01
          explanation: |
            Art. 1:245 BW bepaalt dat ouders/voogden met gezag de minderjarige vertegenwoordigen.
      - output: subject_ids
        value: $bevoegde_gezag_relaties.bsn_kind
        legal_basis:
          law: Wet basisregistratie personen
          bwb_id: BWBR0033715
          article: '2.9'
          url: https://wetten.overheid.nl/BWBR0033715/2024-01-01#Hoofdstuk2_Paragraaf2.2_Artikel2.9
          juriconnect: jci1.3:c:BWBR0033715&artikel=2.9&z=2024-01-01&g=2024-01-01
          explanation: BSN nummers van minderjarigen uit gezagsregistratie
      - output: subject_names
        value: $bevoegde_gezag_relaties.naam_kind
        legal_basis:
          law: Wet basisregistratie personen
          bwb_id: BWBR0033715
          article: '2.7'
          url: https://wetten.overheid.nl/BWBR0033715/2024-01-01#Hoofdstuk2_Paragraaf2.2_Artikel2.7
          juriconnect: jci1.3:c:BWBR0033715&artikel=2.7&z=2024-01-01&g=2024-01-01
          explanation: Namen uit persoonsgegevens in BRP
      - output: subject_types
        value:
          operation: FOREACH
          collection: $bevoegde_gezag_relaties
          body: CITIZEN
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '233'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel13_Artikel233
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=233&z=2024-01-01&g=2024-01-01
          explanation: Minderjarigen zijn natuurlijke personen, altijd CITIZEN
      - output: delegation_types
        value: $bevoegde_gezag_relaties.type_gezag
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '245'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel14_Artikel245
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=245&z=2024-01-01&g=2024-01-01
          explanation: Type gezag uit BRP gezagsregistratie
      - output: permissions
        value:
          operation: FOREACH
          collection: $bevoegde_gezag_relaties
          body:
            operation: IF
            cases:
            - when:
                operation: EQUALS
                subject: $current.heeft_handlichting
                value: true
              then: $beperkte_gezag_rechten
            default: $gezag_rechten
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '235'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel13_Afdeling2_Artikel235
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=235&z=2024-01-01&g=2024-01-01
          explanation: |
            Art. 1:235 BW: bij handlichting heeft de minderjarige zelf bepaalde handelingsbevoegdheden. De ouder/voogd heeft dan beperkte rechten voor die gebieden waar het kind zelf bevoegd is.
      - output: valid_from_dates
        value: $bevoegde_gezag_relaties.datum_ingang
        legal_basis:
          law: Wet basisregistratie personen
          bwb_id: BWBR0033715
          article: '2.9'
          url: https://wetten.overheid.nl/BWBR0033715/2024-01-01#Hoofdstuk2_Paragraaf2.2_Artikel2.9
          juriconnect: jci1.3:c:BWBR0033715&artikel=2.9&z=2024-01-01&g=2024-01-01
          explanation: Ingangsdatum gezagsregistratie uit BRP
      - output: valid_until_dates
        value: $bevoegde_gezag_relaties.datum_einde
        legal_basis:
          law: Burgerlijk Wetboek Boek 1
          bwb_id: BWBR0002656
          article: '233'
          url: https://wetten.overheid.nl/BWBR0002656/2024-01-01#Boek1_Titeldeel13_Artikel233
          juriconnect: jci1.3:c:BWBR0002656&boek=1&artikel=233&z=2024-01-01&g=2024-01-01
          explanation: Einddatum gezag, of null als nog actief (leeftijdscheck al in filter)
    untranslatables:
    - construct: iteratie over variabel aantal gezagsrelaties
      reason: FOREACH niet beschikbaar in v0.5.1 schema; het aantal gezagsrelaties per persoon is dynamisch en kan niet
        vooraf worden uitgerold
      suggestion: Voeg FOREACH toe aan het schema of beperk het aantal gezagsrelaties tot een vast maximum
      accepted: true
