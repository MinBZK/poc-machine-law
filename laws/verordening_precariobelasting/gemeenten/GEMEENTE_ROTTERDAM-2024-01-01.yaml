$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: verordening_precariobelasting
regulatory_layer: GEMEENTELIJKE_VERORDENING
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Verordening Precariobelasting Rotterdam 2024
gemeente_code: GM0599
officiele_titel: Verordening Precariobelasting Rotterdam 2024
url: https://lokaleregelgeving.overheid.nl/CVDR719500/1
service: GEMEENTE_ROTTERDAM
uuid: b5d8e2f4-3a6c-4b9e-a7d1-9c4f2e8b1a53
discoverable: BUSINESS
articles:
- number: '2'
  text: 1. Onder de naam 'precariobelasting' wordt een directe belasting geheven ter
    zake van het hebben van voorwerpen onder, op of boven voor de openbare dienst
    bestemde gemeentegrond, bedoeld of genoemd in deze verordening. 2. Onder de naam
    'reclamebelasting' wordt een directe belasting geheven voor een openbare aankondiging
    die zichtbaar is vanaf de openbare weg.
  url: https://lokaleregelgeving.overheid.nl/CVDR719500/1#artikel_2
  machine_readable:
    definitions:
      belastingjaar: 2024
      precario_tarief_per_m2: 3610
      vrijstellingsdrempel_m2: 50
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: ANDERE_HANDELING
      parameters:
      - name: kvk_nummer
        type: string
        required: true
      input:
      - name: heeft_actieve_vergunning
        type: boolean
        source:
          regulation: algemene_plaatselijke_verordening/terrassen
          output: heeft_actieve_vergunning
          service: GEMEENTE_ROTTERDAM
          parameters:
            kvk_nummer: $kvk_nummer
        temporal:
          type: point_in_time
          reference: $referencedate
      - name: vergunde_oppervlakte
        type: number
        source:
          regulation: algemene_plaatselijke_verordening/terrassen
          output: vergunde_oppervlakte
          service: GEMEENTE_ROTTERDAM
          parameters:
            kvk_nummer: $kvk_nummer
        temporal:
          type: point_in_time
          reference: $referencedate
      - name: vestigingsadres
        type: string
        source:
          regulation: handelsregisterwet/bedrijfsgegevens
          output: vestigingsadres
          service: KVK
          parameters:
            kvk_nummer: $kvk_nummer
        temporal:
          type: point_in_time
          reference: $referencedate
      - name: heeft_terras
        type: boolean
        source: {}
      - name: locatie_op_openbare_weg
        type: boolean
        source: {}
      output:
      - name: voldoet_aan_voorwaarden
        type: boolean
      - name: is_belastingplichtig
        type: boolean
      - name: belasting_per_jaar
        type: number
      - name: tarief_per_m2
        type: number
      - name: heffingsmaatstaf_m2
        type: number
      actions:
      - output: voldoet_aan_voorwaarden
        value:
          operation: AND
          conditions:
          - subject: $heeft_terras
            operation: EQUALS
            value: true
          - subject: $locatie_op_openbare_weg
            operation: EQUALS
            value: true
          - subject: $heeft_actieve_vergunning
            operation: EQUALS
            value: true
      - output: is_belastingplichtig
        value: true
        legal_basis:
          law: Verordening precariobelasting Rotterdam 2024
          article: '2'
          url: https://lokaleregelgeving.overheid.nl/CVDR719500/1
          explanation: Het bedrijf heeft een terras op openbare gemeentegrond; precariobelasting
            is verschuldigd
      - output: tarief_per_m2
        value: $precario_tarief_per_m2
        legal_basis:
          law: Verordening precario- en reclamebelasting Rotterdam 2024
          article: '5'
          paragraph: b
          url: https://lokaleregelgeving.overheid.nl/CVDR704478/1
          explanation: Het tarief van € 36,10 per m² per jaar is vastgelegd in artikel
            5 lid b van de verordening
      - output: heffingsmaatstaf_m2
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - $vergunde_oppervlakte
            - $vrijstellingsdrempel_m2
          - 0
        legal_basis:
          law: Verordening precariobelasting Rotterdam 2024
          article: '5'
          paragraph: a
          url: https://lokaleregelgeving.overheid.nl/CVDR704478/1
          explanation: De eerste 50 m² van een terras is vrijgesteld; de heffingsmaatstaf
            is de oppervlakte boven deze drempel
      - output: belasting_per_jaar
        value:
          operation: MULTIPLY
          values:
          - $heffingsmaatstaf_m2
          - $precario_tarief_per_m2
        legal_basis:
          law: Verordening precariobelasting Rotterdam 2024
          article: '5'
          paragraph: b
          url: https://lokaleregelgeving.overheid.nl/CVDR704478/1
          explanation: Precariobelasting = € 36,10 per jaar voor elke m² die de oppervlakte
            van het terras van 50 m² te boven gaat
