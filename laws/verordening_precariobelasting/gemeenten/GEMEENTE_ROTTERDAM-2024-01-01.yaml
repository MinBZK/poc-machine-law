$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: verordening_precariobelasting
regulatory_layer: GEMEENTELIJKE_VERORDENING
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Verordening Precariobelasting Rotterdam 2024
gemeente_code: GM0599
officiele_titel: Verordening Precariobelasting Rotterdam 2024
url: https://lokaleregelgeving.overheid.nl/CVDR719500/1
service: GEMEENTE_ROTTERDAM
uuid: b5d8e2f4-3a6c-4b9e-a7d1-9c4f2e8b1a53
discoverable: BUSINESS
articles:
- number: '2'
  text: '1. Onder de naam ''precariobelasting'' wordt een directe belasting geheven ter zake van het hebben van voorwerpen onder, op of boven voor de openbare dienst bestemde gemeentegrond, bedoeld of genoemd in deze verordening. 2. Onder de naam ''reclamebelasting'' wordt een directe belasting geheven voor een openbare aankondiging die zichtbaar is vanaf de openbare weg.'
  url: https://lokaleregelgeving.overheid.nl/CVDR719500/1#artikel_2
  machine_readable:
    definitions:
      BELASTINGJAAR:
        value: 2024
      PRECARIO_TARIEF_PER_M2:
        value: 3610
      VRIJSTELLINGSDREMPEL_M2:
        value: 50
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: ANDERE_HANDELING
      parameters:
      - name: KVK_NUMMER
        type: string
        required: true
      input:
      - name: HEEFT_ACTIEVE_VERGUNNING
        type: boolean
        source:
          regulation: algemene_plaatselijke_verordening/terrassen
          output: heeft_actieve_vergunning
          service: GEMEENTE_ROTTERDAM
          parameters:
            KVK_NUMMER: $KVK_NUMMER
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: VERGUNDE_OPPERVLAKTE
        type: number
        source:
          regulation: algemene_plaatselijke_verordening/terrassen
          output: vergunde_oppervlakte
          service: GEMEENTE_ROTTERDAM
          parameters:
            KVK_NUMMER: $KVK_NUMMER
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: VESTIGINGSADRES
        type: string
        source:
          regulation: handelsregisterwet/bedrijfsgegevens
          output: vestigingsadres
          service: KVK
          parameters:
            KVK_NUMMER: $KVK_NUMMER
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: HEEFT_TERRAS
        type: boolean
        source_reference:
          table: vestigingen
          field: heeft_terras
          select_on:
          - name: kvk_nummer
            description: KvK-nummer van de organisatie
            type: string
            value: $KVK_NUMMER
      - name: LOCATIE_OP_OPENBARE_WEG
        type: boolean
        source_reference:
          source_type: GEMEENTE_ROTTERDAM
          table: bgt_terraslocaties
          field: is_openbare_weg
          select_on:
          - name: adres
            description: Adres van de horecalocatie
            type: string
            value: $VESTIGINGSADRES
      output:
      - name: is_belastingplichtig
        type: boolean
      - name: belasting_per_jaar
        type: number
      - name: tarief_per_m2
        type: number
      - name: heffingsmaatstaf_m2
        type: number
      requirements:
      - all:
        - subject: $HEEFT_TERRAS
          operation: EQUALS
          value: true
          legal_basis:
            law: Verordening precariobelasting Rotterdam 2024
            article: '2'
            url: https://lokaleregelgeving.overheid.nl/CVDR719500/1
            explanation: Het bedrijf moet een terras (voorwerp) op gemeentegrond hebben
        - subject: $LOCATIE_OP_OPENBARE_WEG
          operation: EQUALS
          value: true
          legal_basis:
            law: Verordening precariobelasting Rotterdam 2024
            article: '2'
            url: https://lokaleregelgeving.overheid.nl/CVDR719500/1
            explanation: Het terras moet zich bevinden op voor de openbare dienst bestemde gemeentegrond
        - subject: $HEEFT_ACTIEVE_VERGUNNING
          operation: EQUALS
          value: true
          legal_basis:
            law: Verordening precariobelasting Rotterdam 2024
            article: '2'
            url: https://lokaleregelgeving.overheid.nl/CVDR719500/1
            explanation: Precariobelasting is verschuldigd voor terrassen waarvoor een terrasvergunning is verleend
      actions:
      - output: is_belastingplichtig
        value: true
        legal_basis:
          law: Verordening precariobelasting Rotterdam 2024
          article: '2'
          url: https://lokaleregelgeving.overheid.nl/CVDR719500/1
          explanation: Het bedrijf heeft een terras op openbare gemeentegrond; precariobelasting is verschuldigd
      - output: tarief_per_m2
        value: $PRECARIO_TARIEF_PER_M2
        legal_basis:
          law: Verordening precario- en reclamebelasting Rotterdam 2024
          article: '5'
          paragraph: b
          url: https://lokaleregelgeving.overheid.nl/CVDR704478/1
          explanation: Het tarief van € 36,10 per m² per jaar is vastgelegd in artikel 5 lid b van de verordening
      - output: heffingsmaatstaf_m2
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - $VERGUNDE_OPPERVLAKTE
            - $VRIJSTELLINGSDREMPEL_M2
          - 0
        legal_basis:
          law: Verordening precariobelasting Rotterdam 2024
          article: '5'
          paragraph: a
          url: https://lokaleregelgeving.overheid.nl/CVDR704478/1
          explanation: De eerste 50 m² van een terras is vrijgesteld; de heffingsmaatstaf is de oppervlakte boven deze drempel
      - output: belasting_per_jaar
        value:
          operation: MULTIPLY
          values:
          - $heffingsmaatstaf_m2
          - $PRECARIO_TARIEF_PER_M2
        legal_basis:
          law: Verordening precariobelasting Rotterdam 2024
          article: '5'
          paragraph: b
          url: https://lokaleregelgeving.overheid.nl/CVDR704478/1
          explanation: Precariobelasting = € 36,10 per jaar voor elke m² die de oppervlakte van het terras van 50 m² te boven gaat
