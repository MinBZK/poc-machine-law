$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.0/schema.json
$id: pensioenwet
regulatory_layer: WET
publication_date: '2026-01-01'
valid_from: '2026-01-01'
name: Pensioenuitkering
bwb_id: BWBR0020809
url: https://wetten.overheid.nl/BWBR0020809/2026-01-01
service: PENSIOENFONDS
uuid: 8a3f5c2d-4e6b-4a1f-9c8d-7e2f3a4b5c6d
discoverable: CITIZEN
articles:
- number: '1'
  text: ''
  url: https://wetten.overheid.nl/BWBR0020809/2026-01-01#Artikel1
  machine_readable:
    definitions:
      OPBOUW_MIDDELLOON:
        value: 0.0175
      OPBOUW_EINDLOON:
        value: 0.0167
      OMREKENFACTOR_KAPITAAL:
        value: 0.05
      MAANDEN_PER_JAAR:
        value: 12
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: GEBOORTEDATUM
        type: date
        source:
          regulation: wet_brp
          output: geboortedatum
          service: RvIG
          parameters:
            BSN: $BSN
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: LEEFTIJD
        type: number
        type_spec:
          unit: years
          precision: 0
          min: 0
        source:
          regulation: wet_brp
          output: leeftijd
          service: RvIG
          parameters:
            BSN: $BSN
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: PENSIOENKAPITAAL
        type: amount
        source_reference:
          table: pensioen_deelnemers
          field: pensioenkapitaal
          select_on:
          - name: bsn
            description: BSN van de deelnemer
            type: string
            value: $BSN
      - name: PENSIOENJAREN
        type: number
        source_reference:
          table: pensioen_deelnemers
          field: pensioenjaren
          select_on:
          - name: bsn
            description: BSN van de deelnemer
            type: string
            value: $BSN
      - name: TYPE_REGELING
        type: string
        source_reference:
          table: pensioen_deelnemers
          field: type_regeling
          select_on:
          - name: bsn
            description: BSN van de deelnemer
            type: string
            value: $BSN
      - name: FRANCHISE
        type: amount
        source_reference:
          table: pensioen_deelnemers
          field: franchise
          select_on:
          - name: bsn
            description: BSN van de deelnemer
            type: string
            value: $BSN
      - name: PENSIOENGEVEND_LOON
        type: amount
        source_reference:
          table: pensioen_deelnemers
          field: pensioengevend_loon
          select_on:
          - name: bsn
            description: BSN van de deelnemer
            type: string
            value: $BSN
      - name: PENSIOEN_LEEFTIJD_FONDS
        type: number
        source_reference:
          table: pensioen_deelnemers
          field: pensioenleeftijd
          select_on:
          - name: bsn
            description: BSN van de deelnemer
            type: string
            value: $BSN
      output:
      - name: is_gepensioneerd
        type: boolean
      - name: pensioenkapitaal
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: pensioen_uitkering_bruto
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: pensioen_uitkering_maandelijks
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: pensioenleeftijd
        type: number
        type_spec:
          unit: years
          precision: 0
          min: 60
      requirements:
      - all:
        - subject: $LEEFTIJD
          operation: GREATER_OR_EQUAL
          value: $PENSIOEN_LEEFTIJD_FONDS
        - subject: $PENSIOENKAPITAAL
          operation: GREATER_THAN
          value: 0
      actions:
      - output: is_gepensioneerd
        value: true
        legal_basis:
          law: Pensioenwet
          bwb_id: BWBR0020809
          article: '10'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0020809/2024-01-01#Hoofdstuk2_Artikel10
          juriconnect: jci1.3:c:BWBR0020809&artikel=10&lid=1&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 10 lid 1 Pensioenwet: toekenning ouderdomspensioen'
      - output: pensioenkapitaal
        value: $PENSIOENKAPITAAL
        legal_basis:
          law: Pensioenwet
          bwb_id: BWBR0020809
          article: '51'
          url: https://wetten.overheid.nl/BWBR0020809/2024-01-01#Hoofdstuk5_Artikel51
          juriconnect: jci1.3:c:BWBR0020809&artikel=51&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 51 Pensioenwet: informatieverstrekking over opgebouwd kapitaal'
      - output: pensioenleeftijd
        value: $PENSIOEN_LEEFTIJD_FONDS
        legal_basis:
          law: Pensioenwet
          bwb_id: BWBR0020809
          article: '18'
          paragraph: '4'
          url: https://wetten.overheid.nl/BWBR0020809/2024-01-01#Hoofdstuk3_Artikel18
          juriconnect: jci1.3:c:BWBR0020809&artikel=18&lid=4&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 18 lid 4 Pensioenwet: pensioenrichtleeftijd'
      - output: pensioen_uitkering_bruto
        value:
          operation: IF
          conditions:
          - test:
              operation: EQUALS
              subject: $TYPE_REGELING
              value: beschikbare_premie
            then:
              operation: MULTIPLY
              values:
              - $PENSIOENKAPITAAL
              - $OMREKENFACTOR_KAPITAAL
          - test:
              operation: EQUALS
              subject: $TYPE_REGELING
              value: middelloon
            then:
              operation: MULTIPLY
              values:
              - $OPBOUW_MIDDELLOON
              - $PENSIOENJAREN
              - operation: SUBTRACT
                values:
                - $PENSIOENGEVEND_LOON
                - $FRANCHISE
          - test:
              operation: EQUALS
              subject: $TYPE_REGELING
              value: eindloon
            then:
              operation: MULTIPLY
              values:
              - $OPBOUW_EINDLOON
              - $PENSIOENJAREN
              - operation: SUBTRACT
                values:
                - $PENSIOENGEVEND_LOON
                - $FRANCHISE
          - else:
              operation: MULTIPLY
              values:
              - $PENSIOENKAPITAAL
              - $OMREKENFACTOR_KAPITAAL
        legal_basis:
          law: Pensioenwet
          bwb_id: BWBR0020809
          article: '10'
          url: https://wetten.overheid.nl/BWBR0020809/2024-01-01#Hoofdstuk2_Artikel10
          juriconnect: jci1.3:c:BWBR0020809&artikel=10&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 10 Pensioenwet: berekening ouderdomspensioen afhankelijk van type regeling'
      - output: pensioen_uitkering_maandelijks
        value:
          operation: DIVIDE
          values:
          - $pensioen_uitkering_bruto
          - $MAANDEN_PER_JAAR
        legal_basis:
          law: Pensioenwet
          bwb_id: BWBR0020809
          article: '10'
          url: https://wetten.overheid.nl/BWBR0020809/2024-01-01#Hoofdstuk2_Artikel10
          juriconnect: jci1.3:c:BWBR0020809&artikel=10&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 10 Pensioenwet: maandelijkse uitbetaling van ouderdomspensioen'
