discoverable: BUSINESS
articles:
- number: '4:2'
  text: |-
    Artikel 4:2 Aanwijzing collectieve festiviteiten 1. De artikelen 2:17, 2:17a, 2:19, 2:19a en 2:20 van het besluit gelden niet voor ten hoogste zeven door het college per kalenderjaar aan te wijzen collectieve festiviteiten gedurende de door hem aan te wijzen dagen of dagdelen. 2. Artikel 3.148 van het besluit geldt niet voor ten hoogste zeven door het college per kalenderjaar aan te wijzen collectieve festiviteiten gedurende de daarbij aan te wijzen dagen of dagdelen. 3. In een aanwijzing krachtens het eerste of tweede lid, kan het college bepalen dat de aanwijzing slechts geldt in één of meer delen van de gemeente. 4. Het college kan wanneer een collectieve festiviteit redelijkerwijs niet te voorzien was, een festiviteit onverwijld als collectieve festiviteit als bedoeld in het eerste lid aanwijzen. <section class="section-chapter js-scrollSection"
  url: https://lokaleregelgeving.overheid.nl/CVDR373493#artikel_4:2
  machine_readable:
    definitions:
      max_ontheffingen_per_jaar:
        value: 12
      min_aanvraagtermijn_uren:
        value: 48
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: kvk_nummer
        type: string
        required: true
      - name: activiteitsdatum
        type: date
        required: true
      - name: activiteitsstarttijd
        type: time
        required: true
      input:
      - name: kvk_status
        type: string
        source:
          regulation: handelsregisterwet/bedrijfsgegevens
          output: status
          service: KVK
          parameters:
            kvk_nummer: $kvk_nummer
      - name: verleende_ontheffingen_dit_jaar
        type: array
        source_reference:
          source_type: cases
