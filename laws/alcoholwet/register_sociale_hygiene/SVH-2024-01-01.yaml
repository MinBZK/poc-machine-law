discoverable: HIDDEN
articles:
- number: '8'
  text: "1 Leidinggevenden van het horecabedrijf en het slijtersbedrijf voldoen aan de volgende eisen:\n  a. zij hebben de\
    \ leeftijd van eenentwintig jaar bereikt;\n  b. zij zijn niet in enig opzicht van slecht levensgedrag;\n  c. zij mogen\
    \ niet onder curatele staan.\n2 Bij of krachtens algemene maatregel van bestuur worden naast de in het eerste lid gestelde\
    \ eisen andere eisen ten aanzien van het zedelijk gedrag van leidinggevenden gesteld en kan de in dat lid, onder b, gestelde\
    \ eis nader worden omschreven.\n3 Leidinggevenden beschikken tevens over voldoende kennis en inzicht met betrekking tot\
    \ sociale hygiëne en zijn ingeschreven in het Register sociale hygiëne, genoemd in artikel 11c.\n4 De in het derde lid\
    \ gestelde eis geldt niet voor leidinggevenden voor wier rekening en risico het horecabedrijf of het slijtersbedrijf wordt\
    \ uitgeoefend, indien die leidinggevenden geen bemoeienis hebben met de bedrijfsvoering of de exploitatie van het horecabedrijf\
    \ of het slijtersbedrijf waarvoor vergunning wordt gevraagd of is verkregen en de vergunninghouder dit in een schriftelijke\
    \ verklaring bevestigt.\n5 Indien een paracommerciële rechtspersoon het horecabedrijf uitoefent, voldoen ten minste twee\
    \ leidinggevenden aan de bij of krachtens dit artikel gestelde eisen."
