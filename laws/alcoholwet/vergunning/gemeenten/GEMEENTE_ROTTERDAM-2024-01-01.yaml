$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: alcoholwet/vergunning
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Alcoholwetvergunning Horeca Rotterdam
bwb_id: BWBR0002458
url: https://wetten.overheid.nl/BWBR0002458/2024-01-01
service: GEMEENTE_ROTTERDAM
uuid: 7c2e8f4a-3b9d-4e1f-a5c2-9d8b7e6f4a3c
discoverable: BUSINESS
articles:
- number: '3'
  text: '1 Het is verboden zonder daartoe strekkende vergunning van de burgemeester het horecabedrijf of slijtersbedrijf uit
    te oefenen.

    2 Met toepassing van artikel 28, eerste lid, laatste zinsnede, van de Dienstenwet is paragraaf 4.1.3.3. van de Algemene
    wet bestuursrecht niet van toepassing op de aanvraag van een vergunning als bedoeld in het eerste lid.'
  url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Artikel3
  machine_readable:
    definitions:
      BIBOB_ERNSTIG_GEVAAR:
        value: ernstig_gevaar
      BIBOB_BESCHIKKING_TYPE:
        value: vergunning
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: KVK_NUMMER
        type: string
        required: true
      input:
      - name: LEEFTIJD_EXPLOITANT
        type: number
        source:
          regulation: wet_brp
          output: leeftijd
          service: RvIG
          parameters:
            BSN: $BSN_LEIDINGGEVENDE
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: IS_ONDER_CURATELE_EXPLOITANT
        type: boolean
        source:
          regulation: burgerlijk_wetboek_handelingsonbekwaamheid
          output: is_onder_curatele
          service: RECHTSPRAAK
          parameters:
            BSN: $BSN_LEIDINGGEVENDE
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: BEDRIJF_STATUS
        type: string
        source:
          regulation: handelsregisterwet/bedrijfsgegevens
          output: status
          service: KVK
          parameters:
            KVK_NUMMER: $KVK_NUMMER
      - name: SVH_REGISTRATIE_GELDIG
        type: boolean
        source:
          regulation: alcoholwet/register_sociale_hygiene
          output: is_geregistreerd
          service: SVH
          parameters:
            BSN: $BSN_LEIDINGGEVENDE
      - name: SVH_REGISTRATIENUMMER
        type: string
        source:
          regulation: alcoholwet/register_sociale_hygiene
          output: registratienummer
          service: SVH
          parameters:
            BSN: $BSN_LEIDINGGEVENDE
      - name: VOLDOET_AAN_NATIONALE_EISEN
        type: boolean
        source:
          regulation: alcoholwet/vergunning
          output: voldoet_aan_nationale_eisen
          service: VWS
          parameters:
            LEEFTIJD_LEIDINGGEVENDE: $LEEFTIJD_EXPLOITANT
            IS_ONDER_CURATELE: $IS_ONDER_CURATELE_EXPLOITANT
            VLOEROPPERVLAKTE: $VLOEROPPERVLAKTE_HORECALOKALITEIT
            TYPE_BEDRIJF: $TYPE_BEDRIJF
      - name: WEIGERINGSGROND_NATIONAAL
        type: string
        source:
          regulation: alcoholwet/vergunning
          output: weigeringsgrond_nationaal
          service: VWS
          parameters:
            LEEFTIJD_LEIDINGGEVENDE: $LEEFTIJD_EXPLOITANT
            IS_ONDER_CURATELE: $IS_ONDER_CURATELE_EXPLOITANT
            VLOEROPPERVLAKTE: $VLOEROPPERVLAKTE_HORECALOKALITEIT
            TYPE_BEDRIJF: $TYPE_BEDRIJF
      - name: BIBOB_MATE_VAN_GEVAAR
        type: string
        source:
          regulation: wet_bibob
          output: mate_van_gevaar
          service: LBB
          parameters:
            KVK_NUMMER: $KVK_NUMMER
            BESCHIKKING_TYPE: $BIBOB_BESCHIKKING_TYPE
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: BSN_LEIDINGGEVENDE
        type: string
        source_reference:
          table: leidinggevenden
          field: bsn
          select_on:
          - name: kvk_nummer
            description: KVK-nummer van de onderneming
            type: string
            value: $KVK_NUMMER
      - name: VLOEROPPERVLAKTE_HORECALOKALITEIT
        type: number
        source_reference:
          table: inrichtingen
          field: vloeroppervlakte_horecalokaliteit
          select_on:
          - name: kvk_nummer
            description: KVK-nummer van de onderneming
            type: string
            value: $KVK_NUMMER
      - name: TYPE_BEDRIJF
        type: string
        source_reference:
          table: inrichtingen
          field: type_bedrijf
          select_on:
          - name: kvk_nummer
            description: KVK-nummer van de onderneming
            type: string
            value: $KVK_NUMMER
      - name: HEEFT_ACTIEVE_ALCOHOLWETVERGUNNING
        type: boolean
        source_reference:
          table: vergunningen
          field: heeft_alcoholvergunning
          select_on:
          - name: kvk_nummer
            description: KVK-nummer van de onderneming
            type: string
            value: $KVK_NUMMER
      output:
      - name: heeft_recht_op_vergunning
        type: boolean
      - name: heeft_actieve_vergunning
        type: boolean
      - name: weigeringsgrond
        type: string
      requirements:
      - all:
        - subject: $BEDRIJF_STATUS
          operation: EQUALS
          value: Actief
          legal_basis:
            law: Handelsregisterwet 2007
            bwb_id: BWBR0021777
            article: '2'
            url: https://wetten.overheid.nl/BWBR0021777/2024-01-01#Artikel2
            explanation: De onderneming moet actief geregistreerd zijn
        - subject: $SVH_REGISTRATIE_GELDIG
          operation: EQUALS
          value: true
          legal_basis:
            law: Alcoholwet
            bwb_id: BWBR0002458
            article: '8'
            paragraph: '4'
            url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel8
            explanation: Leidinggevenden moeten ingeschreven staan in het Register Sociale Hygiëne
        - subject: $VOLDOET_AAN_NATIONALE_EISEN
          operation: EQUALS
          value: true
          legal_basis:
            law: Alcoholwet
            bwb_id: BWBR0002458
            article: '27'
            paragraph: '1'
            url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk3_Artikel27
            explanation: Moet voldoen aan alle nationale eisen uit artikel 8 en 10
        - or:
          - subject: $BIBOB_MATE_VAN_GEVAAR
            operation: IS_NULL
          - subject: $BIBOB_MATE_VAN_GEVAAR
            operation: NOT_EQUALS
            value: $BIBOB_ERNSTIG_GEVAAR
          legal_basis:
            law: Wet bevordering integriteitsbeoordelingen door het openbaar bestuur
            bwb_id: BWBR0013798
            article: '3'
            url: https://wetten.overheid.nl/BWBR0013798/2024-01-01#Paragraaf2_Artikel3
            explanation: Bij ernstig gevaar volgens Bibob-advies moet de vergunning worden geweigerd
      actions:
      - output: heeft_recht_op_vergunning
        value: true
        legal_basis:
          law: Alcoholwet
          bwb_id: BWBR0002458
          article: '27'
          url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk3_Artikel27
          explanation: Geen weigeringsgrond is van toepassing, dus de vergunning wordt verleend
      - output: heeft_actieve_vergunning
        value: $HEEFT_ACTIEVE_ALCOHOLWETVERGUNNING
        legal_basis:
          law: Alcoholwet
          bwb_id: BWBR0002458
          article: '3'
          url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel3
          explanation: Geeft de status van de actieve Alcoholwetvergunning door
      - output: weigeringsgrond
        value:
          operation: IF
          conditions:
          - test:
              operation: NOT_EQUALS
              subject: $BEDRIJF_STATUS
              value: Actief
            then: Onderneming is niet actief in het handelsregister
          - test:
              operation: EQUALS
              subject: $VOLDOET_AAN_NATIONALE_EISEN
              value: false
            then: $WEIGERINGSGROND_NATIONAAL
          - test:
              operation: EQUALS
              subject: $BIBOB_MATE_VAN_GEVAAR
              value: $BIBOB_ERNSTIG_GEVAAR
            then: Ernstig gevaar volgens Bibob-advies
          - else: ''
        legal_basis:
          law: Alcoholwet
          bwb_id: BWBR0002458
          article: '27'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk3_Artikel27
          explanation: Weigeringsgronden op grond van artikel 27
