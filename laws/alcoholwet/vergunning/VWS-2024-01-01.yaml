$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.1/schema.json
$id: alcoholwet/vergunning
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Alcoholwet vergunningseisen nationaal
bwb_id: BWBR0002458
url: https://wetten.overheid.nl/BWBR0002458/2024-01-01
service: VWS
uuid: 8a3f9b5c-4d2e-4f0a-b6c3-1e9d8f7a5b4c
discoverable: HIDDEN
articles:
- number: '8'
  text: "1 Leidinggevenden van het horecabedrijf en het slijtersbedrijf voldoen aan de volgende eisen:\n  a. zij hebben de\
    \ leeftijd van eenentwintig jaar bereikt;\n  b. zij zijn niet in enig opzicht van slecht levensgedrag;\n  c. zij mogen\
    \ niet onder curatele staan.\n2 Bij of krachtens algemene maatregel van bestuur worden naast de in het eerste lid gestelde\
    \ eisen andere eisen ten aanzien van het zedelijk gedrag van leidinggevenden gesteld en kan de in dat lid, onder b, gestelde\
    \ eis nader worden omschreven.\n3 Leidinggevenden beschikken tevens over voldoende kennis en inzicht met betrekking tot\
    \ sociale hygiëne en zijn ingeschreven in het Register sociale hygiëne, genoemd in artikel 11c.\n4 De in het derde lid\
    \ gestelde eis geldt niet voor leidinggevenden voor wier rekening en risico het horecabedrijf of het slijtersbedrijf wordt\
    \ uitgeoefend, indien die leidinggevenden geen bemoeienis hebben met de bedrijfsvoering of de exploitatie van het horecabedrijf\
    \ of het slijtersbedrijf waarvoor vergunning wordt gevraagd of is verkregen en de vergunninghouder dit in een schriftelijke\
    \ verklaring bevestigt.\n5 Indien een paracommerciële rechtspersoon het horecabedrijf uitoefent, voldoen ten minste twee\
    \ leidinggevenden aan de bij of krachtens dit artikel gestelde eisen."
  url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Artikel8
  machine_readable:
    definitions:
      MINIMALE_LEEFTIJD:
        value: 21
      MINIMALE_VLOEROPPERVLAKTE_HORECA:
        value: 35
      MINIMALE_VLOEROPPERVLAKTE_SLIJTERIJ:
        value: 15
      TYPE_HORECABEDRIJF:
        value: horecabedrijf
      TYPE_SLIJTERSBEDRIJF:
        value: slijtersbedrijf
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: LEEFTIJD_LEIDINGGEVENDE
        type: number
        required: true
      - name: IS_ONDER_CURATELE
        type: boolean
        required: true
      - name: IS_VAN_SLECHT_LEVENSGEDRAG
        type: boolean
      - name: IS_INGESCHREVEN_SVH_REGISTER
        type: boolean
      - name: VLOEROPPERVLAKTE
        type: number
        required: true
      - name: TYPE_BEDRIJF
        type: string
        required: true
      output:
      - name: voldoet_aan_leeftijdseis
        type: boolean
      - name: voldoet_aan_curatele_eis
        type: boolean
      - name: voldoet_aan_levensgedrag_eis
        type: boolean
      - name: voldoet_aan_svh_eis
        type: boolean
      - name: voldoet_aan_inrichtingseis
        type: boolean
      - name: voldoet_aan_artikel_8
        type: boolean
      - name: voldoet_aan_nationale_eisen
        type: boolean
      - name: weigeringsgrond_nationaal
        type: string
      requirements:
      - all:
        - operation: GREATER_OR_EQUAL
          subject: $LEEFTIJD_LEIDINGGEVENDE
          value: $MINIMALE_LEEFTIJD
          legal_basis:
            law: Alcoholwet
            bwb_id: BWBR0002458
            article: '8'
            paragraph: '1'
            url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel8
            explanation: 'Artikel 8 lid 1 onder a: leidinggevenden moeten de leeftijd van eenentwintig jaar hebben bereikt'
        - subject: $IS_ONDER_CURATELE
          operation: EQUALS
          value: false
          legal_basis:
            law: Alcoholwet
            bwb_id: BWBR0002458
            article: '8'
            paragraph: '1'
            url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel8
            explanation: 'Artikel 8 lid 1 onder c: leidinggevenden mogen niet onder curatele staan'
        - or:
          - subject: $TYPE_BEDRIJF
            operation: NOT_EQUALS
            value: $TYPE_HORECABEDRIJF
          - operation: GREATER_OR_EQUAL
            subject: $VLOEROPPERVLAKTE
            value: $MINIMALE_VLOEROPPERVLAKTE_HORECA
          legal_basis:
            law: Alcoholwet
            bwb_id: BWBR0002458
            article: '10'
            paragraph: '2'
            url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel10
            explanation: 'Artikel 10 lid 2: een horecalokaliteit moet ten minste 35 m² vloeroppervlakte hebben'
        - or:
          - subject: $TYPE_BEDRIJF
            operation: NOT_EQUALS
            value: $TYPE_SLIJTERSBEDRIJF
          - operation: GREATER_OR_EQUAL
            subject: $VLOEROPPERVLAKTE
            value: $MINIMALE_VLOEROPPERVLAKTE_SLIJTERIJ
          legal_basis:
            law: Alcoholwet
            bwb_id: BWBR0002458
            article: '10'
            paragraph: '2'
            url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel10
            explanation: 'Artikel 10 lid 2: een slijtlokaliteit moet ten minste 15 m² vloeroppervlakte hebben'
      actions:
      - output: voldoet_aan_leeftijdseis
        value:
          operation: GREATER_OR_EQUAL
          subject: $LEEFTIJD_LEIDINGGEVENDE
          value: $MINIMALE_LEEFTIJD
        legal_basis:
          law: Alcoholwet
          bwb_id: BWBR0002458
          article: '8'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel8
          explanation: Leeftijd moet minimaal 21 jaar zijn
      - output: voldoet_aan_curatele_eis
        value:
          operation: EQUALS
          subject: $IS_ONDER_CURATELE
          value: false
        legal_basis:
          law: Alcoholwet
          bwb_id: BWBR0002458
          article: '8'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel8
          explanation: Mag niet onder curatele staan
      - output: voldoet_aan_levensgedrag_eis
        value:
          operation: IF
          conditions:
          - test:
              operation: IS_NULL
              subject: $IS_VAN_SLECHT_LEVENSGEDRAG
            then: true
          - test:
              operation: EQUALS
              subject: $IS_VAN_SLECHT_LEVENSGEDRAG
              value: false
            then: true
          - else: false
        legal_basis:
          law: Alcoholwet
          bwb_id: BWBR0002458
          article: '8'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel8
          explanation: Mag niet van slecht levensgedrag zijn
      - output: voldoet_aan_svh_eis
        value:
          operation: IF
          conditions:
          - test:
              operation: IS_NULL
              subject: $IS_INGESCHREVEN_SVH_REGISTER
            then: true
          - test:
              operation: EQUALS
              subject: $IS_INGESCHREVEN_SVH_REGISTER
              value: true
            then: true
          - else: false
        legal_basis:
          law: Alcoholwet
          bwb_id: BWBR0002458
          article: '8'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel8
          explanation: Moet ingeschreven zijn in Register sociale hygiëne
      - output: voldoet_aan_inrichtingseis
        value:
          operation: IF
          conditions:
          - test:
              operation: AND
              values:
              - operation: EQUALS
                subject: $TYPE_BEDRIJF
                value: $TYPE_HORECABEDRIJF
              - operation: GREATER_OR_EQUAL
                subject: $VLOEROPPERVLAKTE
                value: $MINIMALE_VLOEROPPERVLAKTE_HORECA
            then: true
          - test:
              operation: AND
              values:
              - operation: EQUALS
                subject: $TYPE_BEDRIJF
                value: $TYPE_SLIJTERSBEDRIJF
              - operation: GREATER_OR_EQUAL
                subject: $VLOEROPPERVLAKTE
                value: $MINIMALE_VLOEROPPERVLAKTE_SLIJTERIJ
            then: true
          - test:
              operation: AND
              values:
              - operation: NOT_EQUALS
                subject: $TYPE_BEDRIJF
                value: $TYPE_HORECABEDRIJF
              - operation: NOT_EQUALS
                subject: $TYPE_BEDRIJF
                value: $TYPE_SLIJTERSBEDRIJF
            then: true
          - else: false
        legal_basis:
          law: Alcoholwet
          bwb_id: BWBR0002458
          article: '10'
          paragraph: '2'
          url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel10
          explanation: Vloeroppervlakte moet voldoen aan minimumeis voor bedrijfstype
      - output: voldoet_aan_artikel_8
        value:
          operation: AND
          values:
          - operation: GREATER_OR_EQUAL
            subject: $LEEFTIJD_LEIDINGGEVENDE
            value: $MINIMALE_LEEFTIJD
          - operation: EQUALS
            subject: $IS_ONDER_CURATELE
            value: false
        legal_basis:
          law: Alcoholwet
          bwb_id: BWBR0002458
          article: '8'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel8
          explanation: Alle verplichte eisen van artikel 8 lid 1
      - output: voldoet_aan_nationale_eisen
        value: true
        legal_basis:
          law: Alcoholwet
          bwb_id: BWBR0002458
          article: '27'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk3_Artikel27
          explanation: Aan alle nationale eisen uit artikel 8 en 10 is voldaan
      - output: weigeringsgrond_nationaal
        value:
          operation: IF
          conditions:
          - test:
              operation: LESS_THAN
              subject: $LEEFTIJD_LEIDINGGEVENDE
              value: $MINIMALE_LEEFTIJD
            then: Leidinggevende heeft de leeftijd van 21 jaar niet bereikt (artikel 8 lid 1 onder a)
          - test:
              operation: EQUALS
              subject: $IS_ONDER_CURATELE
              value: true
            then: Leidinggevende staat onder curatele (artikel 8 lid 1 onder c)
          - test:
              operation: AND
              values:
              - operation: EQUALS
                subject: $TYPE_BEDRIJF
                value: $TYPE_HORECABEDRIJF
              - operation: LESS_THAN
                subject: $VLOEROPPERVLAKTE
                value: $MINIMALE_VLOEROPPERVLAKTE_HORECA
            then: Horecalokaliteit heeft minder dan 35 m² vloeroppervlakte (artikel 10 lid 2)
          - test:
              operation: AND
              values:
              - operation: EQUALS
                subject: $TYPE_BEDRIJF
                value: $TYPE_SLIJTERSBEDRIJF
              - operation: LESS_THAN
                subject: $VLOEROPPERVLAKTE
                value: $MINIMALE_VLOEROPPERVLAKTE_SLIJTERIJ
            then: Slijtlokaliteit heeft minder dan 15 m² vloeroppervlakte (artikel 10 lid 2)
          - else: ''
        legal_basis:
          law: Alcoholwet
          bwb_id: BWBR0002458
          article: '27'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk3_Artikel27
          explanation: Weigeringsgrond op basis van niet voldoen aan artikel 8 of 10
