$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: alcoholwet/vergunning
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Alcoholwet vergunningseisen nationaal
bwb_id: BWBR0002458
url: https://wetten.overheid.nl/BWBR0002458/2024-01-01
service: VWS
uuid: 8a3f9b5c-4d2e-4f0a-b6c3-1e9d8f7a5b4c
discoverable: HIDDEN
articles:
- number: '8'
  text: |-
    1 Leidinggevenden van het horecabedrijf en het slijtersbedrijf voldoen aan de volgende eisen:
      a. zij hebben de leeftijd van eenentwintig jaar bereikt;
      b. zij zijn niet in enig opzicht van slecht levensgedrag;
      c. zij mogen niet onder curatele staan.
    2 Bij of krachtens algemene maatregel van bestuur worden naast de in het eerste lid gestelde eisen andere eisen ten aanzien van het zedelijk gedrag van leidinggevenden gesteld en kan de in dat lid, onder b, gestelde eis nader worden omschreven.
    3 Leidinggevenden beschikken tevens over voldoende kennis en inzicht met betrekking tot sociale hygiëne en zijn ingeschreven in het Register sociale hygiëne, genoemd in artikel 11c.
    4 De in het derde lid gestelde eis geldt niet voor leidinggevenden voor wier rekening en risico het horecabedrijf of het slijtersbedrijf wordt uitgeoefend, indien die leidinggevenden geen bemoeienis hebben met de bedrijfsvoering of de exploitatie van het horecabedrijf of het slijtersbedrijf waarvoor vergunning wordt gevraagd of is verkregen en de vergunninghouder dit in een schriftelijke verklaring bevestigt.
    5 Indien een paracommerciële rechtspersoon het horecabedrijf uitoefent, voldoen ten minste twee leidinggevenden aan de bij of krachtens dit artikel gestelde eisen.
  url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Artikel8
  machine_readable:
    definitions:
      minimale_leeftijd:
        value: 21
      minimale_vloeroppervlakte_horeca:
        value: 35
      minimale_vloeroppervlakte_slijterij:
        value: 15
      type_horecabedrijf:
        value: horecabedrijf
      type_slijtersbedrijf:
        value: slijtersbedrijf
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: leeftijd_leidinggevende
        type: number
        required: true
      - name: is_onder_curatele
        type: boolean
        required: true
      - name: is_van_slecht_levensgedrag
        type: boolean
      - name: is_ingeschreven_svh_register
        type: boolean
      - name: vloeroppervlakte
        type: number
        required: true
      - name: type_bedrijf
        type: string
        required: true
      output:
      - name: voldoet_aan_leeftijdseis
        type: boolean
      - name: voldoet_aan_curatele_eis
        type: boolean
      - name: voldoet_aan_levensgedrag_eis
        type: boolean
      - name: voldoet_aan_svh_eis
        type: boolean
      - name: voldoet_aan_inrichtingseis
        type: boolean
      - name: voldoet_aan_artikel_8
        type: boolean
      - name: voldoet_aan_nationale_eisen
        type: boolean
      - name: weigeringsgrond_nationaal
        type: string
      requirements:
      - all:
        - operation: GREATER_THAN_OR_EQUAL
          subject: $leeftijd_leidinggevende
          value: $minimale_leeftijd
          legal_basis:
            law: Alcoholwet
            bwb_id: BWBR0002458
            article: '8'
            paragraph: '1'
            url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel8
            explanation: 'Artikel 8 lid 1 onder a: leidinggevenden moeten de leeftijd van eenentwintig jaar hebben bereikt'
        - subject: $is_onder_curatele
          operation: EQUALS
          value: false
          legal_basis:
            law: Alcoholwet
            bwb_id: BWBR0002458
            article: '8'
            paragraph: '1'
            url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel8
            explanation: 'Artikel 8 lid 1 onder c: leidinggevenden mogen niet onder curatele staan'
        - or:
          - operation: NOT
            value:
              operation: EQUALS
              subject: $type_bedrijf
              value: $type_horecabedrijf
          - operation: GREATER_THAN_OR_EQUAL
            subject: $vloeroppervlakte
            value: $minimale_vloeroppervlakte_horeca
          legal_basis:
            law: Alcoholwet
            bwb_id: BWBR0002458
            article: '10'
            paragraph: '2'
            url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel10
            explanation: 'Artikel 10 lid 2: een horecalokaliteit moet ten minste 35 m² vloeroppervlakte hebben'
        - or:
          - operation: NOT
            value:
              operation: EQUALS
              subject: $type_bedrijf
              value: $type_slijtersbedrijf
          - operation: GREATER_THAN_OR_EQUAL
            subject: $vloeroppervlakte
            value: $minimale_vloeroppervlakte_slijterij
          legal_basis:
            law: Alcoholwet
            bwb_id: BWBR0002458
            article: '10'
            paragraph: '2'
            url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel10
            explanation: 'Artikel 10 lid 2: een slijtlokaliteit moet ten minste 15 m² vloeroppervlakte hebben'
      actions:
      - output: voldoet_aan_leeftijdseis
        value:
          operation: GREATER_THAN_OR_EQUAL
          subject: $leeftijd_leidinggevende
          value: $minimale_leeftijd
        legal_basis:
          law: Alcoholwet
          bwb_id: BWBR0002458
          article: '8'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel8
          explanation: Leeftijd moet minimaal 21 jaar zijn
      - output: voldoet_aan_curatele_eis
        value:
          operation: EQUALS
          subject: $is_onder_curatele
          value: false
        legal_basis:
          law: Alcoholwet
          bwb_id: BWBR0002458
          article: '8'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel8
          explanation: Mag niet onder curatele staan
      - output: voldoet_aan_levensgedrag_eis
        value:
          operation: IF
          cases:
          - when:
              operation: IS_NULL
              subject: $is_van_slecht_levensgedrag
            then: true
          - when:
              operation: EQUALS
              subject: $is_van_slecht_levensgedrag
              value: false
            then: true
          default: false
        legal_basis:
          law: Alcoholwet
          bwb_id: BWBR0002458
          article: '8'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel8
          explanation: Mag niet van slecht levensgedrag zijn
      - output: voldoet_aan_svh_eis
        value:
          operation: IF
          cases:
          - when:
              operation: IS_NULL
              subject: $is_ingeschreven_svh_register
            then: true
          - when:
              operation: EQUALS
              subject: $is_ingeschreven_svh_register
              value: true
            then: true
          default: false
        legal_basis:
          law: Alcoholwet
          bwb_id: BWBR0002458
          article: '8'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel8
          explanation: Moet ingeschreven zijn in Register sociale hygiëne
      - output: voldoet_aan_inrichtingseis
        value:
          operation: IF
          cases:
          - when:
              operation: AND
              conditions:
              - operation: EQUALS
                subject: $type_bedrijf
                value: $type_horecabedrijf
              - operation: GREATER_THAN_OR_EQUAL
                subject: $vloeroppervlakte
                value: $minimale_vloeroppervlakte_horeca
            then: true
          - when:
              operation: AND
              conditions:
              - operation: EQUALS
                subject: $type_bedrijf
                value: $type_slijtersbedrijf
              - operation: GREATER_THAN_OR_EQUAL
                subject: $vloeroppervlakte
                value: $minimale_vloeroppervlakte_slijterij
            then: true
          - when:
              operation: AND
              conditions:
              - operation: NOT
                value:
                  operation: EQUALS
                  subject: $type_bedrijf
                  value: $type_horecabedrijf
              - operation: NOT
                value:
                  operation: EQUALS
                  subject: $type_bedrijf
                  value: $type_slijtersbedrijf
            then: true
          default: false
        legal_basis:
          law: Alcoholwet
          bwb_id: BWBR0002458
          article: '10'
          paragraph: '2'
          url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel10
          explanation: Vloeroppervlakte moet voldoen aan minimumeis voor bedrijfstype
      - output: voldoet_aan_artikel_8
        value:
          operation: AND
          conditions:
          - operation: GREATER_THAN_OR_EQUAL
            subject: $leeftijd_leidinggevende
            value: $minimale_leeftijd
          - operation: EQUALS
            subject: $is_onder_curatele
            value: false
        legal_basis:
          law: Alcoholwet
          bwb_id: BWBR0002458
          article: '8'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk2_Artikel8
          explanation: Alle verplichte eisen van artikel 8 lid 1
      - output: voldoet_aan_nationale_eisen
        value: true
        legal_basis:
          law: Alcoholwet
          bwb_id: BWBR0002458
          article: '27'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk3_Artikel27
          explanation: Aan alle nationale eisen uit artikel 8 en 10 is voldaan
      - output: weigeringsgrond_nationaal
        value:
          operation: IF
          cases:
          - when:
              operation: LESS_THAN
              subject: $leeftijd_leidinggevende
              value: $minimale_leeftijd
            then: Leidinggevende heeft de leeftijd van 21 jaar niet bereikt (artikel 8 lid 1 onder a)
          - when:
              operation: EQUALS
              subject: $is_onder_curatele
              value: true
            then: Leidinggevende staat onder curatele (artikel 8 lid 1 onder c)
          - when:
              operation: AND
              conditions:
              - operation: EQUALS
                subject: $type_bedrijf
                value: $type_horecabedrijf
              - operation: LESS_THAN
                subject: $vloeroppervlakte
                value: $minimale_vloeroppervlakte_horeca
            then: Horecalokaliteit heeft minder dan 35 m² vloeroppervlakte (artikel 10 lid 2)
          - when:
              operation: AND
              conditions:
              - operation: EQUALS
                subject: $type_bedrijf
                value: $type_slijtersbedrijf
              - operation: LESS_THAN
                subject: $vloeroppervlakte
                value: $minimale_vloeroppervlakte_slijterij
            then: Slijtlokaliteit heeft minder dan 15 m² vloeroppervlakte (artikel 10 lid 2)
          default: ''
        legal_basis:
          law: Alcoholwet
          bwb_id: BWBR0002458
          article: '27'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0002458/2024-01-01#Hoofdstuk3_Artikel27
          explanation: Weigeringsgrond op basis van niet voldoen aan artikel 8 of 10
