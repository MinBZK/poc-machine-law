articles:
- number: '28'
  text: "1 De rechten waarvan de schuldige, in de bij de wet bepaalde gevallen, bij rechterlijke uitspraak kan worden ontzet,\
    \ zijn:\n  1°. het bekleden van ambten of van bepaalde ambten;\n  2°. het dienen bij de gewapende macht;\n  3°. het recht\
    \ de leden van algemeen vertegenwoordigende organen te verkiezen en tot lid van deze organen te worden verkozen;\n  4°.\
    \ het zijn van raadsman of gerechtelijk bewindvoerder;\n  5°. de uitoefening van bepaalde beroepen.\n2 Ontzetting van\
    \ leden van de rechterlijke macht die, hetzij voor hun leven, hetzij voor een bepaalde tijd, zijn aangesteld, of van andere\
    \ voor hun leven aangestelde ambtenaren, geschiedt, ten opzichte van het ambt waartoe zij aldus zijn aangesteld, alleen\
    \ in de gevallen en op de wijze bij de wet bepaald.\n3 Ontzetting van het recht bedoeld in het eerste lid, onder 3°, kan\
    \ alleen worden uitgesproken bij veroordeling tot gevangenisstraf van ten minste een jaar.\n4 De rechter kan aan een krachtens\
    \ algemene maatregel van bestuur aangewezen reclasseringsinstelling opdracht geven toezicht te houden op de naleving door\
    \ de veroordeelde van de ontzetting van het recht om ambten of bepaalde ambten te bekleden en het recht om bepaalde beroepen\
    \ uit te oefenen."
