$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: wet_kinderopvang
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Bepalen kinderopvangtoeslag
bwb_id: BWBR0017017
url: https://wetten.overheid.nl/BWBR0017017/2024-01-01
service: TOESLAGEN
uuid: f8e7d6c5-4321-4f0f-bbbb-123456789abc
discoverable: CITIZEN
articles:
- number: '1.5'
  text: "1 Een ouder heeft aanspraak op een kinderopvangtoeslag in de door hem of zijn partner betaalde kosten, indien het\
    \ betreft:\n  a. kinderopvang in een geregistreerd kindercentrum; of\n  b. gastouderopvang in een geregistreerde voorziening\
    \ voor gastouderopvang.\n2 Indien het ouderparticipatieopvang in een ouderparticipatiecrèche betreft, heeft de ouder in\
    \ de aanloopperiode, bedoeld in artikel 1.60b, in afwijking van het eerste lid, geen aanspraak op kinderopvangtoeslag.\n\
    3 Een ouder en diens partner die tevens ouder is worden voor de toepassing van deze wet geacht gezamenlijk één aanspraak\
    \ te hebben."
  url: https://wetten.overheid.nl/BWBR0017017/2024-01-01#Artikel1.5
  machine_readable:
    definitions:
      MAX_UURTARIEF_DAGOPVANG:
        value: 902
      MAX_UURTARIEF_BSO:
        value: 766
      MAX_HOURS_PER_YEAR:
        value: 2760
      INKOMENSDREMPEL_1:
        value: 3500000
      INKOMENSDREMPEL_2:
        value: 7000000
      PERCENTAGE_1:
        value: 0.96
      PERCENTAGE_2:
        value: 0.8
      PERCENTAGE_3:
        value: 0.33
      MIN_HOURS_PARTNER:
        value: 1040
      MIN_HOURS_PER_WEEK:
        value: 20
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: TOEKENNING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: INKOMEN
        type: amount
        type_spec:
          unit: eurocent
        source:
          regulation: wet_inkomstenbelasting
          output: inkomen
          service: BELASTINGDIENST
          parameters:
            BSN: $BSN
      - name: PARTNER_BSN
        type: string
        source:
          regulation: wet_brp
          output: partner_bsn
          service: RvIG
          parameters:
            BSN: $BSN
      - name: PARTNER_INKOMEN
        type: amount
        type_spec:
          unit: eurocent
        source:
          regulation: wet_inkomstenbelasting
          output: inkomen
          service: BELASTINGDIENST
          parameters:
            BSN: $PARTNER_BSN
      - name: KINDEREN_BSNS
        type: array
        source:
          regulation: wet_brp
          output: kinderen_bsns
          service: RvIG
          parameters:
            BSN: $BSN
      - name: GEWERKTE_UREN
        type: number
        source:
          regulation: wet_structuur_uitvoeringsorganisatie_werk_en_inkomen
          output: gewerkte_uren
          service: UWV
          parameters:
            BSN: $BSN
      - name: PARTNER_GEWERKTE_UREN
        type: number
        source:
          regulation: wet_structuur_uitvoeringsorganisatie_werk_en_inkomen
          output: gewerkte_uren
          service: UWV
          parameters:
            BSN: $PARTNER_BSN
      - name: KINDEROPVANG_KVK
        type: string
        required: true
        source_reference:
          source_type: claim
      - name: AANGEGEVEN_UREN
        type: array
        required: true
        source_reference:
          source_type: claim
      - name: VERWACHTE_PARTNER_UREN
        type: number
        required: true
        source_reference:
          source_type: claim
      output:
      - name: is_gerechtigd
        type: boolean
      - name: jaarbedrag
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      requirements:
      - all:
        - operation: OR
          values:
          - subject: $PARTNER_BSN
            operation: IS_NULL
          - operation: OR
            values:
            - subject: $PARTNER_GEWERKTE_UREN
              operation: GREATER_OR_EQUAL
              value: $MIN_HOURS_PARTNER
            - subject: $VERWACHTE_PARTNER_UREN
              operation: GREATER_OR_EQUAL
              value: $MIN_HOURS_PER_WEEK
        - subject: $GEWERKTE_UREN
          operation: GREATER_THAN
          value: 0
      actions:
      - output: is_gerechtigd
        value: true
      - output: jaarbedrag
        value:
          operation: FOREACH
          subject: $AANGEGEVEN_UREN
          value:
          - operation: MULTIPLY
            values:
            - operation: MIN
              values:
              - operation: IF
                conditions:
                - test:
                    operation: EQUALS
                    subject: $soort_opvang
                    value: DAGOPVANG
                  then: $MAX_UURTARIEF_DAGOPVANG
                - else: $MAX_UURTARIEF_BSO
              - $uurtarief
            - operation: MIN
              values:
              - $uren_per_jaar
              - $MAX_HOURS_PER_YEAR
            - operation: IF
              conditions:
              - test:
                  operation: LESS_THAN
                  subject:
                    operation: ADD
                    values:
                    - $INKOMEN
                    - operation: IF
                      conditions:
                      - test:
                          operation: NOT_NULL
                          subject: $PARTNER_BSN
                        then: $PARTNER_INKOMEN
                      - else: 0
                  value: $INKOMENSDREMPEL_1
                then: $PERCENTAGE_1
              - test:
                  operation: LESS_THAN
                  subject:
                    operation: ADD
                    values:
                    - $INKOMEN
                    - operation: IF
                      conditions:
                      - test:
                          operation: NOT_NULL
                          subject: $PARTNER_BSN
                        then: $PARTNER_INKOMEN
                      - else: 0
                  value: $INKOMENSDREMPEL_2
                then: $PERCENTAGE_2
              - else: $PERCENTAGE_3
          combine: ADD
        legal_basis:
          law: Wet kinderopvang
          bwb_id: BWBR0017017
          article: '1.6'
          url: https://wetten.overheid.nl/BWBR0017017/2024-12-11#Hoofdstuk1_Afdeling1_Paragraaf4_Artikel1.6
          juriconnect: jci1.3:c:BWBR0017017&artikel=1.6&z=2024-12-11&g=2024-12-11
          explanation: Artikel 1.6 Wet kinderopvang bepaalt optelling toeslag voor alle kinderen
