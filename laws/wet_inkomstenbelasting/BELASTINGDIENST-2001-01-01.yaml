      - name: bedrijfsinkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
      - name: maandelijks_inkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
      actions:
      - output: box1_inkomen
        value:
          operation: ADD
          values:
          - $box1_dienstbetrekking
          - $box1_onderneming
          - $box1_uitkeringen
          - $box1_overige_werkzaamheden
          - $box1_eigen_woning
      - output: box2_inkomen
        value:
          operation: ADD
          values:
          - $box2_dividend
          - $box2_aandelen
      - output: box3_bezittingen
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - operation: ADD
              values:
              - $box3_sparen
              - $box3_beleggen
              - $box3_onroerend_goed
            - $box3_schulden
            - operation: IF
              cases:
              - when:
                  operation: EQUALS
                  subject: $heeft_partner
                  value: true
                then: $box3_heffingsvrije_voet_partners
              default: $box3_heffingsvrije_voet_alleenstaand
          - 0
      - output: box3_inkomen
        value:
          operation: MULTIPLY
          values:
          - $box3_bezittingen
          - $box3_forfaitair_rendement
      - output: belastbaar_inkomen
        value:
          operation: ADD
          values:
          - $box1_inkomen
          - $box2_inkomen
          - $box3_inkomen
          - operation: SUBTRACT
            values:
            - 0
            - $persoonsgebonden_aftrek
      - output: box1_inkomen_na_aftrek
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - $box1_inkomen
            - $persoonsgebonden_aftrek
          - 0
      - output: resterende_aftrek_na_box1
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - $persoonsgebonden_aftrek
            - $box1_inkomen
          - 0
      - output: box3_inkomen_na_aftrek
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - $box3_inkomen
            - $resterende_aftrek_na_box1
          - 0
      - output: resterende_aftrek_na_box3
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - $resterende_aftrek_na_box1
            - $box3_inkomen
          - 0
      - output: box2_inkomen_na_aftrek
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - $box2_inkomen
            - $resterende_aftrek_na_box3
          - 0
      - output: is_aow_leeftijd
        value:
          operation: GREATER_THAN_OR_EQUAL
          subject: $leeftijd
          value: $pensioenleeftijd
      - output: box1_belasting
        value:
          operation: IF
          cases:
          - when:
              operation: EQUALS
              subject: $is_aow_leeftijd
              value: true
            then:
              operation: IF
              cases:
              - when:
                  operation: LESS_THAN_OR_EQUAL
                  subject: $box1_inkomen_na_aftrek
                  value: $box1_schijf1_grens
                then:
                  operation: MULTIPLY
                  values:
                  - $box1_inkomen_na_aftrek
                  - $box1_tarief1_aow
              default:
                operation: ADD
                values:
                - operation: MULTIPLY
                  values:
                  - $box1_schijf1_grens
                  - $box1_tarief1_aow
                - operation: MULTIPLY
                  values:
                  - operation: SUBTRACT
                    values:
                    - $box1_inkomen_na_aftrek
                    - $box1_schijf1_grens
                  - $box1_tarief2_aow
          default:
            operation: IF
            cases:
            - when:
                operation: LESS_THAN_OR_EQUAL
                subject: $box1_inkomen_na_aftrek
                value: $box1_schijf1_grens
              then:
                operation: MULTIPLY
                values:
                - $box1_inkomen_na_aftrek
                - $box1_tarief1
            default:
              operation: ADD
              values:
              - operation: MULTIPLY
                values:
                - $box1_schijf1_grens
                - $box1_tarief1
              - operation: MULTIPLY
                values:
                - operation: SUBTRACT
                  values:
                  - $box1_inkomen_na_aftrek
                  - $box1_schijf1_grens
                - $box1_tarief2
      - output: box2_belasting
        value:
          operation: IF
          cases:
          - when:
              operation: LESS_THAN_OR_EQUAL
              subject: $box2_inkomen_na_aftrek
              value: $box2_schijf1_grens
            then:
              operation: MULTIPLY
              values:
              - $box2_inkomen_na_aftrek
              - $box2_tarief1
          default:
            operation: ADD
            values:
            - operation: MULTIPLY
              values:
              - $box2_schijf1_grens
              - $box2_tarief1
            - operation: MULTIPLY
              values:
              - operation: SUBTRACT
                values:
                - $box2_inkomen_na_aftrek
                - $box2_schijf1_grens
              - $box2_tarief2
      - output: box3_belasting
        value:
          operation: MULTIPLY
          values:
          - $box3_inkomen_na_aftrek
          - $box3_belastingtarief
      - output: algemene_heffingskorting
        value:
          operation: IF
          cases:
          - when:
              operation: EQUALS
              subject: $is_aow_leeftijd
              value: true
            then:
              operation: MAX
              values:
              - operation: SUBTRACT
                values:
                - $algemene_heffingskorting_max_aow
                - operation: IF
                  cases:
                  - when:
                      operation: GREATER_THAN
                      subject: $box1_inkomen
                      value: $algemene_heffingskorting_afbouw_start
                    then:
                      operation: MULTIPLY
                      values:
                      - operation: MIN
                        values:
                        - operation: SUBTRACT
                          values:
                          - $box1_inkomen
                          - $algemene_heffingskorting_afbouw_start
                        - operation: SUBTRACT
                          values:
                          - $algemene_heffingskorting_nulpunt
                          - $algemene_heffingskorting_afbouw_start
                      - $algemene_heffingskorting_afbouw_aow
                  default: 0
              - 0
          default:
            operation: MAX
            values:
            - operation: SUBTRACT
              values:
              - $algemene_heffingskorting_max
              - operation: IF
                cases:
                - when:
                    operation: GREATER_THAN
                    subject: $box1_inkomen
                    value: $algemene_heffingskorting_afbouw_start
                  then:
                    operation: MULTIPLY
                    values:
                    - operation: MIN
                      values:
                      - operation: SUBTRACT
                        values:
                        - $box1_inkomen
                        - $algemene_heffingskorting_afbouw_start
                      - operation: SUBTRACT
                        values:
                        - $algemene_heffingskorting_nulpunt
                        - $algemene_heffingskorting_afbouw_start
                    - $algemene_heffingskorting_afbouw
                default: 0
            - 0
      - output: arbeidskorting
        value:
          operation: IF
          cases:
          - when:
              operation: EQUALS
              subject: $is_aow_leeftijd
              value: true
            then:
              operation: MAX
              values:
              - operation: SUBTRACT
                values:
                - $arbeidskorting_max_aow
                - operation: IF
                  cases:
                  - when:
                      operation: GREATER_THAN
                      subject: $box1_dienstbetrekking
                      value: $arbeidskorting_afbouw_start
                    then:
                      operation: MULTIPLY
                      values:
                      - operation: MIN
                        values:
                        - operation: SUBTRACT
                          values:
                          - $box1_dienstbetrekking
                          - $arbeidskorting_afbouw_start
                        - operation: SUBTRACT
                          values:
                          - $arbeidskorting_nulpunt
                          - $arbeidskorting_afbouw_start
                      - $arbeidskorting_afbouw_aow
                  default: 0
              - 0
          default:
            operation: MAX
            values:
            - operation: SUBTRACT
              values:
              - $arbeidskorting_max
              - operation: IF
                cases:
                - when:
                    operation: GREATER_THAN
                    subject: $box1_dienstbetrekking
                    value: $arbeidskorting_afbouw_start
                  then:
                    operation: MULTIPLY
                    values:
                    - operation: MIN
                      values:
                      - operation: SUBTRACT
                        values:
                        - $box1_dienstbetrekking
                        - $arbeidskorting_afbouw_start
                      - operation: SUBTRACT
                        values:
                        - $arbeidskorting_nulpunt
                        - $arbeidskorting_afbouw_start
                    - $arbeidskorting_afbouw
                default: 0
            - 0
      - output: inkomensafhankelijke_combinatiekorting
        value:
          operation: IF
          cases:
          - when:
              operation: AND
              conditions:
              - operation: EQUALS
                subject: $heeft_kinderen_onder_12
                value: true
              - operation: GREATER_THAN
                subject: $box1_dienstbetrekking
                value: $inkomensafhankelijke_combinatiekorting_min_inkomen
            then:
              operation: MIN
              values:
              - operation: ADD
                values:
                - $inkomensafhankelijke_combinatiekorting_basis
                - operation: MULTIPLY
                  values:
                  - operation: SUBTRACT
                    values:
                    - $box1_dienstbetrekking
                    - $inkomensafhankelijke_combinatiekorting_min_inkomen
                  - $inkomensafhankelijke_combinatiekorting_percentage
              - $inkomensafhankelijke_combinatiekorting_max
          default: 0
      - output: totale_heffingskortingen
        value:
          operation: ADD
          values:
          - $algemene_heffingskorting
          - $arbeidskorting
          - $inkomensafhankelijke_combinatiekorting
      - output: totale_belastingschuld
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - operation: ADD
              values:
              - $box1_belasting
              - $box2_belasting
              - $box3_belasting
            - $totale_heffingskortingen
          - 0
