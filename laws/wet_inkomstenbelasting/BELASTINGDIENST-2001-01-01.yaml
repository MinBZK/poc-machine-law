          - 0
      - output: box2_inkomen_na_aftrek
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - $box2_inkomen
            - $resterende_aftrek_na_box3
          - 0
      - output: is_aow_leeftijd
        value:
          operation: GREATER_THAN_OR_EQUAL
          subject: $leeftijd
          value: $pensioenleeftijd
      - output: box1_belasting
        value:
          operation: IF
          cases:
          - when:
              operation: EQUALS
              subject: $is_aow_leeftijd
              value: true
            then:
              operation: IF
              cases:
              - when:
                  operation: LESS_THAN_OR_EQUAL
                  subject: $box1_inkomen_na_aftrek
                  value: $box1_schijf1_grens
                then:
                  operation: MULTIPLY
                  values:
                  - $box1_inkomen_na_aftrek
                  - $box1_tarief1_aow
              default:
                operation: ADD
                values:
                - operation: MULTIPLY
                  values:
                  - $box1_schijf1_grens
                  - $box1_tarief1_aow
                - operation: MULTIPLY
                  values:
                  - operation: SUBTRACT
                    values:
                    - $box1_inkomen_na_aftrek
                    - $box1_schijf1_grens
                  - $box1_tarief2_aow
          default:
            operation: IF
            cases:
            - when:
                operation: LESS_THAN_OR_EQUAL
                subject: $box1_inkomen_na_aftrek
                value: $box1_schijf1_grens
              then:
                operation: MULTIPLY
                values:
                - $box1_inkomen_na_aftrek
                - $box1_tarief1
            default:
              operation: ADD
              values:
              - operation: MULTIPLY
                values:
                - $box1_schijf1_grens
                - $box1_tarief1
              - operation: MULTIPLY
                values:
                - operation: SUBTRACT
                  values:
                  - $box1_inkomen_na_aftrek
                  - $box1_schijf1_grens
                - $box1_tarief2
      - output: box2_belasting
        value:
          operation: IF
          cases:
          - when:
              operation: LESS_THAN_OR_EQUAL
              subject: $box2_inkomen_na_aftrek
              value: $box2_schijf1_grens
            then:
              operation: MULTIPLY
              values:
              - $box2_inkomen_na_aftrek
              - $box2_tarief1
          default:
            operation: ADD
            values:
            - operation: MULTIPLY
              values:
              - $box2_schijf1_grens
              - $box2_tarief1
            - operation: MULTIPLY
              values:
              - operation: SUBTRACT
                values:
                - $box2_inkomen_na_aftrek
                - $box2_schijf1_grens
              - $box2_tarief2
      - output: box3_belasting
        value:
          operation: MULTIPLY
          values:
          - $box3_inkomen_na_aftrek
          - $box3_belastingtarief
      - output: algemene_heffingskorting
        value:
          operation: IF
          cases:
          - when:
              operation: EQUALS
              subject: $is_aow_leeftijd
              value: true
            then:
              operation: MAX
              values:
              - operation: SUBTRACT
                values:
                - $algemene_heffingskorting_max_aow
                - operation: IF
                  cases:
                  - when:
                      operation: GREATER_THAN
                      subject: $box1_inkomen
                      value: $algemene_heffingskorting_afbouw_start
                    then:
                      operation: MULTIPLY
                      values:
                      - operation: MIN
                        values:
                        - operation: SUBTRACT
                          values:
                          - $box1_inkomen
                          - $algemene_heffingskorting_afbouw_start
                        - operation: SUBTRACT
                          values:
                          - $algemene_heffingskorting_nulpunt
                          - $algemene_heffingskorting_afbouw_start
                      - $algemene_heffingskorting_afbouw_aow
                  default: 0
              - 0
          default:
            operation: MAX
            values:
            - operation: SUBTRACT
              values:
              - $algemene_heffingskorting_max
              - operation: IF
                cases:
                - when:
                    operation: GREATER_THAN
                    subject: $box1_inkomen
                    value: $algemene_heffingskorting_afbouw_start
                  then:
                    operation: MULTIPLY
                    values:
                    - operation: MIN
                      values:
                      - operation: SUBTRACT
                        values:
                        - $box1_inkomen
                        - $algemene_heffingskorting_afbouw_start
                      - operation: SUBTRACT
                        values:
                        - $algemene_heffingskorting_nulpunt
                        - $algemene_heffingskorting_afbouw_start
                    - $algemene_heffingskorting_afbouw
                default: 0
            - 0
      - output: arbeidskorting
        value:
          operation: IF
          cases:
          - when:
              operation: EQUALS
              subject: $is_aow_leeftijd
              value: true
            then:
              operation: MAX
              values:
              - operation: SUBTRACT
                values:
                - $arbeidskorting_max_aow
                - operation: IF
                  cases:
                  - when:
                      operation: GREATER_THAN
                      subject: $loon_uit_dienstbetrekking
                      value: $arbeidskorting_afbouw_start
                    then:
                      operation: MULTIPLY
                      values:
                      - operation: MIN
                        values:
                        - operation: SUBTRACT
                          values:
                          - $loon_uit_dienstbetrekking
                          - $arbeidskorting_afbouw_start
                        - operation: SUBTRACT
                          values:
                          - $arbeidskorting_nulpunt
                          - $arbeidskorting_afbouw_start
                      - $arbeidskorting_afbouw_aow
                  default: 0
              - 0
          default:
            operation: MAX
            values:
            - operation: SUBTRACT
              values:
              - $arbeidskorting_max
              - operation: IF
                cases:
                - when:
                    operation: GREATER_THAN
                    subject: $loon_uit_dienstbetrekking
                    value: $arbeidskorting_afbouw_start
                  then:
                    operation: MULTIPLY
                    values:
                    - operation: MIN
                      values:
                      - operation: SUBTRACT
                        values:
                        - $loon_uit_dienstbetrekking
                        - $arbeidskorting_afbouw_start
                      - operation: SUBTRACT
                        values:
                        - $arbeidskorting_nulpunt
                        - $arbeidskorting_afbouw_start
                    - $arbeidskorting_afbouw
                default: 0
            - 0
      - output: inkomensafhankelijke_combinatiekorting
        value:
          operation: IF
          cases:
          - when:
              operation: AND
              conditions:
              - operation: EQUALS
                subject: $heeft_kinderen_onder_12
                value: true
              - operation: GREATER_THAN
                subject: $loon_uit_dienstbetrekking
                value: $inkomensafhankelijke_combinatiekorting_min_inkomen
            then:
              operation: MIN
              values:
              - operation: ADD
                values:
                - $inkomensafhankelijke_combinatiekorting_basis
                - operation: MULTIPLY
                  values:
                  - operation: SUBTRACT
                    values:
                    - $loon_uit_dienstbetrekking
                    - $inkomensafhankelijke_combinatiekorting_min_inkomen
                  - $inkomensafhankelijke_combinatiekorting_percentage
              - $inkomensafhankelijke_combinatiekorting_max
          default: 0
      - output: totale_heffingskortingen
        value:
          operation: ADD
          values:
          - $algemene_heffingskorting
          - $arbeidskorting
          - $inkomensafhankelijke_combinatiekorting
      - output: totale_belastingschuld
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - operation: ADD
              values:
              - $box1_belasting
              - $box2_belasting
              - $box3_belasting
            - $totale_heffingskortingen
          - 0
      - output: buitenlands_inkomen
        value: $buitenlands_inkomen
      - output: inkomen
        value:
          operation: ADD
          values:
          - $box1_inkomen
          - $box2_inkomen
          - $box3_inkomen
          - $buitenlands_inkomen
      - output: vermogen
        value:
          operation: SUBTRACT
          values:
          - operation: ADD
            values:
            - $spaargeld
            - $beleggingen
            - $onroerend_goed
          - $schulden
      - output: partner_box1_inkomen
        value:
          operation: ADD
          values:
          - operation: IF
            cases:
            - when:
                operation: NOT
                value:
                  operation: IS_NULL
                  subject: $partner_bsn
              then:
                operation: ADD
                values:
                - $partner_loon_uit_dienstbetrekking
                - $partner_uitkeringen_en_pensioenen
                - $partner_winst_uit_onderneming
                - $partner_resultaat_overige_werkzaamheden
                - $partner_eigen_woning
            default: 0
      - output: partner_box2_inkomen
        value:
          operation: ADD
          values:
          - operation: IF
            cases:
            - when:
                operation: NOT
                value:
                  operation: IS_NULL
                  subject: $partner_bsn
              then:
                operation: ADD
                values:
                - $partner_reguliere_voordelen
                - $partner_vervreemdingsvoordelen
            default: 0
      - output: partner_box3_inkomen
        value:
          operation: IF
          cases:
          - when:
              operation: NOT
              value:
                operation: IS_NULL
                subject: $partner_bsn
            then:
              operation: MULTIPLY
              values:
              - operation: MAX
                values:
                - operation: SUBTRACT
                  values:
                  - operation: ADD
                    values:
                    - $partner_spaargeld
                    - $partner_beleggingen
                    - $partner_onroerend_goed
                  - $partner_schulden
                  - $heffingsvrij_vermogen
                - 0
              - $box3_rendement
          default: 0
      - output: partner_buitenlands_inkomen
        value: $partner_buitenlands_inkomen
      - output: partner_inkomen
        value:
          operation: ADD
          values:
          - $partner_box1_inkomen
          - $partner_box2_inkomen
          - $partner_box3_inkomen
          - $partner_buitenlands_inkomen
      - output: gezamenlijk_vermogen
        value:
          operation: IF
          cases:
          - when:
              operation: NOT
              value:
                operation: IS_NULL
                subject: $partner_bsn
            then:
              operation: ADD
              values:
              - $vermogen
              - operation: SUBTRACT
                values:
                - operation: ADD
                  values:
                  - $partner_spaargeld
                  - $partner_beleggingen
                  - $partner_onroerend_goed
                - $partner_schulden
          default: $vermogen
      - output: bezittingen
        value:
          operation: ADD
          values:
          - $spaargeld
          - $beleggingen
          - $onroerend_goed
      - output: bedrijfsinkomen
        value:
          operation: DIVIDE
          values:
          - $winst_uit_onderneming
          - 12
      - output: maandelijks_inkomen
        value:
          operation: DIVIDE
          values:
          - operation: ADD
            values:
            - $box1_inkomen
            - $box2_inkomen
            - $box3_inkomen
          - 12
