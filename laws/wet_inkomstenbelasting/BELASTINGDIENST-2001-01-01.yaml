          operation: ADD
          values:
          - $loon_uit_dienstbetrekking
          - $winst_uit_onderneming
          - $uitkeringen_en_pensioenen
          - $resultaat_overige_werkzaamheden
          - $eigen_woning
      - output: box2_inkomen
        value:
          operation: ADD
          values:
          - $reguliere_voordelen
          - $vervreemdingsvoordelen
      - output: box3_bezittingen
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - operation: ADD
              values:
              - $spaargeld
              - $beleggingen
              - $onroerend_goed
            - $schulden
            - operation: IF
              cases:
              - when:
                  operation: EQUALS
                  subject: $heeft_partner
                  value: true
                then: $box3_heffingsvrije_voet_partners
              default: $box3_heffingsvrije_voet_alleenstaand
          - 0
      - output: box3_inkomen
        value:
          operation: MULTIPLY
          values:
          - $box3_bezittingen
          - $box3_forfaitair_rendement
      - output: belastbaar_inkomen
        value:
          operation: ADD
          values:
          - $box1_inkomen
          - $box2_inkomen
          - $box3_inkomen
          - operation: SUBTRACT
            values:
            - 0
            - $persoonsgebonden_aftrek
      - output: box1_inkomen_na_aftrek
