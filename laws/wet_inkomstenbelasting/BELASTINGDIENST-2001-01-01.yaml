articles:
- number: '2.1'
  text: "1 Belastingplichtigen voor de inkomstenbelasting zijn de natuurlijke personen die:\n  a. in Nederland wonen (binnenlandse\
    \ belastingplichtigen) of\n  b. niet in Nederland wonen maar wel Nederlands inkomen genieten (buitenlandse belastingplichtigen).\n\
    2 Nederlands inkomen is inkomen bedoeld in hoofdstuk 7."
  url: https://wetten.overheid.nl/BWBR0011353/2001-01-01#Artikel2.1
