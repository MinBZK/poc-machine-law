        type_spec:
          unit: eurocent
          precision: 0
      - name: box1_belasting
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: box2_inkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
      - name: box2_belasting
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: box3_inkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
      - name: box3_belasting
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: algemene_heffingskorting
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: arbeidskorting
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: inkomensafhankelijke_combinatiekorting
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: totale_heffingskortingen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: belastbaar_inkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
      - name: buitenlands_inkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
      - name: inkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
      - name: vermogen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
      - name: partner_box1_inkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
      - name: partner_box2_inkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
      - name: partner_box3_inkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
      - name: partner_buitenlands_inkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
      - name: partner_inkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
      - name: gezamenlijk_vermogen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
      - name: bezittingen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
      - name: bedrijfsinkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
      - name: maandelijks_inkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
      actions:
      - output: box1_inkomen
        value:
          operation: ADD
          values:
          - $BOX1_DIENSTBETREKKING
          - $BOX1_ONDERNEMING
          - $BOX1_UITKERINGEN
          - $BOX1_OVERIGE_WERKZAAMHEDEN
          - $BOX1_EIGEN_WONING
      - output: box2_inkomen
        value:
          operation: ADD
          values:
          - $BOX2_DIVIDEND
          - $BOX2_AANDELEN
      - output: box3_bezittingen
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - operation: ADD
              values:
              - $BOX3_SPAREN
              - $BOX3_BELEGGEN
              - $BOX3_ONROEREND_GOED
            - $BOX3_SCHULDEN
            - operation: IF
              conditions:
              - test:
                  operation: EQUALS
                  subject: $HEEFT_PARTNER
                  value: true
                then: $BOX3_HEFFINGSVRIJE_VOET_PARTNERS
              - else: $BOX3_HEFFINGSVRIJE_VOET_ALLEENSTAAND
          - 0
      - output: box3_inkomen
        value:
          operation: MULTIPLY
          values:
          - $box3_bezittingen
          - $BOX3_FORFAITAIR_RENDEMENT
      - output: belastbaar_inkomen
        value:
          operation: ADD
          values:
          - $box1_inkomen
          - $box2_inkomen
          - $box3_inkomen
          - operation: SUBTRACT
            values:
            - 0
            - $PERSOONSGEBONDEN_AFTREK
      - output: box1_inkomen_na_aftrek
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - $box1_inkomen
            - $PERSOONSGEBONDEN_AFTREK
          - 0
      - output: resterende_aftrek_na_box1
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - $PERSOONSGEBONDEN_AFTREK
            - $box1_inkomen
          - 0
      - output: box3_inkomen_na_aftrek
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - $box3_inkomen
            - $resterende_aftrek_na_box1
          - 0
      - output: resterende_aftrek_na_box3
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - $resterende_aftrek_na_box1
            - $box3_inkomen
          - 0
      - output: box2_inkomen_na_aftrek
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - $box2_inkomen
            - $resterende_aftrek_na_box3
          - 0
      - output: is_aow_leeftijd
        value:
          operation: GREATER_OR_EQUAL
          subject: $LEEFTIJD
          value: $PENSIOENLEEFTIJD
      - output: box1_belasting
        value:
          operation: IF
          conditions:
          - test:
              operation: EQUALS
              subject: $is_aow_leeftijd
              value: true
            then:
              operation: IF
              conditions:
              - test:
                  operation: LESS_OR_EQUAL
                  subject: $box1_inkomen_na_aftrek
                  value: $BOX1_SCHIJF1_GRENS
                then:
                  operation: MULTIPLY
                  values:
                  - $box1_inkomen_na_aftrek
                  - $BOX1_TARIEF1_AOW
              - else:
                  operation: ADD
                  values:
                  - operation: MULTIPLY
                    values:
                    - $BOX1_SCHIJF1_GRENS
                    - $BOX1_TARIEF1_AOW
                  - operation: MULTIPLY
                    values:
                    - operation: SUBTRACT
                      values:
                      - $box1_inkomen_na_aftrek
                      - $BOX1_SCHIJF1_GRENS
                    - $BOX1_TARIEF2_AOW
          - else:
              operation: IF
              conditions:
              - test:
                  operation: LESS_OR_EQUAL
                  subject: $box1_inkomen_na_aftrek
                  value: $BOX1_SCHIJF1_GRENS
                then:
                  operation: MULTIPLY
                  values:
                  - $box1_inkomen_na_aftrek
                  - $BOX1_TARIEF1
              - else:
                  operation: ADD
                  values:
                  - operation: MULTIPLY
                    values:
                    - $BOX1_SCHIJF1_GRENS
                    - $BOX1_TARIEF1
                  - operation: MULTIPLY
                    values:
                    - operation: SUBTRACT
                      values:
                      - $box1_inkomen_na_aftrek
                      - $BOX1_SCHIJF1_GRENS
                    - $BOX1_TARIEF2
      - output: box2_belasting
        value:
          operation: IF
          conditions:
          - test:
              operation: LESS_OR_EQUAL
              subject: $box2_inkomen_na_aftrek
              value: $BOX2_SCHIJF1_GRENS
            then:
              operation: MULTIPLY
              values:
              - $box2_inkomen_na_aftrek
              - $BOX2_TARIEF1
          - else:
              operation: ADD
              values:
              - operation: MULTIPLY
                values:
                - $BOX2_SCHIJF1_GRENS
                - $BOX2_TARIEF1
              - operation: MULTIPLY
                values:
                - operation: SUBTRACT
                  values:
                  - $box2_inkomen_na_aftrek
                  - $BOX2_SCHIJF1_GRENS
                - $BOX2_TARIEF2
      - output: box3_belasting
        value:
          operation: MULTIPLY
          values:
          - $box3_inkomen_na_aftrek
          - $BOX3_BELASTINGTARIEF
      - output: algemene_heffingskorting
        value:
          operation: IF
          conditions:
          - test:
              operation: EQUALS
              subject: $is_aow_leeftijd
              value: true
            then:
              operation: MAX
              values:
              - operation: SUBTRACT
                values:
                - $ALGEMENE_HEFFINGSKORTING_MAX_AOW
                - operation: IF
                  conditions:
                  - test:
                      operation: GREATER_THAN
                      subject: $box1_inkomen
                      value: $ALGEMENE_HEFFINGSKORTING_AFBOUW_START
                    then:
                      operation: MULTIPLY
                      values:
                      - operation: MIN
                        values:
                        - operation: SUBTRACT
                          values:
                          - $box1_inkomen
                          - $ALGEMENE_HEFFINGSKORTING_AFBOUW_START
                        - operation: SUBTRACT
                          values:
                          - $ALGEMENE_HEFFINGSKORTING_NULPUNT
                          - $ALGEMENE_HEFFINGSKORTING_AFBOUW_START
                      - $ALGEMENE_HEFFINGSKORTING_AFBOUW_AOW
                  - else: 0
              - 0
          - else:
              operation: MAX
              values:
              - operation: SUBTRACT
                values:
                - $ALGEMENE_HEFFINGSKORTING_MAX
                - operation: IF
                  conditions:
                  - test:
                      operation: GREATER_THAN
                      subject: $box1_inkomen
                      value: $ALGEMENE_HEFFINGSKORTING_AFBOUW_START
                    then:
                      operation: MULTIPLY
                      values:
                      - operation: MIN
                        values:
                        - operation: SUBTRACT
                          values:
                          - $box1_inkomen
                          - $ALGEMENE_HEFFINGSKORTING_AFBOUW_START
                        - operation: SUBTRACT
                          values:
                          - $ALGEMENE_HEFFINGSKORTING_NULPUNT
                          - $ALGEMENE_HEFFINGSKORTING_AFBOUW_START
                      - $ALGEMENE_HEFFINGSKORTING_AFBOUW
                  - else: 0
              - 0
      - output: arbeidskorting
        value:
          operation: IF
          conditions:
          - test:
              operation: EQUALS
              subject: $is_aow_leeftijd
              value: true
            then:
              operation: MAX
              values:
              - operation: SUBTRACT
                values:
                - $ARBEIDSKORTING_MAX_AOW
                - operation: IF
                  conditions:
                  - test:
                      operation: GREATER_THAN
                      subject: $BOX1_DIENSTBETREKKING
                      value: $ARBEIDSKORTING_AFBOUW_START
                    then:
                      operation: MULTIPLY
                      values:
                      - operation: MIN
                        values:
                        - operation: SUBTRACT
                          values:
                          - $BOX1_DIENSTBETREKKING
                          - $ARBEIDSKORTING_AFBOUW_START
                        - operation: SUBTRACT
                          values:
                          - $ARBEIDSKORTING_NULPUNT
                          - $ARBEIDSKORTING_AFBOUW_START
                      - $ARBEIDSKORTING_AFBOUW_AOW
                  - else: 0
              - 0
          - else:
              operation: MAX
              values:
              - operation: SUBTRACT
                values:
                - $ARBEIDSKORTING_MAX
                - operation: IF
                  conditions:
                  - test:
                      operation: GREATER_THAN
                      subject: $BOX1_DIENSTBETREKKING
                      value: $ARBEIDSKORTING_AFBOUW_START
                    then:
                      operation: MULTIPLY
                      values:
                      - operation: MIN
                        values:
                        - operation: SUBTRACT
                          values:
                          - $BOX1_DIENSTBETREKKING
                          - $ARBEIDSKORTING_AFBOUW_START
                        - operation: SUBTRACT
                          values:
                          - $ARBEIDSKORTING_NULPUNT
                          - $ARBEIDSKORTING_AFBOUW_START
                      - $ARBEIDSKORTING_AFBOUW
                  - else: 0
              - 0
      - output: inkomensafhankelijke_combinatiekorting
        value:
          operation: IF
          conditions:
          - test:
              operation: AND
              values:
              - operation: EQUALS
                subject: $HEEFT_KINDEREN_ONDER_12
                value: true
              - operation: GREATER_THAN
                subject: $BOX1_DIENSTBETREKKING
                value: $INKOMENSAFHANKELIJKE_COMBINATIEKORTING_MIN_INKOMEN
            then:
              operation: MIN
              values:
              - operation: ADD
                values:
                - $INKOMENSAFHANKELIJKE_COMBINATIEKORTING_BASIS
                - operation: MULTIPLY
                  values:
                  - operation: SUBTRACT
                    values:
                    - $BOX1_DIENSTBETREKKING
                    - $INKOMENSAFHANKELIJKE_COMBINATIEKORTING_MIN_INKOMEN
                  - $INKOMENSAFHANKELIJKE_COMBINATIEKORTING_PERCENTAGE
              - $INKOMENSAFHANKELIJKE_COMBINATIEKORTING_MAX
          - else: 0
      - output: totale_heffingskortingen
        value:
          operation: ADD
          values:
          - $algemene_heffingskorting
          - $arbeidskorting
          - $inkomensafhankelijke_combinatiekorting
      - output: totale_belastingschuld
        value:
          operation: MAX
          values:
          - operation: SUBTRACT
            values:
            - operation: ADD
              values:
              - $box1_belasting
              - $box2_belasting
              - $box3_belasting
            - $totale_heffingskortingen
          - 0
      - output: buitenlands_inkomen
        value: $BUITENLANDS_INKOMEN
      - output: inkomen
        value:
          operation: ADD
          values:
          - $box1_inkomen
          - $box2_inkomen
          - $box3_inkomen
          - $buitenlands_inkomen
      - output: vermogen
        value:
          operation: SUBTRACT
          values:
          - operation: ADD
            values:
            - $BOX3_SPAREN
            - $BOX3_BELEGGEN
            - $BOX3_ONROEREND_GOED
          - $BOX3_SCHULDEN
      - output: partner_box1_inkomen
        value:
          operation: ADD
          values:
          - operation: IF
            conditions:
            - test:
                operation: NOT_NULL
                subject: $PARTNER_BSN
              then:
                operation: ADD
                values:
                - $PARTNER_BOX1_DIENSTBETREKKING
                - $PARTNER_BOX1_UITKERINGEN
                - $PARTNER_BOX1_ONDERNEMING
                - $PARTNER_BOX1_OVERIGE_WERKZAAMHEDEN
                - $PARTNER_BOX1_EIGEN_WONING
            - else: 0
      - output: partner_box2_inkomen
        value:
          operation: ADD
          values:
          - operation: IF
            conditions:
            - test:
                operation: NOT_NULL
                subject: $PARTNER_BSN
              then:
                operation: ADD
                values:
                - $PARTNER_BOX2_DIVIDEND
                - $PARTNER_BOX2_AANDELEN
            - else: 0
      - output: partner_box3_inkomen
        value:
          operation: IF
          conditions:
          - test:
              operation: NOT_NULL
              subject: $PARTNER_BSN
            then:
              operation: MULTIPLY
              values:
              - operation: MAX
                values:
                - operation: SUBTRACT
                  values:
                  - operation: ADD
                    values:
                    - $PARTNER_BOX3_SPAREN
                    - $PARTNER_BOX3_BELEGGEN
                    - $PARTNER_BOX3_ONROEREND_GOED
                  - $PARTNER_BOX3_SCHULDEN
                  - $HEFFINGSVRIJ_VERMOGEN
                - 0
              - $BOX3_RENDEMENT
          - else: 0
      - output: partner_buitenlands_inkomen
        value: $PARTNER_BUITENLANDS_INKOMEN
      - output: partner_inkomen
        value:
          operation: ADD
          values:
          - $partner_box1_inkomen
          - $partner_box2_inkomen
          - $partner_box3_inkomen
          - $partner_buitenlands_inkomen
      - output: gezamenlijk_vermogen
        value:
          operation: IF
          conditions:
          - test:
              operation: NOT_NULL
              subject: $PARTNER_BSN
            then:
              operation: ADD
              values:
              - $vermogen
              - operation: SUBTRACT
                values:
                - operation: ADD
                  values:
                  - $PARTNER_BOX3_SPAREN
                  - $PARTNER_BOX3_BELEGGEN
                  - $PARTNER_BOX3_ONROEREND_GOED
                - $PARTNER_BOX3_SCHULDEN
          - else: $vermogen
      - output: bezittingen
        value:
          operation: ADD
          values:
          - $BOX3_SPAREN
          - $BOX3_BELEGGEN
          - $BOX3_ONROEREND_GOED
      - output: bedrijfsinkomen
        value:
          operation: DIVIDE
          values:
          - $BOX1_ONDERNEMING
          - 12
      - output: maandelijks_inkomen
        value:
          operation: DIVIDE
          values:
          - operation: ADD
            values:
            - $box1_inkomen
            - $box2_inkomen
            - $box3_inkomen
          - 12
