articles:
- number: '2'
  text: 1. De tenuitvoerlegging van een vrijheidsstraf of vrijheidsbenemende maatregel
    vindt, voor zover niet bij of krachtens de wet anders is bepaald, plaats door
    onderbrenging van de persoon aan wie deze is opgelegd in een penitentiaire inrichting
    dan wel door diens deelname aan een penitentiair programma. 2. Met handhaving
    van het karakter van de vrijheidsstraf of de vrijheidsbenemende maatregel wordt
    de tenuitvoerlegging hiervan zoveel mogelijk en afhankelijk van het gedrag van
    de betrokkene dienstbaar gemaakt aan de voorbereiding van de terugkeer in de maatschappij.
    Bij het verlenen van vrijheden aan gedetineerden wordt rekening gehouden met de
    veiligheid van de samenleving en de belangen van slachtoffers en nabestaanden.
    3. Personen ten aanzien van wie de tenuitvoerlegging plaatsvindt van een vrijheidsstraf
    of vrijheidsbenemende maatregel worden aan geen andere beperkingen onderworpen
    dan die welke voor het doel van de vrijheidsbeneming, het belang van de handhaving
    van de orde of veiligheid noodzakelijk zijn.
