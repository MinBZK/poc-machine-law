$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/heads/main/schema/v0.5.1/schema.json
$id: zorgverzekeringswet/bijdrage
regulatory_layer: WET
publication_date: '2026-01-01'
valid_from: '2026-01-01'
name: Inkomensafhankelijke bijdrage Zvw
bwb_id: BWBR0018450
url: https://wetten.overheid.nl/BWBR0018450/2026-01-01
service: BELASTINGDIENST
uuid: 2b4c6d8e-1a3f-4e5b-8c7d-9f0e1a2b3c4d
discoverable: CITIZEN
articles:
- number: '41'
  text: De inhoudingsplichtige en de verzekeringsplichtige zijn een inkomensafhankelijke bijdrage verschuldigd.
  url: https://wetten.overheid.nl/BWBR0018450/2026-01-01#Artikel41
  machine_readable:
    definitions:
      MAXIMUM_BIJDRAGE_INKOMEN:
        value: 7541200
      PERCENTAGE_HOOG:
        value: 0.065
      PERCENTAGE_LAAG:
        value: 0.0525
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: AANSLAG
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: LEEFTIJD
        type: number
        type_spec:
          unit: years
          precision: 0
          min: 0
        source:
          regulation: wet_brp
          output: leeftijd
          service: RvIG
          parameters:
            BSN: $BSN
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: GEBOORTEDATUM
        type: date
        source:
          regulation: wet_brp
          output: geboortedatum
          service: RvIG
          parameters:
            BSN: $BSN
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: PENSIOENLEEFTIJD
        type: number
        type_spec:
          unit: years
          precision: 2
          min: 65
        source:
          regulation: algemene_ouderdomswet/leeftijdsbepaling
          output: pensioenleeftijd
          service: SVB
          parameters:
            GEBOORTEDATUM: $GEBOORTEDATUM
        temporal:
          type: point_in_time
          reference: $calculation_date
      - name: INKOMEN_LOON
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
        source:
          regulation: wet_inkomstenbelasting
          output: box1_inkomen
          service: BELASTINGDIENST
          parameters:
            BSN: $BSN
        temporal:
          type: period
          period_type: year
      output:
      - name: bijdrage_type
        type: string
      - name: is_aow_gerechtigd
        type: boolean
      - name: bijdrage_inkomen
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: bijdrage_inkomen_begrensd
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      - name: verschuldigde_bijdrage
        type: amount
        type_spec:
          unit: eurocent
          precision: 0
          min: 0
      requirements:
      - all:
        - subject: $INKOMEN_LOON
          operation: GREATER_THAN
          value: 0
      actions:
      - output: is_aow_gerechtigd
        value:
          operation: GREATER_THAN_OR_EQUAL
          subject: $LEEFTIJD
          value: $PENSIOENLEEFTIJD
        legal_basis:
          law: Zorgverzekeringswet
          bwb_id: BWBR0018450
          article: '43'
          paragraph: '2'
          url: https://wetten.overheid.nl/BWBR0018450/2024-01-01#Hoofdstuk5_Paragraaf5.1_Artikel43
          juriconnect: jci1.3:c:BWBR0018450&artikel=43&lid=2&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 43 lid 2 Zvw: bepaling AOW-gerechtigdheid voor tarief'
      - output: bijdrage_type
        value:
          operation: IF
          cases:
          - when:
              operation: EQUALS
              subject: $is_aow_gerechtigd
              value: true
            then: LAAG
          default: HOOG
        legal_basis:
          law: Zorgverzekeringswet
          bwb_id: BWBR0018450
          article: '43'
          url: https://wetten.overheid.nl/BWBR0018450/2024-01-01#Hoofdstuk5_Paragraaf5.1_Artikel43
          juriconnect: jci1.3:c:BWBR0018450&artikel=43&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 43 Zvw: bepaling toepasselijk tarief'
      - output: bijdrage_inkomen
        value: $INKOMEN_LOON
        legal_basis:
          law: Zorgverzekeringswet
          bwb_id: BWBR0018450
          article: '42'
          url: https://wetten.overheid.nl/BWBR0018450/2024-01-01#Hoofdstuk5_Paragraaf5.1_Artikel42
          juriconnect: jci1.3:c:BWBR0018450&artikel=42&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 42 Zvw: bepaling bijdrage-inkomen'
      - output: bijdrage_inkomen_begrensd
        value:
          operation: MIN
          values:
          - $bijdrage_inkomen
          - $MAXIMUM_BIJDRAGE_INKOMEN
        legal_basis:
          law: Zorgverzekeringswet
          bwb_id: BWBR0018450
          article: '43'
          paragraph: '1'
          url: https://wetten.overheid.nl/BWBR0018450/2024-01-01#Hoofdstuk5_Paragraaf5.1_Artikel43
          juriconnect: jci1.3:c:BWBR0018450&artikel=43&lid=1&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 43 lid 1 Zvw: maximum bijdrage-inkomen'
      - output: verschuldigde_bijdrage
        value:
          operation: IF
          cases:
          - when:
              operation: EQUALS
              subject: $bijdrage_type
              value: HOOG
            then:
              operation: MULTIPLY
              values:
              - $bijdrage_inkomen_begrensd
              - $PERCENTAGE_HOOG
          default:
            operation: MULTIPLY
            values:
            - $bijdrage_inkomen_begrensd
            - $PERCENTAGE_LAAG
        legal_basis:
          law: Zorgverzekeringswet
          bwb_id: BWBR0018450
          article: '41'
          url: https://wetten.overheid.nl/BWBR0018450/2024-01-01#Hoofdstuk5_Paragraaf5.1_Artikel41
          juriconnect: jci1.3:c:BWBR0018450&artikel=41&z=2024-01-01&g=2024-01-01
          explanation: 'Artikel 41 Zvw: berekening inkomensafhankelijke bijdrage'
