$schema: https://raw.githubusercontent.com/MinBZK/regelrecht-mvp/refs/heads/main/schema/v0.5.1/schema.json
$id: machtigingenwet
regulatory_layer: WET
publication_date: '2024-01-01'
valid_from: '2024-01-01'
name: Bepalen vertegenwoordigingsbevoegdheid namens rechtspersonen
bwb_id: BWBR0003045
url: https://wetten.overheid.nl/BWBR0003045/2024-01-01
service: KVK
uuid: 3f8a2b1c-9d4e-4f5a-b8c7-6e1d2f3a4b5c
discoverable: DELEGATION_PROVIDER
articles:
- number: '240'
  text: '1 Het bestuur vertegenwoordigt de vennootschap, voor zover uit de wet niet anders voortvloeit.

    2 De bevoegdheid tot vertegenwoordiging komt mede aan iedere bestuurder toe. De statuten kunnen echter bepalen dat zij
    behalve aan het bestuur slechts toekomt aan een of meer bestuurders. Zij kunnen voorts bepalen dat een bestuurder de vennootschap
    slechts met medewerking van een of meer anderen mag vertegenwoordigen.

    3 Bevoegdheid tot vertegenwoordiging die aan het bestuur of aan een bestuurder toekomt, is onbeperkt en onvoorwaardelijk,
    voor zover uit de wet niet anders voortvloeit. Een wettelijk toegelaten of voorgeschreven beperking van of voorwaarde
    voor de bevoegdheid tot vertegenwoordiging kan slechts door de vennootschap worden ingeroepen.

    4 De statuten kunnen ook aan andere personen dan bestuurders bevoegdheid tot vertegenwoordiging toekennen.'
  url: https://wetten.overheid.nl/BWBR0003045/2024-01-01#Artikel240
  machine_readable:
    definitions:
      BESTUURDER_FUNCTIES:
        value:
        - BESTUURDER
        - DIRECTEUR
        - ALGEMEEN_DIRECTEUR
      EIGENAAR_FUNCTIES:
        value:
        - EIGENAAR
        - VENNOOT
        - BEHEREND_VENNOOT
        - MAAT
      GEMACHTIGDE_FUNCTIES:
        value:
        - GEMACHTIGDE
        - PROCURATIEHOUDER
        - GEVOLMACHTIGDE
      BEVOEGDE_FUNCTIES:
        value:
        - BESTUURDER
        - DIRECTEUR
        - ALGEMEEN_DIRECTEUR
        - EIGENAAR
        - VENNOOT
        - BEHEREND_VENNOOT
        - MAAT
        - VOORZITTER
        - GEMACHTIGDE
        - PROCURATIEHOUDER
        - GEVOLMACHTIGDE
      VOLLEDIGE_BEVOEGDHEID_RECHTEN:
        value:
        - LEZEN
        - CLAIMS_INDIENEN
        - BESLUITEN_ONTVANGEN
      BEPERKTE_BEVOEGDHEID_RECHTEN:
        value:
        - LEZEN
    execution:
      produces:
        legal_character: BESCHIKKING
        decision_type: ANDERE_HANDELING
      parameters:
      - name: BSN
        type: string
        required: true
      input:
      - name: FUNCTIONARISSEN
        type: array
        source_reference:
          table: functionarissen
          fields:
          - kvk_nummer
          - functie
          - bevoegdheid
          - handelsnaam
          - rechtsvorm
          - status
          - datum_inschrijving
          - datum_uitschrijving
          select_on:
          - name: bsn
            description: BSN nummer van de persoon
            type: string
            value: $BSN
      output:
      - name: heeft_delegaties
        type: boolean
      - name: subject_ids
        type: array
      - name: subject_names
        type: array
      - name: subject_types
        type: array
      - name: delegation_types
        type: array
      - name: permissions
        type: array
      - name: valid_from_dates
        type: array
      - name: valid_until_dates
        type: array
      - name: bevoegdheden
        type: array
      requirements:
      - operation: EXISTS
        subject: $FUNCTIONARISSEN
        legal_basis:
          law: Handelsregisterwet 2007
          bwb_id: BWBR0021777
          article: '18'
          url: https://wetten.overheid.nl/BWBR0021777/2024-01-01#Hoofdstuk3_Artikel18
          juriconnect: jci1.3:c:BWBR0021777&artikel=18&z=2024-01-01&g=2024-01-01
          explanation: Persoon moet als functionaris zijn ingeschreven in het Handelsregister
      actions:
      - output: bevoegde_functionarissen
        value:
          operation: FOREACH
          subject: $FUNCTIONARISSEN
          where:
            operation: IN
            subject: $current.functie
            values: $BEVOEGDE_FUNCTIES
          value: $current
        legal_basis:
          law: Burgerlijk Wetboek Boek 2
          bwb_id: BWBR0003045
          article: '240'
          paragraph: '2'
          url: https://wetten.overheid.nl/BWBR0003045/2024-01-01#Boek2_Titeldeel5_Afdeling4_Artikel240
          juriconnect: jci1.3:c:BWBR0003045&boek=2&artikel=240&lid=2&z=2024-01-01&g=2024-01-01
          explanation: 'Art. 2:240 lid 2 BW: alleen bestuurders hebben vertegenwoordigingsbevoegdheid. Art. 2:240 lid 4 BW:
            statuten kunnen ook anderen bevoegdheid toekennen (gemachtigden). Commissarissen en andere toezichthouders zijn
            NIET bevoegd de rechtspersoon te vertegenwoordigen.

            '
      - output: heeft_delegaties
        value:
          operation: EXISTS
          subject: $bevoegde_functionarissen
        legal_basis:
          law: Burgerlijk Wetboek Boek 2
          bwb_id: BWBR0003045
          article: '240'
          paragraph: '2'
          url: https://wetten.overheid.nl/BWBR0003045/2024-01-01#Boek2_Titeldeel5_Afdeling4_Artikel240
          juriconnect: jci1.3:c:BWBR0003045&boek=2&artikel=240&lid=2&z=2024-01-01&g=2024-01-01
          explanation: 'Art. 2:240 lid 2 BW bepaalt dat iedere bestuurder vertegenwoordigingsbevoegd is. Alleen functies met
            vertegenwoordigingsbevoegdheid worden meegeteld.

            '
      - output: subject_ids
        value: $bevoegde_functionarissen.kvk_nummer
        legal_basis:
          law: Handelsregisterwet 2007
          bwb_id: BWBR0021777
          article: '18'
          url: https://wetten.overheid.nl/BWBR0021777/2024-01-01#Hoofdstuk3_Artikel18
          juriconnect: jci1.3:c:BWBR0021777&artikel=18&z=2024-01-01&g=2024-01-01
          explanation: KVK nummers van bedrijven waarvoor bevoegde vertegenwoordiging is geregistreerd
      - output: subject_names
        value: $bevoegde_functionarissen.handelsnaam
        legal_basis:
          law: Handelsregisterwet 2007
          bwb_id: BWBR0021777
          article: '9'
          url: https://wetten.overheid.nl/BWBR0021777/2024-01-01#Hoofdstuk3_Artikel9
          juriconnect: jci1.3:c:BWBR0021777&artikel=9&z=2024-01-01&g=2024-01-01
          explanation: Handelsnaam uit inschrijving in Handelsregister
      - output: subject_types
        value:
          operation: FOREACH
          subject: $bevoegde_functionarissen
          value: BUSINESS
        legal_basis:
          law: Handelsregisterwet 2007
          bwb_id: BWBR0021777
          article: '9'
          url: https://wetten.overheid.nl/BWBR0021777/2024-01-01#Hoofdstuk3_Artikel9
          juriconnect: jci1.3:c:BWBR0021777&artikel=9&z=2024-01-01&g=2024-01-01
          explanation: Deze wet behandelt alleen rechtspersonen (BUSINESS), geen natuurlijke personen
      - output: delegation_types
        value: $bevoegde_functionarissen.functie
        legal_basis:
          law: Handelsregisterwet 2007
          bwb_id: BWBR0021777
          article: '18'
          url: https://wetten.overheid.nl/BWBR0021777/2024-01-01#Hoofdstuk3_Artikel18
          juriconnect: jci1.3:c:BWBR0021777&artikel=18&z=2024-01-01&g=2024-01-01
          explanation: Functie uit functionaris-registratie in Handelsregister
      - output: bevoegdheden
        value: $bevoegde_functionarissen.bevoegdheid
        legal_basis:
          law: Burgerlijk Wetboek Boek 2
          bwb_id: BWBR0003045
          article: '240'
          paragraph: '3'
          url: https://wetten.overheid.nl/BWBR0003045/2024-01-01#Boek2_Titeldeel5_Afdeling4_Artikel240
          juriconnect: jci1.3:c:BWBR0003045&boek=2&artikel=240&lid=3&z=2024-01-01&g=2024-01-01
          explanation: 'Art. 2:240 lid 3 BW: de bevoegdheid van het bestuur kan in de statuten worden beperkt. Het Handelsregister
            registreert dit als VOLLEDIG of BEPERKT.

            '
      - output: permissions
        value:
          operation: FOREACH
          subject: $bevoegdheden
          value:
            operation: IF
            conditions:
            - test:
                operation: EQUALS
                subject: $current
                value: VOLLEDIG
              then: $VOLLEDIGE_BEVOEGDHEID_RECHTEN
            - else: $BEPERKTE_BEVOEGDHEID_RECHTEN
        legal_basis:
          law: Burgerlijk Wetboek Boek 2
          bwb_id: BWBR0003045
          article: '240'
          paragraph: '3'
          url: https://wetten.overheid.nl/BWBR0003045/2024-01-01#Boek2_Titeldeel5_Afdeling4_Artikel240
          juriconnect: jci1.3:c:BWBR0003045&boek=2&artikel=240&lid=3&z=2024-01-01&g=2024-01-01
          explanation: 'Bepaalt per bedrijf de rechten op basis van de geregistreerde bevoegdheid. VOLLEDIG = alle rechten,
            BEPERKT = alleen leesrechten.

            '
      - output: valid_from_dates
        value: $bevoegde_functionarissen.datum_inschrijving
        legal_basis:
          law: Handelsregisterwet 2007
          bwb_id: BWBR0021777
          article: '18'
          url: https://wetten.overheid.nl/BWBR0021777/2024-01-01#Hoofdstuk3_Artikel18
          juriconnect: jci1.3:c:BWBR0021777&artikel=18&z=2024-01-01&g=2024-01-01
          explanation: Inschrijvingsdatum uit Handelsregister
      - output: valid_until_dates
        value: $bevoegde_functionarissen.datum_uitschrijving
        legal_basis:
          law: Handelsregisterwet 2007
          bwb_id: BWBR0021777
          article: '18'
          url: https://wetten.overheid.nl/BWBR0021777/2024-01-01#Hoofdstuk3_Artikel18
          juriconnect: jci1.3:c:BWBR0021777&artikel=18&z=2024-01-01&g=2024-01-01
          explanation: Uitschrijvingsdatum uit Handelsregister, null indien nog actief
