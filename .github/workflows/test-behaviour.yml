name: Run Behaviour Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.uv/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv sync

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build and install regelrecht engine (PyO3)
        run: |
          uv pip install maturin
          git clone --depth 1 --branch feat/foreach-implementation https://github.com/MinBZK/regelrecht.git /tmp/regelrecht
          cd /tmp/regelrecht/packages/engine
          maturin develop --features python

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y locales
          sudo locale-gen nl_NL.UTF-8
          sudo update-locale LANG=nl_NL.UTF-8

      - name: Install Playwright browsers
        run: |
          uv run playwright install --with-deps chromium

      - name: Ensure no @skip tags in main features
        run: |
          if grep -rE "^[[:space:]]*@skip[[:space:]]*$" features/ --include="*.feature" 2>/dev/null; then
            echo "ERROR: @skip tags found in features/."
            exit 1
          fi
          echo "No @skip tags found in main features directory."

      - name: Run tests
        run: ./script/test-behaviour --tags='~@ui' --tags='~@skip'
        env:
          LANG: nl_NL.UTF-8
          LC_ALL: nl_NL.UTF-8
