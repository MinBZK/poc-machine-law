apiVersion: apps/v1
kind: Deployment
metadata:
  name: dpl
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: wallet-verifier
          image: wallet-verifier-image
          ports:
            - name: requester
              containerPort: 3010
              protocol: TCP
            - name: wallet
              containerPort: 3009
              protocol: TCP
          env:
            # WARNING: The following env var is referenced by INDEX in overlays/sandbox/kustomization.yaml
            # Do NOT reorder, add, or remove items above this without updating the overlay patch!
            - name: WALLET_REACHABLE_URL  # env[0]
              value: "http://wallet-verifier.127-0-0-1.nip.io:8080/"
            - name: VERIFICATION_SERVER__STORAGE__URL
              valueFrom:
                secretKeyRef:
                  name: wallet-verifier-db-app
                  key: uri
